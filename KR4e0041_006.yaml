front:
  text: 眉菴集卷之六
  hash: sha256:23e9fe492d6e49c88e02078132e44de9494e9c72517165a5763970d170777b34
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_006-1a}
body:
  text: 五言律姑蘇楊基孟載著新嵗見月桞外纎纎白梅邊淡淡春年光兼月色此夜一時新未擬開金鏡先將照玉人更須三五夜相逐寶車塵雪中桞春雪晚蕭蕭隨鶯上桞條漸將絲共結終與絮俱飄淚粉凝啼眼珍珠壓舞腰東風自憐惜留映赤欄橋雪中燕燕雪兩差池相兼拂繡幃玉樓迷故壘珠箔見烏衣斜訝衝花落輕疑掠絮飛曉寒人未起還認畫梁歸元夕前對雨雪後亷纎雨江南淺淡春鶯花無那客燈火正愁人石潤苔生髮氷消水有鱗九衢明月夜車馬往來頻感春獨立何所愛江空春水遙舊情題竹見新恨對花銷束脯非沾祿聞鐘豈造朝慚非鞲上鶻風起欲凌霄近有近有山東信河南已退兵初聞通漢使又復叛齊城機笑多疑失師憐少算傾如何金四萬容易托陳平謝饒內史惠江芷花掩露猗猗情深寄一枝已看辭衆草還得近華芝緑艷明書積清芬落硯池野人無以報賴有木桃詩池閣晚興二首池閣敞重扉林光動淺漪病嫌紈扇早愁覺漏籖遲雨鶴飢猶立風荷弱屢欹冥冥空濶外極目見蛛絲久隂人迹斷苔徑雨痕交樹密枝藏果池清藕露苞鈴將驚鳥製檻或飯魚敲自笑囱間枕多眠覺面拗秋齋雜賦五首劉表知先主懷王識沛公未聞收夏口先已入關中今古車書異興衰曆數同方驚雞作鳯當信鶩非鴻今日長洲苑秋風列羽旗不圖新約法復見舊威儀鼓舞兒童樂歌謡父老悲煙埃方衮衮禾黍正離離歎息馮唐老吁嗟李廣賢窮通元有命生死詎非天鼓角西風裏江湖短髮前南飛有鴻鴈一字若為傳晚樹霜猶碧秋花雨未黃戎衣輕繡錦旅食尚糟粳驛路千山隔河流一葦航母憂兵不戰已定法三章邏卒去不返行人愁未回正須犀作甲母用玉為杯清淚尋常落丹心早晚灰交仍期管鮑書或似鄒枚七夕樓逈秋河逼簾虛夕露侵巧於間處乞愁向别時深月殿蛛絲繞星橋鵲駕臨年來孤此夜兒女亦傷心送沙天民之無錫兼簡張彥禎風雨送君行溪山傷我情故園春種麥髙桞暮啼鶯亂世難知已常談愧老生兹行見張翰懷抱得深傾謝雪坡參政入淮維舟竹外坡把酒唱離歌沙雪融將盡江花開未多淮兵春入戍津吏夜鳴河佇望南歸日君恩早賜羅早冬沙淺蒹葭白林深橘柚紅沙鳬晴趂日山隼夜呼風世亂嗟親老家貧任嵗窮平生迂懶意未忍即從戎露泫夜濃初滴橫江白漸多珠光聨玉陛金氣逼銀河甘和杯中屑涼侵襪底羅無人為收拾的爍滿秋荷梅花清夢為沈敬賦霜月路西東梨雲影淡濃孤燈數聲角急雪五更鐘時向愁邊得春於醉裏逢不須尋舊迹湖上兩三峯夜坐懷天倪逼仄僅容膝歸來方解衣冥冥孤鴈去擾擾亂蚊飛物理誰能識人情豈故違鄰家有修竹賴爾破愁圍宫怨舊寵憶專房羅衣有賜香偶來春沼上間坐緑隂涼鳯髻從教側蛾眉懶畫長新愁千萬種一種一思量送王季野為愛王崇教書名虞禇齊龍文題玉軸鳯册縷金泥滌硯雲生沼籠鵝雨滿溪諸山多晉刻時復到河西初夏過寧真道院真館坐微雨午階蘭氣清以兹魚鳥性遂識水雲情佳樹細花落清池圓葉生芳時與幽賞欣此一來并謔桞一首二句作春淺愛鵝黃春深葉漸長裊裊復揚揚春風折又長絮飛疑燕拂枝重覺鶯藏晚挂初三月秋零一夜霜江邊千萬樹此樹斷人腸隔鄰桃花春色護低垣晴梢露未乾不愁開處逺深恨折時難水或漂香出人應罷繡看願慿雙蛺蝶將夢過東闌孤坐春事忽已晚江雲仍久隂乾坤芳草闊風雨落花深思極難孤坐愁多却短吟豈無遊覽意觸目捴傷心閏七夕星橋方泣别銀渚喜重過鵲整初回駕鸞停暫擲梭歡如前會少情比去年多可是勤耕織恩容兩渡河秋日舟中見蝶趂暖戲晴川依人上畫船粉銷煙翅薄香冷露鬚拳野菜踈籬外山花小徑邊夜深桃李夢猶在綺羅筵孤雲為王子囦賦斷影落平湖隂雲逺更孤山川遺迹在天地此身俱空濶飛還白氤氲看欲無何須嘆漂泊神化亦須臾聽雪軒虛簷迸玉鳴入夜轉分明風嚮不相似雨聲無此清倚窗心不倦撥火耳頻驚道是梅花落梅花落更輕直溪間居處士居􅌉谷先生隱直溪水流無曲折沙或湧髙低船向花間入雲來竹外迷怡然沖淡意欲與古人齊荷葉圓的破蓬苞孤莖上藕梢雨撑栖鷺屋風捲蔭龜巢溪友裁巾幘墟人作飯包小娃曽已折新月裏湖拗桐樹珍木曙鴉啼瑶枝小鳯栖材憐工製瑟葉想戲裁圭涼送秋聲早隂移夜月低夢回踈雨滴人在轆轤西謝徐良夫惠米玉色西溪米蒲囊手自封恩同粟五秉寵過祿千鍾雲子鮮鮮滑紅芒細細舂加餐愧尸素飯飽一支笻季迪病目戲作不寐聽鄰鐘聲來覺耳聰夜吟斜避月曉立背當風萬象空花外千山霧雨中欲行俄觸戶昏晝問兒童溪山小隱何處溪山隱衡門對野橋晚風携鶴子春雨種魚苖小徑斜通竹踈籬曲護蕉人生間自足不用楚詞招盟鷗亭舊業水西頭新盟結衆漚群踈寒不散影獨暮相投􅔽蓞陂塘雨菰蒲野岸秋青田無白鶴得此復何求雨雨急愁雲黑窗虛愛竹青石泉流細細山鳥去冥冥醉裏傾荷葉飢來煮茯苓不知劉道士何用換鵝經愛竹軒為愛軒前竹平安愜此心雨聲西澗曉秋影北堂深瘦倚差差玉踈搖細細金冝容扶短䇿幽處一披襟偶題身懶交遊絶時危感慨新清江催短鬢芳草怨歸人花落縱橫雨鶯啼淡蕩春欲搖舟楫去波浪沒平津曉起曉起忽鈎簾青山在短簷花踈風更減衣薄雨重添别意因詩記間愁與病兼靈荃龜策在其奈不能占送胡鼎文遊越脈脈寒食雨差差桃李花君能輕逺别我獨愛春華山縣增新壘江流失舊沙不須探禹穴科斗已成蛙送孫彥聲都事之淮安忠襄不可見幕下得遺賢䇿可西平楚書能北首燕春旗硤石寨暮雨芍陂田勿易開邊隙兵交又十年贈沈真仲徵士花落滿煙莎蘭舟喜見過壯心丹未已愁鬢緑無多小燕斜斜舞新鶯婉婉歌都將舊遊意一笑付江波送王仲容之上海薄宦依東海孤城隔戍煙花踈寒食後人逺暮帆前深巷編蒲履斜岡種木綿母煩厭荒寂微祿有畬田寄葉德彰戴叔能江逺樹層層蒲荷葉漸增酒樽池閣雨碁局夜船燈竹淨刪逾瘦花踈掃未能亭亭川上鵠風急看飛騰寄海鹽楊寨官海嶼通村險邊城出敵遙旗燈秋塞雨鈴柝夜溝潮士飽爭投石農間數舞簫毋令廢收穫髙壠有枯苖送范彥章之雋里輕帆挂渚蒲兩日到南湖寨結防秋伍城添築壘夫多風棗花落少雨稷苖枯見説隨陽鴈嗷嗷滿路隅寄金友直縣令安吉山柵護層層城陴遇險增逺烽朝屢報髙櫓夜頻登薄産千株栗荒租半畝菱憐君治斯邑亦復有能稱過束氏廢園有感苑廢主頻更才登意即傾燕歸鄰屋住蛙聚野塘鳴瓦礫鴛鴦字溝渠環珮聲惟餘數株桞衰颯尚多情壺中插緋碧桃索髙二校書同詠麗質鬪春華纎穠間更嘉緑煙縈綺雪紅雨亂青霞醒醉休相妬仙凡自一家春風忽披拂點綴舞禋斜春暉堂春樹藹晴暉山雲並舍飛雙魚供處饌五綵戲時衣病每通宵坐貧長負米歸人方念離别得養似君稀瓶中插松竹緑蕚梅偶賦清肌不涴塵緑蕚破初勻松竹為三友芝蘭是四鄰未銷金殿雪曽報玉堂春欲借東風便持將寄逺人贈婉素同祀碧雞神絲蘿又結姻文如謝道韞書逼衛夫人兾缺終相敬梁鴻不厭貧還能事荆布歸釣五湖濱初夏試筆池閣已南風鶯殘藥自紅坐憐修竹裏行愛緑隂中衣濕蕉無力羅輕扇有功欲搖孤楫去江闊雨濛濛賀趙季文推官致仕白髮還家日青衫告老時鄉人邀入社朝士送題詩晚步鳩為杖晨餐肉作糜時時來故里能讀道傍碑年至即投簪非緣老病侵車無三驥錫囊有二疏金荷葉清江曲苔花緑樹隂不須休沐暇日日此追尋方氏園居十首北墅花連屋東園菊繞莊病長陪客坐老不厭人狂鵝鴨荒陂雨楂梨小樹霜他年倘相過里邑定名方多水少塵埃經年不掃苔竹繁頻洗葉松老别求栽雪寺看碑入雲窗晒帖開徐文與張羽乘月想能來秋氣入郊墟新涼似雨餘囊收試驗藥藁集著成書酒熟知愁減花開覺病除何曽廢錢買山果及溪魚解佩酬琴價將書當酒資竹樓聽雪夜梅屋看花時女嫁為農婦兒從作圃師鄰翁無奈俗招飲豈能辭昔事李輕車豪名動狹斜鶯聲吳苑樹􅍡色武陵花觀妓江樓月彈棊水殿霞歸來種瓜果鉏畚是生涯舊物嗟孤劒春風别五陵未衰先遣妾已靜更踈僧往事真騎虎中年得縱鷹兩溪千頃月談坐不須燈春社村村鼓豐年樂事同全家兩溪上連日百花中母送歸寧女兒邀讀法翁莫言田野意即是有虞風由來種瓜地隨處即青門習俗羞營利甘貧耻受恩挂蓑秋樹濕濯足晚溪渾欲訪齠年友漂零只自存園廬依緑水無吏索租錢嵗計千株橘秋衣半畒蓮飲先諸客醉詩許衆人傳為愛溪光好經旬獨棹船回汀兼復渚迢遞入漁邦有港皆通楫無山不到窗踈煙春隴犢深雪夜籬厖過客停舟問而翁恐姓龎眉菴集卷之六
