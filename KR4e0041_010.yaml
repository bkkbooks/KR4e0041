front:
  text: 眉菴集卷之十
  hash: sha256:f80d4981bb102297c8ca5e974ecced643dde8445cf1cd15b852dd7a575bda2e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_010-1a}
body:
  text: 五言絶句吳郡楊基孟載著新月光斜鏡露邊影沒眉鋪黛香烟隔院來知有佳人拜殘雪庭雪半消殘猶存舊臘寒春風知有意留待隔年看春夢二首春夢復春夢春夢何時曉啼鳥忽相呼花殘人又老春夢復春夢夢與覺時同縱使風吹破相看似夢中五色五色繡羅衣花多枝葉稀春來不敢著怕引蝶雙飛陌上桑青青陌上桑葉葉帶春雨已有催絲人咄咄桑下語優人乞米恢諧一面笑慷慨千鍾粟相逢莫歎貧農夫方夜哭隔簾聽歌低處最多情聲遲拍轉停坐中腸亦斷况乃隔簾聽仕女美女二圖獨立長門裏徘徊無所親可憐前殿月不照後宫人無人問起遲不語自支頥此意春風解深閨未嫁時花開花開醉不休花謝莫深愁縱使花長在東風也白頭壺中二色桃花素頰映紅腮西園共折耒憐渠竟先落知是最先開折花贈內并代答二首人面玉姢姢花枝更可憐慿從畫眉手折寄鏡臺前一朵折春風花濃意更濃而今映花面不似向時紅詠眉雙鸞畫得勻烟栁鬪輕顰莫對初三月姮娥妬殺人詠眼秋波含脉脉未轉己情通千古風流意都緣一盻中瓶中插梨杏桃李四花有詠各自媚春光輕紅映淺粧日融花氣暖忘却是誰香施君眠雲堂展雲作衾裯一榻秋隂冷曉睡重懵騰壓碎梨花影倪雲林畫竹寫竹是傳神何曾要逼真惟君知此意與可定前身題畫二首重耒竹滿坡竟失茅茨處忽記别君時門前五株樹泉爭亂石穿松激回飊響山經讀未終猿啼孤月上墨竹烟梢忽縱橫風葉屢偃仰一榻卧山中靜聽秋雨響墨葵晞髮待朝陽黃眉映墨粧午時人搗藥衣上有玄霜竹為僧賦猿啼石澗幽月出秋林靜孤僧耿未眠坐對蕭蕭影九鸞圖秋塘白鷺栖烟淡草萋萋一隻耒沙晚青山日又低彈琴髙士江靜月在水山空秋滿亭自彈還自罷初不要人聽栁塘春燕花落燕飛交春風在栁梢玉樓皆繡幕髙處莫安巢扇上畫四首雨歇見青山菰蒲第幾灣鷗來又飛去只有釣舟間江逺愛山低沙虛覺樹危靜中誰共賞橋上立多時雙桐石上栽四月始花開不見朝陽鳳秋風𣣔下來别夢蘋花外歸心燕子前齊王不好瑟塵土滿朱絃刺客四詠匙首秋啼聶政魂寒漬荆軻血報讐兼報恩刺人還自殺筑朝擊無秦聲暮擊皆死曲誰知腹中鉛㸌却壯士目椎公子終救趙留侯徒中車平生萬金客不及圯橋書劔差差三尺光氣奪萬乘貴立成千載功不出五步內轅門十詠胄雙簷鳳翅開虜見即心摧莫厭黃金重貂蟬自此來鎧重函鎖鐵堅葉葉金花錯將軍勇絶人尋取三副著纛羽葆矗青雲風搖翠羽分貔貅一百萬于此認中軍鉞寵錫王階前專征欲定邊奏功須右秉長在節旄先矛鈎鋒紫電明瘦幹青蛇滑馬上利長兵刺人須丈八刀掛帳殺風寒新磨血未乾酒酣曾斫虜不敢醉中看弓力能穿七札弝搰金梢短十萬羽林兒無人開得滿箙斜插虎豹皮掛向軍前戰射退黑山胡歸來有餘箭袍袍花對縫裁上刺黃金字著處萬人看是為君恩賜馬未鼓即騰驤身輕箭不傷明朝卸金甲歸牧華山陽天平山十四題龍門天開一罅通石古雙崖破中有波濤痕知是龍飛過石屋六丁運神斤鑿石為巨屋風雨繞入窗夜夜山鬼宿五丈石落星長百尺風雨忽中斷至今雷火焦突兀猶存半白雲泉冷冷白雲泉流向白雲邊泉水流不斷白雲飛上天一線泉石竇小如針泉飛一縷金天風吹不斷穿過白雲深卓筆峰露蘚凝斑管烟蘿束紫毫山靈罷揮灑卓立萬山髙飛來峰髙峰似玉臺何處忽飛來定向西天竺曇花頂上開釣魚磯老父兆非熊遺石此山久誰操百尺竿重試連鰲手蟾蜍石神蟇月中來化作千嵗石曾吞玉杵霜清露時時滴頭陀巖頭陀不可見巖石似當時草長齊肩髮雲裁百衲衣華蓋松飛蓋結龍形斜扛九曲青流螢枝上落疑是紫微星四時亭泉聲四時清山色四時好不知寒暑移但覺松杉老宿雲軒盈盈山中雲就我簷下宿昨夜雲不歸空閒半間屋照湖鏡圑圑山中石下照太湖影如何一鑑中三萬六千頃端陽十詠百索紅映釧金黃雙纒腕玉香閨愁千萬里羞比綵絲長叉符紅縠剪金蟇輕羅蔟艾花不須靈笈篆心靜自無邪守宫玉臼搗薰風蛾眉怨六宫長門深似海何用印花紅角黍紅絲繫緑蔓金糈沃香餳風雨羅江上家家祭屈平艾虎踞户𣣔生風當門勢自雄未能離草莽亦是駭兒童蒲觴蒲葉復蒲根香瓊泛緑樽亂離誰引壽聊𣣔奠湘魂鬪草珠玉賭牙籖爭奇手自拈一籌矜獨勝䄂有謝公髯射栁弓滿馬如飛沙平見柳枝雋功收一鏃多是飬由基擊毬低昂一㸃紅忽起青雲上風急下來遲衆人齊面仰競渡船頭花帽欹船尾花袍舞江神不敢行百面鼉皮鼓書懷朝梳髮尚玄夕鑑鬢已斑欣戚茍異懷妍悴即改顔聞柝孤館月如霜閣閣鳴秋柝羌兵未解圍淚逐寒聲落不寐有懷鵲寒栖未定裊裊風吹竹孤燈不厭貧斜照畸魂宿聞鴈天寒霜月苦人逺秋衣綻獨坐聽長夜燈前一聲鴈夢歸夢歸片時歡夢覺終夜惡𣣔起就殘燈鼠搖寒燼落燈花逺人無喜報何事有燈花莫是閨中說姑傍伴緝麻憶母齒落鬢鬖鬖新年九十三寸心猶未報一飯豈能堪憶子未知索果啼已解迎人抱平生䑛犢心時時背燈笑憶弟青州信息稀八桂音書絶思君無奈愁拭目都成血上書乞歸飬陳情𣣔上書意切辭語促復恐大官嗔燈前再三讀志喜咫尺近天顔殊恩得賜環滿沽彭澤酒歡飲看廬山對江望山朝看江上山暮看江上山山色信不改江流幾時還陪方員外看花步屧到花隂花踈更繞林留連今日意不是少年心夜坐窗寒雪亂飛鴈帶邊聲過對影却增愁吹燈暗中坐示楊水西親逺更家貧將歸未有因相逢難說與君是故鄉人逢故奴二首出門逢故奴倉卒塵中拜不暇相隨行街頭捧衣賣出門逢故奴怪我顔危槁茲事何足驚别離容易老雜畫十首芙蕖紅衣寒未脫緑蓋晴猶卷楚女棹歌回遙遙秋江晚萱草窗間宜男花本是忘憂草叉頭誰倒簮錢唐蘇小小夜落金錢朝開金錢小夜開金錢薄青閨卜逺人銀燈花共落蘭蘭葉弄秋暉蘭花帶露晞若將紉作佩相稱芰荷衣山茶細簇蜂脾蠟深裁鶴頂砂雪中誰共賞一樹玉梅花牡丹當時姚家黃花面濶一尺惆悵洛陽人而今多未識木芙蓉江寒浦溆多舉目皆衰草唯有拒霜花遙遙隔江好孔雀掉尾立花隂參差萬㸃金年年蕃國進不是孔家禽蛺蝶衣薰細細香鬚染盈盈露特地一雙飛花間惹人妬蜂結房山中樹暮歸香滿腹微物詎可輕針遲能藏毒白門逢别王之常一自吳中别于今已十年客邊喜相見風雨白門前沽取白門酒醉别鳴皋雲君我摽仕逸惕樂從此分長沙雜詠十首花深衆禽寂格格啼山鷓橈響一燈來人歸碧湘夜融融緑烟暖夢繞蘭苕外時倩鳥呼醒花濃春自醉東風吹小雨一夜滿瀟湘明月鷗波裏䕷蕪各自長髙樹蘿垂屈低垣竹掩花門前烟渚濶春水又沉沙網得湘中魚穿向湘邊栁一徑入花隂來換長沙酒寒沙竹塢深細雨烟江渺不聽野鶯啼那知是春曉密瓦栽斑竹踈籬種紫荆日斜墟市散時有虎經行筠嶼烟長碧蘭坡水自香只疑行畫裏忘却在瀟湘湘人愛樓居斜枕湘江起樓下倚闌人簮花照春水栁色帶輕嚬桃花露淺唇異鄉寒食近能得幾多春六言絶句內律一首附即景長眉短眉栁葉深色淺色桃花小橋小店沽酒新火新烟煮茶今年去年酒債三月兩月春愁看山看水出郭聽雨聽風倚樓東家西家燕飛明日後日春歸多愁多病送客無酒無錢典衣桃花杏花紅白蒲葉芷葉參差飛髙飛下胡蝶行去行來鷺鷥小景二首白雲浩浩秋色碧澗冷冷雨聲坐得松隂過石先生酒醒詩成雨雨風風路迷斷橋流水平堤出門苔徑泥滑喚取扁舟過溪初歸吳中感事附郭好山逺近近城流水西東人哭人歌夜月花開花落春風赤山間居二首荷鍤繞籬栽菊解衣石上觀松甘分簟食瓢飲底須千駟萬鍾抱膝長吟梁父折腰寧愧鄉兒酒呼白墮朝飲米雜雕胡晚炊逰靈岩懷古靈岩吳城西山名也舊為吳王夫差離宫名館娃者在焉今琴臺西施洞響屧廊採香徑八角井皆其遺跡尚存塵埋洞裏金蓮誰調臺上朱絃屧廊春盡花落香徑雲深鹿眠抉目臣亡此處捧心人去何年莫洗館娃遺恥山頂空流石泉濯清亭二首半江落日髙樹兩岸清風短莎莫怪滄浪水濁邇來濯足人多我濯塵纓水潯君垂雙足清隂自是秋江清濁滄浪孺子何心天心水靣亭二首海天萬里遙碧秋水一池鑑空莫問鳶飛魚躍看他明月清風動中消息春到靜裏工夫夜深三十六宫春意不道水面天心畫三首芙蓉江上秋色楊栁堤邊月明莫教西軒種竹客中無奈秋聲五株樹下待月三板橋頭賦詩童子不知人意棹歌却怪歸遲一箇茅亭晚渡數聲啼鳥秋林愛他湖上山色立盡溪頭樹隂自嘆白髮慈親九十紅塵客路三千歸去桃花源裏綵衣萱草堂前眉菴集卷之十
