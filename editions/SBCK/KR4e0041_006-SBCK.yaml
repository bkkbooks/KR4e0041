front:
  text: 眉菴集巻之六
  hash: sha256:1447c5a8264f342b1bd7672603d650b40985bce5a29cc4014071e93e0066054b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_006-1a}
body:
  text: 五言律姑蘇楊基孟載著新嵗見月桞外纎纎白梅邊淡淡春年光兼月色此夜一時新未擬開金鏡先將照玉人更湏三五夜相逐寳車塵雪中桞春雪晚蕭蕭随鶯上桞條漸將絲共結終與絮俱飄淚粉凝啼眼珎珠壓舞腰東風自憐惜留映赤欄橋雪中燕燕雪两差池相兼拂繡幃玉樓迷故壘珠箔見烏衣斜訝衝花落輕疑掠絮飛曉寒人未起還認畫梁歸元夕前對雨雪後亷纎雨江南淺淡春鶯花無那客燈火正愁人石潤苔生髪氷消水有鱗九衢明月夜車馬徃来頻感春獨立何所愛江空春水遥舊情題竹見新恨對花銷束脯非沾禄聞鐘豈造朝慚非鞲上鶻風起欲凌霄近有近有山東信河南已退兵初聞通漢使又復叛齊城機咲多疑失師憐少算傾如何金四萬容易托陳平謝饒内史惠江芷花掩露猗猗情深寄一枝已㸔辭衆草還得近華芝緑艶明書積清芬落硯池野人無以報頼有木桃詩池閣晚興二首池閣敞重扉林光動淺漪病嫌紈扇早愁覺漏籖遲雨鶴飢猶立風荷弱屡欹㝠㝠空濶外極目見蛛絲乆隂人迹断苔逕雨痕交樹宻枝藏果池清藕露苞鈴將驚鳥製檻或飯魚敲自咲囱間枕多眠覺面􅉾秋齋雜賦五首劉表知先主懷王識沛公未聞􅀵夏口先已入関中今古車書異興衰暦数同方驚雞作鳯當信鶩非鴻今日長洲􅁐秋風列羽旗不圖新約法復見舊威儀鼔舞兒童樂歌謡父老悲烟埃方衮衮禾黍正離離歎息馮唐老吁嗟李廣賢窮通元有命生死詎非天皷角西風裏江湖短髪前南飛有鴻鴈一字若為傳晚樹霜猶碧秋花雨未黄戎衣輕綉錦旅食尚糟糠驛路千山隔河流一葦航母憂兵不戰已定法三章邏卒去不返行人愁未囬正湏犀作甲母用玉為杯清淚尋常落丹心早晚灰交仍期管鮑書或似鄒枚七夕樓逈秋河逼簾虛夕露侵巧於間䖏乞愁向别時深月殿蛛絲繞星橋鵲駕臨年来孤此夜兒女亦傷心送沙天民之無錫兼簡張彦禎風雨送君行溪山傷我情故園春種麥髙桞暮啼鶯亂世難知已常譚愧老生兹行見張翰懷抱得深傾謝雪坡參政入淮維舟竹外坡把酒唱離歌沙雪融將盡江花開未多淮兵春入戍津吏夜鳴河佇望南帰日君恩早賜羅早冬沙淺蒹葭白林深橘柚紅沙鳬晴趂日山隼夜呼風世亂嗟親老家貧任嵗窮平生迂懶意未忍即􅀙戎露泫夜濃初滴横江白漸多珠光聨玉陛金氣逼銀河甘和杯中屑凉侵襪底羅無人為収拾的爍滿秋荷梅花清夢為沈敬賦霜月路西東梨雲影淡濃孤燈数聲角急雪五更鐘時向愁邊得春於醉裏逢不湏尋舊迹湖上兩三峯夜坐懷天倪偪仄僅容膝帰来方觧衣冥冥孤鴈去擾擾亂蚊飛物理誰能識人情豈故違隣家有脩竹頼尔破愁圍宫怨舊寵憶專房羅衣有賜香偶来春沼上閑坐緑隂涼鳯髻􅀙教側蛾眉懶畫長新愁千萬種一種一思量送王季野為愛王崇教書名虞禇齊龍文題玉軸鳯册縷金泥滌硯雲生沼籠鵝雨滿溪諸山多晉刻時復到河西初夏過寧真道院真舘坐微雨午堦蘭氣清以兹魚鳥性遂識水雲情佳樹細花落清池圓葉生芳時與幽賞欣此一来并謔桞一首二句作春淺愛鵝黄春深葉漸長裊裊復揚揚春風折又長絮飛疑燕拂枝重覺鶯藏晚掛初三月秋零一夜霜江邊千萬樹此樹断人腸隔隣桃花春色䕶低垣晴梢露未乾不愁開䖏逺深恨折時難水或漂香出人應罷綉㸔願慿雙蛺蝶將夢過東闌孤坐春事忽已晚江雲仍乆隂乾坤芳草闊風雨落花深思極難孤坐愁多却短吟豈無遊覽意觸目捴傷心閏七夕星橋方泣别銀渚喜重過鵲整初回駕鸞停暫擲梭歡如前㑹少情比去年多可是勤耕織恩容两渡河秋日舟中見蝶趂暖戱晴川依人上畫船粉銷烟翅薄香冷露􅂡拳野菜踈籬外山花小逕邊夜深桃李夢猶在綺羅筵孤雲為王子囦賦断影落平湖隂雲逺更孤山川遺迹在天地此身俱空濶飛還白氤氲㸔欲無何湏嘆漂泊神化亦湏臾聴雪軒虚簷迸玉鳴入夜轉分明風嚮不相似雨聲無此清倚窓心不倦撥火耳頻驚道是梅花落梅花落更輕直溪閑居䖏士居􅌉谷先生隠直溪水流無曲折沙或湧髙低船向花間入雲来竹外迷怡然冲淡意欲與古人齊荷葉圓的破蓬苞孤莖上藕梢雨撑栖鷺屋風捲䕃􅀛巢溪友裁巾幘墟人作飯包小娃曽已折新月裏湖􅉾桐樹珎木曙鴉啼瑶枝小鳯栖材憐工製瑟葉想戱裁圭凉送秋聲早隂移夜月低夢回踈雨滴人在轆轤西謝徐良夫惠米玉色西溪米蒲囊手自封恩同粟五秉寵過禄千鍾雲子鮮鮮滑紅芒細細舂加飡愧尸素飯飽一支笻季迪病目戱作不寐聴隣鐘聲来覺耳聡夜吟斜避月曉立背當風萬象空花外千山霧雨中欲行俄觸戸昏晝問兒童溪山小隠何䖏溪山隠衡門對野橋晚風携鶴子春雨種魚苖小逕斜通竹踈籬曲䕶蕉人生閒自足不用楚詞招盟鷗亭舊業水西頭新盟結衆漚群踈寒不散影獨暮相投􅔽蓞陂塘雨菰蒲野岸秋青田無白鶴得此復何求雨雨急愁雲黒窓虛愛竹青石泉流細細山鳥去㝠㝠醉裏傾荷葉飢来煑茯苓不知劉道士何用換鵝經愛竹軒為愛軒前竹平安愜此心雨聲西澗曉秋影北堂深瘦倚差差玉踈揺細細金冝容扶短䇿幽䖏一披襟偶題身懶交㳺絶時危感慨新清江催短髩芳草怨歸人花落縱横雨鸎啼淡蕩春欲揺舟楫去波浪沒平津曉起曉起忽鈎簾青山在短簷花踈風更减衣薄雨重添别意因詩記閑愁與病兼靈荃龜筴在其柰不能占送胡鼎文遊越脉脉寒食雨差差桃李花君能輕逺别我獨愛春華山縣増新壘江流失舊沙不須探禹穴科斗已成蛙送孫彦聲都事之淮安忠㐮不可見幕下得遺賢䇿可西平楚書能北首燕春旗硤石砦暮雨芍陂田勿易開邊隙兵交又十年贈沈真仲徵士花落滿烟莎蘭舟喜見過壯心丹未已愁鬂緑無多小燕斜斜舞新鶯婉婉歌都將舊遊意一咲付江波送王仲容之上海薄宦依東海孤城隔戍烟花踈寒食後人逺暮㠶前深巷編蒲履斜崗種木綿母煩厭荒寂微禄有畬田寄葉徳彰戴叔能江逺樹層層蒲荷葉漸増酒樽池閣雨碁局夜船燈竹淨删逾瘦花踈掃未能亭亭川上鵠風急㸔飛騰寄海塩楊砦官海嶼通村險邊城出敵遥旗燈秋塞雨鈴柝夜溝潮士飽爭投石農閑数舞箾毋令廢収穫髙壠有枯苖送范彦章之雋里輕㠶掛渚蒲两日到南湖寨結防秋伍城添築壘夫多風棗花落少雨稷苖枯見説随陽鴈嗷嗷滿路隅寄金友直縣令安吉山栅䕶層層城陴遇險増逺烽朝屢報髙櫓夜頻登薄産千株栗荒租半畆菱憐君治斯邑亦復有能称過束氏廢園有感􅁐廢主頻更􅅻登意即傾燕歸隣屋住蛙聚埜塘鳴瓦礫鴛鴦字溝渠環珮聲惟餘数株桞衰颯尚多情壺中挿緋碧桃索髙二校書同詠麗質闘春華纎穠間更嘉緑烟縈綺雪紅雨亂青霞醒醉休相妬仙凡自一家春風忽披拂㸃綴舞䄄斜春暉堂春樹藹晴暉山雲並舎飛雙魚供䖏饌五綵戱時衣病毎通宵坐貧長負米歸人方念􅄐别得養似君稀瓶中挿松竹緑蕚梅偶賦清肌不涴塵緑蕚破初勻松竹為三友芝蘭是四隣未銷金殿雪曽報玉堂春欲借東風便持将寄逺人贈婉素同祀碧鷄神絲蘿又結姻文如謝道韞書逼衛夫人兾缺終相敬梁鴻不厭貧還能事荆布歸釣五湖濱初夏試筆池閣已南風鶯殘藥自紅坐憐脩竹裏行愛緑隂中衣濕蕉無力羅輕扇有功欲揺孤檝去江闊雨濛濛賀趙季文推官致仕白髪還家日青衫告老時鄉人邀入社朝士送題詩晚步鳩為杖晨飡肉作糜時時來故里能讀道傍碑年至即投簪非縁老病侵車無三驥錫嚢有二䟽金荷葉清江曲苔花緑樹隂不湏休沐暇日日此追尋方氏園居十首北墅花連屋東園菊遶庄病長陪客坐老不厭人狂鵝鴨荒陂雨楂梨小樹霜他年倘相過里邑定名方多水少塵埃經年不掃苔竹繁頻洗葉松老别求栽雪寺看碑入雲窓晒帖開徐文與張羽乗月想能来秋氣入郊墟新凉似雨餘嚢􅀵試驗藥藁集著成書酒熟知愁減花開覺病除何曽廢錢買山果及溪魚觧佩酬琴價將書當酒貲竹樓聴雪夜梅屋㸔花時女嫁為農婦児從作圃師隣翁無柰俗招飲豈能辭昔事李輕車豪名動狹斜鸎聲吳苑樹􅍡色武陵花觀妓江樓月弹棊水殿霞歸來種􅀲果鉏畚是生涯舊物嗟孤劒春風别五陵未衰先遣妾已靜更踈僧徃事真騎虎中年得縱鷹两溪千頃月談坐不湏燈春社村村鼔豊年樂事同全家两溪上連日百花中母送歸寧女兒邀讀法翁莫言田野意即是有虞風由來種􅆶地随䖏即青門習俗羞營利甘貧耻受恩掛蓑秋樹濕濯足晚溪渾欲訪齠年友漂零只自存園廬依緑水無吏索租錢嵗計千株橘秋衣半畒蓮飲先諸客醉詩許衆人傳為愛溪光好經旬獨棹船回汀兼復渚迢逓入漁邦有港皆通檝無山不到窓踈烟春隴犢深雪夜籬厖過客停舟問而翁恐姓龎眉菴集巻之六
