body:
  text: 眉菴詩集序予布衣時雅聞楊孟載先生名及入翰林為史官奉􅃙纂􅁱大明一統誌攷先生先丗予蜀嘉州人因大父仕江左而生吴中遂家焉又誦先生詩云我家岷山更西住正見岷山發源䖏扵是乎益知先生雖生吴中寔蜀人也先生生于元末仕于國初宏逺之噐醇正之學初任榮昜令再謪鍾離閑居江寧句曲久之􅀍薦陞江西省幕賔復使湖南廣右累官山西按察使誌載先生讀書日記數千言􅀹工扵詩與髙啓徐賁張羽為詩友故時有髙楊張徐之稱云先生􅀁著眉菴集有五七言古體五七言律詩及歌行排律絶句詞曲総若干篇教授鄭鋼編集巳板行矣字多訛􅍝先後失序而缺略􅀹甚識者惜焉吴中張公企翶以名進士累官廣東僉憲素重先生之詩毎遇公暇輒研䆒之補其缺略次其先後􅂂厯之序字之訛􅍝者悉攷正之釐為十二卷繡梓以廣其傳其用心亦厚矣㢤間以示予俾為之序夫詩言志也三百篇之後變而為漢魏為六朝宋元以前惟唐為盛今先生之詩穠䴡纎蔚藹然正大和平之音殆有唐人風味夫豈易得者㢤僉憲公􅀎俾先生之詩大顯于天下後世天下後世即其詩可以知其志知其志可以知其人然則先生不但有光扵吴而且有光扵蜀也予後生小子因僉憲公之命不敢以􅓎悠辭而僣序之其景仰之誠得不扵是而少舒㢤成化二十年夏六月既望賜進士奉直大夫廣東市舶提舉前翰林侍讀學士經筵官兼太子講讀古渝江朝宗書眉菴集目録卷之一五言古體感懷十四首漢傑士六首秋懷秋夜言懷四首送謝防禦送丁將作送陳資深贈跛奚登靈岩和韻贈别龔行義贈張主簿與陳時敏送王國忠雨中効􅅊體西齋聞晚鶯􅀄夏過道院净瓶送王主簿賦舍利塔空齋逰北寺竹林乆雨期袁宰不至寓感贈馮瘍醫東皋􅀚魚萍季迪病目夢親堂夀萱堂虎丘值雨贈毛生殘燈附和晚節堂梁溪暮歸山中言憂樂二首贈真性空蘭室聴松軒僧寺感秋守愚齋除夕冩懷吴宫遺跡八詠荅髙二䀻君自題宜秋軒贈錢祐之淮隂祠送錢叅政􅀉内婉素客舘秋思夢綵堂贈許山人三首送許山人舟中有感出臺復還洪都曉發石頭口送陳管勾賦南昌亭送䖏士送方以亨送方員外省中􅀣午窓坐睡白髪嵗暮書事過上藍寺對江望山晞髪發南浦望西山夜過市􅆜馹與洪鎮撫話霧中望新淦城泊五老峯下湖西望瀑布聞廬山雷鳴望蘄州過小􅀌贈漢隂老父吊賈太傅望岳麓望南岳過魏夫人祠衡陽逢丁㤗發衡州湘女湘江道中湘竹有題􅄋澗灘别劉啓賢過道士洑過仙家岩零陵感春瀟湘八景登三夏故城過長平有感至太原卷之二七言古體逰穹窿山姑蘇臺雪坡索詩着色西湖景約范園看花草堂芙蓉尚梅軒王叔明􅀞􅁄竹三禽圗詠七姊妹花贈鑷工王生􅀞爲包師聖題沈仲真恵梅趙善長􅀞夜聞異香贈吕道士巧石双松圖清溪漁􅀮聞蟬􅀞馬贈故人全王孫歎道傍野花夜􅀫静嘯軒巢雲對雪禁體聴老京妓歌送劉子逺喜客来送章教諭雨中看花白門送范謙送李琴川冝秋軒桂冝秋軒梅贈别徐季子送吴居易周曽秋塘圖北山梨花句容送蔡惟中贈許白雲喜雨杜伯淵送新米月灣秋影贈蕭䖏士别哭翟好問卷之三七言古體夢題雲山圖省掖􅀚梅西省海棠千葉桃花憶北山梨花清明看花方貟外看花樟􅀣鎮舟中望廬山聞鄰船吹笛春江對雪春江雪霽雪中登黄鶴再登黄鶴楼湘中見春鴈登岳陽楼長江萬里圖湘江秋意圖湘漢秋晴圖湘隂廟梨花㽞題湘江寺祈陽行皂角灘湘中四詠過高郵新湖夢緑軒蔡河懷徐㓜文鄭州道中題水西草堂留别楊公輔送朱明善并州對雪卷之四歌行齊老曲鐡笛歌擊筑吟董君行白頭母吟附李道士歌九峯行招鶴詞黄鶴生歌玉鵉引玉仙謡附釣鰲海客歌春風行山中雲歌春愁曲新絃曲結客少年場毬場曲病駞行廢宅行􅀒蓑行醉歌行梁園飲酒歌癡頑子歌白􅁑篇代贈憶昔行卷之五長短句體梅邉讀易􅀚眠松有感覇王丘過陳湖送孫照庵七賢過関圖宋宫􅀚潮圗漁樵問話圖七􅋙圖春􅱜捕雀圖夫織蒲麥田髙休採花詞雲樵􅀞鴈送張山長挂劍䑓狼山青霜葉紅君莫疑錦㠶涇送􅁑仲行七色荼䕷花双春堂元日立春白雲書舍九日賞菊苧􅀮送朱孟仁彭蠡阻風南康望廬山登繩金塔過劍江聞鷄癸丑元日憶省掖桃花水雲居題李叅政紅竹卷之六五言律新嵗見月雪中柳雪中燕元夕前對雨感春近有謝恵江芷池閣晚興二首秋齋雜賦五首七夕送沙天民雪坡入淮早冬露梅花清夢夜坐懷天倪宫怨送王季野􅀄夏過道院謔柳隔隣桃花􅀌坐閏七夕秋日舟中見蝶􅀌雲聴雪軒直溪閑居荷葉桐􅀣謝徐良夫恵米季迪病目溪山小􅀮盟鷗亭雨愛竹軒偶題曉起送胡鼎文送孫都事贈沈真仲送王仲容􅀉葉德彰􅀉楊砦官送范彦章􅀉金縣令過束氏廢園壼中緋桃春暉堂瓶中緑蕚梅贈婉素􅀄夏試筆賀趙推官方氏園居十首卷之七五言律省垣對雨二首贈秦侍儀送劉翰林􅀫季迪京舘春盡聞鶯聲題牛侍御􅀞和懷弟之作懷赤山舊業夏夜有懷逢鄭校書江村雜興首折二十秋日郊居杜伯寜相過懷句容諸友送劉少府贈華陽道士客懷過龍江沙河舟中逢張孟㳟逢丘克荘發淮安􅀉婉素盱眙懷古舟中聞促織元夕前雨人日懷髙啓哭陳都事送沈縣丞􅀉張彦禎省中牡丹燈洪都立夏前有賦東湖晚晀湖口見月風雨泊舟晚過秋浦晚登峨眉亭沙河至采石逢俞武仲江船早起夜坐夜坐聞江聲江船聞柝􅀫雲巷三首晚過大悲閣至吴城山謁龍君廟出蠡望廬山夜泊聞笛江邉小旗亭雨中登湖亭鸚鵡洲折蘭見􅀉岳陽樓舟中聞杜䳌􅀫巴􅁜入永州零陵二首湘中雜言九首􅀄入山西境山西秋日省垣對雪五言排律水邉見新燕送趙景普京城􅀚燈送傅憲使送竺孟容衞氏挽章祀社稷述事晉邸北狩卷之八七言律送路季璉聞官軍南征􅀉楊鐡厓先生悼朱總制送謝雪坡送謝叅軍朝京郡齋飬痾送潘省叅挽吕輔之叅軍送錢思復登石湖山亭虎丘遊和韻追送徐孟岳􅀉王常宗􅀉醉樵饒介之送胡張二師送趙智送人之上海書張夢辰舟留書雲間元夕次韻和謝雪坡􅀉送鄭本􅀄􅀉謝􅀮君贈勤上人别􅀉林訓導謨何明府見過漫興聞雪坡將還懷王􅀮君附荅懷髙著作附荅江村寒食乘槎白雲深䖏聴秋軒雨中懷沈逹卿天妃宫題皇妃對奕圗問梅望太湖􅀄春二首春日雜詠四首見花清明後見花立夏木茶爐竹素圗栽竹鵝翎菊卜流梅花夢徴赴京到京奉天殿早朝新正試筆雪東風元夕􅀚燈塔燈應制上馬簡方貟外送周錬師感春春日出郊送杭太祝送安南使臣送僧住北禪悼楊文舉送鄭與權題玉真􅀚送俊用章春宵樓狂歌秦淮官舎晚春寓江寜村新柳春草春水􅀣底白髪减衣清明冩懷江畔㝷花上已對雨用前韻書事白門冩懷用韻春暮有感夜坐漸老畣李仲弘移家􅀉張揭二文學夜坐聴雨不􅄰雨中獨坐江墅晚歩自咲用前韻梅杏桃李卷之九七言律罷職寓句曲賣􅂁􅀉諸􅁑彦飛冝秋軒對月登茅峰不果􅀫清元道舘哭髙季迪豫章早春登洪都城浦口逢春過豐城夜泊臨江省垣對雨江郭對雨􅀉牛理問懷班大叅懷萬􅀰中􅀉劉儀部懷王節推懷方員外次前韻遣興冬夜􅀫江右祖母􅀄度思親别省垣諸友望夫石登娥眉亭謁小姑廟大姑遇老衲鄱陽湖喜晴懷申屠衡晚泊湓浦過黄州武昌夜泊吕仙祠過洞庭過龍君廟岳陽回仙夢覺舟中聞吴歌途次感秋渡漢江哭李太守三湘過黄陵廟江邉㝷花興安道中来陽江􅀉書祁陽道中衡陽有懷客中寒食桂林􅀚兵桂林即興二首聞江聲有感晚發􅀲洲􅀫楊州南門邵白懷徐賁過髙郵即景淮安候船至􅀛山有題贈林通判懷許知府太原郊行清明懷故園􅀉王知司􅀉舊契張来儀懷宋大叅􅀉陳􅃹勾無題卷之十五言絶句新月殘雪春夢二首五色陌上桑優人乞米隔簾􅃪歌仕女羙女圗花開壺中二色桃贈内并代荅詠眉詠眼瓶中四花施君眠雲堂倪雲林􅀞竹題􅀞二首墨竹墨葵竹為僧賦九鷥圗弹琴髙士柳塘春燕扇上􅀞四首剌客四詠轅門十詠天平山十四題端陽十詠書懷聞柝不􅄰有懷聞鴈夢歸燈花憶母憶子憶弟上書乞歸養志喜對江望山陪方公看花夜坐示楊水西逢故奴二首雜􅀞十首逢王之常二首長沙雜詠十首六言絶句律一首内附即景小景二首􅀄歸感事赤山閑居二首登靈岩吊古濯清亭二首天心水面亭􅀞三首自嘆卷之十一七言絶句天平山中寒食有感過隣家撥悶憶均二弟称称􅀄度回文二首􅀞三首二仕女圗夢逰西湖燈夕㣲雨紅梅水仙十二紅圗柳枝詞故山春日七首雨中對杏花壺中碧桃花時感事雨中對花三首春半春暮西園雜興落花嘆三月晦日仕女四春圖斯道遺梔花屋後種松松下􅃦齋見螢火看蜘蛛􅀘網粉􅇛兒花見􅂵􅅔有感蓮渚泛舟避暑貽羙人夏日赤山漫興過鄧尉山二首􅃹夫人墨竹趙仲穆墨蘭白描芍藥圗睡起圖張仲敏竹藍釆和像贈胡校理贈薛如鑑􅀉無錫張彦禎􅀉陳惟寅松陵道中青山白雲圗􅀫雲竹居題􅀞四皓煩伯定移菊八日對菊徽宗草蟲二羙人圖剌綉倦綉圖附題仕女二白練圗代贈所懽三首枇杷青鳥遇詢故園贈京妓出金陵城南挹翠亭聴歌江寧雨中江村漫興三首􅀄到京春日懷江南春盡聞鶯乞珉玉巾環夢髙季迪秋夜江邉見紅葉客中懷弟妹沙河􅃪雨舟中書所見舟中聞絡緯客中憶弟夢称称過琵琶亭詠姑山梅花出江看廬山廬山看雲又看廬山無雲舟泊南湖三首途中題􅀞送二生還山西到省對花題方貟外像雜􅀞六首聞鵲吊赤璧舟中見雪珠鯉魚山阻風夏口望武昌德安山中岳陽阻風過洞庭口􅃅湘江對雨楚江秋意圖經汨羅廟祁陽道中五首潭州雜懷九首舟回看廬山望五老峯送李都司嘆道傍廢宅􅀚剥􅀥重過文竹軒送陳明善過下蔡過竇鳴犢祠梁園聞鴈登宋宫故基太行望雲到山西題􅀞梅太原見榴花􅀚晋祠泉曉度鴈門題罷釣圗除夜卷之十二詞曲江寜冩懷春思春水折柳四春圖梨花夜月瓶中四花春閨怨春恨嘲春四詠紅白桃花柳鶯燕三詠絮暮春見花句曲閒居春暮試衣暮春送春詠鷗江寜閒居荅屠仲權見􅀉夏􅀄臨􅀄夏閒居卜居詠塵詠簾題隔屏仕女感秋重陽感舊詠雪禁體客中夀婉素旅中感舊月夜過釆石江船􅃪雨江邉落梅夜泊大姑廟臨湘雪夜巴陵雪夜岳陽春暮衡陽道中秋雨舟中見新燕湘中書所見花邉夜􅀫祁陽聞蛙旅中春曉山西途中􅀉王止仲憶故園眉菴集目録終
