front:
  text: 眉菴集巻之十二
  hash: sha256:4a6f7179819401df2d7969f552cdebd16e3d3c35d700f710ffeb2634faee70e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_012-1a}
body:
  text: 詞姑􅂫楊基孟載著江寜春舘寫懷清平樂四闋春氷銷後緑水粼粼皺减却風流添却瘦多在黄昏時􅀱匆匆啇女琵琶蕭蕭白髪烏紗金谷園中芳草􅀇都觀裏桃花自從别後眉也尋常皺瘦得腰肢無可瘦又是魂消時􅀱當時纎手琵琶東風小雨窓紗今夜相思何䖏月明滿樹梨花梅酸杏小人與春俱老一架荼䕷開遍了能得歡娛多少隂隂緑􅀣青苔都無半㸃塵埃寄語此中􅆐鶴先生早晚歸來狂歌醉舞俯仰成今古白髪蕭蕭􅅻幾􅈁聴遍江南春雨歸來茆屋三間桃花流水潺潺莫向窓前種竹先生要㸔西山春思多麗問鶯花底事蕭索是東風釀成細雨晚來吹滿樓閣辟寒金再簮寶髻鎮帷屏重護香幄杏惜生紅桃緘淺碧向人憔悴未開一蕚念惟有淡黄楊栁搖曵珠箔凭闌乆春鴻去盡錦字誰托柰夢裏清歌妙舞覺來偏更情惡聴髙樓数聲􅆧笛􅃹多少殘夣梅花驚落鴛帶慵寛鳯鞋􅂴綉新晴誰與共行樂料應在楚雲湘水深䖏望黄鶴不似栁花長任恁漂泊春水沁園春巴蜀雪銷湘漢氷融净無片埃㸔風吹皺緑晴􅉼杜若雨添香膩暖浸莓苔江漲魚鱗溪沈燕尾嬴得沙鷗􅀫鷺猜花隂下見行人待渡芳意徘徊湖􅁁十二樓臺映多少朱簾影倒開愛緑醅可染蒲萄新釀麴塵低蘸楊栁􅀄栽􅁱褉人歸浣紗女去猶有餘香拂岸來多情䖏汎桃花無数流出天台折栁清平樂欺烟困雨拂拂愁千􅈁曽把腰肢羞舞女嬴得輕盈如許猶寒未暖時光將昏漸曉池塘記取春來楊栁風流正在輕黄四春圖四景美人各賦浣溪沙一闋雲母玲瓏七寳屏玻璃㶑灧百花棚笙簫羅綺一層層信手摘將金荔擲教人扶下綵車行六街明月萬家燈右元夕鵉股先尋閗草􅁫鳳頭新繡踏青鞋衣裳宫様不湏裁雕玉疊成鸚鵡架泥金鎸就牡丹牌明朝相約㸔花來右花朝軟翠冠児簇海棠砑羅衫子綉丁香閒來水上踏春陽風暖有人􅀎作伴日長無事可思量水流花落任怱忙右上己暖雨香雲百五天玉纎銀甲十三絃咲移羅幙上紅船照水再簮珠絡索背人重貼翠􅇛圓安排花裏蹴秋千右寒食梨花夜月善薩蠻水晶簾外姢姢月梨花枝上層層雪花月兩糢糊隔簾㸔􅁒無月華今夜黒全見梨花白花也咲姮娥讓他春色多瓶中四花瓶挿梨杏桃李各一枝踏莎行小小含風盈盈帶露折來仝向銀瓶貯朱唇偏耐雪霜寒氷肌不受胭脂汚瘦燕休矜肥環莫妬東君一様憐蠻素若教淺淡咲深濃大家都被嬋姢誤春閨怨蝶戀花二闋淨洗胭脂輕掃黛閗草亭􅁁自抝梨花戴一叚心情空自愛風流那得常時在屈指春光歸已快不捲朱簾又恐東風怪花影低將新月碍小闌干外深深拜新製羅衣珠絡縫消瘦肌膚􅁒試猶嫌重莫信鵲聲相侮弄燈花幾度成春夢風雨又將花斷送滿地胭脂補盡蒼苔空獨自移將萱草種金􅁫挽得花枝動春恨千秋􅀊栁花飛盡魚鳥無音信盃减量愁添鬂梅酸心未老藕断絲猶嫩歡咲地轉頭都做江淹恨香冷灰銷印燈暗煤生暈空自觧誰偢問夜長春夢短人逺天涯近庭院晚一簾風雨寒成陣嘲春四詠如夣令昨夜雪晴風小羅幙嫩寒猶悄天氣近花朝江上燕児來了催曉催曉隔􅀣数聲啼鳥右春曉瞥眼韶華如織粉退紅嫣忽忽堪詫是東君忙去都忘相識可惜可惜芳草謾連天碧右春暮㸃綴落梅穠李埋沒蒼苔芳芷楼上倚闌人立在玉屏風裏風起風起都做一江春水右春雪銀渚拂波輕度羅幄送寒低護催得百花開又與百花相妬無数無数吹過􅀞欄西去右春風紅白桃花採桒子淺碧深紅是誰家分染桃花片兩枝爭艷青粉墻頭見深䖏娉婷淺更多嬌倩昭陽殿玉環飛燕各自東風面栁鶯燕三詠㸃絳唇裊裊婷婷為誰僝􅄽腰如把小桃相亞低拂前簷瓦深䖏鶯蔵不怕金丸打章臺下幾株如􅀞繫着青􅍡馬何䖏飛來栁梢一㸃黄金小哢晴催曉喉舌如簧巧春夣湏􅁷正繞江南道空相惱被他驚覺緑遍池塘草王謝堂前舊時簾幙深如許自從歸去花落春無主緑水橋􅁁茅屋人家雨花深䖏有人相妬掌上輕盈舞絮憶秦娥東風惡一江春水楊花落楊花落惹人衫袖綴人簾幙才飛却墜能纎弱倐來還去無拘着無拘着山遙水逺任伊飄泊暮春見花踏莎行白皺沾苔紅輕惹絮落花堆積無層數當時開折頼東風漂零還是東風妬􅀫雨初晴低烟欲暮綿綿芳草迢迢路緑隂深䖏聴啼鶯鶯聲更在深深䖏淺碧凝鬚輕紅染瓣東風着意催初綻不湏抵死恨開遲遲開却得遲遲看醉眼微醒覊魂欲斷斜陽流水東西岸只知人有萬千愁花枝更有愁千萬句曲閒居春暮賀新􅀰自離西江省幕謫句曲已徂春矣寓居無聊未免感時撫事援填古詞用撥新悶云風晴􅀣隂薄正簾櫳楊花飛盡楝花吹落一逕青苔無人到翠葆時翻露籜聴􅀣頂長鳴孤鶴半沼香萍風約住見新荷影裏㕠魚躍多少恨頓忘却踈狂莫咲今非昨想當時狂歌醉舞轉頭都錯内苑櫻桃纎纎手勸薦金盤杏酪夣不到南薰池閣丗事多因忙裏悞􅄸人生只有閒中樂且對酒任漂泊試衣賣花聲風暖試輕羅簾外婆娑落花重疊滿柔莎細數輕羅衫上淚更比花多無語却臨波低歛雙蛾玉容春色两消磨多少相思無限恨一葉新荷暮春錦堂春芍藥闌􅁁按樂荼䕷屏下圍棊春光正在多情䖏腸斷􅁒歸時踈雨一池荷葉緑隂千􅀣黄􅕢那些清景無人觧只許自家知送春㸃絳唇栁上梅􅁁那時庭院􅀄相遇杜鵑啼䖏驀地抛人去春也多情故繞江􅁁􅀣風兼雨落花飛絮併得難停住詠鷗南郷子春水緑迢迢長與鳬鷖㸃翠苗一向逐波浮不定飄飄又趂東風下晚潮閒倚木蘭橈相近相親不用招今夜月明何䖏覔遙遙兩岸蘆花雪未銷江上閒居冩懐青玉案七闋王孫芳草生無数漸緑遍長干路春色匆匆愁裏度幾畨風雨幾畨晴霽又是遙山暮青鞋不怕春泥汙紅藥重教曲闌護細数落花成獨步自縁山野不堪廊廟不是文章悞曉窓啼鳥驚春睡似報道春光至側側餘寒侵繡被梅花飛也杏花開也燕子歸來未水光山色如人意長恨春隂杳無際今日新情俱可喜山光明媚水光溶漾只有人憔悴鶯聲留我㸔山乆臨去也重囬首雖是春光隨䖏有暖風輕霧淡烟踈雨都在江􅁁栁自知不是經綸手無意封侯印如斗行樂何湏金谷友只消尋箇典衣伴侣同醉金􅁜酒曉來一陣輕寒過水面薄氷吹破竹外錦鳩啼一箇添黄入栁㸃紅歸杏都是東風做鬂絲遊颺烏巾墮醉裏漁歌自賡和但得潮頭風不大数群鷗鳥半篙烟雨着我船中卧雪消天氣東風猛簾半捲猶嫌冷恠問春來長不醒一春都是酒徒花伴醉了重相請而今白髪羞垂領靜裏時將舊游省記得孤山堤上景一湾流水半痕新月􅀞出梅花影五更風雨花如霰問春在誰庭院報道春光浮氷面一雙鸂􅈑数莖芹藻無数桃花片武􅁜溪上東風怨空趂漁郎再尋便抛棄已同秋後燕那知别後飄飄蕩蕩這裏重相見平湖過雨青如鑑柳下賣花船䌫雌蝶雄蜂飛繞擔杏花終是輕紅嫩白不比梨花淡一春􅀎幾花前探天氣無慿故相賺晴不多時隂亦暫一囬風雨一囬烟霧何䖏堪登覽荅屠仲權見寄如夣令窓外月斜鷄呌門外馬嘶車閙多少夣中人盡被春風吹覺休咲休咲白髪也曽年少茅屋小窓寒驟人影梅花同瘦風􅂃雪初晴月上一更前後迤逗迤逗白髪青衫如舊首夏書事夏􅀄臨瘦緑添肥病紅催老園林昨夜春歸天氣清和輕羅試着單衣雨餘門掩斜暉㸔翻翻乳燕交飛荷錢猶小芭蕉漸長新竹成圍何郎粉淡荀令香銷紫鵉夣逺青鳥書稀新愁舊恨在他紅藥闌西猶記當時水晶簾一架荼䕷有誰知千山杜鵑無数鶯啼初夏閒居浣溪沙三闋幾巻斜封出舊窠藕絲柔梗上新荷衣裳輕薄試单羅烟淡淡中青草合雨絲絲裏緑隂多園林佳趣是清和漸老情懐怕别離可堪人去又春歸斜陽流水意遲遲春從不歸終不住人重相見更相期此時端的断腸時小院囬廊曲更深一重楊栁一重隂夜長人靜漏沉沉雪白梨花千瓣玉雨黄梅子萬丸金清和天氣夏初臨卜居蝶戀花人間何䖏宜閒住除却桃源便向瀟湘去楊柳桃花千萬樹不湏更覔深深䖏白驚輕鷗為伴侣女嫁漁郎男娶漁翁女已辦緑蓑眠細雨料應天意還相許詠塵望湘人愛輕隨馬足深輾綉輪落花飛絮相和紫陌春晴東華風暖拂拂嫩紅掀􅉫羅襪微生素衣曽染閒愁無那㸔補巢燕子㗸將細雨香泥重做誰向花前行過見金蓮踪跡尚留些箇無䖏覔佳音嬴得兩眉低護鎻茂􅀪何事猶携紈扇却恐西風相汚且歸去緑􅀣隂中淨掃青苔髙卧詠簾燭影揺紅花影重重亂紋匝地無人捲有誰惆悵立黄昏踈映宫妝淺只有楊花得見觧怱怱尋方覔便多情長在莫雨囬廊夜香庭院曽記揚州紅楼十里東風軟腰肢半露玉娉婷猶恨蓬山逺閒悶如今怎遣柰草色青青似剪且教高揭放数㸃春一雙新燕題隔屏仕女醉花隂雲母屏風金縷扇薄映春風面縱是不分明猶勝腰肢背後忩忩見鏡裏花枝簾底燕無䖏尋方便莫道不留情秋水芙蓉獨自思量遍感秋摸魚児問黄花為誰開晚青青猶繞西圃秋光頼有芙蓉好那更薄霜輕霧江逺䖏但只見寒烟衰草山無数凭闌不語恨一㸃飛鴻数聲柔櫓都不帶愁去當時夢空憶邯郸故步山陽笛裡曽賦黄金散盡英雄老莫倚善題鸚鵡君㸔取且信提携如意樽前舞浮名浪許要挿桞當門種桃臨水歸老舊㳺路壬子重陽感舊念奴嬌今年重九被閑愁孤負一畨時節菊蕋青青香未吐知我無心扳折紫􅈉凝霜金橙噴霧舊事慿誰説故山何䖏莫山無限紅葉遙想響􅓏廊西􅉼空閣上水與雲相接囬首十年成一夢却倚西風傷别料得明年人雖强徤雙鬂都成雪且湏沽酒與君低問明月詠雪禁體水調歌頭嘗愛歐陽及蘇公禁體雪詩而自古雪詞無禁體者十月晦余歸龍江風雪連日因賦水調歌頭一曲仍不用塩梅玉㓗皓白飛舞字風色夜來􅂃寒氣十分嚴起看江上樓閤無䖏不鈎簾短短釣簔漁艇小小竹籬茅舎斜挂一青帘醉眼傲今古不飲咲陶潜正蔌蔌俄揚揚復纎纎楚山埋沒何在髙䖏露雙尖人道党家風味不比陶家清致我欲兩相兼舉盞慶豐瑞來嵗不湏占客中壽婉素齊天樂華鯨聲逺鶯聲早忩忩瑞烟籠曉蛾緑添眉蜂黄㸃額楼上妝梳初了羅輕佩小向晴日簾櫳暖雲池沼細􅅡名香滿斟春酒拜翁媪繁華流水東去又梁園密雪長干芳草楊栁東風梨花淡月幾度夢魂牽繞佳辰漸好願此别歸來㑹多離少咲引児孫故鄊稱二老旅中感舊喜遷鶯烟光明㓕正細雨醸寒羅衣猶怯泥沁香融波添緑膩斡淡栁金梨雪借問逺山何事低學脩眉雙結料也是為朝朝暮暮傷人離别情切且莫問燕子未來來也成虚設蘇小愁多秋娘老去雖把綉簾髙掲囬想舊時春夢多少轉員周折但只願盡今生都是稱心時節月夜過采石西江月采石磯頭明月娥眉亭上秋山古今來徃幾人間贏得新愁無限不用朱唇低唱何湏纎手輕彈一觴一咏到更䦨驚起数行鴻鴈江舡聴雨如夣令蓬上雨聲初罷舡尾緑簔齊挂添却幾重泉都向松梢飛下如􅀞如􅀞山與白雲齊亞江邊落梅千秋嵗引斷角殘鐘孤城小驛雪裏匆匆見顔色才㸔緑毛花底鳳又聴黄鶴樓中笛綺窓寒綉帷晚時相憶開䖏漏他春消息飄䖏恨他春抛擲猶自多情㸃衣白當時一枝曾折寄而今数朶湏憐惜小橋邊短籬外重尋覔夜泊大姑廟下風雨無眠賦以感懐念奴嬌一天風雨柰無情悞我匆匆行色龍女祠前三日住可是東君留客夣裏家山燈前児女幾䖏􅃄波隔数莖愁鬂㸔來今又添白遙想小小宫桃盈盈墻杏都被輕寒勒只有春江如得意添却蒲萄三尺鶯燕休愁鳬鷖莫咲行止非人力明朝西去布㠶高掛晴碧臨湘雪夜謁金門東風劣吹下一天春雪單薄被児寒又怯自温温不熱依舊起來周折梅影淡横斜月清則是清清更絶欠他相對説巴陵雪夜西江月銀燭偏欺瘦影爐熏不退輕寒蘭舟聴雪楚江干篷外春虫撩亂添上鬂􅁁白髪驚囬夢裏青鵉尋常猶恨夜漫漫今夜更長一半岳陽春暮念奴嬌楚江天暖滿山桃李被東風吹忒怨白愁紅千萬㸃都向溪􅁁流出前度劉郎去年崔護相見頭全白杜䳌啼䖏要歸誰便歸得惆悵南浦南􅁁東湖東畔芳草茸茸碧寒食清明都過了囬首無多春色茂苑鶯声鷗波烟雨同是江南客五湖春􅄅且聴君山吹笛衡陽道中洞仙歌斜紅皺白映水花千􅀣獨自沉吟對雨恨黄鸝特地飛向枝頭千百囀説盡愁人意緒倚篷凝望眼楚天湘水一㸃君山在何䖏料得綺窓前人也銷魂歸期逺玉纎頻数便冩却銀牋向衡陽倩着箇春鴻帶將囬去秋雨作折湘中訴􅂨情中年人已怕逢秋情景不相投尋常耳􅁁風雨都聴作許多愁千古事幾時休枉追求数行鴈一􅂀瀟湘獨自登樓湖南舟中見新燕雙雙燕去年别䖏記黄葉秋聲晚凉庭院忩忩欲去再入綉幃留戀囬首東風又軟漸細雨梨花開遍那知各自飄零向這裏人家重見栁外湘波似練竹籬茅舎何如玉樓金殿呢喃聲裏如訴落紅千片一様山遙水逺料應也多愁多怨相期月戸雲窓依舊舞裙歌扇湘中書􅀁見虞美人巴􅁜􅀣裏湘隂路幾箇人家住門前緑水繞圍遭閑種一株楊栁一株桃青梅紫筍黄雞酒又剪畦􅁁韮楚聲歌罷􅅍簮花盡是不知音律老叟花邉夜􅀫菩薩蛮瀟湘門外春江水小紅樓子臨江起樓下是誰家一株含咲花蘭舟休遠去只就花邉住花影上牙樯夢魂今夜香祁陽道中聞蛀小重山纍纍湘雲帶晚霞東風吹絮落晴沙夢魂今夜繞天涯春暮也芳艸􅅍鳴蛙獨自莫咨嗟青烟飛颺䖏有人家且分新火試新茶深竹裏無數木香花旅中春曉二􅀰神野棠風急又過了一番花信想芍藥猶香荼䕷將謝春色忩忩欲盡自疊牋題芳字冩不就閒愁閑悶􅀎幾度尋思鏡中添了許多愁鬂休恨清明已過清和相近漸藕葉初圓櫻桃紅小新竹姢姢緑嫩踈雨池塘緑隂亭舘别是一般風韻記珎簞湘簾葛巾紈扇晚凉時分山西途中送友回郷阮􅀰歸携手河梁惜袂分秋鴈不成群同來不得同歸去目断太行雲望故里暢覊魂近楊桞閶門惟㽞白髪老河汾無才可報君初到山西􅅻中秋已寒甚擁弊裘矣緬思故郷正當賞桂問月之期杳莫可得然諸友亦多散沒惟止仲在焉用填詞一闋寄之則郷情旅况覽示何如惜餘春慢隴頭水澁秋蟬過塞鴈鳴寒威􅈝至恁早覺袖手􅂴將開這氣􅀱偏與中原異峭砭肌骨洌脆髭湏江南老實難當禦覽髙山何葉不零那百草歸何䖏記故郷秋暑方消金粟飄香黄花委地謾携壺共上着翠微吟盻白雲紅􅀣時去丗更無幾南迁北徃畨成夣􅂻到明朝嬴得􅁁雪霏顛空令撫脾憶故園長相思山悠悠水悠悠水逺山長無盡頭俺怎不生愁憶歸休合歸休春到江波漾白鷗好弄一扁舟眉菴集巻十二終眉菴集補遺懐舊業春舘坐微雨午窓蘭氣清以兹魚鳥性遂適園林情佳􅀣細花落清池圓葉生芳辰與幽賞欣此一來并小孤山江流西來如箭急孤峰横截江心立桃花水漲勢相爭峽口瞿塘猶不及山神堂堂心膽麄當是人間偉丈夫江頭廟裡青綾帳翠靨紅粧塑小姑南浦歌朝發南浦棹莫聴南浦歌春江與春草如此别離何春風楊栁悲千縷秋水荷花暗江渚白􅄠収罾灧灧霜青裙採緑絲絲雨沙渚東􅁁是蓼洲人家髙繫木蘭舟還乗紫極宫前月移過秋屏閣下逰感春何所平生愛江空春水遥舊情題竹見新恨對花銷束脯非沽祿聞鐘豈造朝自慙鞲上鶻風起欲􅇒霄春水又盈尺鶯花未滿林草扵閑䖏緑愁向夜來深野鳥丁寕意江雲去住心從來布衣願不必問多金一窓秋影窈窕梧桐􅀣參差桂竹林如何數枝影共此一牎隂雲破月華滿夢回秋意深相看竟長夜脉脉故園心滕王閣圖地湧三重閣江横百尺䑓渚霞朝牖闢山雨暮簾開金奏雲中落銀屏月下來虹霓明綺席星斗弄珠胎歌舞俄成夢登臨信可哀􅀞圗迷蛺蝶文甃積莓苔憶赴閻公宴曽誇子建才長天與秋水千古共徘徊氷連日毒熱思氷不可得囙賦五言排律一首書箑上庻㡬望梅止渇之意也仍邀來儀季廸幼文三文學同詠􅇒室啓深蔵殊㤙錫上方壺清迷練色甌薄耀寒光當座人俱素登筵體共凉瑩含銀永㓗甘薦􅁡脾香淺碧迎歌扇微紅映舞裳明愁難作鑑堅恐易成漿瑞擬金窓雪勛高玉井霜屏慚雲母熱簾詫水晶凉醉客狂思聶詞臣渇願甞陳王方避暑突兀殿中央燈夕觀妓􅃧作豔語舞緩態偏濃歌停拍未終􅁫留人勝雪釧響臂羅風不畫眉長緑非酣臉自紅意將回眼送嬌逐㸃頭通此夕瑶䑓下當時洛浦中莫言常見慣膓㫁杜司空栽竹斸開蒼蘚種琅玕移得瀟湘入座看宿土半含春雨潤短籬鈄弄午風寒紫苞未見揺氷雪翠實終當宿鳳鵉何䖏玉笙吹夜月碧桃零落滿東䦨王䝉􅀞西山圗楚山迢逓隔江齊江上人家盡向西缺䖏每逄新月上淡中長映夕陽低清憐爽氣晴猶濕紫護􅃄光晝欲迷無復滕王高閣上珠簾暮雨正凄凄春夢三首春夢復春夣春夢何時醒昨日梨花白今朝梅子青春夣復春夢夢好不知春只有雙胡蝶憐他夢􅂻人春夢復春夣夣覺春無迹何䖏覓殘紅東南數峰碧絹扇紈扇娟娟白篔簹箇箇青如何明月裏吹下鳳皇翎半身羙人圖􅀞師有意画風流􅀞到風流意便休記得去年春雨後杏花院􅂻短墻頭嘉靖乙卯臘月廿六日志于疊翠軒
