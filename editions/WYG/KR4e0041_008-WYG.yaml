body:
  text: 眉菴集巻八明楊基撰七言律送路季璉問聘河東時東駕出師太原二首三晉封疆拱帝圻兩河山色照戎衣青虹貫日隨星出赤鳥如雲夾電飛使者梅花春後折王孫芳草夢中歸入朝若問東南事積粟如山萬馬肥其二三讓祠前酒一巵杏花紅白栁絲絲古來使者稱吴札此日行人得趙咨老祖山河終不改諸侯勲業已如斯青宫賜宴如前日為賦栖栖六月詩聞官軍南征解圍有日喜而遂詠四首天師南下靜風塵正月樓船渡孟津中外諸侯元有約東南豪傑豈無人十年白骨埋荒楚一日蒼生去暴秦喜極自提孤劍舞不知雙涙落衣巾其二巴江東去動旌旗此變還應責望誰尺土未歸終自復一夫作難彼何時北來兵勢當無敵南向人心頼不離見說兩淮消息好已將牛酒犒王師其三兩河精騎向襄陽全蜀材臣出鳯翔天下風雲争㑹合江東子弟謾搶攘人皆厭亂思平世誰不將歸說故鄉我有先塋依古井十年不奠一壺漿其四官軍聞說下揚州夢裡扶搖賦逺遊天運未容人力勝民心須順物情求遭逢喪亂生何補見得昇平死即休沽取一壺花下酌弟兄兒女笑相酧寄楊鐵厓先生不見雲間楊鐵史寮中七客近如何老來詩句疎狂甚亂後文章感慨多長笛參差吹海鳯小璚楊栁舞天魔春明且盡嬉遊樂莫解梁鴻五噫歌先生所居名七者寮懷悼朱秦仲總制力盡戈鋋援不回猶揮赤手搏風雷波濤失意蛟龍伏肝膽如杠虎豹摧漫使張遼說關羽誰將全武易秦裴煩君更緩須臾死要對春風酒一杯送雪坡太守之武林湖上烟飛開畫船鳬鷖鴻鴈滿前川舊遊未覺英雄老遺愛猶思太守賢驛樹籠葱春雨裏江花零落晚風前遙知不着登山屐先向閭閻問倒懸送謝叅政朝京萬方臣妾歸降日四海諸侯職貢秋七册寶書銀葉篆九重珠絡翠雲裘舍人入奏臚傳早天子論功寵遇優正及燕山三尺雪馬蹄須遍御街遊郡齋養痾呈醉樵内史三首江雲倐忽暝還收五月猶寒着敝裘芳草斜陽看易晚綠荷疎雨聽如秋池塘空濶蜻蜓喜簾幙蕭條燕子愁不是無言成獨坐暫將心事静中求其二小軒新沐喜神清短幘单衣覺漸輕松下琴書晴亦潤竹西忩戸晚猶明愁來對酒心先醉病後看花意懶行却憶故山深處立綠蘿千樹呌流鶯其三亂裏情懷苦未開更兼貧病兩相催翻書自取醫方讀冩劵頻賒藥品裁有子問安催啖粥無人療渇漫思梅東山謝傅能相憶風雨園丁送韭來送潘省參榖北覲黄鉞專征異撫軍薊門鼙鼓接西秦江淮久頼齊桓伯中外方思李泌臣鶴駕簫聲丹禁曉龍池栁色舊宫春邦交不用縱横術况復東周有古人挽吕輔之參軍老來不作華亭尹死後仍書貞惠君猶有綈袍憐范叔更無珠履哭田文練兵每到防秋試積粟多緣歉歲分欲奠一尊招夜月紫藤蒼栢繞孤墳送錢思復曲江庾信文章四十年一官今喜便宜遷諸侯賔客青雲表亂世功名白髮前弟子年來金馬詔故人天上玉樓宣先生且向江南老草閣東風聽雨眠登石湖山亭和胡宣古宋仲温危亭百尺瞰奔湍落日清虛縹緲間石壁倚風青鳥下洞簫吹月玉龍還霸圖猶在英雄夢雲氣或連吳越山無限興亡眼前事五湖烟水不相關虎丘遊和張雲門韻烟草離離接故宫劍光無復吐長虹虬髯一怒江山定烏喙重來苑囿空佛宇勢凌雲海日梵鍾聲和塔鈴風峯前虎去髙丘在野草殘花泣露紅追送徐孟岳長洲苑前春草生騎馬送君君已行東風楊栁忽淡蕩新水鵞鴨自縱横青菘堆雨晚飯足白苧裁雪春衣成隣家有酒可賸買我欲相從聽早鶯寄王常宗不為春愁減帶圍自緣多病故人稀無多的的梅花在有幾斜斜燕子歸月上湖平還蕩槳酒醒風起更添衣㣲官未得追隨去定悒爐熏静掩扉寄號醉樵饒介之萬里西風到井梧泠泠秋水接平蕪清虛自是松間鶴瘦硬何須石上蒲千古英雄雙醉眼四山風雨一樵夫正須斤斧收材木要向凌烟見畫圖送胡布張憲二軍咨二首鳯凰出世不多見神駒汗血非全功子龍勇冠萬人敵劉表氣壓三軍雄㑹使策勲夸海内何必紀姓歸遼東遲子縱横覽八極當駕巨浪乗長風其二丈夫許國亦何蚤中興紱冕皆吾徒絳火流雲赤雀下神劍入海妖龍屠秦人玉琯不自惜宋客燕石何其愚㑹見清明舊雕鶚鶱飛萬里騁良圖送趙智之海濱兼柬乃伯元鼎十月肅霜霜未嚴片㠶歸去雨纎纎鴈飛空濶雙斜影山隔蒼茫一翠尖自笑楊雄登館閣誰憐膠鬲在魚鹽到家為我寒暄問汝伯遙應雪滿髯寓雲間送人之上海兼簡曲江居士嗟予多難未能歸念爾無家更别離春近江花開次第雪消沙鴈落參差英雄惟贈劍三尺貧賤相逄酒一巵為語海州錢博士白頭誰與細論詩同雲間謝嘉書張夢辰舟手持三尺青琅玕鼓枻來徃凌風湍放歌吳淞江月白濯足洞庭秋水寒黄金何用鑄范蠡紫蓴自足供張翰扁舟早晚落吾手便當相逐投魚竿將歸吳中留書雲間齋舍讀書喜逄明主知直節不受儒官欺男兒自當萬人敵少壮恥為童子師江總還家向草草仲尼去魯獨遲遲蜀雲亭下春消息雪白梅花開一枝元夕次韻鐵崖先生三首千輪萬騎影參差盡道風光勝舊時珠果亂抛金並蔕銀花交射玉連枝星緣燈映看偏密月為人留下轉遲白髪老仙逢盛事綵毫先詠太平詩其二星斗斕斒落絳河魚龍㶑灔出滄波尋常巷陌皆車馬到處笙歌盡綺羅人意尚嫌春夜短燈光更比月明多謾教夷女傞傞舞細按吳兒宛宛歌和謝雪坡錢塘見寄經旬不見謝宣城小楷烏絲寄逺情黄篾樓髙春夢破綠羅衣薄暮寒生鶴臨沙渚鷗俱浴花落江泥燕與争亦欲雨蓑搖短楫西湖新水蕩空明送鄭本初還越深冬未飄一片雪江梅已開千樹花出門上馬霜滿屋舞劍聞鷄月在沙秦豈無人徒贈策楚雖三户復成家壯懐亦有東遊夢明日津頭見斷槎赤山書事寄龜巢謝隐君君南蘭陵人今避兵居吴長洲之獨樹湖曾向溪南看藝麻竹杠兠子一肩斜秧苗尚短仍含穀荷葉才高已上花蠶屋柘烟朝焙蠒鵲爐沉火晝薰茶而今風雨成抛絶卧聽西園兩部蛙贈勤上人别兼簡雲間陶宗儀澄公髙義動山川亂後今逢弟子賢四海交遊諸老盡百年衣鉢一燈傳詩題玉几峰前竹社散東林寺裏蓮惟有赤城陶逸史老懐能說舊時禪寄林訓導謨江上雪消春水渾故人書札到柴門英雄所見自相合貧賤之交誰與論漢室山河終混一秦城樓閣易黄昏平生不識之無字也學相如與賣文長洲何明府見過使君麾節耒相訪正及南風百草長新語驚人渾爛漫竒才化俗更循良西山雲朶金銀氣東閣梅花氷雪香便欲乗槎逺相從鳬鷖春水綠茫茫漫興十日南風吹雨晴隣家鵞鴨傍人鳴蒼苔門巷槐花落青草池塘荷葉生已喜包茅來楚貢不勞酈舌下齊城野情欲買滄浪屋醉詠鳬鷖歌太平聞雪坡將還吳門桑葉重重戴勝飛行人多報故人歸髩從别後星星出花到春深樹樹稀詩喜官閒能不廢身緣謀拙事多違便須出郭相迎迓遮莫南風雨滿衣懷王隠君止仲小几支頥却掩書身閒喜復見秋初山林自此縱横落絺綌於人次第疎沙鳥浴江明白鷺水花搖雨淡紅蕖相知獨有王摩詰兩月無詩寄草廬附王半軒次韻寄答懷刺歸來卧枕書白雲滿榻閉門初草𤣥未信揚雄病禮法從知阮籍疎短障夕陽悲蟋蟀方塘秋水老芙蕖南村口燥呼難得一任狂風攪敝廬懷高著作季廸坐看青江飲白虹不知樓閣又秋風瀰漫禾黍蒼烟外零落芙蓉暮雨中富貴逼人驚變豹文章鳴世豈雕蟲清時欲草征西檄只有陳留阮瑀工附高青丘次韻寄答殘雨翛翛映彩虹憐君獨咏楚䑓風逺江㠶影秋蕪外故苑砧聲晚樹中壯歲漸如辭幕燕閒身猶坐蠧書蟲雅音自古無能好莫向人誇瑟最工江村寒食預折楊枝挿繞簷豆糜香軟麥􅄳甜春衣未染新絲織午篆猶分舊火􅄈小雨送花青見蕚輕雷摧笋碧抽尖不因人逺傷離别那得春愁上短髯乗槎為日者張徳元賦百尺枯槎孕氣靈濤花空影入滄溟星河弄月珠胎白銀漢流雲鵲羽青坐拂珊瑚龍婉婉卧看蓬島翠㝠㝠不須更問君平卜認得黄姑駕彩軿白雲深處為天平圭上人賦上人卓錫亂雲中縹緲蓮花第幾峯行盡崎嶇方見塔望迷樓閣但聞鐘四山曉氣層層雨一逕秋隂曲曲松幾度相尋問童子水流花落竟無蹤聽秋軒為方上人題聽秋軒前秋滿庭聽秋軒裏貯秋聲噫嘘萬竅西南發搖落四山風雨鳴定起寳花如雪墮夢回璧月帶潮生便須飛錫蒼梧野聞取鈞天九奏笙雨中懷沈逹卿茂卿立春一月二十日江鷗野鶩飛滿池杏花差白淨洗面楊栁半青爭畫眉沈郎多病徴未起王孫不歸吁可悲南周山頭養親好贈以金盤五色芝天妃宫贈道士沈雪溪帝遣神妃降紫芬海波搖蕩赤霞裙月明貝闕金銀氣日暖龍旂贔屭紋青册簡書天上錫紺帷靈語夜深聞方壇露冷三花繞坐演琅函大篆文題明皇貴妃對奕祿山傍觀圖深院紋楸敵睡魔玉環用意蹙雙蛾只因數子藏機密不覺三郎失着多布陣似窺龍尾道爭邊未至馬嵬坡有人冷眼觀成敗若個胡兒是爛柯問梅次趙元鼎韻驚散溪頭一樹雲故人相别又相親兩三枝上幾分月四五㸃中多少春不入楚騷緣底事畨成𦍑笛是何因芳心欲露還羞澁踏雪歸來香滿身望太湖天帝何年遣六丁鑿開混沌是雙青湖通南北澄氷鑑山斷東西列畫屏挾雨龍歸霄漢暝網魚船過水雲腥乗風欲往終吾老甪里先生古洞庭初春二首雪晴泥軟不生埃春水浮香上綠苔栁色嫩於鵞破殼笋痕斑似鹿辭胎踏青鞋韈平頭製試暖衣裳稱體裁安得草堂江浦上紫桃紅杏一齊開其二春色撩人到水涯草香蘭氣總詩材酒邀同伴嘗新熟花趁初晴賞半開蹀􅞃馬隨車響過鞦韆人送笑聲來直須清夜紅羅燭莫負東風玉鏡䑓春日雜詠四首雨雨風風未肯晴百年時序逼清明花無桃李非春色人有笙歌是太平黄鳥巧衝蝴蝶過紫騮驕趁玉驄行酒家不用逢人問高挿花枝作斾迎其二偶自循籬出逕苔刺桐花落野棠開一年春已無多在幾個人曽有暇來浸榖陂塘科斗亂浴蠶時節杜䳌哀買山莫種閒花栁多覔松栽與栢栽其三蘭心刺促上枯根草色淒迷入舊痕灘觜無泥沙自白潮頭有雨水先渾龍祠神去鴉鳴樹魚市人歸犬應門便織蓑衣與牛薦此身只合老江村其四陋巷荒蕪野趣濃小溪春水恰船通無邊草色猶春雨有幾梅花更晚風文體敢期盧駱並交情惟許范張同欲將浪迹隨漚鳥錯比溪南是瀼東見花聽風聽雨坐空齋不道春花爛漫開亂世身如危處立異鄉人似夢中來十年多故塵雙鬂萬事無心酒一杯明日清明改新火且將榆栁着殘灰清明後見花狼藉春到清明花漸稀花應憐我見春遲多情杜牧重來日前度劉郎再到時莫為東風愁對酒且因流水獨臨池短墻深處無人折留得殘紅四五枝立夏風雨都無半日春滿溪鵞鴨水迷津櫻桃子熟已薦廟芭蕉葉長才過人壯歲得閒緣性拙故交雖淡却情真如何蓋得江邊屋賸采新荷飯綠蒓木茶爐紺綠仙人煉玉膚花神為曝紫霞腴九天清淚沾明月一㸃芳心托鷓鴣肌骨已為香魄死夢魂猶在露團枯孀娥莫怨花零落分付餘醺與酪奴竹素圖百尺飛樓似石渠牙籖五色照窓虚平生不惜千金費喪亂猶存萬巻餘秦火已來皆斷簡楚經之外總閒書晴雲滿榻芝香散應與諸郎校一初裁竹劚開蒼蘚種琅玕移得瀟湘入座看宿土半含春雨潤短籬斜䕶晚風寒紫苞未見搖氷雪翠葉終須宿鳯鸞何處銀笙吹夜月碧袍零落滿闌干鵞翎菊曾隨漚鷺浴滄浪又對芙蓉試淺粧露冷有香栖晚圃月明無夢到寒塘綠波春草當時雨黄葉秋風此夜霜莫道淵明最憐惜右軍應為寫千行卜流吳人於初正以榖占人一年休咎炒成花者吉否反是春入吳門十萬家家家爆榖作生涯就鍋裂碎黄金粟随手翻成白玉花紅粉佳人占喜事白頭老子問年華晚來分付兒童戲數片江梅撲鬂斜梅花夢綠蕚仙人曉睡濃香魂縹緲逐東風翠禽啼破春如海蝴蝶飛來月滿空白玉樓䑓渾落莫黄昏時節正朦朧巡簷欲問神遊處只在孤山淺水東徴赴京亂後人如再得生敢於世上望聲名詩吟白屋惟安隱詔落丹厓陡失驚鳯闕有心求柱梲鯫材何量抵瓶罌不堪故舊愁分手楊栁楓橋第一程到京欝葱王氣古金陵㤗運重新感盛明臣庻梯航趨上國江山龍虎衞髙城六街塵掠秦淮過萬户鍾聲魏闕鳴白髮到京期少補敢將詞賦重聲名奉天殿早朝二首雙闕翬飛紫蓋高日華雲影映松濤萬年青擁連枝橘千葉紅開並蔕桃仗以玉龍銜寶玦珮將金兕錯銀刀乍晴風日忻妍美闔殿齊穿御賜袍其二貂璫綉帽列金撾玉節龍旂拱翠華甘露欺霜凝紫液卿雲如蓋結丹霞鶯聲近隔宫中栁駿騎遙穿仗外花聖主直教恩澤遍香羅先到小臣家新正試筆寒隨殘臘去匆匆又見年光入眼濃恨不髪如春草綠笑曽花似面顔紅門無賀客酬佳節座有癡兒夀老翁已許承恩趨鳯闕珮聲齊到日華東雪欹欹整整復皚皚可是春氷細剪裁到處江山皆玉立誰家庭院不花開幾回旋繞還飛去半餉悠揚却下來獨有梅邊易消滅也應和氣近蓬萊東風曉寒衣袂欲生稜沉火微薰半臂綾内苑未消千樹雪東風先解一池氷梅驚玉笛吹還落栁傍珠簾折未能回首帝城明月滿六街簫鼓萬家燈元夕觀燈綵鸞扶轂駕雲軿寶騎揚鑣逐隊行十里燈光欺月色九衢歌響雜簫聲綺羅香繞長春苑珠翠人遊不夜城喜極未能閒坐得也隨僚友看昇平塔燈應制百尺浮屠聳半空闌干十二影玲瓏日臨銅柱霞標爛風颺銀花火樹紅一劍騰光衝斗口五星揚彩入離宫高明願與君心並徧照逃亡草野中上馬晴來未覺是春朝已有東風着栁條雪自堅牢盈尺在氷纔輕薄一邊消不愁霧暗看花眼且倩人扶上馬腰却憶探春湖上路小紅船子木蘭橈新春左掖簡方員外鷄籌送曉日初長粉署微薫應漏香草色才回半痕綠栁條初染一分黄玉壺氷解春無迹羅幕風来澹有光自愧才疎非畫諾敢隨鳴鳯集朝陽送周鍊師𤣥初還吴𤣥都春暖碧桃開鳴佩朝天到鳯䑓夜檄雨龍江上發曉呼雲鶴洞中來黄精却老和泉煮丹橘娱親遶舍栽為問長生應有術早修真籙進蓬萊感春茂苑東風散鼓鼙草堂近在栁營西春衣禁酒聊存着詩句懷人每謾題花有底忙衝蝶過鳥能多慧學鶯啼閒身凖擬看山色又復朝叅逐馬蹄春日出郊偶臨春水賞春晴更覺身隨步履輕人靣映花渾一色竹音和雨恰齊聲衣從典盡須沉醉簮未容投且暫行除却鳯林佳麗地更於何處樂昇平送杭太祝代祀四瀆馮夷擊鼓走黄能夜報祠宫代祀來虎節不須桐柏去龍香且向吕梁開古來河海猶三望今日風塵上九垓若對壽春城下月可能巵酒酹荒萊黄能之能匡來反水中三足鱉名也應制送安南使臣杜相之還國都門車馬曉騑騑勅送陪臣萬里歸使者重聞新寵詔嗣王仍賜舊頒衣驛亭五月蕉花落江路南風荔子肥歸報大廷方徹樂也知存沒感皇威送僧住姑蘇北禪六年江海一論心又聽鐘聲出禁林歸路暖風芳草合講堂春雨落花深未誇葛老三編論獨愛韋郎五字吟水月仙人塵不染待君重振海潮音悼楊文舉博士白髮蒼髯老太常亂離終喜得還鄉八分書古追東漢七字詩工到盛唐謫久已無書滿屋病多惟有藥成囊我慚同姓曽聨職宿草西風淚數行送鄭與權之官七閩七閩地暖不飛雪山路早行仍衣綿黄金結客記昔日白髪上官非壮年荔子曉風人似玉桄榔春雨樹如烟還家定跨揚州鶴流水寒松遶墓田題玉真觀五色琳宫綴玉題萬年瑤冊秘金泥屏風盡是青山疊旛蓋都將綠樹迷雲氣長隂時嘯虎日華先曉夜聞鷄閒身願得同真侣卧看􅊯􅊯鹿引麛送俊用章上人還中竺五色雲函貝葉牋寳幢花雨下諸天纔叅闕下䕫龍會又赴山中鹿豕筵萬法西來知幾刼一枝東指已千年行當着屐藤蘿外共看峰頭玉井蓮春宵樓春宵樓上人如玉一刻光隂直萬錢簾底按歌風細細酒闌私語月姢姢錦窩香暖雲初散羅幕燈昏客未眠莫怪銅壺太催促長門猶嘆夜如年狂歌東風十日不成雨北郭兩山吹作塵縱横自可二千石貧賤何須七尺身醉後狂歌皆慟哭老來春色最傷神且將建業城邊栁持贈山陽笛裏人秦淮官舍懐春潮來灘觜綠沉沙獨坐㣲吟送物華强健憶曾身似犢風流那復鬢如鴉十年金谷園中友三月長安馬上花春色正濃人意好且教群吏暫休衙晚春三首旌旗獵獵繞髙城曲水飄香出綉楹雨頡風頏枝外蝶花遮栁映樹頭鶯乍籠紗幘羞容老試着羅衣覺體輕猶憶醉歸湖上路滿身飛絮馬縱横其二宫樹㕘差帶苑墻暖塵兼霧撲衣裳新蒲細栁皆春色紫燕黄鶯欲斷腸沽酒客來花未落祓除人去水猶香老懷無復登臨賞坐對鍾山到夕陽其三辛夷如雪照庭柯老去愁驚日已過芳草漸於歌館宻落花偏向舞筵多故人别後皆黄土南浦春來又綠波便欲移家勾曲住採芝種玉此山阿寓江寕村居病起寫懐十首落梅風急晚蕭蕭病起愁驚雪盡消巵酒不添前日量帶圍初减舊時腰髙樓錦瑟花連屋深巷珠簾栁映橋准擬青鞋踏春草看他翡翠戲蘭苕其二病體支離倦裏巾偶因行樂見陽春梅緣無恨尋常瘦栁故多愁日夜顰夢裏笙歌隨騕褭畫中羅綺繡麒麟相期欲就吳姬飲却恐江花笑客貧其三性懶逢春睡轉昏曉鶯多在夢中聞故人錦字憑誰寄學士銀魚每自焚布穀雨晴宜種藥葡蒲水暖欲生芹相思未信蓬山逺只隔江東一片雲其四望盡吳山是楚峰一緘芳信托歸鴻丁香暗結盈盈露荳蔻㣲含細細風春水染衣鸚鵡綠江花落酒杜䳌紅此身曾是登瀛客未信扶桑弱水東其五不知殘雪是春光起見輕雲覆野塘春草春江相妬綠新鶯新栁鬭争黄囊無太史新頒厯衣有容臺舊賜香但使清尊花底醉任教白髮鏡中長其六東風拂栁軟婆娑野鳥啼春聽未和世事不隨人意好雨聲偏為客愁多回文篆小香如蟻凹面杯深酒勝鵞一帶春江皆碧草却愁無地着漁蓑其七醉舞狂歌四十年老來參得一乗禪東風未濕墻腰雪細雨㣲添石眼泉無數白鷗閒似我一江春水碧於天莫言笠澤非彭澤定擬金川是輞川其八坐對青山覺眼明山應憐我眼偏青一官不博三竿日萬事無過兩鬢星花底蛛絲迷蛺蝶草根蝦族變蜻蜓文章無預封侯相莫向人誇識一丁其九十里吴堤踏暖塵老懐忽憶故鄉春泥金孔雀裁歌扇刻玉麒麟壓舞茵翠袖錦筝邀上客畫船銀燭照歸人而今白髪東風裏疑是前身與後身其十門外春泥一尺深窓間雲氣十分隂寒毡溜雨衾如鐵濕竈凝烟火似金酒解驅愁時强飲詩多感舊懶長吟貧家不願千金粟但得陽烏照晚林新栁濃如烟草淡如金濯濯姿容裊裊隂漸軟已無憔悴色未長先有别離心風來東面知春淺月到梢頭覺夜深惆悵隋宫千萬樹淡烟疎雨正沉沉春草嫩綠柔香逺更濃春來無處不茸茸六朝舊恨斜陽裏南浦新愁細雨中近水欲迷歌扇綠隔花偏櫬舞裙紅平川十里人歸晚無數牛羊一笛風春水溶溶漾漾欲平橋知是巴江雪盡消紅雨落花來衮衮綠烟芳草去迢迢沅湘已沒鷗邊渡湓浦新添鶩外潮向晚漁郎走相報大家齊上木蘭橈樹底偶自無眠樹底行不關春色惱人情蛙當静夜聽偏閙鳥並深池宿屢驚楊栁無風偏嬝娜梨花有月更分明春江一𣲖東流去剛道波聲為不平白髪江栁逢春已變金雪消江水到門深青山識我歸來意白髪消人仕宦心半醉半醒花冉冉閒愁閒悶闕莫言萬事中年後不是中年已不禁减衣春衣初减覺身輕老眼緣晴逺倍明濯足愛臨流水坐看山羞逐少年行江花一色多於雪野鳥雙啼闕莫道飄零易傷感故鄉應更不勝情清明寫懷江樹蘢䓤入苑青祓除時節又清明漢宫蠟燭分闕唐女羅衣傍水行一片花飛愁燕燕三分春去怨鶯鶯人生幾度東闌雪莫道黄州自有情江畔尋花偶成二首細草平沙暖更融謾隨蝴蝶步東風衰髯照水疑添白老眼看花覺厭紅且自細聽鶯宛宛莫教深惜燕怱怱江村到處皆春色聊與行人弔客中其二偶隨流水到花邊便覺心清似昔年春色自來皆夢裡人生何必盡樽前平原席上三千客金谷園中百萬錢俛仰繁華竟陳迹野花啼鳥謾留連上巳對雨三月長安草滿坡年年修禊襍笙歌麗人羅䄂珠腰衱中使銀鐺錦靿靴江上只今春雨暗水邊何處落花多不須惆悵開元事寂寂山隂長薜蘿再用前韻書事三首春來不到鳯凰坡辜負江頭白苧歌輕薄衣裳宜換裌軟紅泥土不沾靴鶯緣夢短嗔啼早雨為花疎厭聽多只恐新晴便零落南風吹老樹隂蘿其二溱水遙連洧水坡周人按舞鄭人歌轆轤回轉秋千索龜甲斜縫蹴踘靴轍迹不教青草合鶯聲偏向綠楊多而今折贈無紅葉枳棘䝉茸蓋女蘿其三莫將南浦擬東坡且對吴兒唱楚歌醉裏那知髯似㦸老來方信面如靴驚人事業非難做傳世文章不在多步逐東風看花栁幾時山月照烟蘿春日白門冩懷用高季廸韻十首得歸雖喜未忘悲夢裏愁驚在别離尚短栁如新折後已殘梅似半開時江雷殷夜蟲蛇早山雨崇朝蛺蝶遲製取烏紗籠白髪免教春色笑人衰其二萬里歸來戴鶡冠老懷無復舊時歡沙邊野水鷗隨汲竹外青山鶴從看花信幾畨風作陣江聲連日雨添寒無心車馬千鍾祿有幸茅茨一榻安其三柴門斜對曲江頭農具漁罾晚自收細雨短莎寒似臘淡烟新栁暝如秋鷗能來徃縁曾識鶯或丁寧解說愁回首故交零落盡更將詩酒與誰遊其四阮途無用苦悲窮已􅂸衰顔漸老翁沙鴈隨春衝北雨江花迎暖待東風文章誤我虚名在貧賤輕人舊業空惆悵成臯遷謫地夜闌猶入夢魂中其五綠髮無多白髪長謫居還復是他鄉風紉晚佩猗蘭弱雨滴春蔬早韭香碧栁五株千本菊黄牛十角一羣羊得閒隨地為農好不獨長安與洛陽其六未即移家返敝廬且移妻子傍村墟千金已費床頭劒一字無存架上書短髪恨因多難白故交慚為久貧疎浮名薄俗看俱幻獨有耽詩癖未除其七逺歸偏惜竄餘身多難畨為異姓親前度劉郎非故物當時燕子總西隣家貧母老難為客酒薄愁深不醉人走向津頭看春色綠波芳草却傷神其八綠蕪迷渚水漫沙斷岸無舟路轉賒細栁已黄千萬縷小桃初白兩三花烟中晚棹兼漚逺雨裏春旗趁屋斜野趣莫嫌渾寂寞近來沙觜有人家春暮有感春色鮮明不稱貧越羅川錦照烏巾斜陽芳草遲遲晚流水桃花去去春萬里歸心漚送客片時閒夢鳥催人五湖風雨烟波濶便着青蓑採白蘋其二啼鳥匆匆變物華雨池科蚪漸成蛙青鞋謾踏閒邊草白髪羞簮醉裏花此日驊騮思苜蓿當時鸚鵡喚琵琶遙憐簫鼓追遊地齊麥青青已沒鴉夜坐看雪曾登百尺樓江頭回首又新秋虛名未死猶相累舊業雖貧底足憂身暫得閒如換骨心長無愧勝封侯夜深風露凉如許坐對明河澹澹流漸老漸老無營萬慮沉鶯聲喚起向來心春風顛似唐張旭天氣和如魯展禽結客每酬雙白璧纏頭曾費萬黄金短笻消得江村路步步薔薇綠樹隂畣李仲𢎞寫懷次韻二首休對清江嘆逝波且抛簮珮着漁蓑愁邊巵酒歡娱少老後文章感慨多燕子綠蕪三月雨杏花春水一羣鵞聊將白髪歸來意總和東風懊恨歌其二春來渡口足風波獨立船頭舞短蓑髙栁忽驚啼鳥變故園應是落花多尋人不敢門題鳯愛客都將字換鵞獨有屋西山數疊也應憐我醉時歌移家不思歸隐却移家旋買輕舟繫淺沙飲興已􅂸今後絶吟情方悔向來差龍將急雨抛成雹虹入輕雲映作霞交友十年零落盡與誰同看上林花寄張學錄孟兼掲應奉孟同二文學何用聰明萬巻書自須卑陋一㕓居草於閒處生偏密花到春深看漸疎綠水滿渠澆藥後青山無數巻簾初相過莫道柴門窄細栁髙槐可䕃車寄潜齋夜坐聽雨獨憑書几坐空齋静裏孤蛩語自哀雨㸃故隨更㸃落秋聲偏逐鴈聲來一奩香篆銷仍在兩穗燈花欝未開不用追思十年事此心今日已成灰不寐斜河轉影月當櫺舊事牽愁酒漸醒半紙功名雙夢蝶十年辛苦一囊螢麒麟照眼嗟還失鴻鴈驚心忍暫聽如此老懐如此夕鬢毛那得不星星雨中獨坐有懐滎陽道中用寄潜齋夜坐韻山色秋光澹遶齋雨聲蟲響互悲哀清尊憐我攻愁去白髪欺人送老來江栁淨無餘葉在渚蓮遲有一花開馬蹄却憶成臯路野曉西風滿面埃早秋江墅晚步秋前秋後十日雨村北村南千頃麻晚渚芙蓉輕落片午前秔稻細含花仙翁蠟屐髙巾幘溪女銀釵小髻髽老我不知官府事水邊吟到日西斜自笑用前韻自笑多愁鬢有華懶求真訣飯胡麻庭蕪綠是今年草籬槿紅非昨日花西月墮江沉半璧北山當屋露雙髽此身那得如鷗鷺雨泊風飄片片斜梅杏桃李落莫香魂繞舊宫詎知色相本來空笛聲黄鶴高樓上詩句孤山小店中曉樹烟霜千萬㸃晚籬松竹兩三樷相思咫尺憑誰寄目㫁天南樹樹鴻右梅花其二當時庭館醉春風客裏相逢意轉濃只恐胭脂吹漸白最憐春水照能紅一枝爭買珠簾外千樹遙看小店中惆悵先生歸去後江南烟雨又濛濛右杏花其三深深翠竹映嬋娟湘女梳粧立曉烟流水落花成悵望舞裙歌袖是因緣也無人折休相妬纔有鶯啼更可憐却憶東闌碧千葉暖風香雨為誰妍右桃花其四憶與盧仝共看來花光月色兩徘徊江村逺處長相識風雨寒時已早開霽雪玲瓏愁易濕春氷輕薄笑難裁江城二月城西路誰惜柔香滿翠苔右李花眉菴集巻八
