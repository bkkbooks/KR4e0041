body:
  text: 眉菴集巻九明楊基撰七言律罷職初寓句曲山居在句容縣南一舎近三茆峰昔陶隠居所處也兔逃罝罟鳥投林脫彼官資暢此心便覺夜來清夢出始知人住碧山深詩窮任使金銷槖酒樂何妨雪滿簮更擬怡雲問𢎞景華陽仙洞事幽尋賣袍鵷鷺行中舊賜緋團花分縫織秋葵齋宫夜直雞前著内殿春朝馬上披仙露滴身猶㸃㸃御香薫袖尚離離山中無復瀛洲夢換取金錢當酒貲寄諸葛同知彦飛白髪慵梳步屧遲老於田野最相宜每當酒熟花開日正值身閒客到時雪屋夜燈因婦織月波秋舫為僧移而今此樂同誰説只有鄉人馬逺知宜秋軒對月并序四首余自罹患奔走南北佳景良辰往往愧負及來杜曲時豐景幽秋氣旣中月色倍常自十四至十七與杜氏兄弟舉酒邀月夜分乃休感佳節之難逢而良㑹之易失也夜賦一詩以示諸杜留以為故事云洪武辛亥寓句容仙家玉斧斵猶偏天上瓊樓㸔欲全未滿固當勝旣滿已圓終不似將圓今宵對影人先醉明日成珠蚌有縁惆悵吳宫與唐殿冷風魚鑰夜如年右十四夜其二龍宫浮出白蓮花海宇通明濕素霞琪樹有隂銀闕冷玉盤無缺綘河斜十分夜色初開鏡多少離人正憶家但舉觥籌行百罰莫聽更皷疊三撾右十五夜其三已覺來遲未捲簾漸經樓閣照東簷清光念爾隨秋減白髪憐余向曉添自對嫦娥歌宛宛誰教揚栁舞纎纎昇州憶似鄜州㸔香霧雲鬟濕翠奩右十六夜其四坐久星繁影漸虧也應天轉玉輪欹葵丘伯主初盟後天寳君王欲倦時繞樹鵲驚霜落早吹簫人恨夜眠遲不須戚戚悲圓缺長使清光灧酒巵右十七夜中秋約登茅峰不果寄羽士蔣玉壺仙人待月大茅峰樓閣髙寒近可通表裏山河俱皓白古今烏兔自西東一塵不住空明外萬象都懸倒影中欲便吹笙跨黄鶴人間或有雨兼風宿清元道館簡羽士巫山隠手閲靈文對羽流道心真境兩清幽雙松過影知將晚一雨生凉覺近秋丹井有靈泉似玉石碑無恙字如鈎欲求大藥調精魄却笑山人已白頭哭髙季迪舊知鸚鵡才髙竟殞身思君别我愈傷神每憐四海無知己頓覺中年少故人祀托友生香稻糈魂歸丘隴杜䳌春文章穹壤成何用哽咽東風淚滿巾豫章早春茸茸草色變枯荄􅉡􅉡寒梅落逕苔山頂雪惟朝北在水邊風已自東來不須銀管催鶯出便好珠簾為燕開見説嶺南春更早桃花流水勝天台登洪都城憶滕王閣故基豫章城郭楚江濱帝子笙歌逈不聞十載以前猶有閣三王之後豈無文春風南浦青青草暮雨西山淡淡雲若對畫圖悲蛺蝶落霞孤鶩正思君浦口逢春憶禁苑舊游春氷消盡草生齊細雨香融紫陌泥花裏小樓雙燕入栁邊深巷一鸎啼坐臨南浦彈流水步逐東風唱大堤還憶當年㸔花伴錦衣􅍡馬玉門西過豐城雲樹參差接逺汀隔沙誰識是豐城芙蓉不禁行人採薜荔多依古樹生寒店雞聲烟寺逺滄江鴻影暮川晴欲將三弄桓伊笛吹向船頭喚月明夜泊臨江城下江清月白悵然有懐萬里清江急有聲一篷愁影對寒檠當時鸚鵡杯中酒何處龍香火底笙斗轉東南知夜半月臨子午應潮生不多鏡裏青青髪又向今宵白幾莖省垣對雨有懐方員外二首老去惟耽是詠詩擬將詩癖待君醫何愁不到王摩詰自恨無過杜牧之城外緑陰聯騎日省中春雨聽鶯時歸來莫待秋風後荷葉荷花正滿池其二煮得新醅灧灧紅省垣誰與晚樽同人當暫别情偏惡詩到無聊語更工江浦荷花雙鷺雨驛亭楊栁一蟬風論文若到虞楊地應對清江憶范公江郭對雨鵓鳩催雨一雙啼江郭崇高竹樹低嫩葉暗將枯葉換新梢爭與舊梢齊席因留客長虗左簾為㸔山盡捲西自笑為郎今白首也曾通籍向金閨寄牛理問斗南每笑楊朱吝一毫恥將刀筆事蕭曹鯨鯢未覺滄溟濶鷹隼寧知華岳高白璧一雙酬劇孟黄金百鎰鑄山濤小牕新種娟娟竹深暎春風紫蔕桃懐班大叅景通一榻凝香省署西短屏深掩樹陰低笑談毎為相知發詩句惟應送别題不以學從當世曲直將名與古人齊别來幾日偏相憶風雨江村半夜鷄懐萬郎中伯玉憶曾簮筆侍金鑾華髪驚㸔照鶡冠倩可承家如有子俸能供祭勝無官杯縁量減常先醉帯為愁多覺屢寛應念故園秋色裏露珠香滿菊花團寄劉儀部子髙開遍芙蓉雨滿津西風又冷楚江蘋眼前簮紱流如水天上羲和釀得春黄葉亂蟬南浦樹紫髯一騎上京塵此時詩興誰能識還憶山隂賀季真懐王節推彦文烏㡌輕籠雪滿簮古苔怪木訟堂深官清猶有長憂色年老惟存不競心與吏議刑秋寂寂教兒讀律夜沈沈酒闌可解時相憶月落霜飛鵲繞林立秋日懐方員外幾日西清晝掩屏緑塵幽蘚遍閒㕔病中事少翻嫌健醉裏愁多只願醒悞響閤鈴飛夜鵲偶攤書巻落秋螢萍蹤已辦東南别風雨長更各自聴次前韻遣興已覺新凉入畫屏江聲樹影在西㕔人情近午猶思浴客夢驚秋却易醒月淡渚蓮香掩鷺雨深池草濕栖螢從今不恨無情緒茅屋西風細細聽冬夜宿江右省垣懐劉子髙司業曖曖微宵耿玉繩澄澄夜色麗觚稜月明鳷鵲千枝雪霜冷枇杷一樹氷魚鑰戒嚴森畫㦸鳯團銷醉擁青綾瀛洲盡是羣仙府鶴背應須得共登七月三十日祖母初度時年八十九白髪青瞳壽者身每逢佳節話咸淳百年未盡四千日來嵗還週九十春遷客無家空望拜孤臣有表竟誰陳今朝風雨茅茨底應對兒孫説逺人思親一割鴻溝消息稀隻身湖海尚流離乾坤何事有今日父子可憐逢此時悵望只添新涕淚艱難應變舊鬚眉愁心恨不隨春雪飛上吳山椿樹枝將歸金陵留别省垣諸友吳山歴歴向東遙望盡寒雲意未消多難定煩慈母憶畸魂時頼故人招曉霜猶凍枇杷樹春雨還生杜若苖歸去不愁江水濶野鷗羣裏木蘭橈望夫石在采石東山上古荔荒苔緑滿身至今翹首望歸人玉容已化峰頭石戰骨應為塞上塵風雨不銷千載恨鶯花又度一畨春誰將湘女斕斒竹種向東風佀有因登峨眉亭在牛渚山峨眉亭上㸔秋山低蹙輕顰淺淡間雨過微雲添一抹晚來新月闘雙彎不愁商女行相妬長恨離人去未還我亦峨眉山下客偶因西眺憶鄉關先生祖蜀中故末句及之謁小姑廟月帔星冠敞翠屏白腮紅頰兩眉青魚鱗小殿波紋滑龍尾長旗雨氣腥巫女沈牛歌宛轉彭郎囬馬拜娉婷蘭舟願祝東風便一夜夷猶過洞庭大姑山廟遇老衲年七十餘云是東林寺僧時廟厄囘禄方謀逮興有作白髪星星照赤髭春風邂逅水仙祠我非當世陶彭澤渠是前生逺法師結習已空終不染塵根俱盡竟何思猶將大乗神通力笑寄須彌向一枝鄱陽湖喜晴鄱陽湖裏㸔春晴山色波光蕩漾明短髪已羞芳草緑閒身應羨一鷗輕風來栁上偏無力雲到松梢更有情却羡蘇堤舊游路碧桃千樹響流鶯舟泊潯陽懐申屠衡江烟漠漠草毿毿且泊蘭舟近水南一鷺暝投槎外石雙鴻低拂樹邊嵐夢隨春雨歸華屋愁逐東風上短簮栁色漸深人漸逺幾時花裏共停驂晚泊湓浦逢冷節小雨籠隂䕶晚霞栁邊停棹聽啼鴉湖光已緑皆春草風信猶寒是杏花到處青鞵隨蛺蝶誰家紅袖泣琵琶匆匆客裏逢佳節那得行人鬢不華過黄州當年逐兔跨神州此地羣雄首建謀亂後江山猶故物春來花草亦新愁歸人拜塜營茅宇過客停舟問竹樓惆悵臨臯驛邊栁淡籠烟雨白沙鷗武昌夜泊懐古鄂渚柔莎夜雨餘漢陽雲樹暮烟初休誇健筆題鸚鵡終悔空緘託鯉魚遺臭功名成底用涴人塵土欲何如滔滔黄鶴樓前水日夜東流恨未除襧衡殷浩桓温庾亮吕仙祠祠在黄鶴樓東江山形勢非神仙不足居此風清月白之夜時聞鐵笛之聲兩㸃方瞳漆有光紫髯眉緑面如霜千年一笑來黄鶴三度長吟到岳陽日月自隨天地老江山不為古今忙又携鐵笛瑤池去亂挿桃花醉一塲過洞庭雨後春江似潑醅洞庭猶更緑於苔碧湘樓閣千花繞紫府旌旗十殿開春色不隨流水去暮雲長帶客愁來閒身也是滄浪客鷗鷺匆匆莫浪猜過洞庭龍君廟陰隂微殿肅神都地位清嚴鎮五湖水府奏工題玉檢淵泉錫爵送珠符雨分赤鯶衝波出風遣青鼉踏浪呼時有蠻商獻袍笏廟前抛肉飼神烏岳陽囘仙有題夢覺邯鄲月未西碧紗斜挿杏花枝丹霞淺淡微生頰白酒甘甜不上眉戲畫榴皮成鶴舞笑揮銅劍作龍騎夜來小宴瑤池上嬴得麻姑一著棋夢覺囊衣單薄藉無氊天氣將寒每自憐嵗月無情人老大風塵如此路三千片時兒女燈前笑多在關河夢裏船那得全家江浦上短蓑微雨卧秋烟舟中聞隣船吳歌有懐幼文來儀輕帆短檝泝烟波疊渚囘舟奈逺何一路詩從愁裏得二分春向客中過江通漢水晴偏緑山入湘雲晚更多何處思君腸欲斷楚妃祠下聴吳歌途次感秋嫋嫋西風吹逝波㝠㝠灝氣逼星河宣王石鼓青苔澁武帝金盤白露多八陣雲開屯虎豹三江潮落見黿鼉沅湘一帯皆秋草欲采芙蓉奈晚何渡漢江九天灝氣肅髙秋萬里銀河入海流西楚人才多用晉中原豪傑暫依劉久無翠羽供王貢時有􅊮弓賜列侯自惜飄飄雙短鬂也隨江漢一輕鷗經潭州哭李太守潭州即今長沙府太守名黼字子威死節元忠臣丁卯科中第一人誓將孤壁障妖塵百年事業歸儒者萬里江山泣老臣肝膽當時紹余闕英靈此日配張巡我來竟就船頭拜一盞寒泉薦緑蘋三湘曾向三湘望五溪水源汨汨盡流西狂思醉裏千鍾少老覺人間萬事低移艇出江當月上煮茶消睡恰鶯啼近來詩句慵思索逢著青山趣謾題過黄陵廟萬里蒼梧接桂林九疑雲氣隔湘陰東風又洒斕斒淚明月長懸悵望心雨裏鷓鴣春色晚廟前莎草落花深荒碑獨有元和刻苔色蝸涎已半侵江邊尋花值雨獨自尋花傍水濱霏霏小雨浥輕塵正憐啼鳥能留客却笑東風也妬人栁色半昏先近晚梨花漸濕更多春湘娥應解知人意兩㸃脩眉結翠顰興安道中青山一半入青雲碧磵千囬轉夕曛松碣㸔來多漢刻竹祠隨處是湘君路經猺洞諸峰直泉入灕江兩派分莫據孤鞍聽蜀魄野棠疎雨又紛紛二月晦日來陽江口寄書自笑無家類轉篷年光何事更怱怱數聲鶯響千山裏一樹花開萬竹中夜入瀟湘偏厭雨春來杜若自宜風兒童别久應驚問華髪飄蕭佀老翁祁陽道中見海棠桂陽江口望祁陽疊疊烟雲入𣺌茫髙樹緑陰千嶂濕野棠疎雨一籬香縱無春在猶囬首況有鶻啼合斷腸惆悵東湖堤上栁暖風輕絮正悠揚衡陽有懐二首寒郭沿洄楚水陰鶯花寂寂雨沈沈江山不盡登臨意節序偏驚老大心客裏茶烟長自冷衡陽栁色為誰深峰前亦有囘歸雁不肯隨人到桂林其二鳴鳩日日喚春陰坐挹爐熏萬慮沈對雨只添鄉國恨㸔花無復少年心烟皆榆栁青猶淺水是瀟湘緑更深不道沙邊有城郭短籬茆宇映疎林客中寒食有感客舎蕭條百尺天衡陽城下栁隂船梨花又濕初晴雨草色仍含己禁烟車馬㸔花悲昔夢綺羅傳燭待明年三吳八桂東西路萬里空山哭杜鵑其二減衣時節尚寒天暫倚東風泊畫船十里樓臺仍細雨五侯池館又新烟且簮楊栁酧佳節莫對桃花憶去年總是無情也腸斷鷓鴣聲裏又啼鵑桂林與蔣張二指揮觀兵大字青旗寫豹韜連環金鎻束征袍千艘夜泊烟江濶萬竈晨炊瘴嶺髙燕頷將軍髯似㦸鵠形俘虜面如刀自慙不得同髙適走馬西河㸔屬櫜桂林即興二首曾見重華巡狩來灕江廟宇野棠開山無檜柏皆巖穴地有芝苓盡藥材花布短衣齊膝製竹皮長㡌覆眉裁也應風土交州近丹荔紅蕉不用栽其二江為池塹石為城南去蒼梧兩日程碧殿尚存虞帝像青山不廢伏波名蘭根出土長斜掛榕樹成門却倒生時有苗人與猺女負薪輸布事科征聞江聲有感嵗事匆匆兩鬂星坐㸔簷影下虗屏寒梅向暖商量白舊草迎春斷續青夢以俗牽終夜惡酒因愁散片時醒秦山密雪巴山雨不似江聲不耐聽晚發𤓰洲江花江草望中稀相趁畸人萬里歸鷗逐晚潮爭北上雁隨春雨向南飛船頭野老新巾幘馬上王孫小帶圍嗟我逺來頭總白洛陽塵土滿征衣宿揚州南門春風曾在此停舟白髪重來又杪秋何事瓊花猶古物當時玉樹總新愁孤城小驛連荆杞野水荒墳見髑髏夜靜有人船上哭可應鄉井是揚州舟次邵白有懐徐幼文文章小技恥雕虫也逐羣才赴洛中多病不宜秋色裏相思只在暮江東鷄豚籬落茅茨雨鳬鴨陂塘菡蓞風欲買一樽澆寂寞傷心不與故人同過髙郵即景蒼烟斜日照孤城嗟我情多却倦登田豕白蹄髙似鹿野蚊花股大於蠅人家結屋多蘆葦官府輸租半藕菱莫向西風詢往事旅懐蕭索豈堪勝淮安新河候船城郭逶迤曲遶河塵沙滿眼北風多行人淚落山陽笛逐客魂銷郢水歌江總歸陳嗟老矣淮陰在楚奈貧何明朝又鼓征西棹帆影翩翩逐逝波至龜山有題在盱眙魚鱉撝訶激怒瀧腥風沫雨濕篷忩寳珠佛像山王䕶鐵鎻神工水母降石勢參天龜出洛潭光照夜蜃浮江我行未暇求陳迹且醉船頭濁酒缸夜宿開封郡齋贈林通判輝輝燈影照更闌巵酒憐君為解顔鏡裏風塵雙白鬂夢中烟雨萬青山逢迎意懶長思靜撫字才疎欲乞閒母徳君恩俱未報不勝悲感淚潺湲懐汝寧許知府能以寛閒繼古風府中無事不從容諸生秋試多髙選八縣春耕少惰農富貴何須皆汗馬文章正欲去雕虫同庚況有聯曹誼風雨相思意萬重太原春日郊行屐齒車輪更馬蹄緑莎隨處踏成蹊無人為惜閒花落有暇來聽好鳥啼步屧愛沿流水曲開懐欲與衆山齊詩成誰復吹簫和却向藤蘿石上題清明懐故園縷縷輕烟細細風秋千池館萬家同髙低草色相參緑深淺桃花各自紅人意盡隨流水去風光都在笑聲中多情白髪并州客坐對西南雪滿峰春日山西寄王允原知司并州春半無花可賞追憶舊遊情動于中因賦長句五首公退之暇詠而味之庶幾春色之在目也允原知司善詠詩者就録以贈是詩先生親筆知司曾孫至今藏于家十里烟光濕翠苕二分春色到花朝無人快擊華奴鼓有伴同吹弄玉簫遍地錦圍歌處席滿身珠壓舞時腰莫嗔老子疎狂甚曾醉揚州廿四橋其二藥苗初茁水生葒老麝収香鹿養茸二月春光纔霽雪一畨花信又顛風參差鸚鵡全身白淺淡棠梨半面紅正是江南寒食近滿簾飛絮雨濛濛其三畫船揺漿蕩晴波步障圍風踏軟莎簫皷隊衝黄鳥散綺羅人比白鷗多不知酒與愁成敵長恨花為病作魔囘首六橋青草徧水光山色近如何其四花時無處不黄鸝偏到垂楊著意啼人立晚風携便面馬臨春水惜障泥踏歌趂拍催腔急旋舞囘身應節齊遙想故山行樂地紫苔侵遍十年題其五一莖白髪已堪嗟況是東風兩鬂華醉裏誤將裙作草老來羞以㡌簮花疎狂不識眉雙結敏捷曾經手八义閒喜日長公館靜自分新火試新茶寄舊契張來儀秦山萬㸃接烟霞東出關門鬂已華無奈異鄉仍哭子可能孤館不思家貧逢北客長賖酒飯比南人只喜茶我住東林數間屋每同談坐到栖鴉懐宋大叅公黻西山暮雨對秋屏曾共銜盃話北征五月雪花猶亂落一春沙草未全生曉因諜使窺邊略夜問降王為冦情東閣晝長香篆小盡繙圖畫憶經行寄陳管勾則威全晉封疆寄太行西來絳水入平陽千山草樹惟無竹七月衣裘已有霜俗喜背牛兼帯犢人能擒虎類驅羊憐君詩思清無敵細覔寒梅認色香無題和唐李義山商隠嘗讀李義山無題詩愛其音調清婉雖極其穠麗然皆託於臣不忘君之意而深惜乎才之不遇也客牕風雨讀而悲之為和五章一瓣芙蕖是綵舟棹歌離思兩夷猶風鬟霧鬂遥相憶月户雲牕許暫留波冷緑塵羅襪曉恨添紅葉翠顰秋雙鸞鏡裏瑤臺雪任是無情也上頭其二纔向瑤臺覔舊踪曙鴉啼斷景陽鐘薄施朱粉籹偏媚倒挿花枝態更濃立近晚風迷蛺蝶坐臨秋水亂芙蓉多情莫恨蓬山逺只隔珠簾抵萬重其三細骨輕軀不耐風春來簾幙怕朝東人間玉宇三山隔天上銀河一水通眉暈淺顰横曉緑臉銷殘纈膩春紅氷絃莫奏清商曲滿地霜華泣翠蓬其四夜合花邊待月來宫中轣轆響春雷笙調恨譜參差度錦織愁紋宛轉囘樓上緑珠知報主座中紅拂解憐才傷心兩炬緋羅燭吹作銀荷葉下灰其五為雨為雲事兩難蕙心蘭質易摧殘箏移錦柱秋先斷漏滴銅壺夜不乾羅幙有香鶯夢煖綺牕無月雁聲寒芙蓉一樹金塘外只有芳卿獨自㸔附沈通理次韻無題五首通理居蘇之崑山宣徳正統間詩人蘭漿雙欹倚桂舟隔花臨水思夷猶香囊玉佩勞相贈綉幄銀屏惜共留愁繞鳳臺秦樹暝夢囘巫峽楚雲秋多才苦被春情惱鏡裏潘郎雪滿頭行雨行雲少定踪夢囘時節怕聞鐘竹枝寄恨心偏懶桃葉題情意轉濃香冷綉鞍閒騕褭燭殘金障掩芙蓉紅樓緑水無多逺如隔江山幾萬重纎纎斜日弄微風腸斷仙山碧海東鸞鏡有塵空自掩雁書無路若為通愁横栁葉眉顰翠泪濕桃花臉暈紅盡道芳年易憔悴莫教青鬂作秋篷油璧香車幾度來赤闌橋畔起驚雷夢隨暮雨陽臺去愁踏春波洛浦囘青鳥銜書通密意綵鸞留詠惜竒才芳心一寸如紅燭總遣燒殘未作灰𤨏牕珠户别離難蘭蕙柔姿惜易殘曲斷瑤箏銀甲冷書留錦字墨花乾羅衾積夢驚春晚寳鴨銷香覺夜寒檻外碧桃花自好一年芳景共誰㸔
