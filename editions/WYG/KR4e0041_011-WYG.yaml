body:
  text: 眉菴集巻十一明楊基撰七言絶句天平山中予家赤山相去不五里許細雨茸茸濕楝花南風樹樹熟枇杷徐行不記山深淺一路鶯啼送到家寒食有感二首亂裏情懐怕寒食強拈巵酒竟無懽晚來一陣東風雨吹得梨花不奈㸔其二漠漠輕隂接逺天離離芳草鎻春烟郭西多少新墳墓若箇能來掛紙錢過隣家撥悶亂來情思倦㸔花閒却西園小小車今日偶因題竹去試扶藜杖到東家憶均垍二弟在逺三首别來芳草遍天涯憶汝飄零何處家一向春愁禁不得晚風吹破紫荆花其二一雙鴻雁隔天飛三月江南未解圍惆悵夜來風雨裏片時春夢見渠歸其三兄愁弟戚兩相親還復江濱定海濱却恐數州消息異懶將踪跡問行人稱稱初度我年六六鬂如絲見汝三齡却兩朞願得汝長并我老太平還説亂離時囘文二首烏啼夢裏燈添恨月轉屏前影對愁枯葉亂飛霜砌冷細烟香遶夜牕幽其二秋涼晚殿水蕉紅扇掩閒情舊感空樓對逺霞殘照落愁邊寄信有歸鴻畫三首石上風來吹酒醒白雲幽繞緑苔生山中莫道無絲竹聴徹松聲與磵聲其二葉葉衣裳帶雨裁白鷗江水淨無埃偶然扶杖沙邊立不為㸔山獨自來其三幽蘿灌水䕃清溪水鳥忘情自在啼正好從容㸔山色淡烟衰草夕陽低紅緑蕉二仕女圖兩樹紅蕉隔禁扉曉涼携伴試羅衣金鈴小犬迎人吠應怪秋來出院稀其二為折芙蓉向御溝碧羅衣薄又驚秋侍兒剛道新涼好不解芭蕉與扇愁夢遊西湖採蓮女郎蓮花腮藕絲衣輕難剪裁瞥然一見唱歌去荷葉滿湖風雨來燈夕微雨脉脉輕陰潤玉笙霏霏小雨濕銀箏雖教月色朦朧黒更覺燈光分外明紅梅一般香影月朦朧只有仙肌逈不同天不念貧空付色儘教消瘦却教紅水仙氷肌玉骨照江波瑟瑟塵生襪底羅自是仙魂招不得滿天風雨夜如何十二紅圖何處飛來十二紅萬年枝上立東風楚王宫殿皆零落説盡春愁暮雨中栁枝詞千枝萬縷軟婆娑倩得東風著雨挼昨夜鵞黄變新緑比郎衫色不爭多故山春日八首千花萬蕚委塵埃只有荼䕷獨自開應是隣家更零落過墻蝴蝶又飛來其二梨花兩枝春可憐下馬折花山逕邊山中人家改新火隔樹吹來榆栁烟其三青青蘆笋襍蒲芽細細浮萍是栁花昨日臨池㸔科斗曉來風雨已聞蛙其四桑葉隂隂戴勝飛采桑人執懿筐歸老夫欲買新絲染製取斑斕五色衣其五寂寂青山一鳥啼紫藤花落午風微不知刻漏長多少但覺桐隂半日移其六輕寒拂拂雨沈沈紅漸蕭疎緑未隂不是牕前兩啼鳥錯將時序比秋深其七春來芳草踏成蹊半是車輪半馬蹄多謝清明三日雨舊痕新緑一般齊其八陌上誰尋雨後花山中人摘雨前茶陰陰樹木青青草可是王家與謝家雨中對杏花杏花枝上雨㝠濛洗得胭脂淡淡紅寄語東君莫相妬放教春色十分濃壺中碧桃先謝折梨花一枝補之一枝紅在一枝空底事氷肌不耐風更折梨花來作伴玉環飛燕本相同花時感事為怪春寒起較遲卧憑啼鳥報春期近來鶯燕渾無語過却梅花總不知雨中對花四首正好㸔花却醉吟醒時花事已傷心西園數朶開將盡風雨相㸔到夜深其二春風幾日雨淹淹鶯慘花愁總不堪惆悵隋堤千樹栁至今青眼望江南其三消得吟風却避風已開微淡半開濃要知有色還無色莫愛深紅暎淺紅春半薺葉深能沒乳鴉石泉清可見魚蝦一年春事餘多少只有南風楝子花春暮西園雜興四首疎疎簾影漾微波庭户無人鳥自過一樹楊花三日雨池塘春水緑萍多其二緑蕪春水燕雙飛細雨輕寒稱祫衣半日不來池上立殘花又比午前稀其三蒲葉初長蕙葉齊杏花如雪涴春泥無人搖動秋千索黄鳥飛來架上啼其四野棠飛盡木香開蝶靜蜂稀逕有苔正是江村寒食後老夫先為緑隂來落花嘆半隨流水半莓苔只有沾泥更可哀燕子也能知愛惜為人銜入綉簾來三月晦日花飛一片即春歸況是陰陰緑滿枝謾道東風有今夜不知春已去多時仕女四春圖東風剪剪入籹臺眉蹙春愁掃不開非是薄羅能耐冷捲簾貪㸔燕雙來右春陰其二隔簾鸚鵡解呼名花落閒庭草自生曲曲畫闌皆倚遍一春刀剪不聞聲右春悶其三風送楊花滿綉床飛來紫燕亦雙雙閒情正在停針處笑嚼殘絨唾碧牕右春綉其四蹴罷秋千日已沈東風花底力難禁笑携女伴歸來晚失却羅鞋不再尋右春倦衍斯道上人折梔子花見遺走筆奉謝五月鄉林簷蔔開雪花如掌照青苔不教天女輕分去却為維摩逺送來屋後種松屋後荒蕪地五弓自除瓦磔種青松朝來未見蕭蕭葉便覺吟詩錯費工松下小簟疎簾曲水濱葛衣蒲扇紫荷巾自慙不及雙松樹猶有清陰蔽路人寢齋見螢火雨館蕭條已罷吟流螢穿隙自相尋也應憐我無燈燭故入紗帷照夜深㸔蜘蛛補網風雨蛛絲斷不収密經細緯更綢繆自憐辛苦纔盈尺多少飛虫網外遊粉團兒花小小流蘇結素羅團團香粉綴柔柯玉奴不識傷心恨滿面春風笑靨多見紫薇有感埜水荒垣兩樹紅猩袍爛漫照西風無人種近絲綸閣花落花開暮雨中蓮渚泛舟二首氷漿不用蔗漿調聞得荷香酒自消一𣲖江聲滿船月却愁容易度今宵其二玉簫低與玉笙調度未成腔意已消雪白芙蓉香一色總教人不愛春宵避暑貽美人二首緑荷瀉酒勝瑤漿白葛含風壓串香不待瓊樓髙百尺玉人相對自清凉其二酥凝酪粉煉霞觴衣染浮絲碧藕香試下瑤堦㸔明月玉膚消得幾多凉夏日聴徹簫韶獨掩扉水花向夕斂紅衣舞衫不用鴛鴦縠别染春絲上錦機赤山漫興松梢吹粉落衣裳躑躅花開竹筍長可是山中朝洗藥一渠春水茯苓香過鄧尉山訪徐良夫留别二首隨意扶笻入逺林紫藤花落逕苔深山中莫道無音樂一片鸎聲在緑陰其二浮雲載山山欲動春水煮茶消午夢緑蘋風起恰開帆數聲啼鳥來相送管夫人墨竹霧鬢雲鬟洛浦神氷肌玉骨衛夫人都將松雪齋中意偏寫瀟湘雨外真趙仲穆墨蘭二首當年曾進福州蘭小殿秋風翠珮寒零落楚香収不得且從魏國畫中㸔其二繁露幽香泣翠娥冷雲纎月淡秋河沅湘一帶皆春色誰道懐王廟裏多白描芍藥圖錢選作玉樓寒擁翠羅衾珠箔晴搖縷縷金蝴蝶亂飛花未落東風庭院又春深睡起圖月圓團扇送輕涼荷大如錢作藕香午夢醒來思白雪玉甌催進荔枝漿張仲敏鈎勒竹解珮歸來月影孤秋風鸞鶴自相呼先生晚種參差玉招得林間兩鳳雛藍采和像石崇步障四十里猗頓珊瑚八百株寧可黄金堆下死街頭不散一青蚨贈胡校理文伯南郭先生一尺鬚秋風欲别意踟蹰明朝歸㸔庭前杏添得清明幾百株贈薛如鑑善相二陸門前一見君笑談許我到青雲平生不學縱横術那得黄金鑄印文寄無錫張彦禎老去張堪更愛農不教税務及疲癃如今麥熟蠶成箔處處桑麻百二弓寄陳惟寅惟允坐有重氊食有魚眼能識字手能書山於秋水船頭㸔家在春波門外居松陵道中吳姬盪槳出蘋花江上行人未到家日晚城邊秋佀水萋萋烟樹亂鳴鵶青山白雲圖手種溪頭十畆陰鳥啼花落暮雲深夜來一尺蘭苕雨若箇扁舟肯見尋宿雲竹居月斜風細酒微醺白露瀼瀼濕練裙底事夜深清不寐半忩竹影半牕雲題畫暮靄霏霏掩翠峰遶籬落葉有行蹤杖籬獨自行吟去不是尋僧定㸔松四皓高帝如何太子盈先生垂老入京城當時四皓非黄綺多是留侯指教成煩李伯定移菊何處籬邊菊本多煩君將送緑婆娑老夫準擬重陽醉亂折黄花挿皂羅九月八日對菊去年風雨罷登髙今日黄花預見招莫怪遶籬開未好正含秋色待明朝題趙松雪臨宋徽宗水墨草蟲趙自題云不暇丹青筆何人寫逺愁露濃時菊晚風𦂳候蟲秋元末諸作者不知公意反有所誚走不揣次韻用以慰之云王孫老去尚風流畫裏新詩寫淡愁莫道吳宫與梁苑露蛩烟草一般秋二美人圖半餉無言却斂眉玉簮斜墮翠鬟欹相逢莫説傷心事才入深宫自得知其二鴉頭羅襪鳳頭鞋細踏花隂下玉堦綰得青絲無奈滑更臨春水照金釵刺綉倦綉二圖兩日無心綉一絲偶將針線刺花枝無端綉到雙蝴蝶憶著西牕夜雨時其二刺得芙蓉半朶金倚床無語自沈吟玉奴不解傷心意抵死相催綉幾針附唐處敬和洗花染線刺春羅鳳翼雙飛錦作窩蹔起非關針力倦海棠時節困偏多附髙季迪和翠絲盤葉碧玲瓏小蕚花鋪茜縷紅夢裏鴛鴦留不得分明却在綉床中為孟辨題二仕女紅綃衫子雪膚肌女伴相邀去賭碁花底忽逢雙蛺蝶背藏羅扇㸔多時右觀蝶其二玉奴催報海棠開及早梳頭出鏡臺便揀一枝和露折六宫惟我最先來右折花白練二圖㦸尾參差白練分馬嵬坡下舊香魂君王西去無消息疎雨桃花半掩門右碧桃其二珎禽斜立海棠枝玉雪胭脂㸔欲迷只恐驚飛花亂落霓裳三拍按教低右海棠代贈所懽三首濃緑蛾眉淺淡籹玉肌紅暎白霓裳春風不稱花枝願逢著多情即斷腸其二衆中相見獨相憐憐我多情更有縁不是無心㸔春色亂離情緒不如前其三寛盡羅衣兩鬢秋相逢猶自愛風流天涯無復陽臺夢辜負春風萬種愁枇杷青鳥枇杷香遶漢宫栽珠箔銀屏四面開武帝遣書邀阿母青衣使者最先來遇史克敬詢故園克敬自長洲來因詢吳中風景大異往昔賦此以寓鄉里之思云三年身不到姑蘇見説城邊栁半枯縱有蕭蕭幾株在也應啼殺樹頭烏贈京妓宜時秀欲唱清歌却掩襟晚風亭子落花深坐中年少休輕聴此曲先皇有賜金出金陵城南二首長干塔前千樹花半隨流水半泥沙王孫醉裏渾忘却走馬麄豪來索茶其二去盡黄鸝緑樹隂閒門重掩落花深當時一曲尊前酒多少王孫買笑金憶挹翠亭聴歌示徐幼文余唐卿清歌一曲動梁塵只憶當時淚滿巾何況春歸花落盡眼前漂泊兩三人江寧雨中解盡春氷水漸通岸花狼藉燕西東巴江不盡青青草都在疎烟淡兩中江村漫興三首江籬葉長三月春江邊栁花飛接人吳姬壓酒醉十日及此東風緑髪新其二一月春陰不㸔山夢魂長在碧雲間美人别後縁詩瘦白玉腰圍一尺慳其三莫道書生未白顛鷓鴣聲裏自年年祇因落盡墻頭杏幾日琵琶不上絃重到京杏花村裏清明酒陽羨山中穀雨茶如此情懐如此景行人何事不思家春盡聞鶯有懐髙季迪一聲黄鳥喚愁醒已是南風緑滿庭客裏得聞休恨晚故園知有幾人聴從袁賛府乞珉玉巾環新製東坡一幅巾也堪漉酒障埃塵更須乞取雙環玉相稱山人兩鬢銀夢故人髙季迪三首辛亥八月十八夜夢與季迪論詩已而各出詩藁互相商確季迪在吳時每得一詩必走以見示得意處輙自詫不已夢中抵掌故態如常時因賦三絶季迪且索其舊作云詩社當年共頡頏我才慚不似君長可應句好無人識夢裏相尋與較量其二老來久不誦君詩得見都忘是夢時我最憐君君識我此中未許俗人知其三驚人新句嘆無前故態疎狂佀少年便寫錦囊三百首為君披咏步涼天秋夜秋風今夜十分凉斜月欺人巧照床自是不眠思往事漏聲元只許多長江邊見紅葉一瓣霜紅一瓣秋上陽宫裏御街頭而今漂泊寒江上相趂蘆花細細流客中懐弟妹弟妹當年五六人銀鞍羅綺照青春而今死别兼生别風雨瀟瀟一病身沙河聴雨壬子閏七月十四夜惡雨乖風聴未休暗愁悲續斷鴻秋却將湖海三年夢併作沙河一夜愁舟中書所見二首羅帕包頭不畫眉沙河船裏鬰金衣可應憶著關心事斜倚秋風㸔雁飛其二玉膚花貌是誰家趂逐秋風渡晚沙河水東流燕西去一般魂夢遶天涯舟中聞絡緯江濶天空北斗低月寒沙白露凄凄家鄉漸逺衣裳薄憑仗秋蛩莫夜啼客中憶弟去時霜葉遶溪紅落盡桃花信未通客裏匆匆寒食酒一樽那得弟兄同夢稱稱二首語未能真已誦詩相過爭愛骨權竒他鄉夢裏分明見猶佀當年索果時其二掌上明珠落大淵夢中愁對玉娟娟我將四十空囘顧念有何人與我𤣥過琵琶亭在彭澤楓葉蘆花兩鬢霜櫻桃楊栁久相忘當時莫怪青衫濕不是琵琶也斷腸詠大姑山下梅花紫蕚黄鬚抱玉膚也應人惜半枝枯雪中惟有山僧折瓦􅇲寒泉薦大姑出江㸔廬山一疊峰巒一道泉幾重雲樹幾重烟歸來記取屏風様寫向茅齋聴雨眠雨晴廬山㸔雲横帶斜烟抹翠蛾淡籠初日照青螺行人謾道廬山好自是春雲態度多㸔廬山時無片雲消盡春雲山更宜芙蓉全見碧參差天然標格誰能似虢國夫人淡畫眉舟泊南湖有懐三首二月十二日舟泊彭蠡南湖嘴風雨甚寒憶吳中是日郡人皆試夾紗衣單羅扇往范家園㸔杏花入春來此為行樂之首紗衣羅扇一時裁兩兩三三作伴來正是吳中好風景范家園裏杏花開其二單羅小扇夾紗衣冠子梳頭挿翠㣲知是范家園裡醉無人不戴杏花歸其三日日㸔花載酒行不論時節與隂晴相逢猶自嫌春色花裏迎人問太平途中為人題畫溪水涵秋帶緑蕪草堂雲冷鶴將雛相逢未遂還山約空復年來㸔畫圖江西送陳文獻薛存道二生還山西三首江上憐君踏雨來推篷一笑兩眉開莫教章句孤年少自古山西出將才其二滕王閣下說山西多少雲山望轉迷問我路程嗟更逺桂林烟雨鷓鴣啼其三君歸晉兾我湘潭塵土風波兩不堪盡道衡陽有迴雁行人更在雁西南到江西省對花八首閒來樹底踏青莎喜見斜紅挿皂羅莫愛壓枝千萬朶三花兩蕋更情多其二長恨花開春色闌不堪春半百花殘從今却願遲開落得向清明節裏㸔其三芳草無端出意長斷紅殘緑弄春陽莫愁寒食花開盡更有荼䕷與木香其四最好花枝最後開千重籹束萬重栽東風不敢輕吹破前度劉郎恐再來其五青絲茵褥是柔莎白苧衣裳勝綺羅千樹桃花紅一色春光誰道不須多其六小小旗亭曲曲闌禁烟時節未鶯殘便須連夜燒銀燭莫待他年霧裏㸔其七東湖東畔栁枝長滿苑飛花亂夕陽何處祓除兒女散過來流水鬱金香其八生色屏風一面開輕羅團扇合歡裁深深院落青青栁縱是無花也㸔來後四首次前韻題方員外像一尺長鬚七尺身當時顔色畫能真相㸔已覺如兄弟不待他年是别人雜畫六首玉椀糖霜萬顆氷王孫筵上酒微醒若教畫作囘仙鶴一夜吹簫過洞庭右石榴其二盧橘當年出漢家誰將名字雜枇杷風枝露葉金盤果盡是僧房雪後花右枇杷其三一斛凉州價已多上林千樹酒成河塵沙漠漠穹廬雪若箇銀瓶覆紫駞右蒲萄其四茂陵老去愛求仙青鳥銜書到御前不意種桃成一笑開花結子六千年右緋桃其五密瓣深紅别有春武陵千樹欲迷津不因流水漂香出那得秦人識晉人右千葉緋桃其六沈香亭北繞闌栽曽藉花奴羯鼓催今夜不須銀燭照待他明月上枝來右海棠其七淨洗胭脂學道裝玉冠青帔羽衣裳蕋珠宫裏秋宵永立盡瑤堦一夜霜右蜀葵其八紫袍紅刺玉纎纎甘露収香入翠奩何處南風開滿架緑陰庭院水晶簾右薔薇聞鵲鳷鵲船頭喚夢囘鵲聲雖好却成哀昇州一望三千里那得音書送喜來過黄州吊赤壁風雨來登赤壁磯武昌烟栁望中稀無人更有坡仙樂月小山髙醉未歸舟中見雪珠鮫人捧淚泣春風亂擲明珠向短篷欲采緑莎紉作佩滿江春水落花紅鯉魚山阻風天甚寒雨皆成霰江南天氣太無憑草色烟光暖欲蒸向晚鯉魚風乍急盡吹小雨作春氷夏口川江東接漢江流萬里相逢鸚鵡洲更約瀟湘與沅澧大家淘盡古今愁望武昌吹面風來杜若香離離烟栁拂鷗長人家鸚鵡洲邊住一向開門對漢陽其二春風吹雨濕衣裾緑水紅籹畫不如却是漢陽川上女過江來買武昌魚徳安山中石橋斜日萬山陰雲滿寒溪雪滿林獨有梅花㸔不厭江南春色故園心岳陽阻風三湘風雨五湖春萬里相思一病身能向此中魂不斷更無愁處可愁人過洞庭口號七十二峰天際開一泓秋水大於盃白鷗千㸃飛不盡鴻雁一雙何處來湘江對雨二首風雨黄陵半掩門鷓鴣聲裡樹微昏無情最是江邊竹猶自淋漓有淚痕其二𣺌𣺌滄波淡淡鷗緑蒲青葦響如秋人生不聴瀟湘雨行遍江湖未是愁題楚江秋意圖萬里巴江入海流水天空濶雁行秋楚歌未斷西風起一叚青山一叚愁經汨羅廟在湘陰縣北六十里三閭祠宇汨羅邨重午年年一掃門莫道獨清當日事至今湘水不曽渾祁陽道中五首疎烟小雨濕流光愁得楊花不暇狂半餉春晴便飄蕩綴人簾幙上人床其二愁紅怨白滿江濱一樹盈盈恰破春正是情多開自晚雨中知有斷腸人其三曲垣低檻是誰家門户深深閉落花千百黄鸝萬竿竹夢魂應不到天涯其四一簇荼䕷湘水東輕輕脂粉趂微風低嚬淺笑皆傾國不在胭脂著意紅其五紅深翠密不成蹊修竹玲瓏巧更低黄鳥未知花又落野棠風裏一雙啼潭州雜懐九首春江瀰漫春草亂一色遙遙青不斷晚來烟起鷓鴣飛無數桃花在東岸其二鵁鶄鸕鷀飛滿沙緑水刺刺上蒲芽湘潭縣裏春分後不道人家有杏花其三渡頭烟栁入村稀沙嘴漁舟各自歸却笑匆匆雙白鳥滿江風雨不停飛其四桃花深紅杏花白紅白花開弄春色東風一片落衣裾腸斷江南未歸客其五船頭漱齒濕衣裳水面花飛口亦香坐愛蜻蜓兼蛺蝶鬬將春色上牙檣其六午睡醒來風滿面十年春夢思量遍前度劉郎觀裏花舊時王謝堂前燕其七吳女娉婷楚腰舞梁園風雪瀟湘雨多情長使鳥催歸底事不教花解語其八楚妃祠前花繞樓楚人唱歌牽客愁全開一樹紫含笑閒聴數聲黄栗留其九湘中老翁不褁巾見我自是平生親衡陽萬里雁不到爲問使君何處人舟囘㸔廬山雲中西去雨中還又見秋雲黯淡間不是漂零應不得一年三度㸔廬山望五老峰次權宣使韻宣使權仲武有送余詩曰五老騎雲來送迎八月廿四日雨中過湖望五老在烟雲中若欲與余笑語者因用仲武韻為起句五老騎雲來送迎笑余舟楫往來輕前身曽住東林寺因與廬山有舊盟其二五老騎雲來送迎迎君却是送君行從今卧聴鍾陵雨誰與廬山愛晚晴送李都司往江西簡省中諸友時寓茆山秋屏閣下雨新晴無限匆匆别我情不意長干秋色裡又將詩句送君行其二我從西省罷官歸旋葺茆茨近翠微從此生涯是鉏畚故人休怪寄書遲其三左掖桃花向北栽兩畨風雨見花開明年對酒應齊説曽與眉菴共㸔來嘆道傍廢宅桑柘隂隂遶岸栽石闌銷折卧蒼苔欲求姓氏無人識時有逃軍剥棗來觀剥棗珠實離離雨更新行人敲剥走荆榛我來不忍臨風食為憶當年種樹人重過文竹軒二首蕭蕭茅宇曲崗西嗟我重来路已迷何事隣翁猶愛惜壁間留得醉中題其二倐來還去已堪悲况復難期再到時踈栁最多離别意十分憔悴向人垂送陳明善之真定風塵贏得鬂毛斑不為臨岐一愴顔五日北風三尺雪馬頭遙見太行山過下蔡當時佳麗比陽城楚女腰肢雪鬬輕莫怪王孫迷一笑古來尤物萬人傾過竇鳴犢大夫祠生死齊君有舜華西來尼父竟同車荒祠人去槐陰靜一院南風芍藥花梁園聞雁有感萬里飛來一雁聲梁園枕上夢初醒誰憐今夜江南月又是空齋獨自聴其二空齋獨自數長更聴得嘹嘹一雁聲忘却江南與江北斷腸同是客中情其三斷腸何處最堪憐客裏逢秋憶去年安得妻孥與兄弟舉家歡笑雁聲前登宋宫故基上皇宫殿碧參差嗟我來登見廢基盡道河邊金線栁腰肢猶似李師師太行望雲為新民賦十年漂泊向風塵一度㸔雲一愴神此日逢君重惆悵異鄉多少望雲人其二晉冀封疆萬里長白雲飛處是他鄉愁心恨不如春雪一夜東風到太行到山西題畫梅江南分手到山西每憶溪橋夢不迷氷雪有如林下約一枝重向畫中題太原官􅅟見榴花短短榴花石上栽南風吹得一枝開花枝縱是相憐我白髪何心為㸔來罷釣圖為翟少叅文光題時翟將休致故及之畏途萬里費經遊到處紅塵沒馬頭何日釣竿從此老也分一片荻花秋觀晉祠泉在太原縣流出為汾河者太行翠色鬱蟠蟠一𣲖泉飛石罅寒千古東流誰禦得任歸滄海起波瀾曉度雁門關山迢遞朔雲髙風𦂳霜華積毳袍此地宣威稱李牧有誰再退北羌豪除夜舊歴驚心只一行坐依燈火戀年光尋常客裏愁長夜惟有今宵願更長眉菴集巻十一
