  - {type: page-break, offset: 5, content: '', id: KR4e0041_WYG_002-1a, image: WYG1230/WYG1230-0355c.png}
body:
  text: 眉菴集巻二明楊基撰七言古體遊穹窿山昨日出遊今日還登臨未盡湖東山紫藤花落高樹下翠羽鳥啼深竹間泉停峻石淨可掬磴倚絶壁危難攀攀蘿試上最高頂天風兩腋超塵寰廻視羣峰摠在下擬接浮丘同解顔一本無末四句有人生跬步即天險不獨瞿塘與劍關二句為結姑蘇臺姑蘓臺下清江晚斜日江心照闌檻臺上西施醉捧心江邊東越愁甞膽鴟夷裹屍去不還麋鹿散迹游其間功成却羡陶朱子一葉扁舟弄雲水雪坡約余同入杭既而弗果臨别索詩賦此十年不醉西湖酒夢寐春風萬株桞滿意從容覔舊遊短衣疋馬隨君後孤山梅花斷橋月此興既發中忽否停驂索我題詩送握手躊躇為之久江堤霜白萬馬滑城角鑿落掛北斗前鋒已逺後已動弓箭束腰槊在手借問軍中誰最賢紫髯太守勲名舊范公兵甲陳平計方寸耿耿無不有當時結束事楚國日間十策晦其九萬里曽瞻上國光一麾復出三城守至今錢塘與湖秀父老傳誦弗離口去年逡巡㸃朝斑予得沗為幙下友今兹祀釐尚祀事黼黻籩豆薦芹韭禮樂三千固未遑趙王鼔瑟秦王缶君侯入城如父母兒女掃街霜滿帚莫向江邊聴蹋歌一夜相思成白首著色西湖景和張光弼韻時杭正被苖完虐甚昔日西湖最佳麗稚緑新紅無著地日光爛漫注黄金恰似而今畫圖裡繞湖髻鬟翠萬堆行雲行雨相徃來魚吹碧浪送歌舫手當玉槃行酒杯但知身在歡娛内肯計年光逐流水若尋昨夢問風流不及丹青一張紙約范園看杏花西園杏花如雪明年年看花春滿城烏紗小㡌挿花舞碧羅窄䄂穿山行花今仍發當年道淨洗臙脂眉淡掃僻處休嗟車馬稀内家園裡猶芳草東風回首㡬人存粉悴香憔不忍論錦瑟金錢誰赴約鳯笙龍管謾招魂月斜徐步花枝下欲折生紅淚盈把莫怪無人看此花當年已嘆遊人寡風雨隂晴每願違便湏携酒趂春暉明朝青子花零落鶯老梅酸蛺蝶飛草堂芙蓉孟冬始開遲莫可傷作詩慰之東隣芙蓉花已歇西隣拒霜亦開徹草堂一樹初着花錦蕋瀟瀟間疎葉也知地僻竟開晚不見重陽好時節池寒夜静看不休月白霜清照愈潔愧無樽酒澆遲暮且為花從盛時説憶昔開元太液池緑水朱闌颭紅雪鸞輿毎煩天子顧玉缾甞詔才人折零落江湖事總非露草烟蕪共悽切衰颯如君也不多相㸔勿用長嗚咽尚梅軒江堤雪消春水漲吳人看花車百兩梨花輕盈杏花俗只有梅花清可尚剛風一吹色殊絶霽月暫照光欲蕩一枝斜横修竹外數朶逈臨流水上孤高百卉不敢先豈獨區區丈人行山人尚梅如尚賓兩屐莓苔曉相訪清樽慰花對花飲香雪紛紛落盆盎莫待東家玉笛吹花間容我青藜杖王叔明長史畫白雲英英山簇簇緑蘿隂埀樹如屋鳴琴彈罷坐碧蘚手揺羽扇坦其腹南風徐來生晚凉衣裳颯然荷染香世間萬事若流水呼吸湖光醉一觴棘竹三禽圖棘刺揺揺風蔌蔌一禽驚啼兩禽宿空山日晚腹猶飢何處藩籬有遺粟杏花春雨小樓西撫巻彷徨不忍題愿作尋常雙燕子年年飛入未央棲食燒笋留題陳惟寅竹間春雷一聲萬簮玉參差亂迸莓苔緑斬來掃葉當逕燒何異燃箕煮秋菽登盤查牙玉版肥焦尾碎剥蒼龍皮山人大嚼無以報寫作林間燒笋詩詠七姊妹花紅羅鬬結同心小七蕋參差㺯春曉盡是東風兒女魂蛾眉一様青螺掃三姊娉婷四妹嬌緑窻虚度可憐宵八姨秦國休相妬腸斷江東大小喬贈鑷工王生湘娥剪筠編櫛齒鸞刀寒凝鸊鵜髓鉊華拂刅秋霜飛兩㸃春山愁不起青銅自照顔色好粉垢脂痕驚一掃三十六宫妬少年背指梨花笑春老細骨輕軀珠翠蛾玉膚紅映鴛鴦羅明朝面皺白髪多王郎王郎奈若何畫為包師聖題疎簾半捲絲絲雨菱葉荷花暗江渚水近松深徹夜凉不用開襟揺白羽隔岸人家住緑隂偶來聼我坐彈琴聊將白雪猗蘭意銷盡紅塵汗馬心沈仲真自徳清折苔梅一枝見惠江南地暖雪不落臘月梅花滿岩壑今年正月氷雪多梅蕊青青尚含蕚夢斷寒窻風雨中遥想西湖總蕭索野人逺自山中來寄我横斜春一握碧苔遶枝花半露翡翠明珠相間錯玉骨寒封紫繡衣氷梢翠剪青螺殻初疑老樹鱗甲動更覺霜禽羽毛薄生香入手未敢嗅一日春風到樓閣與君别來鬚髪蒼心跡未逺怍匪昨忽向江南見似人顔色皎皎殊不惡笑呼春酒白玉壺且復清吟對花酌苕溪雪消生杜若畵舫青帘恣行樂明日相思賦逺遊東家許借孤山鶴趙元畫懸厓圖懸崖無根谷無底樓閣參差半空起不信神工斧鑿成人間至險無如此我對畫圖猶拊膺何况﨑嶇險處登槿樹籬邊堤似掌藕花池上月如燈夜聞異香玉河低斜衆星皎白露横飛濕幽艸異香何處忽飄揚郁郁霏霏遍穹昊驀焉隨風驚旖旎稍乆欲尋還縹緲褰衣四顧但澄碧正似萬株丹桂繞恍疑真仙鳯輦過芬馥爐熏散雲表復疑寒兎搗𤣥霜王臼丁東杵龍腦道人六鑿乆空寂臭味色聲俱一掃黙然鼻觀相感通此豈天花故紛惱絪緼自散還自滅聞佀不聞神不擾世間萬有等虚幻臭腐神竒心所造須臾斗轉金氣肅刺刺微寒欺破襖自展羅衾向壁眠一任秋風㺯池篠贈道士吕紫岩岩松青青岩石紫紫岩仙人躡朱履一簮星斗月光寒手把芙蓉扣元始岩下琪花樹樹春岩前流水泛青蘋前身自是純陽子何用重尋回道人巧石雙松圖松蟠怪誕龍形矯石嵌玲瓏雪膚巧何事淋漓水墨圖高堂六月秋風早秋風吹雪山脚動瀑布飛來濕瑶草翠幹危撑日月低霜根倒挿雷霆繞山中黄葉已葢地獨有烟蘿青裊裊夕露猶含碧海秋春霞已破丹山曉平生愛松并愛石何異江鳬得蒲藻醉裡徂徠若可登人間草木慙枯槁豫章將軍顔色好十年走馬淮隂道索我題詩寫壯懷詩成已覺松杉老清溪漁隠清溪秋水清如練厯厯魚蝦皆可見緑蓑酒醒鴈初飛風急蘆花吹滿面溪南一帶是青山逢着埀楊便可灣謾道白鷗閒似我漁舟更比白鷗閒聞蟬眉菴四十未聞道偶于世事無所好尋常惟看東家竹屈指十年今不到微軀之外無長物寒暑一裘兼一㡌妻孥屢嘆升斗絶不獨無烟亦無竈身輕自笑可駕鶴眼明豈止堪窺豹人情世故㸔爛熟皎不如汚恭勝傲有瑕可指未為辱無善足稱方入妙此意於今覺更深靜倚南風聴蟬噪畫馬古人畫馬如畫竹貴在蕭蕭去凢俗骨欲權竒尾欲輕不用豐騌與多肉當時精妙稱曹覇人與驊騮意俱化信筆為之自有神忘却龍媒是圖畫此馬滿身花作團大宛三日到長安若教引見南薰殿應賜殷紅瑪瑙盤贈故人全王孫兄為柱國弟開府門吏紛紛皆繡斧敕賜龍河百畝宫畫㦸彤弓映朱户金鳯盤胸白錦􅃭面如紅玉紫虬鬚六宫曉逐諸王入八府春隨宰相趣東風忽念江南好寳騎㸔花踏春草茂苑鶯聲醉裏聴建章桞色愁中老回首瀛洲草木新蒼顔白髪照烏巾都將秋水蛇紋劔贈與長安游俠人歎道傍野花烟蕪凄凄秋色老夕陽穿樹照梨棗野花一簇道傍開細蕊繁英出深草我來采薪露已晞落莖滿地黄葉飛偶從荆杞得麗質肌膚玉潔生光輝花得人逢花亦喜靈妃粲然露玉齒小朶誰簮寳髻雲幽香不到銀瓶水臨風折花重歎息細數花名思未得人生歡樂在相知莫恨從前未相識夜宿靜嘯軒寒風瀟瀟枯葉響緑窻梅影隨燈上龍腦香熏雲母錢鳯團暖送仙人掌東家夜半雞唱獨西林月黒烏啼兩明朝相憶鳯凰臺臺邊春草青青長巢雲為周孟基賦白雲無心本無住聊結雲巢與雲寓十年種得雲滿山雲復留人人不去以雲作巢人未知雲為窻户雲梁楣巢中除雲一無有几席枕簟皆雲為人言我巢雲一朶我非巢雲雲巢我是耶非耶何足云雲我我雲無不可雲臺諸將千鍾禄萬里青雲電經目人生冨貴等浮雲何似巢雲數椽屋金陵對雪用蘓長公聚星堂禁體韻黄雲凍凝不成葉十載江南無此雪朱簾十二曉開齊正值千山鳥飛絶墻腰簷角危欲墮竹頂松梢重將折偏來舞殿鬬輕盈忽上金釵易消滅誰家沉火吹笙坐着處銀瓶呵手掣脂凝香靨罷晨籹臉暈微渦散春纈帶雨欲拈仍作片因風誤觸俄成屑漁蓑向晚畫難工歌樓未曉光盈瞥怪事休驚越犬吠豐年毎信呉儂説欲和東坡白戰詩氷滿霜毫硯如鐡聼老京妓冝時秀歌慢曲春雲隂隂圍綉幄梨花風𦂳羅衣薄白頭官妓近前歌一曲纔終涙先落收淚從容説姓名十三歌學郭芳卿先皇最愛芳卿唱五鳯樓前樂太平鼎湖龍去紅籹委此曲宜歌到人耳潜向東風作慢腔梨園不信芳卿死從此京華獨擅塲時人爭識杜韋娘芙蓉秋水黄金殿芍藥春屏白玉堂風塵回首江南老衰髩如絲顔色矯深嘆無人聴此詞縱能來聼知音少説罷重歌爾莫辭我非徒聼更能知樽前多少新翻調一度相思一皺眉送劉子逺歸廬陵宫槐隂隂鶯嚦嚦細雨楊花飛不得朝回把酒問東風不獨送春兼送客留春且為行人飲世間萬事邯郸枕但得還家莫厭貧十載異鄉空衣錦喜客來壯年不愁長作客亦不暇愁鬚雪白但愁金盡酒樽空辜負長安好春色閉門三日生緑苔失意忽聞佳客來急拈春衣典春酒正值滿樹梨花開花如氷雪人如玉妙舞清歌歡不足黄昏客醉酒未醒細雨鶯啼梅子緑送張教諭鑑湖五月凉風起荷葉荷花香旎旎先生到縣花正開濯足船頭弄秋水聖朝復興文武科諸生習射更絃歌他年大比登髦俊應報新昌縣裡多雨中看花青青楊桞深深竹雨裡絳桃開一簇羞將瘦蹇逐金鞍着屐㸔花仍不俗花枝淨洗胭脂面老眼驚如夢中見已􅂸春色過三分何止東風吹一片只恐天晴是暮春半隨流水半成塵淡烟芳草長干路作意能來有㡬人春日白門送范謙還四明白門花開春酒香參差桞條如酒黄栁邊沽酒勸君飲别意逈與江流長江花近接瀛洲草宫樹鶯啼燕歸早白馬銀鞍游俠兒雞鳴爭入金陵道金陵自昔稱佳麗虎踞龍蟠天子氣緑㡌將軍衛霍功黒頭卿相金張貴紫陌遥遥十丈塵鳯笙牙板奏青春相逢金水河邊客半是公車待詔人君今掉頭歸故國欲傍雲松㸔山色親老冝承菽水歡時清不用芻蕘䇿到家春深花未稀竹筍嫩白江魚肥登堂奉親兾親喜蜂蝶故遶斑斕衣多才如君世稀有珠韜玉韞那能乆明日徴書到四明期君更酌金陵酒送李琴川謫臨海南風雨來塵作泥稻花豆莢生初齊一人失意解官去席上衆賓顔色低輶車欲發未忍别感慨握手立大堤緑荷為盃樹為葢碧酒蕩漾青琉璃兹行觸熱向甌越咫尺浙水分東西或登龍門探禹穴或上鴈宕聞天雞天台桃花千萬樹中有睍睆黄鶯啼雖云竄謫異憂喜眺望自可窮天梯韓潮桞播夜郎白吉士徃徃遭傾擠蕉中之鹿塞翁馬此事何足含悲凄但嗟靈物困汚瀆無一出手相提携不然寵辱實命致毋乃天不哀羣黎渡江秋風未十日織女須嫁牽牛妻自甘沉匿守太拙寧復乞巧陳爪梨嗟余遘患屢遷逐親見郿塢爭燃臍金多位重胡足恃頃刻變化如雲霓君年五十髮漆黒壯氣欝欝衝端倪驊騮厯塊偶蹔蹶終展􅁬迅追風蹄經過虎阜坐石壁為我拂拭苔中題冝秋軒桂軒東古桂一株花已爛漫人無知者偶夜聞香自東來旦起訪之得于荒庭廢苑中余既嘆其不為人所賞識而復嘉其不以無人而不香也繞樹嗟悼慰之以詩冝秋軒東一株桂香葉婆娑擁寒翠秋堂夜靜風滿簾時覺幽芳來拂鼻清晨曵履訪幽獨一徑青苔雙戸閉離離嫩蕋􅇢虫絲蓛䔩輕花落深砌􅀈金泫露濃更宻苞粟凝珠疎復細半粒能含萬斛香一枝解奪千姝麗當年此地競攀折月戸雲窻敞秋霽金樽灔泛緑色酒翠袖凉簮寳粧髻西風㡬度人跡絶獨有幽花能㸃綴村荒地僻霜露繁摧折紅蘭凋紫蕙瞥然一見衆憂失不意孤懷得佳麗遶之百匝未忍去筆以長歌悲莫繼更深月出擬再來明日紛紛嗟滿篲冝秋軒梅萬松嶺上梅千樹踏雪年年㸔花去湖邊十里翠裙腰盡是㸔花醉眠處花今憔悴不如前人亦飄零二十年夢魂不到西湖上春色自繞南枝邊今年㸔花來杜曲一樹寒香照茒屋别是人間氷雪魂肌膚綽約清如玉雪更玲瓏玉更温春風入頰淡無痕數聲殘角黄昏後獨自相㸔半掩門贈别徐季子徐君昔為吳學官玉壘劍具魚皮鞍千金毎贈壮士别一語耻作儒生酸庭前手種萬修竹窻戸颯沓烟霏寒南風醉眠雪覆簟西月對奕星羅盤維時海内冨文學爭飾黼藻窮研鑚諸生面試鸚鵡賦座客頭帶鵕鸃冠我方年壯髪漆黒朋視班馬慚蘓韓飛鳴欲厠九苞鳯絢爛未讓五色鸞君來勸我意無鋭少抑汝氣粲可觀驊騮受駕就矩步健鶻歛束摶風翰吳門一别二十載鬼物變怪驚百端相逢白下恍夢寐方巾闊帶麻衣寛道傍再拜問所厯細語欵接平生歡君言誓欲拜我母為恐此别重來難母今九十兩足痺風雨半榻茒茨安今朝山中得束筍嫩者香軟供晨飱百年自足三釡飬晚景忽此船行灘君才所施無不可經史滿腹皆琅玕酒酣文史孰比擬強弩激矢江奔湍明朝到京學小隠惟有遶屋山㠝岏櫻桃爛熟梅子大荷葉出水青團團行當散髪坐白石何用秉筆趨金鑾送吳居易黄梅雨晴葉重緑南風棟花開䔩䔩故人謁我此山隈帶束烏犀㡌輕縠入門相顧如夢寐名姓雖忘面仍熟乆之稍稍憶舊游尚恐非真問童僕遂昌先生鄭元祜也吳中老儒客滿座君時雄辨衆賔服先生博學且敬君况我才疎敢相逐蘓臺一别已十載世事飄如電經目羡君遊俠印屢懸嗟我巢傾卵俱覆去年謫官向河洛手脚酸皸雙鬢秃歸來親友半死生不意逢君此江曲摩挲老眼為君喜更覺君顔美如玉龍江花落乳燕飛芙蓉葉大筍過竹殺雞沽酒招我飲爛醉頹然坦其腹深情宻意語未終舟楫匆匆去何速臨流索我題詩送詩句難工羞再讀廬山東來五老峰大孤小孤青亂矗著我茅茨一二間悠然醉把東籬菊題宋周曽秋塘圖右宋周曽秋塘圖一卷前元皇姊大長公主所藏也前有皇姊圖書印記後有集賢學士諸詞臣奉皇姊教㫖所題自大學士趙世延王約而下凢十六人時鄧文原袁伯長俱為直學士李洄以翰林待制居京師為監修國史實至治三年也元運方隆皇姊雅尚文學一時名公鉅儒以文章翰墨寵遇當世其盛盖可想見元既革命此巻遂出江左吾友薛起宗得於其私沈祥氏一日携以見示且徴題詩余雖不獲援筆其間而一十六人者猶及親炙一二袁鄧二老又皆先子之友不可作矣把玩再四敬題於後陂塘九月菰蒲老菱葉無多荷葉少無數飛來白鷺明一羣遊去青鳬小寒雲弄影忽成霞雁帶斜行下淺沙晚色不隨流水去秋光都在拒霜花當時内殿春風細紫衣傳教詞臣醉鮑謝文章沈宋才詩成曲盡秋塘意塘水秋來景漸疎低烟斜日照平蕪鴛鴦去盡芙蓉死空向人間看畵圖北山梨花余卜居金川是金陵城西北門也去北山無十里毎清明時梨花盛開輙動洗籹之想隣友薛起宗邀余㸔者再俱以猥俗所繫不能如約昨又期出郭風雨泥濘弗良於行起宗為折一枝相贈喜而賦此辛亥暮春五日北山梨花千樹栽年年清明花正開薛君好事兩邀我騎馬㸔花携酒來看花出郭我所愛况是梨花最多態我牽塵俗不得赴花本無情花亦怪君今折花馬上歸索我細詠梨花詩氷肌玉骨未受飾敢以粉墨圖西施東坡先生心似鐡惆悵東闌一枝雪重門晚掩沉沉雨疎簾夜捲溶溶月月宜淺淡雨宜濃淡非浪白濃非紅閨房秀麗林下趣冨貴標格神仙風一枝寂莫開逾徧朶朶玲瓏㸔應眩皓腕輕籠素練衣蛾眉淡掃春風面自須玉堂承露華何事種向山人家不愁占斷天下白正恐壓盡人間花江梅正好憐清楚桃杏紛紛何足數只有銀燈照海棠海棠亦是嬌兒女句容送蔡惟中昨日立秋今日凉蔡子束書歸故鄉我來未乆子遽别子豈與我如參商自慚貧無槖金贈解劍換酒澆愁腸醉酣月出重露滴梧飄金井芙蕖香衆賓諠譁􅛐笑口我獨不言情傍徨豈徒戚戚兒女態感舊懷古増悲傷憶昔追遊茂苑上白馬紫轡青絲韁子方年少冨文學面如紅玉肥有光黄金曉酬西館客緑錦夜贈東樓娼三公走檄辟作椽兩府交薦除為郎風塵一别未十載短鬢蕭颯俱老蒼黒巾籠頭着野服微雨鵠立官道傍自云匍匐事販鬻葢屐巾箑紙筆將匪爭刀錐競微利聊復餬口走四方我聞此語重歎息助以唧唧鳴寒螿丈夫失意固如此屠狗買畚庸何妨曲江之西沙桞黄夜逐落潮登野航相逢故友或相問句曲岡頭一草堂贈許白雲白雲老翁樂且貧眼如紫電烱有神麻衣紙扇趿兩屐頭帶一幅東坡巾清晨扣戸走過我謂我舊是諸侯賓入門長揖肆雄辯動引四代卑先秦初疑傲睨意骯􅗣稍乆漸覺情真淳從兹興至毎一到不問風雨并昏晨矯如野鹿不受縶去不可挽送乃嗔我來杜曲少朋舊一境二姓唯朱陳租徴税迫夜繼日未暇與我談逡巡荒村不意得此老洗我三斗胸中塵我時信口答所問怪我出語多驚人翁年耳順學不倦片言有益書諸紳我慚習懶竟成癖日影照腹脚未伸起來巾櫛不自理一飯且飽南湖蓴諸生幼弱學久廢數字費我言諄諄翁來相對輙太息謂可舘閣胡沉淪人生冨貴等泡幻達何可喜窮何顰紛紛道路餓死骨半是臺省公侯身龎公未為無所遺夫婦白首㐮陽民翁聞我語乃大􅛐呼我共醉華陽春正須狎暱到鷗鷺何必影像圖麒麟秦淮雨過秋水碧中有一尺黄金鱗明朝買魚期再酌我自掇拾山中薪喜雨為黄明府作今年太嵗集在酉謂可三錢糴米斗入夏兩月無雲霓焦捲黄枯滿田畝句容縣尹黄叔度晝夜蹙額疾其首脱巾跣足禱諸廟龍井神祠一一扣精誠信可貫金石頃刻雷公訶電毋一雨五日三尺深高壠低田無不有芃芃茂葉雲䆉稏蓛蓛輕花雪紛揉邦民歡喜夜無寐起賀買盡村中酒清晨扶䇿謝縣官微君吾儂將散走尹言此豈我輩力自是天公憐爾叟嗟余貧無牛十角終嵗筆耒事糊口硯田得雨墨濡足庶免饑寒累朋友今朝野老邀我飲草草杯盤薦梨藕醉後狂歌喜雨時詩成謾續諸公後杜伯淵送新米山人送我闕米粒粒如霜新可喜雨舂風簸落紅芒照眼明珠絶糠粃饑腸欲食未敢炊未及秋甞羞祖禰憶我初來嵗方旱焦穗萎苖將槁矣不意兹晨見精鑿此寳更將何物比終嵗勤勞農可念不耕而食余堪耻歸買淞江雪色鱸持向高堂奉甘㫖月灣秋影句容有水號明月灣毎中秋月圓而水中見影方半相傳葛仙翁幻術為此分題送友千江明月秋無際獨有灣頭明月異灣頭十五月方弦半璧婵娟半猶未月明在天光在水水月天月本無二豈縁醉眼自圓缺㸔碧成朱醜成麗不然水府食妖蟇毋乃神仙為狡獪姮娥亦學半面籹太滿恐為人所忌圓非真圓缺非缺造化掀騰等兒戲我來送客秋正中香影婆娑落霜桂邀我同吟月影詩自愧詩脾少清氣眉菴集卷二欽定四庫全書眉菴集巻三明楊基撰七言古體夢題雲山圖夢中有人以雲山圖索詩因題四韻覺後惟記其首二句為足成之前山嵯峨後山聳大如盤龍小飛鳯千巖萬壑春雨晴浮雲載山山欲動平生愛向雲山居漂泊尚作雲山夢明朝拂袖歸故山萬頃白雲和玉種省掖觀梅和宋草堂韻玉肌瘦怯春風惱唇紅不褪香雲老綺窻人靜月初圓笑覺飛璚顔色槁羅幄銅瓶小几邊銀燈疎影硯臺前
