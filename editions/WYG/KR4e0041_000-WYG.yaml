body:
  text: 眉庵集别集類五明提要臣等謹案眉庵集十二巻明楊基撰基字孟載其先嘉州人祖官呉中因家焉始為張士誠記室洪武初起為滎陽縣知縣厯官山西按察使尋以事奪官輸作卒於工所明史文苑傳附載髙啟傳中史稱基少以鐵笛歌為楊維楨所稱與髙啟張羽徐賁號明初四傑其詩頗沿元季穠纎之習都穆南濠詩話摘其佳句十二聨其所品題得失叅半李東陽懐麓堂詩話謂孟載春草詩最傳然緑迷歌扇紅襯舞裙已不能脫元詩氣習至簾為看山盡捲西更過纎巧春來簾幙怕朝東直艶詞耳故徐泰詩談謂其天機雲錦自然羙麗獨時出纎巧不及髙啟之冲雅王世貞藝苑巵言謂其情至之語風雅掃地朱彛尊静志居詩話亦摘其詩語類詞者至數十聯而獨推重其五言古體然近體之佳者亦自清俊流逸雖不能方駕青邱要非餘子所及也集初為鄭鋼板行成化中呉人張習重刻嘉州江朝宗為之序習為後志云乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀眉菴集原序予布衣時雅聞楊孟載先生盛名及入翰林為史官奉勅纂修大明一統誌攷先生先世予蜀嘉州人因大父仕江左而生呉中遂家焉又誦先生詩云我家岷山更西住正見岷山發源處於是乎益知先生雖生呉中實蜀人也先生生於元末仕於國初宏逺之器醇正之學初任滎陽令再謫鍾離閒居江寧句曲乆之被薦陞江西省幕賓復使湖南廣右累官山西按察使誌載先生讀書日記數千言尤工於詩與高啟徐賁張羽為詩友故時有高楊張徐之稱云先生所著眉菴集有五七言古體五七言律詩及歌行排律絶句詞曲總若干篇教授鄭鋼編集已板行矣字多訛謬先後失序而缺畧尤甚識者惜焉呉中張公企翺以名進士累官廣東僉憲素重先生之詩每遇公暇輒研究之補其缺畧次其先後履厯之序字之訛謬者悉攷正之釐為十二巻繡梓以廣其傳其用心亦厚矣哉間以示予俾為之序夫詩言志也三百篇之後變而為漢魏為六朝宋元以前惟唐為盛今先生之詩穠麗纎蔚藹然正大和平之音殆有唐人風味夫豈易得者哉僉憲公能俾先生之詩大顯於天下後世天下後世即其詩可以知其志知其志可以知其人然則先生不但有光於吳而且有光於蜀也予後生小子因僉憲公之命不敢以繆悠辭而僣序之其景仰之誠得不於是而少舒哉成化二十年夏六月既望賜進士奉直大夫廣東市舶提舉前翰林侍讀學士經筵官兼太子講讀古渝江朝宗書欽定四庫全書眉菴集巻一明楊基撰五言古體感懷十四首璞玉宜深藏白雪乃寡和和寡非所悲衒玉徒取禍奈何刖足者抱璞不知過進非烈士忠退耻愚夫懦傭舂匪利直販鬻欲自涴山中一尺雪且復掩扉卧其二清霜凋百草亦令脆者堅士不遇患難智慮何由全𤣥徳髀肉生重耳十九年一為三國雄一稱五伯賢茍不辨菽麥何足攬大權至今巴蜀人歎息後主禪其三鄧禹南陽來仗節歸光武孔明卧隆中不即事先主英雄各有見何必問出處孫曹與更始未可同日語向非
