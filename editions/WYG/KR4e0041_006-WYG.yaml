body:
  text: 眉菴集巻六明楊基撰五言律新嵗見月桞外纎纎白梅邊淡淡春年光兼月色此夜一時新未擬開金鏡先將照玉人更須三五夜相逐寳車塵雪中桞春雪晚蕭蕭隨鶯上桞條漸將絲共結終與絮俱飄淚粉凝啼眼珍珠壓舞腰東風自憐惜留映赤欄橋雪中燕燕雪兩差池相兼拂繡幃玉樓迷故壘珠箔見烏衣斜訝衝花落輕疑掠絮飛曉寒人未起還認畫梁歸元夕前對雨雪後亷纎雨江南淺淡春鶯花無那客燈火正愁人石潤苔生髪氷消水有鱗九衢明月夜車馬徃來頻感春獨立何所愛江空春水遥舊情題竹見新恨對花銷束脯非沾禄聞鐘豈造朝慚非鞲上鶻風起欲凌霄近有近有山東信河南已退兵初聞通漢使又復叛齊城機笑多疑失師憐少算傾如何金四萬容易托陳平謝饒内史惠江芷花掩露猗猗情深寄一枝已㸔辭衆草還得近華芝緑艶明書積青芬落硯池野人無以報頼有木桃詩池閣晚興二首池閣敝重扉林光動淺漪病嫌紈扇早愁覺漏籖遲雨鶴饑猶立風荷弱屢欹㝠㝠空濶外極目有蛛絲其二乆隂人迹斷苔逕雨痕交樹宻枝藏果池清藕露苞鈴將驚鳥掣檻或飯魚敲自笑窻間枕多眠覺面㘭秋齊雜賦五首劉表知先主懷王識沛公未聞牧夏口先已入關中今古車書異興衰厯數同方驚雞作鳯當信鶩非鴻其二今日長洲苑秋風列羽旗不圖新約法復見舊威儀鼔舞兒童樂歌謡父老悲烟埃方衮衮禾黍正離離其三嘆息馮唐老吁嗟李廣賢窮通元有命生死詎非天鼔角西風裏江湖短髪前南飛有鴻雁一字若為傳其四晚樹霜猶碧秋花雨未黄戎衣輕綉錦旅食尚糟糠驛路千山隔河流一葦航毋憂兵不戢已定法三章其五邏卒去不返行人愁未回正須犀作甲毋用玉為杯清淚尋常落丹心早晚灰交仍期管鮑書或似鄒枚七夕樓逈秋河逼簾虛夕露侵巧於間處乞愁向别時深月殿蛛絲繞星橋鵲駕臨年來孤此夜兒女亦傷心送沙天民之無錫兼簡張彦禎風雨送君行溪山傷我情故園春種麥高桞暮啼鶯亂世難知已常譚愧老生兹行見張翰懷抱得深傾謝雪坡參政入淮維舟竹外坡把酒唱離歌沙雪融將盡江花開未多淮兵春入戍津吏夜鳴河佇望南歸日君恩早賜羅早冬沙淺蒹葭白林深橘柚紅水鳬晴趂日山隼夜呼風世亂嗟親老家貧任嵗窮平生迂懶意未忍即從戎露泫露濃初滴横江白漸多珠光聨玉陛金氣逼銀河甘和盃中屑涼侵襪底羅無人為収拾的爍滿秋荷梅花清夢為沈敬賦霜月路西東梨雲影淡濃孤燈數聲角急雪五更鐘時向愁邊得春於醉裏逢不須尋舊迹湖上兩三峯夜坐懷天倪偪仄僅容膝歸來方解衣冥冥孤鴈去擾擾亂蚊飛物理誰能識人情豈故違隣家有修竹頼爾破愁圍宫怨舊寵憶專房羅衣有賜香偶來春沼上閒坐緑隂涼鳯髻從教側蛾眉懶畫長新愁千萬種一種一思量送王季野為愛王崇教書名虞禇齊龍文題玉軸鳯册縷金泥滌硯雲生沼籠鵞雪滿溪諸山多晉刻時復到河西初夏過寧真道院真館坐微雨午堦蘭氣清以兹魚鳥性遂識水雲情佳樹細花落清池圓葉生芳時與幽賞欣此一來并謔桞一首二句作春淺愛鵞黄春深葉漸長裊裊復揚揚春風折又長絮飛疑燕拂枝重覺鶯藏晚掛初三月秋零一夜霜江邊千萬樹此樹斷人腸隔隣桃花春色䕶低垣晴梢露未乾不愁開處逺深恨折時難水或漂香出人應罷綉㸔願慿雙蛺蝶將夢過東闌孤坐春事忽已晚江雲仍乆隂乾坤芳草闊風雨落花深思極惟孤坐愁多却短吟豈無遊覽意觸日總傷心閏七夕星橋方泣别銀渚喜重過鵲整初回駕鸞停暫擲梭歡如前㑹少情比去年多可是勤耕織㤙容兩渡河秋日舟中見蝶趂暖戱晴川依人上畫船粉銷烟翅薄香冷露鬚拳野菜疎籬外山花小逕邊夜深桃李夢猶在綺羅筵孤雲為王子囦賦斷影落平湖隂雲逺更孤山川遺迹在天地此身俱空濶飛還白氤氲㸔欲無何須嘆漂泊神化亦須臾聴雪軒虚簷迸玉鳴入夜轉分明風響不相似雨聲無此清倚窻心不倦撥火耳頻驚道是梅花落梅花落更輕直溪閒居處士居􅌉谷先生隠直溪水流無曲折沙或湧高低船向花間入雲來竹外迷怡然冲淡意欲與古人齊荷葉圓的破蓬苞孤莖上藕稍雨撑栖鷺屋風捲䕃龜巢溪友裁巾幘墟人作飽包小娃曽已折新月拜湖㘭桐樹珎木曙鴉啼瑶枝小鳯栖材憐工製瑟葉想戱裁圭凉送秋聲早隂移夜月低夢回疎雨滴人在轆轤西謝徐良夫惠米玉色西溪米蒲囊手自封恩同粟五秉寵過禄千鍾雲子鮮鮮滑紅芒細細舂加飡愧尸素飯飽一支笻季迪病目戱作不寐聴隣鐘聲來覺耳聰夜吟斜避月曉立背當風萬象空花外千山霧雨中欲行俄觸戸昏晝問兒童溪山小隠何處溪山隠衡門對野橋晚風携鶴子春雨種魚苖小逕鈄通竹疎籬曲䕶蕉人生閒自足不用楚詞招盟鷗亭舊業水西頭新盟結衆鷗羣疎寒不散影獨暮相投菡蓞陂塘雨菰蒲野岸秋青田無白鶴得此復何求雨雨急愁雲黒窻虛愛竹青石泉流細細山鳥去㝠㝠醉裏傾荷業饑來煮茯苓不知劉道士何用換鵞經愛竹軒為愛軒前竹平安愜此心雨聲西澗曉秋影北堂深瘦倚差差玉疎揺細細金閒容扶短䇿幽處一披襟偶題身懶交遊絶時危感慨新清江催短鬢芳草怨歸人花落縱横雨鸎啼淡蕩春欲揺舟楫去波浪沒平津曉起曉起忽鈎簾青山在短簷花疎風更减衣薄雨重添别意因詩記閒愁與病兼靈荃龜筴在其奈不能占送胡鼎文遊越脉脉寒食雨差差桃李花君能輕逺别我獨愛春華山縣増新壘江流失舊沙不須探禹穴科斗已成蛙送孫彦聲都事之淮安忠㐮不可見幕下得遺賢䇿可西平楚書能北守燕春旗峽石砦暮雨芍陂田勿易開邊隙兵交又十年贈沈真仲徵士花落滿烟莎蘭舟喜見過壯心丹未已愁鬢緑無多小燕斜斜舞新鶯婉婉歌都將舊遊意一笑付江波送王仲容之上海薄宦依東海孤城隔戍烟花疎寒食後人逺暮㠶前深巷編蒲履斜崗種木綿母煩厭荒寂微禄有畬田寄葉徳彰戴叔能江逺樹層層蒲荷葉漸増酒樽池閣雨棋局夜船燈竹淨删逾瘦花疎掃未能亭亭川上鵠風雨㸔飛騰寄海鹽楊砦官海嶼通村險邊城出敵遥旗燈秋塞雨鈴柝夜溝潮士飽爭投石農閒數舞箾毋令廢収穫高隴有枯苖送范彦章之雋里輕㠶掛渚蒲兩日到南湖寨結防秋伍城添築壘夫多風棗花落少雨稷苖枯見説隨陽鴈嗷嗷滿路隅寄金友直縣令安吉山栅䕶層層城陴遇險増逺烽朝屢報高櫓夜頻登薄産千株栗荒租半畝菱憐君治斯邑亦復有能稱過束氏廢園有感苑廢主頻更纔登意即傾燕歸隣屋住蛙聚野塘鳴瓦礫鴛鴦字溝渠環珮聲惟餘數株桞衰颯尚多情壺中挿緋碧桃索高二校書同詠麗質鬬春華纎穠間更嘉緑烟縈綺雪紅雨亂青霞醒醉休相妬仙凢自一家春風忽披拂㸃綴舞䄄斜春暉堂春樹藹晴暉山雲並舎飛雙魚供處饌五綵戱時衣病毎通宵坐貧長負米歸人方念離别得養似君稀瓶中挿松竹緑蕚梅偶賦清肌不涴塵緑蕚破初勻松竹為三友芝蘭是四隣未銷金殿雪曽報玉堂春欲借東風便持将寄逺人贈婉素同祀碧雞神絲蘿又結姻文如謝道韞書逼衛夫人兾缺終相敬梁鴻不厭貧還能事荆布歸釣五湖濱初夏試筆池閣已南風鶯殘藥自紅坐憐脩竹裏行愛緑隂中衣濕蕉無力羅輕扇有功欲揺孤楫去江濶雨濛濛賀趙季文推官致仕二首白髪還家日青衫告老時鄉人邀入社朝士送題詩晚步鳩為杖晨飡肉作糜時時來故里能讀道傍碑其二年至即投簪非縁老病侵車無三驥錫嚢有二疏金荷葉清江曲苔花緑樹隂不須休沐暇日日此追尋方氏園居十首北墅花連屋東園菊遶庄病長陪客坐老不厭人狂鵞鴨雙陂雨楂梨小樹霜他年倘相過里邑定名方其二多水少塵埃經年不掃苔竹繁頻洗葉松老别求栽雪竇看碑入雲窻晒㡌開徐文與張羽乗月想能來其三秋氣入郊墟新凉似雨餘嚢収試騐藥藁集著成書酒熟知愁減花開覺病除何曽廢錢買山果及溪魚其四解珮酬琴價將書當酒貲竹樓聴雪夜梅屋㸔花時女嫁為農婦児從作圃師隣翁無奈俗招飲豈能辭其五昔事李輕車豪名動狹斜鸎聲吳苑樹驄色武陵花觀妓江樓月弹棊水殿霞歸來種𤓰果鉏畚是生涯其六舊物嗟孤劍春風别五陵未衰先遣妾已靜更疎僧徃事真騎虎中年得縱鷹兩溪千頃月談坐不須燈其七春社村村鼔豐年樂事同全家兩溪上連日百花中母送歸寧女兒邀讀法翁莫言田野意即是有虞風其八由來種𤓰地隨處即青門習俗羞營利甘貧耻受恩掛簑秋樹濕濯足晚溪渾欲訪齠年友漂零只自存其九園廬依緑水無吏索租錢嵗計千株橘秋成半畝蓮飲先諸客醉詩許衆人傳為愛溪光好經旬獨棹船其十回汀兼復渚迢逓入漁邦有港皆通檝無山不到窻疎烟春隴犢深雪夜籬尨過客停舟問而翁恐姓龎眉菴集巻六
