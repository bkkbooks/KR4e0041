front:
  text: 昭烈賢三顧猶未許君子當識時守身如處女
  hash: sha256:4e36966199d96c758958d53da5e3aee38b69e8cb3036ecc4f04f1e634abdcab2
body:
  text: 其四蝮蛇冬未蟄靡草寒更生陽光泄為電地雷忽有聲上天號令乖致此灾異并不然多殺傷兵氣之所成漢廷免三公毋乃非政刑願言調玉燭仰見三階平其五三人乃成虎衆口能爍金流言雖不多足移君子心人心本無疑理與勢所侵奈何形似間構結已駸駸入耳即契合不待間者深陳平雖云智羽有隙可尋髙祖誠豁達卒亦誅淮隂營營青蠅詩示古猶示今其六位卑諫勿直直諫君心疑交淺言勿深深言友誼虧諤諤衆所惡况復違逆之豈不利於行吐蘗而含飴朝登千仞崗振我身上衣丈夫貴自潔毋論他人非其七一女不得織三人歎無衣一夫不暇畊八口皆啼飢飢寒迫于身誰能不為非西伯善養老仁人為己歸霜寒草木落禽鳥相背飛民心亦何求在于得所依此理勿暫失君子慎其微其八鵲巢知避嵗終為鳩所居巧者勞不足拙者安有餘溪翁夜結網山人朝煮魚隆凖入關中不讀半巻書當時㣲張韓乃與勝廣俱大拙乃至巧巧者復何如其九驊騮日千里亦在御者功向無造父能乃與凡馬同韓彭覂駕材驅䇿遇沛公増本渥洼児意不與項通豈獨知馬難所貴御馬工駕御苟失宜鮮不敗乃翁蕭蕭帳下騅千駟何足雄其十鞲鷹歛六翮栖息如鷦鷯秋風颯然至聳目思凌霄英雄在承平白首為漁樵匪無搏擊能不與狐遭長星亘東南壮士拭寳刀落落丈夫志悠悠児女曹其十一善鬬須扼吭善戰須搏膺楚不都關中卒為漢所傾洛陽非用武况乃居彭城曹公失荆州致使吳蜀争五馬渡江南神孫終莫平元帥破㐮陽宋社忽已更制勝在得勢勿云險可輕其十二劍可敵一人書足記姓名學之十二年書劍两不成歸來吳楚間豪傑已起兵攬鏡照鬚眉一二白髪生老母在高堂未敢即逺行太息長在夜鷄鳴星斗横其十三浮雲從何來本是山川氣寸隂不終朝一雨浩無際江河㑹交流草木奮妍麗但知潤澤功不識真宰意天風吹𤣥隂白日照厚地理亂自有常千載可坐致其十四東隣夜從軍西隣曉上官一為死别愁一為知己歡歡者承新恩拂拭頭上冠愁者囑妻孥結束跨下鞍悲歡何不同一危復一安黄塵障東華平地生波瀾朝榮夕賜死轉盻異暑寒寄語承恩人莫歎從軍難漢傑士楚范增附淮隂天下士本是飢寒人朝為女子憐暮為惡少嗔身無兼人勇屈辱楚水濱一朝拜大將為漢伊吕臣王齊及王楚初假後即真男児猶龍蛇窮達乃屈伸如何百世下獨有黔婁貧其二蕭何刀筆吏碌碌起沛中初無一矢勞胡乃第一功發縱及指示帝論亦未公信亡追及之此為萬世雄漢卒頼信力亡楚定四封曹叅彼何人而欲與之同其三子房本韓臣志欲報韓仇亡秦與蹶楚初不為漢謀功成不貪賞而乃願封留冨貴非初心竟從赤松遊寥寥千載下斯人誰與儔其四范増亦人傑不去羽不亡漢非赤帝靈增固不可當紛紛與楚争可畏惟漢王危哉鴻門㑹㧞劍舞項荘示玦羽不决致令漢道昌成敗非失策天命固有常其五禮樂治化本百年然後興奈何叔孫通綿蕞為可行布衣起山東五載帝業成瘡痍有未起詎可謂治平當時定朝儀事正擊柱争遂令後賢王禮樂終不明漢道止于斯俗儒良可輕其六陳平素無行終為漢相國隂謀固可鄙竒計凢六出後來諸吕難卒頼陸賈力豈縁冨且貴臨事意反詘智者猶若斯請為愚者説秋懷二首曉城露氣白旭日猶蒼莽千林木葉墜逈覺川原廣村虚雞唱獨江静鷗飛兩瞻眺豈不佳遲暮良可愴菱歌發清詞助以蒹葭響斯意竟誰同忘悲却怡賞其二日沒霧靄曛微茫見羣山茅屋四五家時有芻牧還豈惟寵辱忘亦喜思慮閒嗟嗟當世事戚戚念時艱秋夜言懷四首鮮鮮籬邊菊慽慽庭下蕙蕙氣日已銷黄花自妍麗復恐清商激幽芳亦凋瘁褰衣步廣除露白月在地鵲飛林影空蟲語墻隂細昔賢悲絲染徃聖嘆川逝少壮不我留臨風發長喟雅志諒難酬蹉跎老將至其二西齋近寒徑枯葦接深篠秋風颯然至索索鳴不了抛書坐孤榻眼澁燈暈繞窻破斜隙明漏斷餘更悄平生所欣遇此夕紛内擾假寐入㝠思南枝有歸鳥其三夜坐復不樂起行亦無悰徘徊二者間百憂結心胸嵗事忽已遷復共䘮亂逢一身愧無補况乃禄萬鍾月林鵲翻翻風江雁嗈嗈栖止苟有託遲莫還相從其四高梧䕃崇岡衰草被廣陌風微夕露凉星淡秋河白芳辰兼物謝孤抱縁愁積佳人在何許悵望江浦隔昨㑹月初弦徘徊又生魄送謝雪坡防禦出郭團練朝催築城夫暮㸃團結兵兵民皆動揺一日十數驚所頼官長賢撫勞得衆情防禦出郊來父老拜且迎埀髫及戴白羅列車下聴官家百萬師自足與㓂爭汝自守汝鄉汝自保汝生閒暇苟不虞倉卒恐見傾我當徼汝勞薄爾賦税征父老共感激闐然動歡聲旌旗洎甲矛五色相鮮明豈惟備抄掠大敵固可嬰問君何能然子弟衛父兄平川雨初収馬嘶皷鼟鼟相送不同徃極目秋鷹横送将作僉院丁季周奉使兩廣還朝國家厄中運四海揚風塵蚩蚩弄児兵皆我耕桑民或為官府迫漁獵無冨貧奮然掉臂起一呼聚頑嚚始有可招徠乆之竟沉淪勢結不易解遂同越與秦皇明邈九重此恨弗得伸雖居蠻夷中豈不念帝宸丁侯京師來逺使廣海濱舟師送蛟鼉陸足披荆榛所至敷恩威一一為具陳上述天子聖下言將相賢叶欵欵漸輸誠仄仄咸來賔直氣既侃侃婉辭復諄諄邊氓及夷戎感激爭自新酋長獻印璽老弱投棘薪幡然悉改圖喜極涕沾巾安知萬里外復得仰化醇旌槎駕回風星斗羅高旻西風吹征衣相見吳城闉呼酒慰逺别烹鱸煮青蓴念兹歸意切又問銀河津嵯峨蓬萊宫雲霧鬱輪囷至尊開天顔前席顧問頻賜以錦繡叚翠織雙麒麟追趨鶴禁曉錫宴龍樓春賞功固盛典况復能咨詢丈夫志四方策勲貴及辰嗟我獨匏繫戚戚罹蹇屯壮心殊未巳矯首潜酸辛送陳資深歸廣大夫輕别離投老欲入廣奈何干戈際萬里渉沆漭兹城頗阜庶有女供奉養世亂得粗安胡勞問鄉黨君言苦無家一夕魂九徃鄉書昨日至捧讀屢泚顙四䘮寄淺土未得掩諸壙雖云敝廬在誰復脩祀享感兹歸意迫無力猶勉強齒髪固已衰尚足嬰擾攘敢忘鄉土情偷安戀兹壌吾聞重感激惜别復加賞天寒霜露繁摵摵枯葉響水宿慎蛟螭山行避魍魎田園雖荒蕪果實羅栗橡鄰居喜均還相邀具醅盎酒薄不得醉且復歌慨慷人生還鄉樂無物堪比仿喜極繼以悲歡戚同反掌畨思蘇臺月照女夜績紡此時父子情兩地同惝恍安得混車馬妻孥共羅幌兹事竟難期涙眼一悽愴我家嘉陵江踪跡乆飄蕩亦欲問前途逡巡覔西瀼贈破奚楊鉄笛奴也人笑跛奚蹩我愛跛奚跛蚿雖百跂速䕫亦一足可履平疑屐齾厯險若箕簸立如鷺聨拳行類鱉􅂒􅂒形欹裙長前肩脅鞲短左非斮渉寒脛豈刖獻玉踝附婁濟水厄哂却搆兵禍疢同哀駘佗怒及趙女婐觸屏屡思倚守户每得坐戒奚勿躁歩世路方坎坷登靈岩和韻周左丞伯温饒大叅介之單艫集羣英席窄坐每盍烟横半掩寺木落全見塔斜流出渠分曲徑轉溪合村籹妍醜並野話悲笑雜童操吳音聞僧作梵偈答霜苔滑難躋露棘朽易拉磴紆螘縁樹扉敞蝸啓闔娯賔列五豆禮佛過三匝晴崖暝憂雨秋洞寒疑臘窻攀盗果􅆐簷入避鸇鴿掬池萍沾䄂憩石蘚汚衲琴忘荒臺弄屧響囬廊踏值險慮思笻得竒即傾榼感深怒須磔愁極衰鬢颯華年倐川駛雅量浩海納嘯歌激欷歔雄辯肆交沓禅寂虚無量道祖清静葢吅囂蝸觸蠻變幻雀化蛤狂遊類飲酎薄宦避嚼蠟終當謝塵鞅掃屋分坐榻贈别龔行義楚龔風雲姿璞素玉不玷隻身躡雙屐十載食破研麻衣閲冬春睥睨狐貉賤胸中何所蓄經史子集傳酒酣文思湧強弩機發箭清真謝鉛飾越女巧笑倩紆盤珠九曲精粹金百鍊粲如星森羅勇若軍後殿吾黨多英雄氣索皮肉顫西風忽歸來塵土吹滿面從容問所厯揺首不復辨但云秋水清呉淞浄如練方同華表鶴遽作幕上燕去住何太輕弗得絆以線君材匪樗櫟名字已交薦淵泉暫蠖屈霧雨終豹變賢達坎坷多豪傑窮乏先嗟予書中蠧髀消兩目眩朝騎瘦馬出夕飽藜與莧志慚㸃爾狂質匪由也諺猥遭周秦厄不識舜禹禪因君動遐想翅塌足若罥螺巵白甆罌聊為江渚饑囬首芙蓉花紛紛落紅片贈張主簿有田乃有租有身乃有庸不憂徴需煩但願賦役公東家倉􅅒寔西鄰機杼空門戸非不齊貧富有不同縣官皆賢豪豈不念困窮但為嫌疑迫上下相蔽蒙坐㸔頒白民展轉溝壑中嗟嗟華亭簿彷彿古人風與陳時敏别近别㑹有期逺别易慘悽一人失意行衆賓顔色低相顧各無語握手立大堤白沙飛輕烟赤草漫路蹊竈户八九家皮肉瘦且黧再拜謁官長鵠立無所齎孤㕔如荒郵壁落新補泥日沒官吏散角角野雉啼歸來對寒燈児女相孩提雖云去鄉國喜不聞鼔鼙官卑職易稱牛刀用割鷄回首華亭鶴月白露凄凄送王國忠之邵武推官新霜落江楓蘋葉爛如染感秋方惻惻送别復冉冉一官萬里外舟楫破天險人皆亂離戚君獨笑而慊虹光拂孤劍酒色暈雙臉平生峥嶸志弗以微物掩經綸二三䇿謇諤謝諛謟天子固未遑屢讀首屢㸃七閩暖無雪臘月草木蔪花濃霧迷驛榕暗日在崦斯時到官舎鞫案手自檢雖無老母笑反獲在不忝顧予坐書癖譬若秋後簟低回鶴俛啄嚅囁魚上噞未能東浮越况方西渡陜文慙英俊逼鬢覺衰颯漸交遊暫雲合乖散倐電閃憮然成短歌持贈非琬琰雨中効韋體寄季迪止仲道衍仲温四首屢覿歡未終乍違離緒繞㝠㝠鄉國隂獨坐空齋曉鵑啼春樹宻花落流鶯少不有郢中吟何由冩懷抱其二乆静厭紛俗齋居自𤣥處遥知乆黙暇共此瀟瀟雨屢驚芳節換暫覺清音阻欲扣竹間扉棋聲隔春渚其三叢林翳重岡迢逓僧居獨慿軒一悵望春雨蘼蕪緑泉香花落磵窻暝松圍屋憶爾諷經餘袈裟坐深竹其四别君俄兼旬芳景已云暮南風吹新緑欲暗庭前樹騶鳴孤驛曉鴉散春城曙盻此慰離憂新知忽成故西齋聞晚鶯南風池館静深樹野鶯啼初鳴喜新聴再囀復含悽念爾來城市山林定鼔鼙初夏過寧真道院偶來高樹下獨坐青苔石澗雨落餘霏衣裳淡生碧道因微物悟理尚𤣥言析習静自無營何妨處囂寂賦得浄瓶送衍上人虚瓶湛靈泉行住一鉢友紅簮天女花碧挿大士桞中圓涵真虚外潔照萬有自盛甘露漿不貯聲聞酒衍師時出定提挈每在手詞鋒當建瓴禅寂宜守口賦得山逐放舟遲送王主簿舟行山亦移山盡舟亦住青山無故人行人自來去初辭逶迤谷復接參差樹柁轉暮色分㠶駛秋嵐度俄停風暫弱既逺烟重䕶别意即山情依君屢回顧賦舎利塔送僧人八萬四千塔巋然天地中靈光忽上下浩刼未終窮法象諸天䕶真身五藴空堅明元不壞生滅豈無同暫住猶飛錫三匝禮秋風空齋天王寺比丘號也托友求詩為説偈曰上人坐空齋嵳峩兠率宫兠率乃佛土亦在虚無中兠率既無有空齋何所從豈獨空齋無四大亦本空萬有萬法幻如泡影電風隨起即隨滅無聲色與踪以無起滅故即之了不逢真空本非空去住空色同試舉空齋偈為扣西來翁遊北寺竹林僧居古城隂迢逓通萬竹林光落虚牖坐愛衣裳緑齋餘孤磬逺茶罷㣲烟續道人悟重𤣥淡然無衆欲譬彼石根泉亭亭湛寒渌乆雨十日雨不止四簷如決堤今朝雨聲絶又聴斑鳩啼開門對西郊汨沒失路蹊徃來舟車人拍浮類鳬鷖我貧乏車馬徒步兩屐泥歸來冠裳濕焙燎勞山妻側聞關中旱終年望雲霓燥土及萬里曽不留涔蹄上天本無私造化自不齊侏儒與方朔斯言非滑稽雨中期袁宰不至晨興罷巾櫛撫巻對秋渚幽人期不至值此瀟瀟雨豈縁俗情牽致此清興阻呼童掃庭蕪落葉深幾許更採石田芝空齋待君煮寓感人心渺烟海浩浩不可量正兹春風和忽然變秋霜悽悽不見矜惕惕反中傷始終非感激愛惡自靡常豈悦芙蓉鮮厭此蕙葉蒼請看塵中鏡拂拭耿輝光贈馮瘍醫為金徳儒謝氣血在人身譬如江與河擁之不得行崩騰作風波古來飬生術運動及按摩較之䟽瀹功相去苦不多金君坐文墨錙銖細研磨氣鬱神不舒顴瘍忽為痾初疑疹發面頃刻如堆螺金刀試神巧一抉回天和神契二竪緩巧師五禽佗乃知藝學流無不由專科去毒類去惡芟夷絶根窠滋蔓不可圖未必非蹉跎余非知醫者此理信靡它作詩代璚玖語陋將如何東臯為馬仲蔚賦初夏藹衆緑霏霏繞園霧横書散輕䇿愜我林臯趣衣凉水氣襲屐潤苔痕汙雨菌結芝肪烟莎緑鶴步意銷念慮寧景適真樂遇衆妙入静觀前非覺神悟江花自孤婉芳草忽已暮為鼓朱絃琴南風在庭樹觀魚池隂樹影凉白小紛成隊吹絮圓漚續觸荷清露碎俄沉静却浮忽遇驚還退幸免釣絲憂江鱸且充鱠賦得萍贈陳乆中浮蹤散寒星一夕生無數魚跳翠乍開鷗過青還聚微風和影去急雨連根露惆悵别君時楊花滿衣絮季迪病目醫令止酒因作此勸之病目須飲酒飲酒調微痾氣血鬱不舒頼此酒力和所以雷公方製藥用酒多活血必酒洗散鬱須酒磨製藥既用酒飲酒良匪他酒可引經絡酒能驅病魔病目不飲酒此盖醫者譌李白好痛飲不聞目有痤子夏與丘明不為飲酒過飲酒既無害不飲如俗何清晨呼東家買置數斗醝爛醉瞑目坐滿目春風酡陶然物我忘夢見孔與軻此藥豈不佳而乃止酒那我今勸君飲君意無媕婀庸醫或見責請示眉菴歌夢親堂邯郸枕中夢要是夢所有余甞詠斯言嗟嘆為良乆漁夫及畋師所夢必筌笱颯然精誠接昭格固不偶聶君乃純孝寤寐夢父母思之不暫置猶種菂得藕嗤彼聲利徒孜孜在升斗壽萱堂朝㸔忘憂花暮㸔忘憂草毋憂日已忘母壽日已老児心與母心願得同壽考回首堂下萱秋風幾枯槁上巳遊虎丘值雨寓平逺齋層軒構崇立緑樹帶吳苑鳩鳴春竹静鶴下烟汀逺初登已神暢稍乆竟忘返松高急雨過草弱㣲風偃幽潭閟靈跡氣濕龍蜿蜿俯深戒臨危厯險知步蹇歸途極遐矚蒼茫失西巘贈毛生丈夫遇知已勝如得美官栖栖無聊中握手意便懽古來豪傑人所就非一端狂言與危行初若不可干從容兩陣間一語九廟安狐貉不外飾而足禦大寒嗟嗟隴西李願識荆州韓殘燈輝輝復熒熒露泠無良燄帷昏驚暈起隙破愁風颭幽人對餘光拂拭床頭劔附季迪和凝光結重暈逼曙零孤朶膏空逐漏水熖在同爐火戀影未能眠更就餘明坐晚節亭壽藏名也人生百年壽六十未為晚胡為鑿𤣥扄築亭在山阪周圍松櫟高可翫不可挽日暮春雨晴黄鳥啼睍睆東家鶴髪翁方置萬金産貽謀非不佳竟為達者莞王君超物理生死若徃返一笑步松隂青山在吾眼梁溪暮歸蕩舟入微茫晚烟羃羣山日落村墟遥惟見芻牧還鴉度風陣低牛鳴月痕彎五噫遺清歌聴之厚人顔山中言入山採薇蕨山路多荆杞褰裳避朝露欲往行復止豈不有饑餓一飯不為耻長歌古松下悲風為之起憂樂二首我有九十母白髪雙瞳青夜禮濩落斗朝誦彌陀經以兹精進力老而愈康寧百年何足云坐享三千齡其二嘗聞古人言五十不為夭嗟予已四旬齒髪固不少有子萬事足此事猶未了一笑付蒼天禍福詎可曉贈真性空上人真如心悟徹物我間廿年住名山已復到彼岸六觀㑹萬有一覺破諸幻袈裟坐緑蘚鳥悦林影散琴清風在竹偈古石當澗贈以青蓮花揺揺落秋瓣蘭室為醫士徐孟善賦種徳有餘慶種蘭有餘香爾來三十年徳與蘭俱昌春風葉猗猗秋露花的的人言徐翁蘭愛比蘓仙橘翁今已仙去蘭猶繞階庭瓊芝與玉樹相映蘭青青我雖不識翁而獲交二子芳名播清芬正與蘭相似人好蘭亦好愛之乆不衰弹君白雪操詠我幽蘭詩聴松軒鳥栖衆喧寂月出萬壑静秋聲松外來厯厯生我聴繁音雜宫徵空響調竽磬風細覺潜消山虚故相應幽人掩書坐瞑目兩耳定聲聴忽兩忘遒然發孤咏秀野軒結茒近東臯清矌接平衍新春㣲雨過芳草緑如剪携書坐深竹自讀自舒捲興來䇿杖藜初不頼輿輦西隣雞豚社落日牛羊圈至貴在無求何勞事冠冕僧寺感秋一榻卧僧室歸夢夕九至燈昏燼垂華香㫁灰成字斜光破窻月急響虚簷吹遥想宦游人應憐此中意守愚齋百智動不足一愚賢自守神交武子甯氣合刺史桞聰明與睿智方寸無不有歛之弗著形譬若物在篰慮千每得一問十且對九衆辨黙乃消羣囂静而受晨齋掩書坐草色連戸牖作詩代盤銘庶或置座右除夕冩懷曉凍雲正宻晚晴雪亦消岩松既露頂澗竹咸舒腰感兹年光徂又復見嵗朝漸與少壯辭老景去不遥人生百年間倐如狂風飄况我患難餘髪黄皮肉焦萬事若死灰那能復然燒差差青楊枝下䕃朱蘭橋明當長翠縷繫我春江橈吳宫遺跡八詠長洲春縠波流暖雲花光艶緑薲津頭洗紅女蝴蝶上羅裙羅裙秋水上明璫揺白槳飛下雙鴛鴦溘溘湖水響横塘晚川氣夕氤氲愁雲凝晚緑蘭舟蕩秋水東向横塘宿横塘花正開紅桃間竹栽誰家織白苧機聲度水來梧宫夜桐堦白露下濕螢光烱烱銅盤燒蠟黄秋衾夢魂冷粉泪鈆華滴雲鬢秋蟬整何處玉鑾聲芙蓉嘆孤影楓陵秋楓樹落清曉野烟結愁隂聲傳燒竹火人語滄波深鳬飛秋水黒蛩吟凉露白江月參差光芙蓉照芳魄越來溪逺岫如蛾眉紫菱盖緑漪小娃木蘭槳採菱溪上歸溪風揺白芷撩亂蘋花起疑是越兵來旌旗照秋水滄浪波入苑緑泱泱縠紋融暖光東風吹白浪照見赤龍堂龍堂負貝闕隂火春波熱鮫人賣髯綃夜夜唱明月綺川遊川水東北流川花照青樓龍船載鳯吹日來川上遊沙明屬玉止苕香翡翠留漁郎蒲葉底網得雙吳鈎茂苑思輦路秋蓬滿野香團緑濕嬪娥粉黛愁嫣花鈆露泣鶯聲舊時好玉砌秋歸早東家胡蝶飛烟姿滿芳草白門荅髙二聘君以上元末在吳作戊申秋余謫大梁季迪甞夢余與若平生明日道路傳余已死季迪有夢余詩己酉春正月余侍親東歸迪亦應召來京師相對驚喜因出所賦夢余之作余既感季迪之念而復疑猶夢也歌以答之結交貴知已不在早與遲嗟我識子晚深淺惟子知每於朋儕間擊節賞我辭前年吳城破子居我西馳交游非不多獨念與子離相去日已逺數與禍患罹道路傅我死可信子尚疑日暮過我廬為我涕交頥今年我還京適子應召來叶握手發長嘆示我夢我詩我昔患難中精爽無不之而子獨夢我與子若有期方子夢我初正我念子時春風鳥嚶嚶花發滿故枝為買一斗酒痛飲春江湄生死固常理勿為達士嗤自題宜秋軒予去官結小軒自適軒近秦淮松菊竹樹之外無他花卉且清曠幽寂與秋相宜因號宜秋賦以詩我軒南山下緑水圍繞之四時非不佳獨與秋最宜秋風入我軒便覺景物竒紅樹照西崦黄花滿東籬夜深明月來蕩漾軒東池池光與月色上下相逶迤我時坐軒中濁酒聊自持微飲不及醉陶然詠陶詩人言秋可傷我覺秋可怡至潔如屈平至清如伯夷愛彼潔與清竟忘揺落悲斯意獨領㑹但恐秋風知贈錢祐之祐之過余宜秋軒携武肅王家譜見示感慨古昔賦此為贈村居無來轍漸與人事屏軒窻頗宜秋爽氣接西嶺錢君曉過我跫然破幽静踉蹡田中來衣屨草露冷臨風岸烏巾上有雙蚱蜢示我族譜文厯厯星斗炳前王勲業在千載猶一頃諸孫尚醖藉整若弓在㯳嗟我昧淺深所得如捕影潭潭百尺甃汲以尋文綆况兹坐窮僻習懶不自省君來實起余如夢覺酒醒蠨蛸罥虚戸絡緯啼廢井何當照寒燈共此秋夜永淮隂祠朝登歌風臺暮入淮隂祠祠荒屋瓦落古木聲差差當時握漢兵劉項相交持舉足有輕重不負高帝知區區假王封如何遽見疑良平一躡足帝心即轉移全齊七十城實為䧟穽機後來雲夢遊此禍乃致之盧綰且稱王耻與絳灌隨居常獨怏怏握手逢陳豨事起倉卒間不意成誅夷吕后固不仁鄼侯亦忍為先王重報功無乃此道虧至今淮水南落日啼烏悲津頭問漂母一飯竟哀誰送叅政錢誠夫之淮安潮落大江渾烏啼曙色分公侯千萬騎送别隘人門威儀督府嚴禮秩節度尊兩淮甲胄士十年弓箭痕南陽與豐沛自古重承㤙寄内婉素天寒思故衣家貧思良妻所以孟徳耀舉案與眉齊憶汝事我初髙樓映深閨珠鈿照羅綺簮珮揺玉犀梳掠不待曉籹成聴鳴雞中吳惜䘮亂廿口各東西有母不得將獨汝與提攜我復竄逺方送我當路啼紛紛道上人無不為慘悽今年我還家赤手無所賫汝亦遇多難典賣罄珥笄朝炊粥一盂暮食鹽與虀堂有九十姑時復脩豚蹄膏沐弗暇澤髪落瘦且黧别來復秋深露下百草凄破碎要補綴甘㫖需醬醯安貧兼飬老此事汝素稽作詩逺相寄新月當窻低客館秋思閒齋閟秋隂弱蕙風屢偃蕭蕭微凉至坐怯疎簾捲哀蝉聴漸急歸雁嗟已晚忽動故園思山川匪遥逺夢綵堂為俞士評賦楚客身未歸悠悠念庭闈江濤雖云廣莫阻魂夜飛秋隂天無星猿呌楓樹稀家門倐已到不失舊路㣲宛然上高堂獻笑試舞衣焉知空明曙鐘動殘星輝難追夢中歡益發覺後欷安能附羽翼逺去仍相依贈許山人三首七十世所稀過此尤足喜山人腰脚徤一日行百里身安子能養飲食具甘㫖擾擾天壤間如翁能有幾其二讀書不須多達理斯為貴讀書未達理不讀亦何異山人識字少時復見一二乃知學道人心静自可至其三我笑山中人猶未達此理患害每過慮聞利輙先喜利害何足驚死生亦命耳但使心不欺造物聴所止送許山人歸長干别業三首我從長干來君向長干去春鴻與秋燕相逢不相聚當時三閣上緑鬢花如霧辱井不可尋纍纍種𤓰芋其二君家烏衣巷正對朱雀橋烏衣去已乆斜陽樹蕭蕭紅薑嫩生芽紫芋肥長苖斯時一樽酒時赴東隣招其三朝耕硯一區暮耕筆一尺疏食且不飽而况有囤積山人萬本韭冨與列侯敵治生不在多勤儉自有益舟中有感水性日就下大江日東馳不知舟行逺但覺青山移我方念儔侣手反坐拄頥天風吹衣裳明月來相隨乗流非不住逝者乃如斯滔滔適意中忽然令人悲壯嵗難再得修名安可期出臺獄復還洪都福至本無象禍來非有因方憂觸羅網遽喜辭妖塵念此蓬藋姿忽遘蹇與屯倉黄圜扉中日夕與死隣皇明眷私照寒谷回陽春既免在滌牲復縱充庖鱗重沐飭冠裳濟濟立要津道路與我慶况我骨肉親歸來向妻孥秉燭語及晨猶疑是夢寐歡樂恐未真嗟余抑何艱坎壈多苦辛弱無勝力錐而欲舉萬鈞羸牛服鹽車遥遥西入秦進逢九坂危退迫尺箠嗔敢惜筋力疲所慮車摧輪哀鳴徒嗷嗷仰訢空諄諄聴者無不憐誰復為觧嚬終當脱羈鞅滄波浩難馴曉發石頭口石頭何斕斒左顧踞赤虎自非神力鑿那得此江滸𤣥精畜隂霧秘迹曠萬古耽視洪都城百雉列飛堵我船候明發值此春夜雨方欣土膏潤可以藝稷黍年豐米糓賤何憂在覊旅掀蓬望烟桞春水緑可醑終許着漁蓑撈蝦冨春渚送陳管勾之鄱陽朝與吳人辭暮送晋人别滔滔楚江水朝暮流不竭我來賛兩省僚友皆俊傑怪君氣如虹欲立萬仞節青蓮出泥滓不涴天性潔相期保貞固百鍊終不折賦南昌亭送丁子讓之淮安士不遇知己鬱鬱徒自憐亭長小丈夫不如漂母賢一飯尚足惜萬金那忍捐季亦泗上人勲業四百年南昌雖云小豈無士八千當時得英雄劉項可比肩奈何自棄之吝彼粥與饘重瞳且沭猴此輩何足愆均行淮隂道亭草緑芊芊為我奉巵酒三酹東風前送滙東宋處士驊騮駕玉輅志不忘春草譬如藜藿人但識桑麻好十年遘憂患退縮苦不早回念春江魚洋洋在芹藻聰明身之累擁腫身所保歸去匡山中雲松可娯老送方以亨還吳興以亨來洪都省兄以常予因與之游者累月既而將還吳興其兄録所贈詩見示余喜而作三章以餞之草有不可偃木有不可彫人心非秋蓬安得隨風飄憐君玉雪姿明月當清霄葳蕤紫荆花輝映非一朝嗈嗈寒江鴈去去誰能招其二逺别腸欲斷近别泪滿纓交游無不然而况弟與兄荒塗霜露繁哀角響故城去傷骨肉思住感鄉里情還家及東作翳翳桑麻成其三賢女失之陋壯士失之貧相逢無所遺慷慨不得伸臨岐歌短章所道皆苦辛淮隂未去楚江摠復仕陳聊沽客中酒用酌還鄉人送方員外之廬陵十年在羈旅未甞憂别離如何與君辭愴如失羣麋君才非我儔語黙皆可師温温霜天裘細細當暑絺不勞綺繡文自然適時宜嗟我百無補不異面有眉既乏視聴功寧免耳目嗤君行值重午高花發榴葵荆人擊鼉鼔舟楫挾兩旗當時懷沙心後世為水嬉作歌贈君别秋風以為期省中樹掖垣東南有大樹隂可一二畝枝葉蓊茂望之蔚然豫章自兵興來巨材剪伐殆盡而兹木獨巋然城郭中其壽可喜也暇日步其下賦此嘉木不常有大材世所稀紛紛拱把中得此翠十圍盤柯結層隂枝葉大且肥下䕃數畝庭芳映百堵扉六月不知暑蒼烟晝霏霏豈為枕簟適實為烏鳥依豫章冨材木剪伐事已非此豈不材者獲與斤斧違褰裳步南風空翠沾我衣徘徊望黄鶴嵗乆將來歸午窻坐睡甚適覺而有賦省中昨夜風可畏今朝風可憐南風㪚煩暑稱此高齋眠夢中聞松聲響如百丈泉不知何身世笙匏奏鈞天浮游清虚中有類脱殻蟬既信圖南樂更覺荘周賢生死俱兩忘况有俗慮牽何當䕃高樹一卧三千年白髪員外方君長余一嵗余髪斑白而方君則髭白一二因相顧笑嘆吾二人之早衰也且聞王政恤二毛則白髪固所當敬吾人其何悲為述以詩白髪無貴賤愁人先得之嗟我愁苦多四十髪有絲我愁寔累髪愁豈髪所為白髪勿笑我可喜不可悲紛紛霄壤間㡬人得如斯嵗暮書事薄雲靄微隂江逺日易墜蒼然望平楚正與西山對㝠㝠孤鴻矯接接昏鴉退感兹嵗年暮矧爾時俗背頼有谷中蘭參差可為佩雨後過上藍寺柬方員外及泉上人梵宫欝岧嶤碧殿抱緑水入門廊廡壞屋漏濕窻紙幽静得丈室苔竹深且美孤華獨清艶衆緑隂薿薿隔窻新雨足石溜響宫徴青山如筆格重疊在書几老僧知客至合掌來作禮已無千佛念為發一笑喜嗟余服轅駒局促垂兩耳逢師類脱鞅空濶向萬里聖覺雖異教迷悟乃一理歸途有餘清作詩示知己對江望山二首朝山翳其麓暮山翳其巔變態孰使之白雲與蒼烟我乆不見山見山喜欲顛以我窺青山料應山亦然喜極復自笑我何愚且偏青山本無情于人何所憐因兹勿復道且聴薫風眠其二大山如龍蟠小山如虎伏以兹龍虎氣不雨山自緑虹長飲其左雲長遶其腹山靈既神異過者敢不肅我生敬青山如對父與叔旦起髪未冠垂簾聴松瀑晞髪在南浦驛道人晞髪坐録樹啼幽鳥江濶風雨晴雲多青山少無聞衆幻滅不昧羣迷曉猶有問津人孤㠶望中小發南浦開船别西山迤􅆔向南浦㠶輕去自速初不用篙櫓蒼蒼烟中樹橐橐響斤斧一女沙上汲衆漁洲畔語我行嵗云晏况復逺儔侣回首北歸鴻翩翩下寒渚過黄牛洲望西山自我來西江未甞㸔西山西山一何秀遥映蒼波間天寒衆木浄日落孤雲閒當時珠簾雨髙捲不可攀至今烟靄中彷彿帝子還夜過市汊驛豐城北時酒醒月出有懷幕中諸友驛樓枕迴洲湍汊聲活活霜蘆花猶泛烟桞葉漸脱月出鳬鴈鳴孤艕寒江濶酒縁風力退詩苦真景奪何處寄相思浮雲楚天末汊口與洪鎮撫夜話我船行何遲君船下來急烏啼月初上鷗静露已濕褰衣步危沙細語成乆立回瀾激空穴風響相嘘吸君才誠國士冨貴可俯拾臨流莫㸔劔恐駭寒江蟄霧中望新淦縣隔窻聞雞聲咫尺望新淦寒江白霧起驛樹連城暗瀰瀰浦溆濶晃晃日色淡亦有渡江人津頭觧孤䌫泊五老峰下初見廬山青再見廬山白山形各異狀轉盻即改色方隂迷積翠忽霽眩金碧蒼烟與雲霧來徃逓䝉羃時時山中禽不自辨巢室我行三徃返真態還未識山水猶若斯世事那可必自湖西發舟望瀑布泊舟廬山下北風吹不休山靈知我來故以風相㽞牽衣渉危沙曠然得平疇桞色緑尚淺芳草青以柔仰觀瀑布泉復作河漢流爐熏既冉冉鹿鳴亦呦呦乃因淹留中終得此日遊向非風濤力那能極㝠捜作詩寓所感萬事無先謀聞廬山雷鳴雷霆有定位發聲胡不然兹山無冬春雷長鳴其巔昆虫不閉蟄蛟龍亦蜿蜒致令山中人厭聼禮不䖍我行值孟春豐隆發深淵衣冠凜危坐對越上帝前天變自當敬心中非有愆望蘄州未見蘄州城已見蘄州山諸山初不髙蒼石礪且頑想當至正時民物庶以殷大江楚西來萬里不閉關兹山獨儲英羣雄出其間遂為禍亂堦滋蔓莫可刪憶我聞亂初我方總兩鬟侍立父祖旁聴説國步艱焉知三十年見此草與菅骨肉亦已零安得髪不斑披榛欲弔古豺虎愴我顔蒼茫望茆宇日落孤舟還過小孤大孤俯如盤小孤儼而立羣山如從吏左右相拱揖孤根屹撑拄萬竅爭噴噏瀏瀏隂風旋慘慘元氣濕江流亘其下震怒莫敢汲洑為盤渦深馳作奔馬急躋攀或失手一駚不可及我來值秋晚木落衆鳥集勿爨夜船犀鮫人抱珠泣贈漢隂老父窮達信有命丈夫乃長貧堂堂七尺軀而憂多苦辛早隨丁都䕶馳逐車馬塵歸來不得意灌園漢江濱但恐女子知不畏醉尉嗔終當返故里共煮秋風蓴過長沙弔賈太傅才高衆所妬年少衆所輕奈何文帝賢而乃謫賈生炎劉握乾運寛大易暴嬴涵濡三十年孰不為政成生言胡不詳慟哭淚滿纓外防夷狄奸内謹七國爭禮樂與風化無一不可行帝心既未遑廷論乃拂膺長沙卑濕地落日鵩鳥鳴臨湘歌短篇哀痛弔屈平雖承宣室問前席何足榮我來欲再拜祠宇乆已傾荒苔剥斷碣滿目皆枳荆汨汨祠下水猶聞太息聲望岳麓我為長沙客不醉長沙酒為愛􅇲麓山繫舟城邊桞峰巒一何秀膏沭春雨後蛾緑淨洗籹方知朱鉛醜所嗟山中寺頽圮想已乆嶙峋北海碑千載獨不朽信為神靈惜長使山鬼守褰衣欲訪古日落辰在酉荒烟鳥雀喧竹宻虎兕吼老眼念後期未知重來否望南岳我從匡廬來但覺諸山低嵯峨望衡岳雲霄與之齊下有赤蛇蟄上有朱雀棲仰瞻祝融㧞俯揖紫葢迷五嶺皆培塿三江為涔蹄巍然南服尊嵩霍相提攜封秩崇君稱諸神咸朝隮丹書篆寳册萬古封金泥百王重祀典赤繅藉玉圭自非精靈通牲帛勞焚賫余方向逺道無由陟層梯蒼蒼烟霞中喔喔聞天雞緬想昌黎伯恭黙開雲霓靈貺自昭格誠敬良可稽斯人乆云沒感念徒含悽過魏夫人祠南岳秘靈氣丹霞凌赤氛中有紺髪姝云是魏元君手把紫虚録印佩朱靈文素質如輕霞飄飄上烟雲三華弭絳節微月來繽紛遶之千靈妃從以萬鶴羣大藥濟羸弱紫府奏殊勲何當受真典驂鸞入氤氲衡陽逢丁㤗我素有詩疾逢人即談詩師友憐我勤遂以詩相期早與高徐輩乃髙季廸徐幼文也逺慕黄初時魏年號時時發警䇿早為詩人知爾來慙潦倒拙語勞吾伊篇章非不多聊足充覆醯衡陽識丁泰握手誦我辭我疾已成癖君復求我醫譬彼病渴人却顧相如悲東風吹江花零落湘水湄情多未忍别因之贈將離發衡州一日白一髪十日皺一膚人生氷雪容終作鞾紋麄今朝清鏡中已與昨日殊不憂須眉蒼但恐皮肉枯肉枯亦常理所念非壯圖有親恩最深撫養勞勤劬憐我幼失怙愛我如掌珠斯恩未及報不敢忘須臾書來得㓙問哀頓空號呼衣衾與棺歛弗得親走趨家山在萬里那能返故都樹頭啞啞啼愧殺返哺烏有子初學言行步要母扶已解索梨栗未知識之無重在託宗祀豈暇問賢愚弟妹皆漂零逺在天一隅仲氏久無信夢中時友于艱難斥鹵濱何以保微軀計工當已還毋乃東歸吳童僕各分飛僅有赤脚奴竛竮苦肺疾終夜聲嗚嗚憐渠亦解事剪伐供樵蘓異鄉骨肉逺頼此相支吾嗟我客梁楚隻身亦﨑嶇白晝畏豺虎夜防狸與狐所頼筋力強竄伏幸無虞今年覺衰倦自怯行逺途東風洞庭波落日青草湖魚龍來欺人烟濤慘糢糊兹晨過衡陽霽景差可娯桃花白練帯春水緑菰蒲感此顔色妍暫使憂心甦萬事信有命拊膺長嘆吁湘女湘水緑瀰瀰湘山碧峩峩空明影上下但覺禽鳥多我方駐輕橈聴彼湘女歌湘女淡掃眉素頰垂兩螺幽蘭結短佩徐行拂青莎春風吹衣裙芳香動微波淑質自妍麗不待綺與羅真修慎所適窈窕山之阿盈盈青樓婦日暮將如何湘江道中思常宗暮江散微雨風定波自碧一鷺立不飛雙鴻逓相直餘烟菱女唱新月漁郎笛此處忽懷人相思杳何極湘竹有題朝行湘竹下暮宿湘竹中雲情與雨態萬變俄不同宻宻深翳日疎疎細含風新梢露裊裊老節烟濛濛紛如千靈妃從以萬青童旛幢列縹緲環珮揺丁東來從蔚藍天歩入東華宫悵望不可即翩然若驚鴻夭矯喜而笑低徊俯乃恭質堅本外直性潔縁中空籊爾中弦矢揉之可彤弓氷雪誓不易肯與時汚隆今朝揭春晴更覺翠色濃戢戢琅玕叢忽見桃花紅直疑路不逺便與桃源通我欲捐輕舟褰衣入崆峒春禽迎我啼音響偕絲桐終當聴山雨自號蒼筤翁瀝澗灘一灘復一灘十步九盤錯厓崩亂石礙轉使水勢惡谽谺鱷張牙屼崛蛟鬬角百躬牽莫前一駚即退却余舟何猛鋭獨與萬險搏篙迎旋渦支纜入欹樹縛齊心忘親讐叶力濟勇弱方危信宜懼過此亦足樂寸嵲能摧車何必盡劔閣向使一不諧羣命未敢托超然望西巘衆緑生逺壑丹砂明赤箭中有不死藥服食信可慿願借麻姑鶴曉發祁陽别劉啓賢羣山抱洪流盡日行曲折坡回出平曠始覺人意悦晨櫛辭隂嵐夕飲得皓月微茫縣郭小樹屋逓顯滅深桞積逺烟孤華燦餘雪入籬聞書聲徑就野老謁跫然喜客至細語共茗啜諸生誠朴野未解習禮節几壁如塗鴉指鼻墨盡湼皆是農家子釋耒甘受業勿謂此輩愚畎畆有俊傑出門復登舟暮雨正凄切前途問尚逺高榕亂啼鴂臨流發新咏聊以散鬱結㑹合自有時何勞念離别過道士洑楚之沅湘細宴山形如道士俯伏之狀因以名山其東南麓有吕安撫墓在焉兹山如青蜺俯飲江水曲邦人失偉觀目以道士洑中有百嵗墳石室䕃木當時錮三泉鳬鴈秘金玉畋師辟虎豹武士禁采牧未為兹山榮竟為兹山辱至今湘漢流到此屢回伏春風吹急雨石斷積蘚緑亦有斧斤聲丁丁響幽谷過仙冡巖蒼崖何巖巖衆石鑿紺黝仙人已羽化蛻骨尤未朽當空玉棺破厯厯見跟肘劍作朱蛇盤函使白虎守及聞上古氏殯殮初未有委棄無貴賤顙泚蠅蚋口陶瓦易衣薪宅兆貴深垕方春尚埋瘞掩此骼胔醜斯人獨不幸暴露嵗月乆何當絶攀縁掇拾歸培塿雖臨不測險結搆亦已就叶兹言信非迂臨風重回首零陵感春舟行苦滛雨雨晴身亦輕暢如辭喧卑振衣登高明羣芳沐春容瑩然眉目清萬緑隂薿薿孤禽語嚶嚶憶昨初戒途飛雪沾我纓桃李寂未華一二春草生漂泊復㡬時花落已縱横花落非足惜念此嵗序更慷慨向秀笛從容桓伊箏曠逹自不凢悲憤何當平嗟嗟高世士亹亹勤修名瀟湘八景靄靄復霏霏横霄曳夕暉巴人與湘女相逐買鹽歸回望墟烟處蒼茫隔翠微右山市晴嵐其二今朝罷漁早掛網堤邊樹雲斷一峯青斜陽在坳處痴兒晚睡醒却訝東方曙右漁村夕照其三孤塔望中青鐘聲隔洞庭蒼山不可及烟濶浪㝠㝠憶似寒山寺楓橋半夜聴右烟寺晚鐘其四風攬湍花晚江寒波欲凝凍僵業漁者歸載一船氷一白迷沙渚柴扉認有燈右江天暮雪其五輕㠶挂春風倒映湘江緑天低浦溆逺歸向誰家宿遥指落花西黄陵廟前屋右逺浦歸㠶其六江横秋草白日落寒沙淺鴻鴈萬里來翩翩下平逺欲墮更低飛斜行兩三轉右平沙落鴈其七風急雨浪浪孤舟夜正長江湖隨處惡何况是瀟湘今夜殘燈裏無人不斷腸右瀟湘夜雨其八湘水秋更清湘月秋更白光輝一相蕩水月不辨色何處洞簫聲巴陵夜歸客右洞庭秋月登三夏故城二首寒樹無柔柯秋草有勁葉原空鶻孤騫山晚雲萬疊登高得平曠人馬皆意愜思挽角胎弓相從雁門獵其二關前葉猶青關後草已白氣候本不殊山勢有阻隔風高鼔角動日落川塞黒邊鴻一聲來壯士亦變色過長平有感驛路石犖确驅車邁荒村川逺蒼烟凉黄沙浩無痕問是古戰塲長平名尚存有生四十萬共此入厚坤發軔暴虐秦六國漸併吞至今遺殺氣草木葉盡髠餘哀寄山嶽上有愁雲屯控馬為追弔白日慘欲昏西風呌邊鴈凄然傷旅魂至太原縣去城南五十里王維太原祁人也唐俗本儉嗇古風猶在兹山長水流邁泉脉注東菑氓事耕牧外鄙樸無他為何當起右轄共詠雉麥詩
