body:
  text: 眉菴集巻七明楊基撰五言律省垣對雨二首朱邸開東閣青閨對晚林雨苔行處濕風葉坐來深俯仰唯緘口交游孰吐心偶逢佳節醉萬事總銷沉其二舊雨深叢菊新霜小樹楓醉憐花冷淡愁愛葉疎紅沙逺無鳴柝江寒有斷鴻羈懐誰共語黙黙坐書空贈秦侍儀文采玉姢姢班行内外聯蕃王從學拜邉使候通箋侍立彤庭上追趨法駕前今朝退朝早衣上有爐烟送翰林修撰劉用章赴滇陽桂苑思戎客薇垣亞相才人皆期管樂我獨愛鄒枚霧雨爐熏掩星河殿影開玉堂清切地遲爾早歸來宿髙季迪京館歲晚此相逄鄉情佀酒濃語長銷夜燭夢短及晨鐘急雪風鳴葦微雲月照松鷄前趨闕去寒樹曉蘢䓗春盡始聞鶯聲衆緑藹園池鶯聲啼更宜愛於三月暮聽似百花時上苑啼應早南風見自遲綠窓殘夢斷相憶海棠枝為牛諒侍御題畫步履近星辰霜凝翠栢新自憐烏府月應照白頭人綉斧監祠夜封章待漏晨清朝崇孝治一飯不忘親和牛侍御懐弟之作春草綠芊芊看雲憶惠連午隂花蕚上秋色鴈行邉此日臨池坐當時聽雨眠應將舒巻意戱綵北堂前懐吴中赤山舊業二首東林携策處南垞釋耕時一逕都縁石諸泉盡到池靜憐松響續凉愛竹隂移盛世容歸隱毋令解組遲其二漸與世紛逺自然塵慮消沿隨碧溪水徑渡綠隂橋岐路迷還識孤村近却遙閒身任來徃不爲野人招夏夜有懷重露澄秋色輕風生夜涼碧看湖草亂紅愛渚蓮香有弟徒相憶何人不異鄉悲笳在城上雙淚落衣裳逄鄭校書一從淮水别千里各西東又是秋風後相逢客路中鬚眉怜我老憂患憶君同遥想西齋宿孤燈照影紅江村雜興二十首春墅一鳩啼橋危懶過溪徑苔都上壁野菜不分畦倚杖妨花宻看山碍竹低欲知幽隱處風雨白門西其二陋巷泥三尺無人訪隱淪窓鳴風减睡炊斷雨添貧野路花迎客江橋栁送人暫須依薄俗憩此竄餘身其三春色冶城東花濃笑老翁燕遲雙壘破蜂早一房通薄瞑山腰雨疎紋水面風便携蓑笠去垂釣綠蒲中其四判醉望愁醒愁因醉轉増已歸仍似客投老漸如僧詩興風樓笛棋聲雪舫燈莫言渾不解此事野夫能其五東瀼復西圻村村可釣磯草於烟處宻花較雨前稀小管催鶯出疎簾待燕歸傷心新栁色猶妬舊羅衣其六偶因辭祿去聊傍葦邉居瓢棄頻賒後衣存屢典餘晚簾花掠燕春水絮吹魚復恐沙崩石楊栽挿遶廬其七江橋春别後沙舸獨歸時鵞鴨東西宅菰蒲逺近陂藕深荷蓋宻竹瘦筍鞭遲野趣誰能識唯應白鷺知其八斜檻俯江湍輕帘矗小竿栁寒鶯羽濕花暖蝶鬚乾酒或臨流酌詩多寫石看不因迂僻地那得此身安其九江影揺春樹潮痕摺晚沙綠蕪三尺雨朱槿一籬花去國仍思國還家復夢家自無干禄意何必逺京華其十將雨山光黒初晴樹色青賣薪沙店逺占糓瓦龜靈石枕支頥冷江瓢潄齒腥醉餘春睡熟長得鳥呼醒其十一乍暖夾衣輕閒依緑渚行鳥喧如有訴花􅆭似傷情風度思前輩才華畏後生自緣耽野趣初不爲逃名其十二詩廢并無藁琴亡况有函菌生舂藥臼苔蝕種花鑱徑濕慵頻掃畦荒懶自芟畏人詢徃事欲語意先慚其十三江月盈盈白墟烟細細隂茅茨孤碓急機杼一燈深短笛多悲調長歌少醉吟自憐知已盡空負壁間琴其十四野渡緣沙濶村酤入市遙雨籬花婉婉風箔葦蕭蕭祠古猶供祭墳荒不禁樵夜來沙觜沒漂斷屋西橋其十五僧居映栁庄漁市入横塘晚渡雙橈月朝吟一硯霜療貧知有術醫俗笑無方種得青青草離憂頼爾忘其十六清流曲幾囬喫飯此山隈歌斷憐鶯續詩遲畏酒催晚晴初見月春盡尚逄梅歸路緣江熟支笻不用陪其十七江渚疑無岸䕷蕪逺接波花疎遊騎少酤賤醉人多燕已將雛出蜂能負子過祇愁春已晚欲借魯陽戈其十八咫尺南朝寺松杉覆短垣野猿偷佛供山鳥學人言石氣晴猶濕泉聲靜却喧塵心乆空寂隨意給孤園其十九儀困非無舌顔貧尚有田病多賒藥劵貧乏買山錢白璧交徵日黄金寵賜年都將舊遊夢一笑野漚邊其二十情深却倦遊矮屋任低頭花落東風怨鶯啼夜雨愁酒煩隣媪買詩許社僧求欲駕東家鶴吹笙到十洲句曲秋日郊居雜興十首茅屋人歸後荒村更異鄉樹寒烏遶月江冷鴈啼霜影頼燈相續愁緣酒在忘明朝覧青鏡白髪幾多長其二出門山氣夕循徑入谿隂野水經寒淺秋風到晚深草潜驚鶻兎莎露啄魚禽自采黄花嗅誰知獨步心其三漸老愛秋光升沉意兩忘鴈聲偏到枕蟲響故依床薜荔千林雨芙蓉一樹霜故園樷菊在衰颯為誰香其四庭樹聚棲鴉溪流沒淺沙瘦憐人似菊濃愛葉如花秋色都連水寒雲忽變霞自慚長在客無地不思家其五牕掩輝輝燭爐消細細香無風寒尚淺有雨夜偏長飢䑕搖空槖枯螢委破囊十年江海夢此夕詎能忘其六地與華陽近三峰獨徃來草香千品藥松老一身苔書怪􅆐偷讀門經鹿撞開墻東有修竹移向北庭栽其七編竹補疎籬生芻束酒旗鷄豚田祖廟鷹犬獵神祠玉糁菰為粉璚酥豆作糜兒童採蘆葉爭學短簫吹其八欲往竟無適意行仍獨還猿聲黄葉寺牛背夕陽山書棄將成業身投未老閒相逢莫嘲誚才與不才間其九偶隨黄蝶去岸幘樹邊橋卯酒紅初散朝霞白漸消沙平畱鴈跡水落見魚苗却愛箕山老從容棄一瓢其十落葉擁柴扉村深客過稀曉車分榖去晚笛飯牛歸漁負雨蓑立鳥啣霜果飛此中真小隱予亦久忘機杜伯寜雨中相過晚晴送别念汝能相過危橋渡野塘入門巾屨濕滿席芰荷香我愛秋前雨人誇午後凉都將耕鑿意一笑送斜陽懷句容縣中諸友武師文山市遶寒㕔雲分半榻燈苔荒征訟少果熟稅錢增薄俸長畱客新詩或寄僧朱絃嗟久斷欲續竟誰能趙仲𢎞古貎復長鬚山林一老儒豐城埋古劍滄海得明珠文氣曹劉並才華沈宋俱故園諸友盡相見獨踟蹰栢師文白髪已千莖相逢喜氣生看山留十日待月坐三更秋浦槎頭釣春泥谷口耕莫言蹤跡閟朝市乆知名翟好問愛爾山城隱柴門對縣衙酒貲千畆苧生計一園𤓰雨步荷巾濕風吟蓆㡌斜時時扶短杖看竹到東家居行恕一榻卧秋隂松明照夜深瓦枰山館奕石薦竹忩琴老愛籠鵞字貧消買藥金岡頭三日别葉落亂蟬吟樊楚尹綠幙雨初涼閒齋夕漏長硯生秋蘚碧花落紫薇香教子抄書法逢人錄酒方自緣耽野趣臺閣意都忘吴善養心境兩俱寂松風時掩關佩紉蘭葉紫冠製竹皮斑飲少長先醉吟多每自刪近來登眺懶滿壁畫秋山吴損菴玉笈佩神經雙瞳煉更青秋雲分席坐春雨卧樓聽掃石持鸞尾􅆽泉洗鶴翎清虛長不食輕欲駕飛軿巫山隱巫山青十二一一楚江濵自入山中隱都忘夢裡身玉冠蒼水珮鶴氅紫荷巾媿我方為客秋風滿靣塵送句容劉少府回揚州家具一車輕囊書與短檠吏多難别意人有去官情㠶影江沉寺簫聲月到城竹西尋舊業烟雨綠蕪生贈華陽道士徐介之太極仙翁劍相傳此瘞藏蘚痕皆鉄色松影尚雷光斗閣三花供真壇半夜香便須邀顧况特地宿君房客懷休官得養親况及楚江春喜極花迎笑情多栁效顰玉醪銀葉鱠紅稻紫絲蓴遙想西園草青青待逺人七月十四日過龍江親已年逾九兒纔月過週家貧歸似客路遠去如流失意螢辭火驚心燕感秋平生離别淚相對未能休沙河舟中旅懷歸正急春色到非遙草際風初泛蘭心雪未消鷺明欺白髪鷗快避輕橈得遂歸田計殊恩感聖朝儀真逢張孟恭相見獨依依都緣㑹靣稀故鄉諸友散獨客幾人歸江總頭全白劉琨事已非野鷗知别意故繞夜航飛𤓰州逢邱克荘江水靚如空江華冷未紅憐予猶客裏羡汝已鄉中白苧青衫雨烏紗短帽風不須搖艇子垂釣五湖東閏七月二日發淮安舟行日已晡㠶影動檣烏河伯抛錢祭風神酹酒呼紅憐𤓰似蜜白愛芡如珠且就篙師醉何煩問遠途至鍾離發書寄婉素漂泊嗟吾遠支吾頼汝賢老親思饌肉癡女憶衣綿刀尺砧聲裏燈花笑影邊聊將千里夢持送到金川盱眙懷古舊說盱眙縣居民不掩關鷄聲啼鳥上人影落花間簾幙層層雨樓䑓靣靣山惟餘孤塔在秋蘚綠斑斑舟中聞促織促織來何處哀吟近短蓬不堪為客裏况復是舟中殘夢寒衾月孤燈夜枕風此時腸欲斷恨不耳雙聾元夕前雨楚澤春初入巴江水又來草憐容易綠花恨較遲開月暗燈慵試衣單苧懶栽晴光在梅栁應待鼓聲催人日懷高啟客路逢人日流光惜易過楚山青漸少吴樹綠還多短草茸茸雪輕鳬隊隊波無因寄高適詩罷獨吟哦哭陳仲野都事沒任所二首氷雪阻修途畸魂託老奴百年鄉夢斷萬里客墳孤囊槖遺書在期功遠姓無一盂寒食飯誰與掃榛蕪其二輿紼暗風沙丹旌映晚霞吏人營殯殮童僕着衰麻襲廕無遺嗣招魂有外家重來恐迷處記取路三义送沈自誠任武康縣丞朱紱還家日青衫佐縣時野蠶春自蠒山犬暮生氂細讀隋唐律間臨漢魏碑都將晉陽事冩作送行詩寄張彦禎城小更臨邊今聞太守賢牛歸新覆屋農種久荒田機杼春坊月旌旗晝壘烟直須興禮樂閭巷盡歌絃省中元夕剪綵簇牡丹燈一樹戲題綵樹玉為柯銀燈錦作窩絳紗籠月小金剪得春多暖艶千枝雪天香五色羅掖垣齋事肅相對夜如何洪都江流與郡通山勢向西雄綠樹南風裏黄梅細雨中城門帝子閣鉄柱羽人宫欲就蘇公飲東湖小圃東立夏前一日有賦漸老綠隂天無家怯杜鵑東風有今夜芳草又明年蠶熟新絲後茶香煮酒前都將南浦恨聊寄北忩眠東湖晚眺漚沒岸如無凉多栁易枯巫歸神廟静兵語驛亭孤日落霞明渚虹收雨暗湖此時篷底坐天盡是東吴湖口見月秋月自嬋姢澄波照更妍梳憐宫鬂側眉想鏡䑓前初見愁將墮猶觀喜漸圓旅懷何處感風露九江船風雨泊舟江渚初寒夜全家在一篷漂零兼主僕憂患及兒童柝響孤城雨鍾聲遠寺風明朝青鏡裏鬚髪定成翁晚過秋浦淡日雨晴天江村正可憐碧雲初見鴈紅樹尚聞蟬一望皆秋色千山各暮烟自慚簮組累羞近釣魚船晚登峨眉亭亭子慿虛好登臨似鏡䑓江分一股折山作兩眉開濃愛秋烟隔顰疑暮雨來短歌聊共冩深愧謫仙才沙河至采石四首近午風猶熱微隂日已凄病軀勞更弱憂色瘦偏黧路轉蒹葭入舟從絡緯棲此中腸易斷不待玉關西其二河曲㠶頻轉波高夢屢驚學人狐拜月照骨鬼吹燈斷甓沉沙嘴殘碑露石􅏢不知何縣邑芳草沒荒塍其三病後難為客天涯獨此身幾朝纔聽鵲千里未逢人夢好徒増喜詩工不療貧悔將孤釣艇抛棄五湖濱其四舟中逾一月驛路及三千老淚青衫上新愁白髪前蛩聲秋岸雨鴻影暮河烟不有西征客誰同此夜眠逢鄉人俞武仲釃酒酹江神占風欲問津偶於春草外逢着故鄉人語宻終難别知新却易親因君問先壟清淚滿衣巾江船早起霽色耀輕霞風檣起曙鴉防寒慿酒力避淺問漁家日出鷄鳴樹波清蠏上沙此時篷底坐極目看蘆花夜坐坐久一船霜神清念慮忘水當深夜白星隔大川黄鐘斷松間寺燈歸栁下庄鳬鷖方露宿漁父莫鳴榔夜坐聞江聲天寒月滿川冬夜木蘭船人影清於鶴江聲急似弦書殘燈落燼香在帳留烟多少關心事相隨到目前江船聞柝月皎江逾白沙明岸欲無柝聲寒郭静人語夜航孤酒渇思分橘衣單怯絮蘆遙憐抱關者霜露裂肌膚宿雲港三首新月低江樹回風疊浪花珠明初見斗綺淡欲銷霞轉柁防危石收㠶避淺沙鄰船有漁火兒女自成家其二孤檝辨漁舟雙旌識戍樓江山人老去歲月水東流鶩外霞催晚虹邊雨送秋不因風浪急那得此淹留其三江濶淨無埃澄澄一鑑開兩㠶烟外小單櫓月中哀更静漚初定秋深鴈未來誰家東戸好蒲栁逐行栽晚入湖口過大悲閣石斷岸争出蘿垂樹倒縣僧吟秋閣雨人渡野航烟鴈鶩清江畔蒹葭白露前終慚累軒冕空學在家禪至吳城山得南風過湖沙嘴南風起船頭雨正飛人方離别去鴈又竟辭歸暖日紅生暈晴波綠漲肥龍君廟前栁顔色妬羅衣謁鄱陽湖龍君廟劍履朱袍列幢幡碧殿開舟人沉璧祭神女獻珠來欲雨蟬鳴樹將風鵲遶䑓瑤函有珉册猶是楚王裁出左蠡望廬山時春雨新霽山色明潤獨不見五老峰為賦瀑布銀河落香爐紫霧分諸峰皆翠碧五老獨烟雲澗濕雨猶滴坡香草自薰遙知幽絶處麋鹿自成羣夜泊琵琶亭聞笛夜泊古亭邊春愁滿畫船青衫司馬涙紅袖琵琶絃故國人何在澄江月又圓誰將折楊栁三弄落花前江邊小旗亭亭子枕春沙青旗趁雨斜瀟湘新畫壁桃李舊栽花換酒來雙鯉當鑪立兩鴉當年下江客相約送新茶雨中登望湖亭有懷幕中諸友水接虛無白亭浮浩蕩開登臨能幾日風雨又重來藕濕花初歛蒲深葉半摧乍同諸友别吟望獨徘徊鸚鵡洲綠遶武昌城遥連漢口營䕷蕪昨夜雨鸚鵡舊時名詩句憐崔顥才華惜禰衡誰能洲下泊不有釣蓑情江夏朱元瑾折蘭花見寄幽蘭不易得孤潔比秋霜自可供金屋何須寄草堂一花湘水碧數葉楚山長便結參差佩羅衣十日香岳陽樓春色醉巴􅁜闌干落洞庭水吞三楚白山接九疑青空濶魚龍舞娉婷帝子靈何人夜吹笛風急雨㝠㝠舟中聞杜䳌落月祁陽路聲聲呌子規萬山春盡夜孤枕夢回時客自傷漂泊人誰念别離無多眼中淚聽汝不勝悲宿巴陵楚有巴陵好君山對縣門暮烟湘樹逺春雨蜀江渾日落船依岸人歸犬吠村憑虛望雲夢胸次詎能呑入永州石氣隂才霧嵐霏暖欲霞憩床腥畏虎飲磵毒防蛇紅葉秋崖樹青蘿晚洞花江山盤屈外遥認兩三家零陵二首地僻三苗近江回二水兼青林皆種蠟赤榖半收鹽好武人輕鬭多祠俗尚占晚來山霧濕衣薄又須添其二古瓦籠山葛荒碑仆石楠江晴初漲雨城午未銷嵐甕富鯖羞鹿盃渾酒餉蚺邦人盡麻枲終歲不知蠶湘中雜言九首春水連春草遙遙一望同烟江來漢口雲樹出湘中竹有啼痕碧花仍笑靨紅誰能鼓瑤瑟哀怨向東風其二小雨弄春晴湖光媚更清髻憐新沐後眉愛靚籹成鵠潔知無累鷗明覺倍輕離離川上草端為客愁生其三鄂渚雲歸後巴山雨過時䳌啼湘女廟花落楚王祠家遠身如夢愁多鬂易絲聊將身暫泊沙嘴看鸕鷀其四風起一湖香青青杜若長花迎衝浪楫燕逐使風檣欲采蘭為佩仍褰荔作裳何如山閣上屏裏看瀟湘其五江晚樹沉沉羣山入漢隂驛亭千栁暗僧院百花深鷺曝愁融雪鶯流欲墮金旅懷元易感非有壮遊心其六鷗聚江初靜鴉啼樹已昏碧湘悲帝子芳草怨王孫㠶影烟中浦漁燈雪後村匆匆萬里客極目正銷魂其七城近江臨郭沙虚月在川栁宜春雪後花怯晚風前野㸑三家市鄉音幾處船坐聽磯下水嘈雜響湘絃其八山霽雲猶濕江寒雪未消雙旗樓鼓急孤塔寺鐘遙水緑鳬鷖藻洲香翡翠苕巴人暮歸急横渡不停橈其九指㸃鷗飛處人間是岳州湘潭山亂出江漢水兼流深竹新祠宇飛花舊酒樓平生巴楚夢明日洞庭遊初入山西境晉鄙不識稻來麰常在庖民居多土窟官賦半羊毛七月裘寒着千山狼夜嘷遺風唐儉嗇古廟享臯陶山西秋日澹日荷香外微涼樹影邊俄聞落疎雨便覺是秋天塞近風寒早天高氣候偏忽思陳鼔吹萬馬向居延和宋大叅省垣對雪和風春前入瑤花雨後寒簾疎穿每易闌曲聚偏難客自衣裳薄人誰夢寐安掖垣今夜直離恨正多端闕題以下俱原闕五言排律水邊見新燕昔别秋風後今歸社雨前巢非金屋舊人是玉堂仙頥頷公侯似腰肢妓女憐花明春殿雪栁暗御樓烟羅幕棲長並銀屏過每聫尾寒鶯共濕衣暖蝶爭妍忽見青帘外俄逢綠水邊莫嗔茆舍小臺榭總蕭然早秋送趙景普東歸歌斷復依依情多忍遽違未緣春色晚自感故交稀舟傍荷花宿人先燕子歸乍涼才却扇多病欲添衣驛樹風蟬咽江祠雨鶴飛幾時搖艇子來扣竹間扉元夕京城觀燈與楊亷夫先生同賦琪樹遶春蛾銀燈爛絳羅風柔宵漏永天近月明多瑞靄浮雙闕繁星動兩河仗迎仙佩出香拂輦塵過菡蓞層層雪魚龍灔灔波清時更良夜遊讌莫蹉跎送傅子敬憲使朝散掖垣風恩乗憲使驄星辰天咫尺山水浙西東民力凋零後君心屬念中江晴鷗汎雪雲净鶚横空草復新年綠花仍故苑紅無因送君去鄉夢託㝠鴻送竺孟容戍營丘内殿朝辭日東藩報命時白門花婉婉青社草離離山雨朱袍濕江風錦帽欹禡牙朝進祝散敵夜吹箎士馬驚銅鼓兒童織綉旗突圍當左拒射敵中斜枝赤手千人服丹心一劍知功成正年少雙鬢未如絲趙宜人衛氏挽章故國王孫貴名家母德新令儀推冡婦榮寵錫宜人讀史青閨夜治絲錦帳春野烟條綠柘溪雨采香蘋熊膽資諸子虬髯識衆賓鏡臺俄掩月琴匣久蒙塵遺範傳宗閫悲歌動縉紳霞坡原上草相望一傷神八月九日祀社稷述事祝史祝王册儒臣奉誓詞衣冠陳盛典秬鬯降洪釐用報金穰瑞仍祈雨露私勾龍嚴配位神棄肅明祠幣玉趨宗伯笙鏞奏瞽師精靈潜格爾肸蠁儼來思赤壤新封國𤣥牲舊制儀豈惟宜土榖還得奠邦畿師出常依主君行每告期禮終受多祜民物正熈熈晉邸北狩剛戊吉初㳙藩宫武用宣獮田之藪隰旄節邁闉􅆵􅂒帀驪為鉓幩銜驒作纒彤弓臣累百貝胄士逾千雲路龍章衮璇霄鶴駕軿和鸞軾前奏韔服䪌傍懸笳鼓鳴翻海罝羅布匝烟獫猋過走兎鷹翥捷飛鳶洡泹多糜鹿豳岐盛豕豣延賓左髀逹登豆右腢穿殪兕才方著當熊譽又傳骨都魂亦散勅勒部齊遷固以巽爻象不殊詩雅篇邊氓瞻紀律勲業可銘鐫眉菴集巻七
