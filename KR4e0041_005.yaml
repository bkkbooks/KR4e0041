front:
  text: 眉菴集卷之五
  hash: sha256:26f3ee643dd964f4ae151c204c39016d8111b11bf9959185a7554f77c758c850
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_005-1a}
body:
  text: 長短句體姑蘇楊基孟載著梅邊讀易世言麋鹿野我更野於鹿呦呦山嶺間未聽人聲先退縮行隨桃花飲流水白石清泉諧所欲落日雙松薜荔青東風百草䕷蕪緑赤山山下飬親處平山南五里許折赤山在吳縣天公而名也先生之家在焉折又曰仰天蓋范文穆慕文正五母雞豚三畝菽不愁女子識韓休但恐相知非鮑叔朝來掃葉繞樹吟仰見寒梅破香玉臘意猶封雪後山春光已到溪南屋信知物瑾互消長往往天心見於復自取羲文一卷書茆薝坐對梅花讀觀眠松有感呈醉樵內史鳯現嶺折饒參政介之也松在朝廷無遺材而我觀蟠松松髙僅尋丈足當髙景山之雄外惟英華發內實神秀鍾氣食白額虎勢挾蒼精龍鱗張角折甲爪露兔絲纒絡苔花封輪囷磊砢盤踞數十畝葉擁車蓋萬箇青童童東柯西柯尤不同隱若雲鵬離溟渤六翮始舉扶搖風幾欲飛上天椎碎霹靂鋒魑魅魍魎莫敢近上帝素有生生裏丰姿森森凛鐡石靈響殷殷來笙鏞膏流茯苓成琥珀屢起凋瘵蘇疲癃胡乃尚爾局束中吳中手持美酒玻璃紅三酹再拜十八公今之拳攣突梯世不容公其正身直節以答上帝忠三晨復朗耀四海無困窮野夫獻頌蓬萊宫霸王丘和楊亷夫朝上亜夫塜暮上霸王丘君臣兩丘土千古同悠悠穀城西來河水瀏瀏葬以魯公其禮已優王勿悲王自仇於乎天意非移劉過陳湖贈寄周明府蘭苕參差桑柘緑細雨岡頭啼布穀人家破産給丁夫麥未上場蠶未熟無蠶催絲綿無麥督稅錢民間此愁誰見憐君侯為我解倒懸送孫照庵往松江吳門花似雪適與佳人别别離苦不逺相看寸心絶前年送君去練川花滿樹今年送君遊吳淞江水頭吳江三百里青蘋涵白芷樓船五色旗煌煌照江水潮來江水明潮回江水平江頭兩啼鳥勸君莫登程君家髙堂親已老為子不宜長在道歸來為問渡江人舊時楊桞今多少七賢過關圖前乘驄後乘犢牛行何遲馬行速關山雪深及馬腹手披牛經馬上讀七名賢五童僕愴惶出關非所欲關東鼓鼙民夜哭李嵩畫宋宫觀潮圖十五湖上月十八江上潮君王連日醉伐鼓更吹簫簫聲忽如天上落大內臨江起飛閣碧瓦朱甍十二闌嬪娥嵗嵗觀潮樂潮水信可定日夕來朝宗人心獨不如而不思兩宫兩宫未雪耻屢下班師旨白馬素車神何不令天吳拆食大姦髓姦髓不可食國耻不可滌嗟爾江上潮雖雄竟何益潮無益於人看潮徒損神橫江鐡騎來三日飛埃塵曆數固有歸爾潮胡不仁遂令鸞鳯雛戚戚悲殘春春光浩無主落花隨暮雨回首幾秋風旌旗又如許又如許君勿悲古來在德不在險一杯之潮安足竒漁樵問話圖君收綸我停斧且向溪頭話今古屈宋文章㸑下薪韓彭事業庖中鮒世上功名賤如土何須了了文兼武君貫魚我負芻有酒可換不可沽青山滿眼同一醉勿論區區榮與枯七􅋙圖牡􅋙蹲牝􅋙坐二子就乳三子卧茆􅉉北風吹壁破群􅋙飢號愁雪墮君不見東家韓盧逞捷足朝逐狡兔夜食肉春􅱜捕雀圖棘針紅尖竹裊裊一雙春禽戲春草獰􅱜何處忽飛來利觜如鈎破禽腦春禽引雛肌骨瘦不彀春􅱜一朝飽一朝飽尋復飢春山鴟梟如瓠肥何如摶梟飽終日留取春禽引子飛夫織蒲夫織蒲妻辟纑田中種豆田下蒲編穰上箔苧脫軸賣席與布未了官家租重門髙樓切雲齊盈倉豆給廄中驪銀鞍鐡甲十萬蹄樓髙髙馬騑騑居民無廬食無糜嗟君之牧能勿悲麥田髙麥田髙稻田低低田年年髙築堤田家茆屋近江水築堤直取江心泥今年雨多不傷榖髙田得沾低亦熟百箔春蠶五母雞全家衣帛兼食肉君不見咸陽東來如掌平間田自多人不耕休採花詞休采花采花胡蝶飛休撲蝶撲蝶傷花枝花枝娟娟戲雙蝶臨風對花不忍折平生愛蝶仍愛花只恐傷花復驚蝶君似蝶妾如花花開能幾日胡蝶過西家雲樵朝出雲在野暮歸雲在山十年事樵採朝暮雲中間空山無人雲漭泱斧聲丁丁四山響曽看仙人石上碁千嵗桃花才反掌白石礪我斧丹楓裁我柯浮雲去盡青山晚奈此猿聲鶴夢多畫鴈春渚别未久秋風來有期年年燕歸日是汝度關時玉關萬里音書絶八月胡雲三尺雪何以飛來漢水頭湘浦蘆花洞庭月花滿寒汀月滿塘鴛鴦鸂􅥩兩相忘啼晴杜若藂邊雨卧冷蒹葭葉上霜送安定書院山長張宗武溪頭梅花氷雪妍弟子送師張别筵緑莎為茵桞為幕次第再拜春風前春風東來吹馬耳馬蹄咫尺長安市盡道先生自此升君不見三鱣堂中楊伯起挂劍臺和黃子雍生諾諾尚淺死諾諾更深當時季子意即是徐君心嗟嗟徐君骨已朽寶劍摩挲在吾手正擬臨岐解贈君不意挂君墳上桞挂劍果何益聊以明不欺當時讓國心肯使徐君疑於乎劍可折臺可隳死生之諾不可戲狼山青為許光祿賦狼山青山前慈烏終夜鳴兒聞烏聲憶慈母母今逺矣兒心苦三見江南秋草黃泪珠不到墳頭土有母壽且康有弟垂金章胡不買船歸故鄉故鄉介母壽外孫拜姑姑拜舅甥已成翁姑白首團欒且共樽前酒酒醒月斜思早歸江南更有糟粳妻霜葉紅贈友還華亭幕官霜葉紅霜葉紅霜花照人如酒濃青袍幕賓上官去挂帆開船江水東江邊小娃年十五臨江踏歌對君舞淮音吳語總銷魂不是璚花舊時譜憶君折桞西湖曲湖上諸峯為君緑一夜江南春信通畫舫銀鞍竸相逐東風一分手去酌華亭酒華亭白鶴不歸來二陸文章亦何有江邊鳬鷖毛羽稀慎勿驚之撩亂飛君莫疑贈薛起宗有弓莫朝射有劍莫夜舞舞劒空驚半夜雞射弓須射南山虎當年意氣雙白虹三尺寶劍兩石弓平沙軟草馬蹄疾仰面射落南飛鴻歸來面皺頭雪白魚皮包劍弓挂壁逢君一笑杯酒空憐我衰顔手無力手無力眼有眵作歌贈君君莫疑英雄老去衆所薄何獨區區楊去非更名曰去非折先生年五十賦得歸帆涇送夏仲信之江北客舟不肯停相送錦帆涇涇邊數株桞株株落秋聲當時種栁臨涇水桞葉參差間桃李君王日暮看花回一色錦帆三十里朝從涇上出暮從涇上歸吳歌聽未了花落鷓鴣飛鳥散春無迹涇上叢叢春草碧自是君王愛捧心美人那得傾城國古來奢麗那能久菲衣惡食傳不朽君過長淮向汴河請君更看陏堤桞送葛仲行逺遊子有逺行役我有逺行詩逺遊幾萬里山川浩無期青山盤盤日欲暮車輪髙隨飛鳥度笑殺東家白面郎一生不識城頭路七色荼䕷花朝出月在牖暮歸星撒沙今朝下馬日未晚見此七色荼䕷花千葩萬蕚春無價綺雪湘雲堆滿架題品當居芍藥前溫柔豈在薔薇下我愛名花天下無中泠之水四腮鱸誰將十樣天孫錦織取徐熙沒骨圖雙椿堂大椿葉青青小椿葉薿薿堂中兩眉壽共坐春風裏春風搖搖吹紫荆兩翁白頭親弟兄兄當有孫弟有子兩翁之壽從此始庚戌元日立春試筆二首桞暖已破眼梅寒尚含腮臘隨除夜盡春逐嵗朝來鳯凰臺下春歸早龍池桞色瀛洲草一夜東風雪盡消十年南國人空老富貴非吾碩文章非我能且沽白下橋邊酒來看金陵市上燈南山雪已消北山雪盈尺信知南枝花早得春風力帝城回首春光近桞上梅邊見春信白玉椒盤內史傳紅羅彩帖詞臣進貧賤何足恤功名非可誇且沽白下橋邊酒來看金陵市上花白雲書舍我家住山深白雲滿長林愛雲如拱壁友雲似同襟去年辭雲向城市雲亦相隨渡江水我留城市雲還山夢裡時時看雲起均家茆屋鑑湖西屋上青雲作隊飛爽氣每沾毛義檄晴光長映老萊衣祗今薇垣畨夜直只尺蓬萊雲五色却向升州望越州吳山萬點吳雲白九日袁贊府宅賞菊自我離姑蘇已負兩重九不獨無錢對菊花白酒黃花總無有前年九日吳城破草口倉黃驚竄走去年重九客榮易淚眼西風盻衰桞那知此日來句曲山水自佳慚白首到處逢人索佳菊預恐無花孤此酒東鄰送我青兩株細蕊含苞香未剖耐何無花亦無酒不憤有酒成不偶丞家數本花正繁秀色幽香照窗牖入門一見清興發亂插烏巾笑開口主人抵掌怪我狂我自有得忘老醜三年僅逢一餉樂此後寧知不愧負便須築室滿山田種菊循籬秋百畝年年釀酒薦秋菊笑引妻孥壽慈母世事茫茫未可期聊作長歌示佳友苧隱為句曲山人翟好問作種桑百箔蠶種苧千匹布先生種苧不種桑布作衣裘布為袴桃花雨晴水滿塘烏紗白苧春風香野樵山葛不敢並越羅川錦爭輝光兒童漾紗婦紡織賣布得錢還買帛黃綿大襖一冬溫白雪中單半襟窄今年苧好畝百斤堆場積圃長輪囷床頭白酒夜來熟殺雞煮鴨邀比鄰東家種桑青繞屋官絹未輸空杼軸婦姑相對歎無衣先生飯飽方捫腹送汲縣主簿朱孟仁我耕蘇臺雲君釣苕溪月萬里西來始識君相逢未久俄相别梁園十月萬樹稀北風滿地塵沙飛客中送客未忍别感慨握手臨大堤問君此行向何所大河之北汲縣古桑柘遙連晉都邑牛羊近接曺風土縣民出郭迎縣官苦酒味薄柤梨酸道傍再拜勸官飲禮數朴略誠堪觀知君下馬人爭愛白襽烏帽紅鞓帶百年華夏總戎衣方治折中原忽看中古威儀在父老喜極復淚垂草年兵燹悲瘡痍兒孫汨沒骨已朽老眼復得逢雍熙人心如此亦難治要在從寬布君惠犬足生氂户不扄牛租減額人長醉嗟我前月除滎陽入門野蒿如屋長日斜吏散公宇靜時有雊雉來飛翔方除瓦礫治官道已見居民歸稍稍自愧才踈撫字勞嗟君年少蜚騰早清霜一夜滿河氷此别憐余白髮生主簿官卑君莫厭鵬程九萬自兹升彭蠡阻風昨日南風顛輕舟挂席如飛仙又如健馬走空闊造父王良相後先今朝北風吼白浪飛天大如斗舟人勸客莫忩忩君不見世間快意那能久舟抵南康望廬山春山如春草春來無不好况是香爐峯百疊屏風圍五老嚶嚶歷歷谷鳥哀朱朱粉粉山花開芙蓉削出紫霧上瀑布倒㵼青天來船頭春山重回首世上虛名一杯酒李白雄豪妙絶詩同與徐凝傳不朽明日移舟過洞庭蘭花斑竹繞沙汀摩挲老子雙愁眼細看君山一點青登繩金塔望廬山過魯必謁岱入洛須望嵩嗟余夜半入彭蠡月黑不見香爐峰明登望湖亭雨氣何空濛山僧指點笑五老正在煙雲中今朝躡層梯髙摽揭晴空匡廬逺出百里外紫翠映帶春霞紅雖云倣佛見顔色巳覺浩蕩開心胸在山看青山佳處未盡逢不如逈立萬仭表一日覽盡千玲瓏何當生羽翰兩腋乘天風不論雨雪與晴霽回翔下上飽玩八面青芙蓉過劍江聞岸上雞聲劔江光似劔霜月寒灔灔輕舟載月江上歸半夜雞聲起茆店寒雞自啼人自寢雞聲不到黃公枕癸丑元日霏霏元日雪脈脈人日雨春來無日不輕隂薄霧寒雲滿南浦常年有雨復新晴淑氣韶光淡繞城草色未逢金勒馬桞條先映玉樓鶯今年風雨兼氷雪忘却春幡慶春節野杏緘愁待酒催江梅索笑邀人折誰與觀雲卜大通且須祈榖問年豐相期十二樓前月賸看花燈萬點紅憶省掖千葉桃花穠李積皓雪繁桃炫朝霞江邊日日見春色盡是尋常兒女花東闌一樹能傾國千瓣玲瓏誰剪刻半吐疑紅却勝紅全開似白元非白旁雖淺淡正復濃雅麗稱月間宜風隂時晴午各異態嗔喜笑嚬無不工嗟我匆匆簿書急時復微吟對花立白苧猶沾夕露香青鞋不怕蒼苔濕而今漂泊楚江濱想像丰儀一愴神惆悵當時看花客對花還説去年人水雲居為劉文丙賦時豫有山西按察司副使之命故末語及之我本山中人看雲三十年白雲如故舊入我秋堂眠去年辭雲向城市雲亦相隨渡江水我留城市雲還山夢裡時時見雲起明日驅車上太行山青雲白樹蒼蒼憶君茆屋瀟湘上雲滿衣裾水滿塘為山西李參政題紅竹山西無竹看認竹竹不真翛然山澤古君子忽作年少如花人想應血雨瀟湘渚洗去琅玕碧如許翠華莫覩覩霓旌淚灑紅氷啼二女口脂香容未老望入霞光九疑小鷓鴣聲喑緑煙消丹穴朝陽鳴鳯鳥爾不知此外雖異心恆虛赧顔訴向誰人道結句照應古君子可佳眉菴集卷之五
