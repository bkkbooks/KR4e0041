front:
  text: 眉菴集卷之九
  hash: sha256:b2ce619d90e4af5fa6fbe07b5f704ae1732b7a4908ed434776a8fd6860480407
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_009-1a}
body:
  text: 七言律吳郡楊基孟載著罷職𥘉寓句曲山居峯昔陶隱居所處也折在句容縣南一舍近三苑兔逃罝罟鳥投林脫彼官資暢此心便覺夜來清夢出始知人住碧山深詩窮任使金銷槖酒樂何妨雪滿簪更擬怡雲問弘景華陽仙洞事幽尋賣𫀆鵷鷺行中舊賜緋團花分縫織秋葵齊宫夜直雞前著內殿春朝馬上披仙露滴身猶點點御香薰䄂尚離離山中無復瀛洲夢換取金錢當酒資寄諸葛同知彥飛白髮慵梳步屧遲老於田野最相宜每當酒熟花開日正值身閒客到時雪屋夜燈因婦織月波秋舫為僧移而今此樂同誰說只有鄉人馬逺知宜秋軒對月并序余自罹患奔走南北佳景良辰往往愧負及來杜曲時豐景幽秋氣既中月色倍常自十四至十七與杜氏兄弟舉酒邀月夜分乃休感佳節之難逢而良㑹之易失也夜賦一詩以示諸杜留以為故事云洪武辛亥寓句容仙家玉斧斫猶偏天上瓊樓看𣣔全未滿固當勝既滿已圓終不似將圓今宵對影人先醉明日成珠蚌有緣惆悵吳宫與唐殿冷風魚鑰夜如年右十四夜龍宫浮出白蓮花海宇通明濕素霞琪樹有隂銀闕冷玉盤無缺絳河斜十分夜色𥘉開鏡多少離人正憶家但舉觥籌行百罰莫聽更鼓疊三撾右十五夜已覺來遲未捲簾漸經樓閣照東簷清光念爾隨秋减白髮憐余向曉添自對嫦娥歌宛宛誰教楊栁舞纎纎升州憶似鄜州看香霧雲鬟濕翠奩右十六夜坐久星繁影漸虧也應天轉玉輪欹葵丘伯主𥘉盟後天寶君王𣣔倦時繞樹鵲驚霜落早吹簫人恨夜眠遲不須戚戚悲圓缺長使清光灔酒巵右十七夜中秋約登茅峯不果寄羽士蔣玉壺仙人待月大茅峯樓閣髙寒近可通表裏山河俱皓白古今烏兔自西東一塵不住空明外萬象都懸倒影中𣣔便吹笙跨黃鶴人間或有雨兼風宿清元道館簡羽士巫山隱手閲靈文對羽流道心真境兩清幽雙松過影知將晚一雨生凉覺近秋丹井有靈泉似玉石碑無恙字如鈎𣣔求大藥調精魄却笑山人已白頭哭髙季迪舊知鸚鵡才髙竟殞身思君别我愈傷神每憐四海無知己頓覺中年少故人祀托友生香稻糈魂歸丘隴杜䳌春文章穹壤成何用哽咽東風淚滿巾右寓句曲作豫章早春茸茸草色變枯荄􅉡􅉡寒梅落徑苔山頂雪惟朝北在水邉風已自東來不須銀管催鶯出便好珠簾為燕開見說嶺南春更早桃花流水勝天台登洪都城憶滕王閣故基豫章城郭楚江濆帝子笙歌逈不聞十載以前猶有閣三王之後豈無文春風南浦青青草暮雨西山淡淡雲若對畫圖悲蛺蝶落霞孤鶩正思君浦口逢春憶禁苑舊遊春氷消盡草生齊細雨香融紫陌泥花裏小樓雙燕入栁邉深巷一鶯啼坐臨南浦彈流水步逐東風唱大堤還憶當年看花伴錦衣􅍡馬玉門西過豐城雲樹參差接逺汀隔沙誰識是豐城芙蓉不禁行人採薜荔多依古樹生寒店雞聲烟寺逺滄江鴻影暮川晴𣣔將三弄桓伊笛吹向船頭喚月明夜泊臨江城下江清月白悵然有懷萬里清江急有聲一篷愁影對寒檠當時鸚鵡杯中酒何處龍香火底笙斗轉東南知夜半月臨子午應潮生不多鏡裏青青髮又向今宵白幾莖省垣對雨有懷方員外老去惟耽是詠詩擬將詩癖待君醫何愁不到王摩詰自恨無過杜牧之城外緑隂聮騎日省中春雨聽鶯時歸來莫待秋風後荷葉荷花正滿池煮得新醅灔灔紅省垣誰與晚樽同人當暫别情偏惡詩到無聊語更工江浦荷花雙鷺雨驛亭楊桞一蟬風論文若到虞楊地應對清江憶范公江郭對雨鵓鳩催雨一雙啼江郭崇髙竹樹低嫩葉暗將枯葉換新梢爭與舊梢齊席因留客長虛左簾為看山盡捲西自笑為郎今白首也曾通籍向金閨寄牛理問斗南每笑楊朱吝一毫恥將刀筆事蕭曺鯨鯢未覺滄溟濶鷹隼寧知華嶽髙白璧一雙酬劇孟黃金百鎰鑄山濤小窗新種娟娟竹深映春風紫蒂桃懷班大參景通一榻凝香省署西短屏深掩樹隂低笑談每為相知發詩句惟應送别題不以學從當世曲直將名與古人齊别來幾日偏相憶風雨江村半夜雞懷萬郎中伯玉憶曾簮筆侍金鑾華髮驚看照鶡冠倩可承家如有子俸能供祭勝無官杯緣量减常先醉帶為愁多覺屢寬應念故園秋色裏露珠香滿菊花團寄劉儀部子髙開遍芙蓉雨滿津西風又冷楚江蘋眼前簮紱流如水天上羲和釀得春黃葉亂蟬南浦樹紫髯一騎上京塵此時詩興誰能識還憶山隂賀季真懷王節推彥文烏帽輕籠雪滿簮古苔怪木訟堂深官清猶有長憂色年老惟存不競心與吏議刑秋寂寂教兒讀律夜沉沉酒䦨可解時相憶月落霜飛鵲繞林立秋日懷方員外幾日西清晝掩屏緑塵幽蘚遍間廰病中事少翻嫌健醉裏愁多只碩醒悮響閣鈴飛夜鵲偶攤書卷落秋螢萍蹤已辦東南别風雨長更各自聽次前韻遣興已覺新凉入畫屏江聲樹影在西廰人情近午猶思浴客夢驚秋却易醒月淡渚蓮香掩鷺雨深池草濕栖螢從今不恨無情緒茅屋西風細細聽冬夜宿江右省垣懷劉子髙司業曖曖微宵耿玉繩澄澄夜色麗觚􅏢月明鳷鵲千枝雪霜冷枇杷一樹氷魚鑰戒嚴森畫㦸鳯團銷醉擁青綾瀛洲盡是群仙府鶴背應須得共登七月三十日祖母𥘉度時年八十九白髮青瞳夀者身每逢佳節話咸淳百年未盡四千日來歲還周九十春遷客無家空望拜孤臣有表竟誰陳今朝風雨茆茨底應對兒孫說逺人思親一割鴻溝消息稀隻身湖海尚流離乾坤何事有今日父子可憐逢此時悵望只添新涕淚艱難應變舊鬚眉愁心恨不隨春雪飛上吳山椿樹枝將歸金陵留别省垣諸友吳山歷歷向東遙望盡寒雲意未消多難定煩慈母憶畸魂時賴故人招曉霜猶凍枇杷樹春雨還生杜若苗歸去不愁江水濶野鷗群裏木蘭橈右仕江西作望夫石在采石東山上古荔荒苔緑滿身至今翹首望歸人玉容已化峯頭石戰骨應為塞上塵風雨不銷千載恨鶯花又度一畨春誰將湘女斕斒竹種向東風似有因登娥眉亭在牛渚山娥眉亭上看秋山低蹙輕顰淺淡間雨過微雲添一抹晚來新月鬪雙彎不愁啇女行相妬長恨離人去未還我亦峨眉山下客偶因西眺憶鄉關句及之折先生祖蜀中故末謁小姑廟月帔星冠敞翠屏白腮紅頰兩眉青魚鱗小殿波紋滑龍尾長旗雨氣腥巫女沉牛歌宛轉彭郎回馬拜娉婷蘭舟願祝東風便一夜夷猶過洞庭大姑山廟遇老衲年七十餘云是東林寺僧時廟厄回祿方謀建興有作白髮星星照赤髭春風邂逅水仙祠我非當世陶彭澤渠是前生逺法師結習已空終不染塵根俱盡竟何思猶將大乘神通力笑寄須彌向一枝鄱陽湖喜晴鄱陽湖裏看春晴山色波光蕩漾明短髮已羞芳草緑間身應羡一漚輕風來桞上偏無力雲到松梢更有情却羡蘇堤舊遊路碧桃千樹響流鶯舟泊潯陽懷申屠衡江烟漠漠草毿毿且泊蘭舟近水南一鷺暝投槎外石雙鴻低拂樹邉嵐夢隨春雨歸華屋愁逐東風上短簮桞色漸深人漸逺幾時花裏共停驂晚泊湓浦逢冷節小雨籠隂護晚霞桞邉停棹聽啼鴉湖光已緑皆春草風信猶寒是杏花到處青鞋隨蛺蝶誰家紅䄂泣琵琶匆匆客裏逢佳節那得行人鬢不華過黃州當年逐兔跨神州此地群雄首建謀亂後江山猶故物春來花草亦新愁歸人拜塜營茅宇過客停舟問竹樓惆悵臨皋驛邉桞淡籠烟雨白沙鷗武昌夜泊懷古鄂渚柔莎夜雨餘漢陽雲樹暮烟𥘉休誇健筆題鸚鵡終悔空緘託鯉魚遺臭功名成底用涴人塵土欲何如㴞㴞黃鶴樓前水日夜東流恨未除祢衡殷浩桓溫庾亮吕仙祠祠在黃鶴樓東江山形勢非神仙不足居此風清月白之夜時聞鐵笛之聲兩點方瞳漆有光紫髯眉緑面如霜千年一笑來黃鶴三度長吟到嶽陽日月自隨天地老江山不為古今忙又携鐡笛瑶池去亂插桃花醉一場過洞庭雨後春江似潑醅洞庭猶更緑于苔碧湘樓閣千花繞紫府旌旗十殿開春色不隨流水去暮雲長帶客愁來間身也是滄浪客鷗鷺匆匆莫浪猜過洞庭龍君廟隂隂紫殿肅神都地位清嚴鎮五湖水府奏工題玉檢淵泉錫爵送珠符雨分赤鯶衝波出風遣青鼉踏浪呼時有蠻啇獻𫀆笏廟前拋肉飼神烏嶽陽回仙有題夢覺邯鄲月未西碧紗斜插杏花枝丹霞淺淡微生頰白酒甘甜不上眉戲畫榴皮成鶴舞笑揮銅劒作龍騎夜來小宴瑶池上嬴得麻姑一著棋夢覺囊衣單薄籍無氊天氣將寒每自憐歲月無情人老大風塵如此路三千片時兒女燈前笑多在關河夢裏船那得全家江浦上短蓑微雨卧秋烟舟中聞鄰船吳歌有懷幼文來儀輕帆短楫泝烟波疊渚回舟奈逺何一路詩從愁裡得二分春向客中過江通漢水晴偏緑山入湘雲晚更多何處思君腸𣣔斷楚妃祠下聽吳歌途次感秋嫋嫋西風吹逝波冥冥灝氣逼星河宣王石鼓青苔澀武帝金盤白露多八陳雲開屯虎豹三江潮落見黿鼉沅湘一帶皆秋草𣣔采芙蓉奈晚何渡漢江九天灝氣肅髙秋萬里銀河入海流西楚人才多用晋中原豪傑暫依劉久無翠羽供王貢時有􅊮弓賜列侯自惜飄飄雙短鬢也隨江漢一輕鷗經潭州哭李太守黼字子威死節元忠臣折潭州即今長沙府太守名丁卯科中第一人誓將孤壁障妖塵百年事業歸儒者萬里江山泣老臣肝膽當時紹余闕英靈此日配張巡我來竟就船頭拜一盞寒泉薦緑蘋三湘曾向三湘望五溪水源汨汨盡流西狂思醉裏千鍾少老覺人間萬事低移艇出江當月上煮茶消睡恰鶯啼近來詩句慵思索逢著青山輒謾題過黃陵廟萬里蒼梧接桂林九疑雲氣隔湘隂東風又灑斕斒淚明月長懸悵望心雨裏鷓鴣春色晚廟前莎草落花深荒碑獨有元和刻苔色蝸涎已半侵江邉尋花值雨獨自尋花傍水濵霏霏小雨浥輕塵正憐啼鳥能留客却笑東風也妬人桞色半昏先近晚梨花漸濕更多春湘娥應解知人意兩點修眉結翠顰興安道中青山一半入青雲碧澗千回轉夕曛松碣看來多漢刻竹祠隨處是湘君路經猺洞諸峯直泉入灕江兩派分莫據孤鞍聽蜀魄野棠踈雨又紛紛二月晦日來陽江口寄書自笑無家類轉蓬年光何事更匆匆數聲鶯響千山裏一樹花開萬竹中夜入瀟湘偏厭雨春來杜若自冝風兒童别久應驚問華髮飄蕭似老翁祁陽道中見海棠桂陽江口望祁陽疊疊烟雲入渺茫髙樹緑隂千嶂濕野棠踈雨一籬香縱無春在猶回首况有䳌啼合斷腸惆悵東湖堤上桞暖風輕絮正悠揚衡陽有懷寒郭沿洄楚水隂鶯花寂寂雨沉沉江山不盡登臨意節序偏驚老大心客裏茶烟長自冷衡陽桞色為誰深峯前亦有回歸鴈不肯隨人到桂林鳴鳩日日喚春隂坐挹爐熏萬慮沉對雨只添鄉國恨看花無復少年心烟皆榆桞青猶淺水是瀟湘緑更深不道沙邉有城郭短籬茆宇映踈林客中寒食有感客舍蕭條百五天衡陽城下桞隂船梨花又濕𥘉晴雨草色仍含已禁烟車馬看花悲昔夢綺羅傳燭待明年三吳八桂東西路萬里空山哭杜䳌减衣時莭尚寒天暫倚東風泊畫船十里樓臺仍細雨五侯池館又新烟且簮楊桞酬佳節莫對桃花憶去年總是無情也腸斷鷓鴣聲裏又啼䳌桂林與蔣張二指揮觀兵大字青旗寫豹韜連環金鎖束征𫀆千艘夜泊烟江闊萬竈晨炊瘴嶺髙燕頷將軍髯似㦸鵠形俘虜面如刀自慙不得同髙適走馬西河看屬櫜桂林即興二首曾見重華巡狩來灕江廟宇野棠開山無檜柏皆岩穴地有芝苓盡藥材花布短衣齊膝製竹皮長帽覆眉裁也應風土交州近丹荔紅椒不用栽江為池塹石為城南去蒼梧兩日程碧殿尚存虞帝像青山不廢伏波名蘭根出土長斜掛榕樹成門却倒生時有苗人與猺女負薪輸布事科征右作折以上奉使湖南廣聞江聲有感歲事匆匆兩鬢星坐看簷影下虛屏寒梅向暖啇量白舊草迎春斷續青夢以俗牽終夜惡酒因愁散片時醒秦山密雪巴山雨不似江聲不耐聽晚發瓜洲江花江草望中稀相趂畸人萬里歸鷗逐晚潮爭北上鴈隨春雨向南飛船頭野老新巾幘馬上王孫小帶圍嗟我逺來頭總白洛陽塵土滿征衣宿楊州南門春風曾在此停舟白髮重來又杪秋何事瓊花猶古物當時玉樹總新愁孤城小驛連荆𣏌野水荒墳見髑髏夜靜有人船上哭可應鄉井是楊州舟次邵白有懷徐幼文文章小技耻雕蟲也逐群才赴洛中多病不宜秋色裏相思只在暮江東雞豚籬落茅茨雨鳬鴨陂塘􅔽蓞風𣣔買一樽澆寂寞傷心不與故人同過髙郵即景蒼烟斜日照孤城嗟我情多却倦登田豕白蹄髙似鹿野蚊花股大于蠅人家結屋多蘆葦官府輸租半藕菱莫向西風詢往事旅懷蕭索豈堪勝淮安新河候船城郭逶迤曲繞河塵沙滿眼北風多行人淚落山陽笛逐客魂銷郢水歌江總歸陳嗟老矣淮隂在楚奈貧何明朝又鼓征西棹帆影翩翩逐逝波至龜山有題在盱眙魚鱉撝訶激怒瀧腥風沫雨濕篷窗寶珠佛像山王護鐡鎖神工水母降石勢參天龜出洛潭光照夜蜃浮江我行未暇求陳迹且醉船頭濁酒缸夜宿開封郡齊贈林通判輝輝燈影照更闌巵酒憐君為解顔鏡裏風塵雙白鬢夢中烟雨萬青山逢迎意懶長思靜撫字才踈𣣔乞閒母德君恩俱未報不勝悲感淚潺湲懷汝寧許知府能以寬閒繼古風府中無事不從容諸生秋試多髙選八縣春耕少惰農富貴何須皆汗馬文章正𣣔去雕蟲同庚况有聮曺誼風雨相思意萬重太原春日郊行屐齒車輪更馬蹄緑莎隨處踏成蹊無人為惜間花落有暇來聽好鳥啼步屧愛沿流水曲開懷𣣔與衆山齊詩成誰復吹簫和却向藤蘿石上題清明懷故園縷縷輕烟細細風秋千池館萬家同髙低草色相參緑深淺桃花各自紅人意盡隨流水去風光都在笑聲中多情白髮并州客坐對西南雪滿峯春日山西寄王允原知司并州春半無花可賞追憶舊逰情動于中因賦長句五首公退之暇詠而味之庶幾春色之在目也允原知司善詠詩者就録以贈至今藏于家折是詩先生親筆知司曾孫十里烟光濕翠苕二分春色到花朝無人快擊華奴鼓有伴同吹弄玉簫遍地錦圍歌處席滿身珠壓舞時腰莫嗔老子踈狂甚曾醉楊州草四槗藥苗𥘉茁水生葒老麝收香鹿飬茸二月春光才霽雪一畨花信又顛風參差鸚鵡全身白淺淡棠梨半面紅正是江南寒食近滿簾飛絮雨濛濛畫船搖槳蕩晴波步障圍風踏軟莎簫鼓隊衝黃鳥散綺羅人比白鷗多不知酒與愁成敵長恨花為病作魔回首六橋青草遍水光山色近如何花時無處不黃鸝偏到垂楊著意啼人立晚風携便面馬臨春水惜障泥踏歌趂拍催腔急旋舞回身應節齊遙想故山行樂地紫苔侵遍十年題一莖白髮已堪嗟况是東風兩鬢華醉裏誤將裙作草老來羞以帽簮花踈狂不識眉雙結敏捷曾經手八義閒喜日長公館靜自分新火試新茶寄舊契張來儀秦山萬點接烟霞東出關門鬢已華無奈異鄉仍哭子可能孤館不思家貧逢北客長賖酒飲比南人只喜茶我住東林數間屋每同談坐到栖鴉懷宋大參公黻西山暮雨對秋屏曾共㗸杯話北征五月雪花猶亂落一春沙草未全生曉因諜使窺邉略夜問降王為虜情東閣晝長香篆小盡翻圖畫憶經行寄陳𬋩勾則威全晋封疆寄太行西來絳水入平陽千山草樹唯無竹七月衣裘已有霜俗喜背牛兼帶犢人能擒虎類驅羊憐君詩思清無敵細覔寒梅認色香南山西作折右仕途中并在河無題和唐李義山啇隱嘗讀李義山無題詩愛其音調清婉雖極其穠麗然皆託于臣不忘君之意而深惜乎才之不遇也客窗風雨讀而悲之為和五章一瓣芙蕖是綵舟棹歌離思兩夷猶風鬟霧鬢遙相憶月户雲窗許暫留波冷緑塵羅襪曉恨添紅葉翠顰秋雙鵉鏡裏瑶臺雪任是無情也上頭才向瑶臺覔舊踪曙鴉啼斷景陽鐘薄施朱粉粧偏媚倒插花枝態更濃立近晚風迷蛺蝶坐臨秋水亂芙蓉多情莫恨蓬山逺只隔珠簾抵萬重細骨輕軀不耐風春來簾幕怕朝東人間玉宇三山隔天上銀河一水通眉暈淺顰橫曉緑臉銷殘纈膩春紅氷絃莫奏清啇曲滿地霜華泣翠蓬夜合花邉待月來宫中轣轆響春雷笙調恨譜參差度錦織愁紋宛轉回樓上緑珠知報主座中紅拂解憐才傷心兩炬緋羅燭吹作銀荷葉下灰為雨為雲事兩難蕙心蘭質易摧殘筝移錦柱秋先斷漏滴銅壺夜不乾羅幕有香鶯夢暖綺窗無月鴈聲寒芙蓉一樹金塘外只有芳卿獨自看附沈通理次韻無題五首德正統間詩人折通理居蘇之昆山宣蘭槳雙欹倚桂舟隔花臨水思夷猶香囊玉佩勞相贈繡幄銀屏惜共留愁繞鳯臺秦樹暝夢回巫峽椘雲秋多才苦被春情惱鏡裏潘郎雪滿頭行雨行雲少定踪夢回時莭怕聞鍾竹枝寄恨心偏懶桃葉題情意轉濃香冷繡鞍間騕裊燭殘金障掩芙蓉紅樓緑水無多逺如隔江山幾萬重纎纎斜日弄微風腸斷仙山碧海東鸞鏡有塵空自掩鴈書無路若為通愁橫柳葉眉顰翠泪濕桃花臉暈紅盡道芳年易憔悴莫教青鬢作秋蓬油壁香車幾度來赤闌橋畔起驚雷夢隨暮雨陽臺去愁踏春波洛浦回青鳥㗸書通密意綵鸞留詠惜竒才芳心一寸如紅燭總遣燒殘未作灰瑣窗珠户别離難蘭蕙柔姿惜易殘曲斷瑶筝銀甲冷書留錦字墨花乾羅衾積夢驚春晚寶鴨銷香覺夜寒檻外碧桃花自好一年芳景共誰看眉菴集卷第九
