body:
  text: 眉菴集後志眉菴楊先生孟載吾蘇之吳邑人家天平山南赤山之下自幼敏悟絶人日記數千言弱冠工文詞議論古昔亦數萬言謂之論鑒嘗挈以試儀曺值元季兵興弗果就職當時文章大家若饒參政介之周左丞伯溫見皆竒之會稽楊廉夫以詩伯一時少所推可僑雲間往來吳下以所號鐵笛謂先生能歌之乎先生曰不惟為作鐵笛歌尤且切效老鐵體翌日成以似廉夫不覺自失曰吾意詩徑已蕪今復得子老鐵當退步讓爾出一頭地也遂偕之東逰呼所從者曰吾在吳又得一鐵來矣若等就之學優于老鐵學也交與成忘年故當時有老楊少楊之稱云避兵圍城中日與才友髙季迪王止仲張來儀徐幼文輩相倡和以自適逮我聖祖肇基之初即受薦任河南榮陽令尋謫鍾離間居秣陵江濱久之又用薦為江西省幕賓以纍復落職處句曲山中又起奉使湖南廣右既而擢山西按察副使升按察使而卒此履歷聞諸故老驗諸詩所載特其大槩緣當時無有筆其行實者故莫克致詳然先生平日之詩甚富皆率意為之略不存稿嘗見先生自序一袟云因吾友方君不得見豫全集為恨故留此以示之爾則是先生盛年稿已散失今流傳人間者十無二三况皆抄本又無序志家異而人殊後至天順間郡人鄭教授嘗為刋行間多訛謬矧諸竒作失載識者病焉習在髫齡即愛誦先生之詩遍假抄録覬圖彌盈及長而仕偕以出入有年猶每隨訪隨録卒莫致其全兹官嶺表念齒已邁爰命庠生顔恭文起會各本録就請前翰林學士西蜀江君序諸首重圖鍥梓以傳噫文章在穹壤間譬之精金美玉不求乎人而人自即之無有久暫而異所好然好金玉之寶者衆人之常情而文章雅淡非有景賢好古之心莫克以致其所好之篤也習為鄉之晚生敬慕前哲之言自幼抵老不忍泯泯是固庸陋無文不能表章乎幽潛則區區素願詎不由之而少慰哉若夫先生學力之充才氣之雄以致詩之清豪自成一家言者覽是集當自得之茲不瀆成化乙已秋桂月朏同邑後學張習志弘治丁巳五月鄉違張企翶先生餽書余藏明𥘉人集髙楊張徐四家獨闕眉菴一種向書估泛太倉收耒者非企翶所梓故不不取今香嚴周文慨然以此册贈余可云四美具矣始淂徐集于顧八愚家次得張集于顧聽玉家次得缶鴻集于書肆兹又得此合四集于一處其收羅不煞費苦心耶後後瀆此口家詩者勿謂原刻刻昌淂也嘉慶己未冬十日王日識于紅椒山館丕烈
