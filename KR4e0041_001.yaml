front:
  text: 眉菴集卷之一
  hash: sha256:c26135ac0928152e4a84e7df5ad45bfbfe5e5a72857af88d925a112eb169aad6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_001-1a}
body:
  text: 五言古體姑蘇楊基孟載著感懷十四首璞玉宜深藏白雪乃寡和和寡非所悲衒玉徒取禍柰何刖足者抱璞不知過進非烈士忠退耻愚夫懦傭舂匪利直販鬻欲自涴山中一尺雪且復掩扉卧清霜凋百草亦令脆者堅士不遇患難智慮何由全玄徳髀肉生重耳十九年一為三國雄一稱五伯賢苟不辨菽麥何足攬大權至今巴蜀人歎息後主禪鄧禹南陽来仗䇿歸光武孔明卧隆中不即事先主英雄各有見何必問出䖏孫曹與更始未可同日語向非昭烈賢三顧猶未許君子當識時守身如䖏女蝮蛇冬未蟄䕷草寒更生陽光泄為電地雷忽有聲上天號令乖致此灾異并不然多殺傷兵氣之所成漢廷凂三公毋乃非政刑願言調玉燭仰見三階平三人乃成虎衆口能爍金流言雖不多足移君子心人心本無疑理與勢所侵柰何形似間構結已駸駸入耳即契合不待間者深陳平雖云智羽有隙可尋髙祖誠豁逹卒亦誅淮隂營營青蠅詩示古猶示今位卑諌勿直直諌君心疑交淺言勿深深言友誼虧諤諤衆所惡况復違逆之豈不利扵行吐蘖而含飴朝登千仞崗振我身上衣丈夫貴自㓗毋論他人非一女不得織三人歎無衣一夫不暇畊八口皆啼飢飢寒迫扵身誰能不為非西伯善養老仁人為己歸霜寒草木落禽鳥相背飛民心亦何求在扵得所依此理勿暫失君子慎其微鵲巢知避嵗終為鳩所居巧者勞不足拙者安有餘溪翁夜結網山人朝煑魚隆凖入關中不讀半卷書當時㣲張韓乃與勝廣俱大拙乃至巧巧者復何如驊騮日千里亦在御者功向無造父能乃與凡馬同韓彭覂駕材驅䇿遇沛公増本渥洼兒意不與項通豈獨知馬難所貴御馬工駕御苟失冝鮮不敗乃翁蕭蕭帳下騅千駟何足雄鞲鷹歛六翮栖息如鷦鷯秋風颯然至聳目思􅓸霄英雄在承平白首為漁樵匪無搏擊能不與狐兎遭長星亘東南壮士拭寳刀落落丈夫志悠悠児女曺善閗湏扼吭善戦湏摶膺楚不都關中卒為漢所傾洛陽非用武况乃居彭城曺公失荆州致使吳蜀争五馬渡江南神孫終莫平元師破襄陽宋社忽已更制勝在得勢勿云險可輕劍可敵一人書足記姓名學之十二年書劍兩不成歸来吳楚間豪傑已起兵攬鏡照鬚眉一二白髪生老母在高堂未敢即逺行太息長在夜鷄鳴星斗横浮雲從何来本是山川氣寸隂不終朝一雨浩無際江河㑹交流草木奮妍麗但知潤澤功不識真宰意天風吹玄隂白日照厚地理亂自有常千載可坐致東隣夜従軍西隣曉上官一為死别愁一為知己歡歡者承新恩拂拭頭上冠愁者囑妻孥結束跨下鞍悲歡何不同一危復一安黄塵障東華平地生波瀾朝榮夕賜死轉盻異暑寒寄語承恩人莫歎從軍難漢傑士楚范增附淮隂天下士本是飢寒人朝為女子憐暮為惡少嗔身無兼人勇屈辱楚水濱一朝拜大將為漢伊吕臣王齊及王楚𥘉假後即真男兒猶龍蛇窮逹乃屈伸如何百世下獨有黔婁貧蕭何刀筆吏碌碌起沛中𥘉無一矢勞胡乃第一功發縦及指示帝論亦未公信亡追及之此為萬世雄漢卒頼信力亡楚定四封曺叅彼何人而欲與之同子房本韓臣志欲報韓仇亡秦與蹶楚𥘉不為漢謀功成不貪賞而乃願封留冨貴非𥘉心竟從赤松遊寥寥千載下斯人誰與儔范増亦人傑不去羽不亡漢非赤帝靈增固不可當紛紛與楚争可畏惟漢王危哉鴻門㑹㧞劍舞項荘示玦羽不决致令漢道昌成敗非失䇿天命固有常禮樂治化本百年然後興柰何叔孫通綿蕞為可行布衣起山東五載帝業成瘡痍有未起詎可謂治平當時定朝儀事正擊柱争遂令後賢王禮樂終不明漢道止扵斯俗儒良可輕陳平素無行終為漢相國隂謀固可鄙竒計凡六出後来諸吕難卒頼陸賈力豈縁冨且貴臨事意反詘智者猶若斯請為愚者說秋懷曉城露氣白旭日猶蒼莽千林木葉墜逈覺川原廣村虚雞唱獨江静鷗飛兩瞻眺豈不佳遲莫良可愴菱歌發清詞助以蒹葭響斯意竟誰同忘悲却怡賞日沒霧靄曛㣲茫見群山茅屋四五家時有芻牧還豈惟寵辱忘亦喜思慮閒嗟嗟當世事戚戚念時艱秋夜言懐四首鮮鮮籬邊菊摵摵庭下蕙蕙氣日已銷黄花自妍麗復恐清啇激幽芳亦凋瘁褰衣步廣除露白月在地鵲飛林影空蟲語墻隂細昔賢悲絲染徃聖嘆川逝少壮不我留臨風發長喟雅志諒難酬蹉跎老将至西齋近寒涇枯葦接深篠秋風颯然至索索鳴不了抛書坐孤榻眼澁鐙暈繞窓破斜隙明漏㫁餘更悄平生所欣遇此夕紛内擾假寐入㝠思南枝有歸鳥夜坐復不樂起行亦無悰徘徊二者間百憂結心胸嵗事忽已遷復共䘮亂逢一身愧無𥙷况乃禄萬鍾月林鵲翻翻風江鴈嗈嗈栖止苟有託遲莫還相從高梧䕃崇岡衰草被廣陌風微夕露凉星淡秋河白芳辰兼物謝孤抱縁愁積佳人在何許悵望江浦隔昨㑹月初弦徘徊又生魄送謝雪坡防禦出郭團練朝催築城夫暮㸃團結兵民民皆動揺一日十數驚所頼官長賢撫勞得衆情防禦出郊来父老拜且迎垂髫及戴白羅列車下聴官家百萬師自足與㓂争汝自守汝鄊汝自保汝生閒暇苟不虞倉卒恐見傾我當徼汝勞薄爾賦税征父老共感激闐然動歡聲旌旗洎甲矛五色稍鮮明豈惟俻抄掠大敵固可嬰問君何能然子弟衞父兄平川雨初收馬嘶皷鼟鼟相送不同徃極目秋鷹横送將作僉院丁季周奉使兩廣還朝國家厄中運四海揚風塵蚩蚩弄兒兵皆我耕桑民或為官府迫漁獵無富貧奮然掉臂起一呼聚頑嚚始有可招徠乆之竟沉淪勢結不易觧遂同胡與秦皇明邈九重此恨弗得伸雖居蠻夷中豈不念帝宸丁侯京師来逺使廣海濱舟師逆蛟鼉陸足披荆榛所至敷恩威一一為具陳上述天子聖下言将相賢叶欵欵漸輸誠仄仄咸来賔直氣既侃侃婉辭復諄諄邊氓及夷戎感激争自新酋長獻印璽老弱投棘薪幡然悉攺圖喜極涕沾巾安知萬里外復得仰化醇旌槎駕囬風星斗羅高旻西風吹征衣相見吴城闉呼酒慰逺别烹鱸煑青蓴念兹歸意切又問銀河津嵯峨蓬莱宫雲霧欝輪囷至尊開天顔前席顧問頻賜以錦繡叚翠織雙麒麟追趨鶴禁曉錫燕龍樓春賞功固成典况復能咨詢丈夫志四方䇿勲貴及辰嗟我獨匏繫戚戚罹蹇屯壮心殊未巳矯首潜酸辛送陳資深歸廣丈夫輕别離投老欲入廣柰何干戈際萬里渉沆漭兹城頗阜庶有女供奉飬世亂得粗安胡勞問郷䣊君言苦無家一夕魂九徃郷書昨日至捧讀屡泚顙四喪寄淺土未得掩諸壙雖云弊廬在誰復脩祀享感兹歸意迫無力猶勉強齒髮固已衰尚足嬰擾攘敢忘郷土情偷安戀兹壌吾聞重感激惜别復加賞天寒霜露繁摵摵枯葉響水宿慎蛟螭山行避魍魎田園雖荒蕪果實羅栗橡鄰居喜均還相邀具醅盎酒薄不得醉且復歌慨慷人生還郷樂無物堪比彷喜極繼以悲歡戚同反掌畨思蘇䑓月照女夜績紡此時父子情兩地同惚怳安得混車書妻孥共羅幌兹事竟難期涙眼一悽愴我家嘉陵江蹤跡乆飄蕩亦欲問前途逡巡覔西瀼贈跛奚楊鐡笛奴也人咲跛奚蹩我愛跛奚跛蚿雖百跂速䕫亦一足可履平疑屐齾厯險若箕簸立如鷺聮拳行類鱉形欹裙長前肩脅鞲短左非斮渉寒脛豈刖獻玉踝附婁濟水厄哂却搆兵禍疢同哀駘佗怒及趙女婐觸屏屡思倚守戸每得坐戒奚勿躁歩世路方坎坷登靈岩和韻周左丞伯温饒大叅介之单艫集群英席窄坐每盍烟横半掩寺木落全見塔斜流出渠分曲徑轉溪合村粧妍醜並埜話悲咲雜童操吳音聞僧作𣑽偈荅霜苔滑難躋露棘朽易拉磴紆螘縁樹扉敞蝸啓闔娱賔列五豆禮佛過三帀晴崖暝憂雨秋洞寒疑臈窓攀盗果猿􅉉入避鸇鴿掬池萍沾䄂憇石蘚汚衲琴忘荒臺弄屧響囬廊踏值險慮思笻得竒即傾榼感深怒湏磔愁極衰鬂颯華年倐川駛雅量浩海納嘯歌激欷歔雄辯肆交沓禪寂虚無量道祖清静蓋吅囂蝸觸蠻變幻雀化蛤狂逰類飲酎薄䆠避嚼䗶終當謝塵鞅掃屋分坐榻贈别龔行義椘襲風雲姿璞素玉不瑑隻身躡雙屐十載食破研麻衣閱冬春睥睨狐貉賤胸中何所蓄經史子集傳酒酣文思湧強弩機發箭清貞謝鈆鉓越女巧咲倩紆盤珠九曲精粹金百鍊粲如星森羅勇若軍後殿吾黨多英雄氣索皮肉戰西風忽歸来塵土吹滿面従容問所歴揺首不復辯但云秋水清呉松净如練方同華表鶴遽作幕上燕去住何太輕弗得絆以線君材匪樗櫟名字己交薦淵泉暫蠖屈霧雨終豹變賢逹坎坷多豪傑窮乏先嗟予書中蠧髀消兩目眩朝騎瘦馬出夕飽藜與莧志慙㸃爾狂質匪由也諺猥遭周秦厄不識舜禹禪因君動遐想翅塌足若罥螺巵白甆罌聊為江渚餞囬首芙蓉花紛紛落紅片贈張主簿有田乃有租有身乃有庸不憂徴需煩但願賦役公東家倉廩實西隣機杼空門戸非不齊貧富有不同縣官皆賢豪豈不念困窮但為嫌疑迫上下相蔽蒙坐㸔頒白民展轉溝壑中嗟嗟華亭簿彷彿古人風與陳時敏别近别㑹有期逺别易慘悽一人失意行衆賔顔色低相顧各無語握手立大堤白沙飛輕烟赤草漫路蹊竈户八九家皮肉瘦且黧再拜謁官長鵠立無所齎孤㕔如荒郵壁落新𥙷泥日沒官吏散角角埜雉啼歸来對寒燈兒女相孩提雖云去郷國喜不聞鼔鼙官卑軄易稱牛刀用割雞囬首華亭鶴月白露凄凄送王國忠之邵武推官新霜落江楓蘋葉爛如染感秋方惻惻送别復冉冉一官萬里外舟楫破天險人皆亂離戚君獨咲而慊虹光拂孤劍酒色暈雙臉平生峥嶸志弗以微物掩經綸二三䇿騫諤謝諛謟天子固未遑屢讀首屢㸃七閩暖無雪臘月草木蔪花濃霧迷驛榕暗日在崦斯時到官舎鞠按手自檢雖無老母咲反獲在不忝顧予坐書癖譬若秋後簟低囬鶴俛啄嚅囁魚上噞未䏻東浮越况方西渡陜文慙英俊逼鬂覺衰颯漸交游暫雲合乖散倐電閃憮然成短歌持贈非琬琰雨中効韋體寄季迪止仲道衍仲温屢覿歡未終乍違離緒繞冥冥郷國隂獨坐空齋曉䳌啼春樹宻花落流鶯少不有郢中吟何由寫懷抱乆静厭紛俗齋居自玄䖏遥知乆黙暇共此蕭蕭雨屢驚芳節換暫覺清音阻欲扣竹間扉棋聲隔春渚樷林翳重岡迢逓僧居獨慿軒一悵望春雨蘼蕪緑泉香花落磵窓暝松圍屋憶爾諷經餘袈裟坐深竹别君俄兼旬芳景已云暮南風吹新緑欲暗庭前樹騶鳴孤驛曉鴉散春城曙盻此慰離憂新知忽成故西齋聞晚鶯南風池舘静深樹埜鶯啼𥘉鳴喜新聴再囀復含悽念爾来城市山林定皷鼙初夏過寕真道院偶来高樹下獨坐青苔石澗雨落餘霏衣裳淡生碧道因微物悟理向玄言析習静自無營何妨䖏囂寂賦得净瓶送衍上人虚瓶湛靈泉行住一鉢友紅簮天女花碧挿大士桞中圓􅉼真空外㓗照萬有自盛甘露漿不貯聲聞酒衍師時出㝎提挈每在手詞鋒當建瓴禪寂冝守口賦得山逐放舟遲送王主簿舟行山亦移山盡舟亦住青山無故人行人自来去𥘉辭逶迤谷復接參差樹柁轉暮色分㠶駛秋嵐度俄停風暫弱旣逺烟重護别意即山情依君屢回顧賦舎利塔送僧八萬四千塔巋然天地中靈光忽上下浩刼未終窮法象諸天護真身五藴空堅明元不壊生㓕豈無同暫住猶飛錫三匝禮秋風空齋天王寺比丘號也託友求詩為說偈曰上人坐空齋嵳峩兠率宫兠率乃佛土亦在虚無中兠率既無有空齋何所従豈獨空齋無四大亦本空萬有萬法幻如泡影電風随起即随㓕無聲色與踪以無起滅故即之了不逢真空本非空去住空色同試舉空齋偈為扣西来翁遊北寺竹林僧居古城隂迢逓通萬竹林光落虚牖坐愛衣裳緑齋餘孤磬逺茶罷㣲烟續道人悟重玄淡然無衆欲譬彼石根泉亭亭湛寒渌乆雨十日雨不止四􅉉如决堤今朝雨聲絶又聴斑鳩啼開門對西郊汨沒失路蹊徃