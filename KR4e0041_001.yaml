歸溪風揺白芷撩亂蘋花起疑是越兵來旌旗照秋水滄浪波入苑緑泱泱縠紋融暖光東風吹白浪照見赤龍堂龍堂負貝闕隂火春波熱鮫鮫賣髯綃夜夜唱明月綺川遊川水東北流川花照青樓龍船載鳯吹日来川上遊沙明属玉止苕香翡翠留漁郎蒲葉底網得雙吳鈎茂苑思輦路秋蓬滿野香團緑濕嬪娥粉黛愁嫣花鈆露泣鶯聲舊時好玉砌秋歸早東家胡蝶飛烟姿滿芳草白門荅髙二聘君以上元未在呉作戊申秋余謫大梁季迪嘗夢余與若平生明日道路傳余已死季迪有夢余詩己酉春正月余侍親東歸迪亦應召来京師相對驚喜因出所賦夣余之作余既感季迪之念而復疑猶夢也歌以荅之結交貴知已不在早與遲嗟我識子晚深淺惟子知每扵朋儕間擊節賞我辭前年吳城破子居我西馳交游非不多獨念與子離相去日已逺數與禍患罹道路傳我死可信子尚疑日暮過我廬為我涕交頥今年我還京適子應詔来叶握手發長嘆示我夢我詩我昔患難中精爽無不之而子獨夢我與子若有期方子夢我𥘉正我念子時春風鳥嚶嚶花發滿故枝為買一斗酒痛飲春江湄生死固常理勿為逹士嗤自題冝秋軒予去官結小軒自適軒近秦淮松菊竹樹之外無他花卉且清曠幽寂與秋相冝因號冝秋賦以詩我軒南山下緑水圍繞之四時非不佳獨與秋最冝秋風入我軒便覺景物竒紅樹照西崦黄花滿東籬夜深明月来蕩漾軒東池池光與月色上下相逶迤我時坐軒中濁酒聊自持微飲不及醉陶然詠陶詩人言秋可傷我覺秋可怡至㓗如屈平至清如伯夷愛彼潔與清竟忘揺落悲斯意獨領㑹但恐秋風知贈錢祐之祐之過余冝秋軒携武肅王家譜見示感慨古昔賦此為贈村居無来轍漸與人事屏軒窓頗冝秋爽氣接西嶺錢君曉過我跫然破幽静踉蹡田中来衣屨草露冷臨風岸烏巾上有雙蚱蜢示我族譜文厯厯星斗炳前王勲業在千載猶一頃諸孫尚醖藉整若弓在㯳嗟我昧淺深所得如捕影潭潭百尺甃汲以尋文綆况兹坐窮僻習懶不自省君来實起余如夢覺酒醒蠨蛸罥虚戸絡緯啼廢井何當照寒燈共此秋夜永淮隂祠朝登歌風䑓暮入淮隂祠祠荒屋瓦落古木聲差差當時握漢兵劉項相交持舉足有輕重不負高帝知區區假王封如何遽見疑良平一躡足帝心即轉移全齊七十城寔為䧟穽機後来雲夢遊此禍乃致之盧綰且稱王恥與絳灌随居常獨怏怏握手逢陳豨事起倉卒間不意咸誅夷吕后固不仁鄼侯亦忍為先王重報功無乃此道虧至今淮水南落日啼烏悲津頭問漂母一飯竟哀誰送叅政錢誠夫之淮安潮落大江渾烏啼曙色分公侯千萬騎送别隘人門威儀督府嚴禮秩節度尊兩淮甲胄士十年弓箭痕南陽與豐沛自古重承恩寄内婉素天寒思故衣家貧思良妻所以孟徳耀舉案與眉齊憶汝事我𥘉髙樓映深閨珠鈿照羅綺簮珮揺玉􅙈梳掠不待曉粧成聴鳴雞中吴惜喪亂廿口各東西有母不得将獨汝與提携我復竄逺方送我當路啼紛紛道上人無不為慘悽今年我還家赤手無所賫汝亦遇多難典賣罄珥笄朝炊粥一盂暮食塩與虀堂有九十姑時復羞豚蹄膏沐弗暇澤髮落瘦且黧别来復秋深露下百草凄破碎要𥙷綴甘㫖需醬醯安貧兼飬老此事汝素稽作詩逺相寄新月當窓低客舘秋思閒齋閟秋隂弱蕙風屢偃蕭蕭㣲凉至坐怯踈簾捲哀蟬聴漸急歸燕嗟已晚忽動故園思山川匪遥逺夣綵堂為俞士評賦楚客身未歸悠悠念庭闈濤江雖云廣莫阻魂夜飛秋隂天無星猿呌楓樹稀家門倐已到不失舊路㣲上高堂獻咲試舞衣焉知空明曙鐘動殘星輝難追夢中歡益發覺後欷安能附羽翼逺去仍相依贈許山人三首七十世所稀過此尤足喜山人腰脚健一日行百里身安子能飬飲食具甘㫖擾擾天壌間如翁能有幾讀書不湏多逹理斯為貴讀書不逹理不讀亦如異山人識字少時復見一二乃知學道人心静自可至我咲山中人猶未逹此理患害每過慮聞利輙先喜利害何足驚死生亦命耳但使心不欺造物聴所止送許山人歸長干別業我從長干来君向長干去春鴻與秋燕相逢不相聚當時三閣上緑鬢花如霧辱井不可尋纍纍種瓜芋君家烏衣巷正對朱雀橋烏衣去已乆斜陽樹蕭蕭紅薑嫩生芽𬗋芋肥長苖斯時一樽酒時赴東隣招朝耕硯一區暮耕筆一尺䟽食且不飽而况有囷積山人萬本韭冨與列侯敵治生不在多勤儉自有益舟中有感以上在京并閒居句容作水性日就下大江日東馳不知舟行逺但覺青山移我方念儔侣手反坐拄頥天風吹衣裳明月来相隨乗流非不住逝者乃如斯滔滔適意中忽然令人悲壮嵗難再得脩名安可期出臺復還洪都福至本無象禍来非有因方憂觸羅網遽喜辭妖塵念此蓬藋姿忽遘蹇與屯倉黄圜扉中日夕與死隣皇明眷私照寒谷囘陽春既免在滌牲復縦充庖鱗重沐飾冠裳濟溺立要津道路與我慶况我骨肉親歸来向妻孥秉燭語及晨猶疑是夣寐歡樂恐未真嗟余抑何艱坎壈多苦辛弱無勝力錐而欲舉萬鈞羸牛服塩車遥遥西入秦進逢九坂危退迫尺箠嗔敢惜筋力疲所慮車摧輪哀鳴徒嗷嗷仰訴空諄諄聴者無不憐誰復爲觧嚬終當脫覊鞅滄波浩難馴曉發石頭口石頭何斕斒左顧踞赤虎自非神功鑿那得此江滸玄精蓄隂霧秘迹曠萬古耽視洪都城百雉列飛堵我船候明發值此春夜雨方欣土膏潤可以藝稷黍年豊米糓賤何憂在覊旅掀篷望烟桞春水緑可醑終許着漁蓑撈蝦冨春渚送陳管勾之鄱陽朝與吳人辭暮送晋人别滔滔楚江水朝暮流不竭我来賛兩省僚友皆俊傑恠君氣如虹欲立萬仞節青蓮出泥滓不涴天性潔相期保貞固百鍊終不折賦南昌亭送丁子譲之淮安士不遇知己欝欝徒自憐亭長小丈夫不如漂母賢一飯尚足惜萬金那忍捐季亦泗上人勲業四百年南昌雖云小豈無士八千當時得英䧺劉項可比肩柰何自棄之吝彼粥與饘重瞳且沐猴此軰何足愆均行淮隂道亭草緑芊芊為我奉巵酒三酹東風前送滙東宋䖏士驊騮駕玉輅志不忘春草譬如藜藿人但識麻衣好十年遘憂患退縮苦不早囬念春江魚洋洋在芹藻聦明身之累擁腫身所保歸去匡山中雲松可娱老送方以亨還吴興以亨来洪都省兄以常予因與之㳺者累月既而将還吴興其兄録所贈詩見示余喜而作三章以餞之草有不可偃木有不可彫人心非秋蓬安得随風飄憐君玉雪姿明月當清宵葳蕤紫荆花輝映非一朝嗈嗈寒江鴈去去誰能招逺别腸欲㫁近别泪滿纓交游無不然而况弟與兄荒塗霜露繁哀角響故城去傷骨肉思住感郷里情還家及東作翳翳桑麻成賢女失之陋壮士失之貧相逢無所遺慷慨不得伸臨岐歌短章所道皆苦辛淮隂未去楚江揔復仕陳聊沽客中酒用酌還郷人送方員外之廬陵十年在覊旅未嘗憂别離如何與君辭愴如失群麋君才非我儔語黙皆可師温温霜天裘細細當暑絺不勞綺綉文自然適時冝嗟我百無𥙷不異面有眉既乏視聴功寧免耳目嗤君行值重午高花發榴葵荆人擊鼉鼓舟楫挾兩旗當時懐沙心後世為水嬉作歌贈君别秋風以為期省中樹掖垣東南有大樹隂可一二畝枝葉蓊茂望之蔚然豫章自兵興来巨材剪伐殆盡而兹木獨巋然城郭中其夀可喜也暇日步其下賦此嘉木不常有大材世所稀紛紛拱把中得此翠十圍盤柯結層隂枝葉大且肥下䕃數畝庭芳映百堵扉六月不知暑蒼烟晝霏霏豈為枕簟適實為烏鳥依豫章冨材木剪伐事已非此豈不材者獲與斤斧違牽裳步南風空翠沾我衣徘徊望黄鶴嵗乆将来歸午窓坐睡甚適覺而有賦省中昨夜風可畏今朝風可憐南風散煩暑稱此高齋眠夢中聞松聲響如百尺泉不知何身世笙匏奏鈞天浮游清虚中有類脫殻蟬旣信圖南樂更覺荘周賢生死俱兩忘况有俗慮牽何當䕃高樹一卧三千年白髮員外方君長余一嵗余髮斑白而方君則髭白一二因相顧咲嘆吾二人之早衰也且聞王政恤二毛則白髮固所當敬吾人其何悲為述以詩白髮無貴賤愁人先得之嗟我愁苦多四十髮有絲我愁實累髮愁豈髮所為白髮勿咲我可喜不可悲紛紛霄壌間㡬人得如斯嵗暮書事薄雲靄微隂江逺日易墜蒼然望平楚正與西山對冥冥孤鴻矯接接昏鴉退感兹嵗年暮矧尔時俗背頼有谷中蘭參差可為佩雨後過上藍寺柬方員外及泉上人𣑽宫欝岧嶤碧殿𫀆緑水入門廊廡壊屋漏濕窓𥿄幽尋得丈室苔竹深且羙孤華獨清艶衆緑隂薿薿隔簾新雨足石溜響宫徴青山如筆格重疊在書几老僧知客至合掌手作禮巳無千佛念為發一咲喜嗟余服轅駒局促垂兩耳逄師類脫鞅空闊向萬里聖覺雖異教迷悟乃一理歸途有餘清作詩示知己對江望山朝山翳其麓暮山翳其巔變態孰使之白雲與蒼烟我乆不見山見山喜欲顛以我窺青山料應山亦然喜極復自咲我何愚且偏青山本無情扵人何所憐因兹勿復道且聴薫風眠大山如龍蟠小山如虎伏以兹龍虎氣不雨山自緑虹長飲其左雲長遶其腹山靈既神異過者敢不肅我生敬青山如對父與叔旦起髮未冠垂簾聴松瀑晞髮在南浦驛道人晞髮坐緑樹啼幽鳥江闊風雨晴雲多青山少無聞衆幻滅不昧群迷曉猶有問津人孤帆望中小發南浦開船别西山迤邐向南浦㠶輕去自速𥘉不用篙櫓蒼蒼烟中樹槖槖響斤斧一女沙上汲衆漁洲畔語我行嵗云晏况復逺儔侣囬首北歸鴻翩翩下寒渚過黄牛洲望西山自我来西江未嘗㸔西山西山一何秀遥映蒼波間天寒衆木净日落孤雲閒當時珠簾雨髙捲不可攀至今烟靄中彷彿帝子還夜過市汊驛豐城北時酒醒月出有懐幕中諸友驛樓枕迴洲湍汊聲活活霜蘆花猶泛烟桞葉漸脫月出鳬鴈鳴孤艕寒江闊酒縁風力退詩苦真景奪何䖏寄相思浮雲楚天末汊口與洪鎮撫夜話我船行何遲君船下来急烏啼月初上鷗静露已濕褰衣步危沙細語成乆立囬瀾激空穴風響相嘘吸君才誠國士冨貴可俯拾臨流莫㸔劍恐駭寒江蟄霧中望新淦城隔沙聞雞聲咫尺望新淦寒江白霧起驛樹連城暗瀰瀰浦溆濶晃晃日色淡亦有渡江人津頭觧孤䌫泊五老峯下以上仕江西作𥘉見廬山青再見廬山白山形各異狀轉盻即改色方隂迷積翠忽霽眩金碧蒼烟與雲霧来徃逓蒙羃時時山中禽不自辨巢室我行三徃返真態還未識山水猶若斯世事那可必自湖西發舟望瀑布泊舟廬山下北風吹不休山靈知我来故以風相留褰衣陟危沙曠然得平疇桞色緑尚淺芳草青以柔仰觀瀑布泉復作河漢流爐熏既冉冉鹿鳴亦􅊯􅊯乃因淹留中終得此日逰向非風濤力那能極㝠捜作詩寓所感萬事無先謀聞廬山雷鳴雷霆有定位發聲胡不然兹山無冬春雷長鳴其巔昆䖝不坯蟄蛟龍亦蜿蜒致令山中人厭聴禮不䖍我行值孟春豐隆發深淵衣冠凛危坐對越上帝前天變自當敬心中非有愆望蘄州未見蘄州城已見蘄州山諸山𥘉不髙蒼石礪且頑想當至正時民物庶以殷大江楚西来萬里不閉関兹山獨儲英群雄出其間遂為禍亂堦滋蔓莫可刪憶我聞亂𥘉我方總兩鬟侍立父祖旁聴說國步艱焉知三十年見此草與菅骨肉亦已零安得髮不斑披榛欲吊古豺虎愴我顔蒼茫望茆宇日落孤舟還過小孤大孤俯如盤小孤儼而立群山如從使左右相拱揖孤根屹撑拄萬竅争噴噏瀏瀏隂風旋慘慘元氣濕江流亘其下震怒莫敢汲洑為盤渦深馳作奔馬急躋攀或失手一駚不可及我来值秋晚木落衆鳥集勿㸑夜船犀鮫人抱珠泣贈漢隂老父窮逹信有命丈夫乃長貧堂堂七尺軀而憂多苦辛早随丁都護馳逐車馬塵歸来不得意灌園漢江濵但恐女子知不畏醉尉嗔終當返故里共煑秋風蓴過長沙吊賈太傅才高衆所妬年少衆所輕柰何文帝賢而乃謫賈生炎劉握乾運寛大易暴嬴涵濡三十年孰不為政成生言胡不祥慟哭淚滿纓外防夷狄奸内謹七國爭禮樂與風化無一不可行帝心既未遑廷論乃拂膺長沙卑濕地落日鵩鳥鳴臨湘歌短篇哀痛吊屈平雖承宣室問前席何足榮我来欲再拜祠宇乆已傾荒苔剥㫁碣滿目皆枳荆汨汨祠下水猶聞太息聲望岳麓我為長沙客不醉長沙酒為愛岳麓山繫舟城邊桞峯巒一何秀膏沐春雨後蛾緑净洗粧方知朱鉛醜所嗟山中寺頽圯想已乆嶙峋北海碑千載獨不朽信為神靈惜長使山鬼守褰衣欲訪古日落辰在酉荒烟鳥雀喧宻竹虎兕吼老眼念後期未知重来否望南岳我従匡廬来但覺諸山低嵯峨望衡岳雲霄與之齊下有赤蛇蟄上有朱雀棲仰瞻祝融㧞俯揖紫盖迷五嶺皆培塿三江為涔蹄巍然南服尊嵩霍相提携封秩崇君稱諸神咸朝隮丹書篆寳册萬古封金泥百王重祀典赤繅藉玉圭自非精靈通牲帛勞焚賫余方向逺道無由陟層梯蒼蒼烟霞中喔喔聞天雞𬗟思昌黎伯恭黙開雲霓靈貺自昭格誠敬良可稽斯人乆云沒感念徒含悽過魏夫人祠南岳秘靈氣丹霞凌赤氛中有紺髮姝云是魏元君手把紫虚録印佩朱靈文素質如輕霞飄飄上烟雲三華弭絳節㣲月来繽紛遶之千靈妃従以萬鶴群大藥濟羸弱紫府奏殊勲何當受真典驂鸞入氤緼衡陽逢丁㤗我素有詩疾逢人即談詩師友憐我勤遂以詩相期早與高徐軰徐㓜文也折乃髙季迪逺慕黄𥘉時號折魏年時時發警䇿早為詩人知爾来慙潦倒拙語勞吾伊篇章非不多聊足充覆醯衡陽識丁泰握手誦我辭我疾已成癖君復求我醫譬彼病渴人却顧相如悲東風吹江花零落湘水湄情多未忍别因之贈將離發衡州五日白一髮十日皺一膚人生氷雪容終作鞾紋麄今朝清鏡中已與昨日殊不憂須眉蒼但恐皮肉枯肉枯亦常理所念非壮圖有親恩㝡深撫飬勞勤劬憐我㓜失怙愛我如掌珠斯恩未及報不敢忘湏臾書来得㓙問哀頓空號呼衣衾與棺歛弗得親走趨家山在萬里那能返故都樹頭啞啞啼愧殺返哺烏有子初學言行步要毋扶已觧索梨栗未知識之無重在託宗祀豈暇問賢愚弟妹皆漂零逺在天一隅仲氏乆無信夢中時友于艱難斥鹵濱何以保㣲軀計工當已還毋乃歸東吴童僕各分飛僅有赤脚奴竛竮苦肺疾終夜聲嗚嗚憐渠亦觧事剪伐供樵蘇異郷骨肉逺頼此相支吾嗟我客梁楚隻身亦﨑嶇白晝畏豺虎夜防狸與狐所頼筋力強竄伏幸無虞今年覺衰倦自怯行逺途東風洞庭波落日青草湖魚龍来欺人烟濤慘糢糊兹晨過衡陽霽景差可娱桃花白練帯春水緑菰蒲感此顔色妍蹔使憂心甦萬事信有命拊膺長嘆吁湘女湘水緑瀰瀰湘山碧峩峩空明影上下但覺禽鳥多我方駐輕橈聴彼湘女歌湘女淡掃眉素頰垂兩螺幽蘭結短珮徐行拂青莎春風吹衣裙芳香動㣲波淑質自妍䴡不待綺與羅真修慎所適窈窕山之阿盈盈青樓婦日暮将如何湘江道中思常宗暮江散㣲雨風㝎波自碧一鷺立不飛雙鴻逓相直餘烟菱女唱新月漁郎笛此䖏忽懷人相思杳何極湘竹有題朝行湘竹下暮宿湘竹中雲情與雨態萬變俄不同宻宻深翳日踈踈細含風新梢露裊裊老節烟濛濛紛如千靈妃從以萬青童旛幢列縹緲環珮揺丁東来従蔚藍天歩入東華宫悵望不可即翩然若驚鴻夭矯喜而笑低回俯乃恭質堅本外直性潔縁中空籊爾中弦矢揉之可彤弓氷雪誓不易肯與時汚隆今朝揭春晴更覺翠色濃戢戢琅玕樷忽見桃花紅直疑路不逺便與桃源通我欲捐輕舟褰衣入崆峒春禽迎我啼音響諧絲桐終當聴山雨自號蒼筤翁􅅹澗灘一灘復一灘十步九盤錯厓崩亂石礙轉使水勢惡谽谺鱷張牙屼崛蛟闘角百躬牽莫前一駚即退却余舟何猛銳獨與萬險搏篙迎旋渦支纜入欹樹縛齊心忘親讐叶力濟勇弱方危信冝懼過此亦足樂寸嵲能摧車何必盡劒閣向使一不諧群命未敢托超然望西巘衆緑生逺壑丹砂明赤箭中有不死藥服食信可慿願借麻姑鶴曉發祁陽别劉啓賢群山抱洪流盡日行曲折坡囘出平曠始覺人意恱晨櫛辭隂嵐夕飲得皓月㣲茫縣郭小樹屋逓顯滅深桞積逺烟孤華燦餘雪入籬聞書聲徑就野老謁跫然喜客至細語共茗啜諸生誠朴埜未觧習禮節几壁如塗鴉指鼻墨盡涅皆是農家子釋耒甘受業勿謂此軰愚畎畝有俊傑出門復登舟暮雨正凄切前途問尚逺髙榕亂啼鴂臨流發新咏聊以散蔚結㑹合自有時何勞念離别過道士洑椘之沅湘細宴山形如道士俯伏之狀因以名山其東南麓有吕安撫墓在焉兹山如青蜺俯飲江水曲邦人失偉觀目以道士洑中有百嵗墳石室䕃藂木當時錮三泉鳬鴈秘金玉畋師辟虎豹武士禁采牧未為兹山榮竟為兹山辱至今湘漢流到此屢囘伏春風吹急雨石㫁積蘚緑亦有斧斤聲丁丁響幽谷過仙冡巖蒼崖何巖巖衆石鑿紺黝仙人已羽化蛻骨尤未朽當空玉棺破厯厯見跟肘劍作朱蛇盤凾使白虎守及聞上古氏殯殮𥘉未有委棄無貴賤顙泚蠅蚋口陶瓦易衣薪宅兆貴深垕方春尚埋瘞掩此骼胔醜斯人獨不幸暴露嵗月乆何當絶攀縁掇拾歸培塿雖臨不測險結搆亦已就叶兹言信非迂臨風重囬首零陵感春舟行苦淫雨雨晴身亦輕暢如辭喧卑振衣登高明群芳沐春容瑩然眉目清萬緑隂薿薿孤禽語嚶嚶憶昨𥘉戒途飛雪沾我纓桃李寂未華一二春草生漂泊復㡬時花落已縦横花落非足惜念此嵗序更慷慨向秀笛従容桓伊筝曠逹自不凡悲憤何當平嗟嗟高世士亹亹勤脩名瀟湘八景靄靄復霏霏横霄曵夕暉巴人與湘女相逐買塩歸囬望墟烟處蒼茫隔翠㣲右山市晴嵐今朝罷漁早掛網堤邉樹雲㫁一峯青斜陽在拗䖏痴児晚睡醒却訝東方曙右漁村夕照孤塔望中青鐘聲隔洞庭蒼山不可及烟闊浪冥冥憶似寒山寺楓橋半夜聴右烟寺曉鐘風攪端花晚江寒波欲凝凍僵業漁者歸載一船氷一白迷沙渚柴扉認有燈右江天暮雪輕㠶挂春風倒映湘江緑天低浦叙逺歸向誰家宿遥指落花西黄陵廟前屋右逺浦歸帆江横秋烟白日落寒沙淺鴻鴈萬里来翩翩下平逺欲墮更低飛斜行兩三轉右平沙落鴈風急雨浪浪孤舟夜正長江湖随䖏惡何况是瀟湘今夜殘燈裏無人不㫁腸右瀟湘夜雨湘水秋更清湘月秋更白光輝一相蕩水月不辨色何䖏洞簫聲巴陵夜歸客右洞庭秋月右使湖南作登三夏故城寒樹無柔柯秋草有勁葉原空鶻孤騫山晚雲萬疊登高得平曠人馬皆意愜思挽角胎弓相従鴈門獵關前葉猶青關後草已白氣候本不殊山勢有阻隔風高皷角動日落川塞黒邉鴻一聲来壮士亦變色過長平有感驛路石犖确驅車邁荒村川逺蒼烟凉黄沙浩無痕聞是古戦塲長平名尚存有生四十萬共此入厚坤發軔暴虐秦六國漸併吞至今遺殺氣草木葉盡髠餘哀寄山嶽上有愁雲屯控馬爲追吊白日慘欲昏西風呌邉鴈凄然傷旅魂至太原縣去城南五十里王維太原祁人也唐俗本儉嗇古風猶在兹山長水流邁泉脉注東菑氓事耕牧外鄙樸無他爲何當起右轄共詠雉麥詩以上三首赴山西時作眉菴集卷之一
