front:
  text: 眉菴集卷之一
  hash: sha256:c26135ac0928152e4a84e7df5ad45bfbfe5e5a72857af88d925a112eb169aad6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_001-1a}
body:
  text: 五言古體姑蘇楊基孟載著感懷十四首璞玉宜深藏白雪乃寡和和寡非所悲衒玉徒取禍奈何刖足者抱璞不知過進非烈士忠退耻愚夫懦傭舂匪利直販鬻欲自涴山中一尺雪且復掩扉卧清霜凋百草亦令脆者堅士不遇患難智慮何由全玄德髀肉生重耳十九年一為三國雄一稱五伯賢苟不辨菽麥何足攬大權至今巴蜀人歎息後主禪鄧禹南陽來仗䇿歸光武孔明卧隆中不即事先主英雄各有見何必問出處孫曹與更始未可同日語向非昭烈賢三顧猶未許君子當識時守身如處女蝮蛇冬未蟄䕷草寒更生陽光泄為電地雷忽有聲上天號令乖致此灾異并不然多殺傷兵氣之所成漢廷凂三公毋乃非政刑願言調玉燭仰見三階平三人乃成虎衆口能爍金流言雖不多足移君子心人心本無疑理與勢所侵奈何形似間構結已駸駸入耳即契合不待間者深陳平雖云智羽有隙可尋髙祖誠豁逹卒亦誅淮隂營營青蠅詩示古猶示今位卑諌勿直直諌君心疑交淺言勿深深言友誼虧諤諤衆所惡况復違逆之豈不利于行吐蘖而含飴朝登千仞岡振我身上衣丈夫貴自潔毋論他人非一女不得織三人歎無衣一夫不暇耕八口皆啼飢飢寒迫于身誰能不為非西伯善養老仁人為己歸霜寒草木落禽鳥相背飛民心亦何求在于得所依此理勿暫失君子慎其微鵲巢知避嵗終為鳩所居巧者勞不足拙者安有餘溪翁夜結網山人朝煮魚隆凖入關中不讀半卷書當時微張韓乃與勝廣俱大拙乃至巧巧者復何如驊騮日千里亦在御者功向無造父能乃與凡馬同韓彭覂駕材驅䇿遇沛公增本渥窪兒意不與項通豈獨知馬難所貴御馬工駕御苟失冝鮮不敗乃翁蕭蕭帳下騅千駟何足雄鞲鷹斂六翮栖息如鷦鷯秋風颯然至聳目思􅓸霄英雄在承平白首為漁樵匪無搏擊能不與狐兔遭長星亘東南壯士拭寶刀落落丈夫志悠悠兒女曺善閗須扼吭善戰須摶膺楚不都關中卒為漢所傾洛陽非用武况乃居彭城曺公失荆州致使吳蜀爭五馬渡江南神孫終莫平元師破襄陽宋社忽已更制勝在得勢勿云險可輕劍可敵一人書足記姓名學之十二年書劍兩不成歸來吳楚間豪傑已起兵攬鏡照鬚眉一二白髮生老母在高堂未敢即逺行太息長在夜雞鳴星斗橫浮雲從何來本是山川氣寸隂不終朝一雨浩無際江河㑹交流草木奮妍麗但知潤澤功不識真宰意天風吹玄隂白日照厚地理亂自有常千載可坐致東鄰夜從軍西鄰曉上官一為死别愁一為知己歡歡者承新恩拂拭頭上冠愁者囑妻孥結束跨下鞍悲歡何不同一危復一安黃塵障東華平地生波瀾朝榮夕賜死轉盻異暑寒寄語承恩人莫歎從軍難漢傑士楚范增附淮隂天下士本是飢寒人朝為女子憐暮為惡少嗔身無兼人勇屈辱楚水濱一朝拜大將為漢伊吕臣王齊及王楚𥘉假後即真男兒猶龍蛇窮逹乃屈伸如何百世下獨有黔婁貧蕭何刀筆吏碌碌起沛中𥘉無一矢勞胡乃第一功發縱及指示帝論亦未公信亡追及之此為萬世雄漢卒賴信力亡楚定四封曺參彼何人而欲與之同子房本韓臣志欲報韓仇亡秦與蹶楚𥘉不為漢謀功成不貪賞而乃願封留冨貴非𥘉心竟從赤松遊寥寥千載下斯人誰與儔范增亦人傑不去羽不亡漢非赤帝靈增固不可當紛紛與楚爭可畏惟漢王危哉鴻門㑹拔劍舞項莊示玦羽不决致令漢道昌成敗非失䇿天命固有常禮樂治化本百年然後興奈何叔孫通綿蕞為可行布衣起山東五載帝業成瘡痍有未起詎可謂治平當時定朝儀事正擊柱爭遂令後賢王禮樂終不明漢道止于斯俗儒良可輕陳平素無行終為漢相國隂謀固可鄙竒計凡六出後來諸吕難卒賴陸賈力豈緣冨且貴臨事意反詘智者猶若斯請為愚者說秋懷曉城露氣白旭日猶蒼莽千林木葉墜逈覺川原廣村虛雞唱獨江靜鷗飛兩瞻眺豈不佳遲莫良可愴菱歌發清詞助以蒹葭響斯意竟誰同忘悲却怡賞日沒霧靄曛微茫見群山茅屋四五家時有芻牧還豈惟寵辱忘亦喜思慮閒嗟嗟當世事戚戚念時艱秋夜言懷四首鮮鮮籬邊菊摵摵庭下蕙蕙氣日已銷黃花自妍麗復恐清啇激幽芳亦凋瘁褰衣步廣除露白月在地鵲飛林影空蟲語墻隂細昔賢悲絲染往聖嘆川逝少壯不我留臨風發長喟雅志諒難酬蹉跎老將至西齊近寒涇枯葦接深篠秋風颯然至索索鳴不了拋書坐孤榻眼澀鐙暈繞窗破斜隙明漏斷餘更悄平生所欣遇此夕紛內擾假寐入冥思南枝有歸鳥夜坐復不樂起行亦無悰徘徊二者間百憂結心胸嵗事忽已遷復共喪亂逢一身愧無𥙷况乃祿萬鍾月林鵲翻翻風江鴈嗈嗈栖止苟有託遲莫還相從高梧䕃崇岡衰草被廣陌風微夕露凉星淡秋河白芳辰兼物謝孤抱緣愁積佳人在何許悵望江浦隔昨㑹月初弦徘徊又生魄送謝雪坡防禦出郭團練朝催築城夫暮㸃團結兵民民皆動搖一日十數驚所賴官長賢撫勞得衆情防禦出郊來父老拜且迎垂髫及戴白羅列車下聽官家百萬師自足與寇爭汝自守汝鄊汝自保汝生閒暇苟不虞倉卒恐見傾我當徼汝勞薄爾賦稅征父老共感激闐然動歡聲旌旗洎甲矛五色稍鮮明豈惟備抄掠大敵固可嬰問君何能然子弟衛父兄平川雨初收馬嘶鼓鼟鼟相送不同往極目秋鷹橫送將作僉院丁季周奉使兩廣還朝國家厄中運四海揚風塵蚩蚩弄兒兵皆我耕桑民或為官府迫漁獵無富貧奮然掉臂起一呼聚頑嚚始有可招徠久之竟沉淪勢結不易解遂同胡與秦皇明邈九重此恨弗得伸雖居蠻夷中豈不念帝宸丁侯京師來逺使廣海濱舟師逆蛟鼉陸足披荆榛所至敷恩威一一為具陳上述天子聖下言將相賢叶欵欵漸輸誠仄仄咸來賔直氣既侃侃婉辭復諄諄邊氓及夷戎感激爭自新酋長獻印璽老弱投棘薪幡然悉攺圖喜極涕沾巾安知萬里外復得仰化醇旌槎駕回風星斗羅高旻西風吹征衣相見吳城闉呼酒慰逺别烹鱸煮青蓴念兹歸意切又問銀河津嵯峨蓬萊宫雲霧鬱輪囷至尊開天顔前席顧問頻賜以錦繡假翠織雙麒麟追趨鶴禁曉錫燕龍樓春賞功固成典况復能咨詢丈夫志四方䇿勳貴及辰嗟我獨匏繫戚戚罹蹇屯壯心殊未巳矯首潜酸辛送陳資深歸廣丈夫輕别離投老欲入廣奈何干戈際萬里涉沆漭兹城頗阜庶有女供奉飬世亂得粗安胡勞問鄉䣊君言苦無家一夕魂九往鄉書昨日至捧讀屢泚顙四喪寄淺土未得掩諸壙雖云弊廬在誰復修祀享感兹歸意迫無力猶勉強齒髮固已衰尚足嬰擾攘敢忘鄉土情偷安戀兹壤吾聞重感激惜别復加賞天寒霜露繁摵摵枯葉響水宿慎蛟螭山行避魍魎田園雖荒蕪果實羅栗橡鄰居喜均還相邀具醅盎酒薄不得醉且復歌慨慷人生還鄉樂無物堪比倣喜極繼以悲歡戚同反掌畨思蘇臺月照女夜績紡此時父子情兩地同惚恍安得混車書妻孥共羅幌兹事竟難期淚眼一悽愴我家嘉陵江蹤跡久飄蕩亦欲問前途逡巡覔西瀼贈跛奚楊鐡笛奴也人笑跛奚蹩我愛跛奚跛蚿雖百跂速䕫亦一足可履平疑屐齾厯險若箕簸立如鷺聮拳行類鱉形欹裙長前肩脅鞲短左非斫涉寒脛豈刖獻玉踝附婁濟水厄哂却搆兵禍疢同哀駘他怒及趙女婐觸屏屢思倚守戶每得坐戒奚勿躁步世路方坎坷登靈岩和韻周左丞伯溫饒大參介之單艫集群英席窄坐每盍烟橫半掩寺木落全見塔斜流出渠分曲徑轉溪合村粧妍醜並野話悲笑雜童操吳音聞僧作𣑽偈答霜苔滑難躋露棘朽易拉磴紆蟻緣樹扉敞蝸啓闔娛賔列五豆禮佛過三匝晴崖暝憂雨秋洞寒疑臘窗攀盜果猿􅉉入避鸇鴿掬池萍沾䄂憩石蘚汚衲琴忘荒臺弄屧響回廊踏值險慮思笻得竒即傾榼感深怒須磔愁極衰鬢颯華年倐川駛雅量浩海納嘯歌激欷歔雄辨肆交沓禪寂虛無量道祖清靜蓋吅囂蝸觸蠻變幻雀化蛤狂逰類飲酎薄䆠避嚼䗶終當謝塵鞅掃屋分坐榻贈别龔行義椘襲風雲姿璞素玉不瑑隻身躡雙屐十載食破研麻衣閲冬春睥睨狐貉賤胸中何所蓄經史子集傳酒酣文思湧強弩機發箭清貞謝鉛鉓越女巧笑倩紆盤珠九曲精粹金百鍊粲如星森羅勇若軍後殿吾黨多英雄氣索皮肉戰西風忽歸來塵土吹滿面從容問所歷搖首不復辨但云秋水清吳松净如練方同華表鶴遽作幕上燕去住何太輕弗得絆以線君材匪樗櫟名字己交薦淵泉暫蠖屈霧雨終豹變賢逹坎坷多豪傑窮乏先嗟豫書中蠧髀消兩目眩朝騎瘦馬出夕飽藜與莧志慙㸃爾狂質匪由也諺猥遭周秦厄不識舜禹禪因君動遐想翅塌足若罥螺巵白瓷罌聊為江渚餞回首芙蓉花紛紛落紅片贈張主簿有田乃有租有身乃有庸不憂徴需煩但願賦役公東家倉廩實西鄰機杼空門戶非不齊貧富有不同縣官皆賢豪豈不念困窮但為嫌疑迫上下相蔽蒙坐看頒白民展轉溝壑中嗟嗟華亭簿倣佛古人風與陳時敏别近别㑹有期逺别易慘悽一人失意行衆賔顔色低相顧各無語握手立大堤白沙飛輕烟赤草漫路蹊竈户八九家皮肉瘦且黧再拜謁官長鵠立無所齎孤㕔如荒郵壁落新𥙷泥日沒官吏散角角野雉啼歸來對寒燈兒女相孩提雖云去鄉國喜不聞鼓鼙官卑職易稱牛刀用割雞回首華亭鶴月白露凄凄送王國忠之邵武推官新霜落江楓蘋葉爛如染感秋方惻惻送别復冉冉一官萬里外舟楫破天險人皆亂離戚君獨笑而慊虹光拂孤劍酒色暈雙臉平生峥嶸志弗以微物掩經綸二三䇿騫諤謝諛諂天子固未遑屢讀首屢㸃七閩暖無雪臘月草木蔪花濃霧迷驛榕暗日在崦斯時到官舍鞠按手自檢雖無老母笑反獲在不忝顧豫坐書癖譬若秋後簟低回鶴俯啄嚅囁魚上噞未䏻東浮越况方西渡陜文慙英俊逼鬢覺衰颯漸交游暫雲合乖散倐電閃憮然成短歌持贈非琬琰雨中效韋體寄季迪止仲道衍仲溫屢覿歡未終乍違離緒繞冥冥鄉國隂獨坐空齊曉䳌啼春樹密花落流鶯少不有郢中吟何由寫懷抱久靜厭紛俗齊居自玄處遙知久默暇共此蕭蕭雨屢驚芳節換暫覺清音阻欲扣竹間扉棋聲隔春渚叢林翳重岡迢遞僧居獨慿軒一悵望春雨蘼蕪緑泉香花落澗窗暝松圍屋憶爾諷經餘袈裟坐深竹别君俄兼旬芳景已云暮南風吹新緑欲暗庭前樹騶鳴孤驛曉鴉散春城曙盻此慰離憂新知忽成故西齊聞晚鶯南風池館靜深樹野鶯啼𥘉鳴喜新聽再囀復含悽念爾來城市山林定鼓鼙初夏過寧真道院偶來高樹下獨坐青苔石澗雨落餘霏衣裳淡生碧道因微物悟理向玄言析習靜自無營何妨處囂寂賦得净瓶送衍上人虛瓶湛靈泉行住一鉢友紅簮天女花碧插大士桞中圓􅉼真空外潔照萬有自盛甘露漿不貯聲聞酒衍師時出㝎提挈每在手詞鋒當建瓴禪寂冝守口賦得山逐放舟遲送王主簿舟行山亦移山盡舟亦住青山無故人行人自來去𥘉辭逶迤谷復接參差樹柁轉暮色分帆駛秋嵐度俄停風暫弱既逺烟重護别意即山情依君屢回顧賦舍利塔送僧八萬四千塔巋然天地中靈光忽上下浩劫未終窮法象諸天護真身五藴空堅明元不壞生滅豈無同暫住猶飛錫三匝禮秋風空齊天王寺比丘號也託友求詩為說偈曰上人坐空齊嵳峩兜率宫兜率乃佛土亦在虛無中兜率既無有空齊何所從豈獨空齊無四大亦本空萬有萬法幻如泡影電風隨起即隨滅無聲色與踪以無起滅故即之了不逢真空本非空去住空色同試舉空齊偈為扣西來翁遊北寺竹林僧居古城隂迢遞通萬竹林光落虛牖坐愛衣裳緑齊餘孤磬逺茶罷微烟續道人悟重玄淡然無衆欲譬彼石根泉亭亭湛寒渌久雨十日雨不止四􅉉如决堤今朝雨聲絶又聽斑鳩啼開門對西郊汨沒失路蹊往來舟車人拍浮類鳬鷖我貧乏車馬徒步兩屐泥歸來冠裳濕焙燎勞山妻側聞關中旱終年望雲霓燥土及萬里曽不留涔蹄上天本無私造化自不齊侏儒與方朔斯言非滑稽雨中期袁宰不至晨興罷巾櫛撫卷對秋渚幽人期不至值此蕭蕭雨豈緣俗情牽致此清興阻呼童掃庭蕪落葉深幾許更採石田芝空齊待君煮寓感人心渺烟海浩浩不可量正兹春風和忽然變秋霜悽悽不見矜惕惕反中傷始終非感激愛惡自靡常豈恱芙蓉鮮厭此蕙葉蒼請看塵中鏡拂拭耿輝光贈馮瘍醫為金德儒謝氣血在人身譬如江與河㙲之不得行崩騰作風波古來飬生術運動及按摩較之疏瀹功相去苦不多金君坐文墨錙銖細研磨氣鬱神不舒顴瘍忽為痾𥘉疑疹發面頃刻如堆螺金刀試神巧一抉回天和神契二竪緩巧師五禽他乃知藝學流無不由專科去毒類去惡芟夷絶根窠滋蔓不可啚未必非蹉跎余非知醫者此理信靡他作詩代璚玖語陋將如何東皋為馬仲蔚賦𥘉夏藹衆緑霏霏繞園霧橫書散輕䇿愜我林皋趣衣凉水氣襲屐潤苔痕汙雨菌結芝肪烟莎緣鶴步意銷念慮寧景適真樂遇衆妙入靜觀前非覺神悟江花自孤婉芳草忽已暮為鼓朱絃琴南風在庭樹觀魚池隂樹影凉白小紛成隊吹絮圓漚續觸荷清露碎俄沉靜却浮忽遇驚還退幸免釣絲憂江鱸且充鱠賦得萍贈陳久中浮蹤散寒星一夕生無數魚跳翠乍開漚過青還聚微風和影去急雨連根露惆悵别君時楊花滿衣絮季迪病目醫令止酒因作此勸之病目須飲酒飲酒調微痾氣血鬱不舒賴此酒力和所以雷公方製藥用酒多活血必酒洗散鬱須酒磨製藥既用酒飲酒良匪他酒可引經絡酒能驅病魔病目不飲酒此蓋醫者訛李白好痛飲不聞目有痤子夏與丘明不為飲酒過飲酒既無害不飲如俗何清晨呼東家買置數斗醝爛醉暝目坐滿目春風酡陶然物我忘夢見孔與軻此藥豈不佳而乃止酒那我今勸君飲君意無媕婀庸醫或見責請示眉菴歌夢親堂邯鄲枕中夢要是夢所有余嘗詠斯言嗟嘆為良久漁夫及畋師所夢必筌笱颯然精誠接昭格固不偶聶君乃純孝窹寐夢父母思之不暫置猶種菂得藕嗤彼聲利徒孜孜在升斗夀萱堂朝看忘憂花暮看忘憂草毋憂日已忘母夀日已老兒心與母心願得同夀考回首堂下萱秋風幾枯槁上巳遊虎丘值雨寓平逺齊層軒構崇丘緑樹帶吳苑鳩鳴春竹靜鶴下烟汀逺𥘉登已神暢稍久竟忘返松高急雨過草弱微風偃幽潭閟靈跡氣濕龍蜿蜿俯深戒臨危歷險知步蹇歸途極遐矚蒼茫失西巘贈毛生丈夫遇知已勝如得美官栖栖無聊中握手意便歡古來豪傑人所就非一端狂言與危行𥘉若不可干從容兩陳間一語九廟安狐貉不外飾而足禦大寒嗟嗟隴西李願識荆州韓殘燈輝輝復熒熒露冷無良焰帷昏驚暈起隙破愁風颭幽人對餘光拂拭床頭劒附季迪和凝光結重暈逼曙零孤朵膏空逐漏水熖在同爐火戀影未能眠更就餘明坐晚節堂夀藏名也人生百年夀六十未為晚胡為鑿玄扄築亭在山阪周圍松櫟高可玩不可挽日暮春雨晴黃鳥啼睍睆東家鶴髮翁方置萬金産貽謀非不隹竟為逹者莞王君超物理生死若往返一笑步松隂青山在吾眼梁溪暮歸蕩舟入微茫晚烟羃群山日落村墟遙惟見芻牧還鴉度風陳低牛鳴月痕彎五噫遺清歌聽之厚人顔山中言入山採薇蕨山路多荆杞褰裳避朝露欲往行復止豈不有飢餓一飯不為恥長歌古松下悲風為之起憂樂二首我有九十母白髮雙瞳青夜禮護落斗朝誦彌陀經以兹精進力老而愈康寧百年何足云坐享三千齡嘗聞古人言五十不為夭嗟豫已四旬齒髮固不少有子萬事足此事猶未了一笑付蒼天禍福詎可曉贈真性空上人真如心悟徹物我間草年住名山已復到彼岸六觀㑹萬有一覺破諸幻袈裟坐緑蘚鳥恱林影散琴清風在竹偈古月當澗贈以青蓮花搖搖落秋瓣蘭室為醫士徐孟善賦種德有餘慶種蘭有餘香邇來三十年德與蘭俱昌春風葉猗猗秋露花的的人言徐翁蘭愛比蘇仙橘翁今已仙去蘭猶繞階庭瓊芝與玉樹相映蘭青青我雖不識翁而獲交二子芳名播清芬正與蘭相似人好蘭亦好愛之久不衰彈君白雪操詠我幽蘭詩聽松軒鳥啼衆喧寂月出萬籟靜秋聲松外來歷歷生我聽繁音雜宫徵空響調竽磬風細覺漸消山深故相應幽人捲書坐瞑目兩耳定聲聽忽兩忘遒然發孤咏秀野軒結茆近東皋清曠接平衍新春微雨過芳草緑如剪携書坐深竹自讀自舒捲興來䇿杖藜𥘉不賴輿輦西鄰雞豚社落日牛羊圈至貴在無求何勞事冠冕僧寺感秋一榻卧僧室歸夢夕九至燈昏燼垂華香斷灰成字斜光破窗月急響虗􅉉吹遙想䆠游人應憐此中意守愚齊百智動不足一愚賢自守神交武子寧氣合刺史桞聰明與睿知方寸無不有斂之弗著形譬若物在篰慮千每得一問十且對九衆辨默乃消群囂靜而受晨齊掩書坐草色連户牖作詩代盤銘庶或置座右除夕寫懷曉凍雲正密晚晴雪亦消岩松既露頂澗竹咸舒腰感兹年光徂又復見嵗朝漸與少壯辭老景去不遙人生百年間倐如狂風飄况我患難餘髮黃皮肉焦萬事若死灰那能復然燒差差青楊枝下䕃朱闌橋明當長翠縷繫我春江橈吳宫遺跡八詠長洲春縠波流暖雲花光艷緑薲津頭洗紅女胡蝶上羅裙羅裙秋水上明璫搖白漿飛下雙鴛鴦溘溘潮水響橫塘晚川氣夕氤氲愁雲凝晚緑蘭舟蕩秋水東向橫塘宿橫塘花正開紅桃間竹栽誰家織白苧機聲度水來梧宫夜桐階白露下濕螢光炯炯銅盤燒䗶黃秋衾夢魂冷粉泪鉛華滴雲鬢秋蟬整何處玉鑾聲芙蓉笑孤影楓陵秋楓樹落清曉野烟結愁隂聲傳燒竹火人語滄波深鳬飛秋水黑蛩吟凉露白江月參差光芙蓉照芳魄越來溪逺岫如蛾眉𬗋菱蓋緑漪小娃木蘭槳採菱溪上歸溪風搖白芷撩亂蘋花起疑是越兵來旌旗照秋水滄浪波入苑緑泱泱縠紋融暖光東風吹白浪照見赤龍堂龍堂負貝闕隂火春波熱鮫鮫賣髯綃夜夜唱明月綺川遊川水東北流川花照青樓龍船載鳯吹日來川上遊沙明屬玉止苕香翡翠留漁郎蒲葉底網得雙吳鈎茂苑思輦路秋蓬滿野香團緑濕嬪娥粉黛愁嫣花鉛露泣鶯聲舊時好玉砌秋歸早東家胡蝶飛烟姿滿芳草白門答髙二聘君以上元未在吳作戊申秋余謫大梁季迪嘗夢余與若平生明日道路傳余已死季迪有夢余詩己酉春正月余侍親東歸迪亦應召來京師相對驚喜因出所賦夢余之作余既感季迪之念而復疑猶夢也歌以答之結交貴知已不在早與遲嗟我識子晚深淺惟子知每于朋儕間擊節賞我辭前年吳城破子居我西馳交游非不多獨念與子離相去日已逺數與禍患罹道路傳我死可信子尚疑日暮過我廬為我涕交頥今年我還京適子應詔來叶握手發長嘆示我夢我詩我昔患難中精爽無不之而子獨夢我與子若有期方子夢我𥘉正我念子時春風鳥嚶嚶花發滿故枝為買一斗酒痛飲春江湄生死固常理勿為逹士嗤自題冝秋軒豫去官結小軒自適軒近秦淮松菊竹樹之外無他花卉且清曠幽寂與秋相冝因號冝秋賦以詩我軒南山下緑水圍繞之四時非不佳獨與秋最冝秋風入我軒便覺景物竒紅樹照西崦黃花滿東籬夜深明月來蕩漾軒東池池光與月色上下相逶迤我時坐軒中濁酒聊自持微飲不及醉陶然詠陶詩人言秋可傷我覺秋可怡至潔如屈平至清如伯夷愛彼潔與清竟忘搖落悲斯意獨領㑹但恐秋風知贈錢祐之祐之過余冝秋軒携武肅王家譜見示感慨古昔賦此為贈村居無來轍漸與人事屏軒窗頗冝秋爽氣接西嶺錢君曉過我跫然破幽靜踉蹡田中來衣屨草露冷臨風岸烏巾上有雙蚱蜢示我族譜文厯厯星斗炳前王勳業在千載猶一頃諸孫尚醖藉整若弓在㯳嗟我昧淺深所得如捕影潭潭百尺甃汲以尋文綆况兹坐窮僻習懶不自省君來實起余如夢覺酒醒蠨蛸罥虛戶絡緯啼廢井何當照寒燈共此秋夜永淮隂祠朝登歌風臺暮入淮隂祠祠荒屋瓦落古木聲差差當時握漢兵劉項相交持舉足有輕重不負高帝知區區假王封如何遽見疑良平一躡足帝心即轉移全齊七十城實為陷穽機後來雲夢遊此禍乃致之盧綰且稱王恥與絳灌隨居常獨怏怏握手逢陳豨事起倉卒間不意咸誅夷吕后固不仁鄼侯亦忍為先王重報功無乃此道虧至今淮水南落日啼烏悲津頭問漂母一飯竟哀誰送參政錢誠夫之淮安潮落大江渾烏啼曙色分公侯千萬騎送别隘人門威儀督府嚴禮秩節度尊兩淮甲胄士十年弓箭痕南陽與豐沛自古重承恩寄內婉素天寒思故衣家貧思良妻所以孟德耀舉案與眉齊憶汝事我𥘉髙樓映深閨珠鈿照羅綺簮珮搖玉􅙈梳掠不待曉粧成聽鳴雞中吳惜喪亂草口各東西有母不得將獨汝與提携我復竄逺方送我當路啼紛紛道上人無不為慘悽今年我還家赤手無所賫汝亦遇多難典賣罄珥笄朝炊粥一盂暮食鹽與虀堂有九十姑時復羞豚蹄膏沐弗暇澤髮落瘦且黧别來復秋深露下百草凄破碎要𥙷綴甘㫖需醬醯安貧兼飬老此事汝素稽作詩逺相寄新月當窗低客館秋思閒齊閟秋隂弱蕙風屢偃蕭蕭微凉至坐怯踈簾捲哀蟬聽漸急歸燕嗟已晚忽動故園思山川匪遙逺夢綵堂為俞士評賦楚客身未歸悠悠念庭闈濤江雖云廣莫阻魂夜飛秋隂天無星猿呌楓樹稀家門倐已到不失舊路微上高堂獻笑試舞衣焉知空明曙鐘動殘星輝難追夢中歡益發覺後欷安能附羽翼逺去仍相依贈許山人三首七十世所稀過此尤足喜山人腰腳健一日行百里身安子能飬飲食具甘㫖擾擾天壤間如翁能有幾讀書不須多逹理斯為貴讀書不逹理不讀亦如異山人識字少時復見一二乃知學道人心靜自可至我笑山中人猶未逹此理患害每過慮聞利輒先喜利害何足驚死生亦命耳但使心不欺造物聽所止送許山人歸長干別業我從長干來君向長干去春鴻與秋燕相逢不相聚當時三閣上緑鬢花如霧辱井不可尋纍纍種瓜芋君家烏衣巷正對朱雀橋烏衣去已久斜陽樹蕭蕭紅薑嫩生芽𬗋芋肥長苖斯時一樽酒時赴東鄰招朝耕硯一區暮耕筆一尺疏食且不飽而况有囷積山人萬本韭冨與列侯敵治生不在多勤儉自有益舟中有感以上在京并閒居句容作水性日就下大江日東馳不知舟行逺但覺青山移我方念儔侣手反坐拄頥天風吹衣裳明月來相隨乘流非不住逝者乃如斯滔滔適意中忽然令人悲壯嵗難再得修名安可期出臺復還洪都福至本無象禍來非有因方憂觸羅網遽喜辭妖塵念此蓬藋姿忽遘蹇與屯倉黃圜扉中日夕與死鄰皇明眷私照寒谷回陽春既免在滌牲復縱充庖鱗重沐飾冠裳濟溺立要津道路與我慶况我骨肉親歸來向妻孥秉燭語及晨猶疑是夢寐歡樂恐未真嗟余抑何艱坎壈多苦辛弱無勝力錐而欲舉萬鈞羸牛服鹽車遙遙西入秦進逢九坂危退迫尺箠嗔敢惜筋力疲所慮車摧輪哀鳴徒嗷嗷仰訴空諄諄聽者無不憐誰復為解嚬終當脫羈鞅滄波浩難馴曉發石頭口石頭何斕斒左顧踞赤虎自非神功鑿那得此江滸玄精蓄隂霧祕迹曠萬古耽視洪都城百雉列飛堵我船候明發值此春夜雨方欣土膏潤可以藝稷黍年豐米穀賤何憂在羈旅掀篷望烟桞春水緑可醑終許著漁蓑撈蝦冨春渚送陳管勾之鄱陽朝與吳人辭暮送晋人别滔滔楚江水朝暮流不竭我來贊兩省僚友皆俊傑怪君氣如虹欲立萬仞節青蓮出泥滓不涴天性潔相期保貞固百鍊終不折賦南昌亭送丁子讓之淮安士不遇知己鬱鬱徒自憐亭長小丈夫不如漂母賢一飯尚足惜萬金那忍捐季亦泗上人勳業四百年南昌雖云小豈無士八千當時得英雄劉項可比肩奈何自棄之吝彼粥與饘重瞳且沐猴此輩何足愆均行淮隂道亭草緑芊芊為我奉巵酒三酹東風前送滙東宋處士驊騮駕玉輅志不忘春草譬如藜藿人但識麻衣好十年遘憂患退縮苦不早回念春江魚洋洋在芹藻聰明身之纍擁腫身所保歸去匡山中雲松可娛老送方以亨還吳興以亨來洪都省兄以常豫因與之遊者纍月既而將還吳興其兄録所贈詩見示余喜而作三章以餞之草有不可偃木有不可雕人心非秋蓬安得隨風飄憐君玉雪姿明月當清宵葳蕤紫荆花輝映非一朝嗈嗈寒江鴈去去誰能招逺别腸欲斷近别泪滿纓交游無不然而况弟與兄荒塗霜露繁哀角響故城去傷骨肉思住感鄉里情還家及東作翳翳桑麻成賢女失之陋壯士失之貧相逢無所遺慷慨不得伸臨岐歌短章所道皆苦辛淮隂未去楚江揔復仕陳聊沽客中酒用酌還鄉人送方員外之廬陵十年在羈旅未嘗憂别離如何與君辭愴如失群麋君才非我儔語默皆可師溫溫霜天裘細細當暑絺不勞綺繡文自然適時冝嗟我百無𥙷不異面有眉既乏視聽功寧免耳目嗤君行值重午高花發榴葵荆人擊鼉鼓舟楫挾兩旗當時懷沙心後世為水嬉作歌贈君别秋風以為期省中樹掖垣東南有大樹隂可一二畝枝葉蓊茂望之蔚然豫章自兵興來巨材剪伐殆盡而兹木獨巋然城郭中其夀可喜也暇日步其下賦此嘉木不常有大材世所稀紛紛拱把中得此翠十圍盤柯結層隂枝葉大且肥下䕃數畝庭芳映百堵扉六月不知暑蒼烟晝霏霏豈為枕簟適實為烏鳥依豫章冨材木剪伐事已非此豈不材者獲與斤斧違牽裳步南風空翠沾我衣徘徊望黃鶴嵗久將來歸午窗坐睡甚適覺而有賦省中昨夜風可畏今朝風可憐南風散煩暑稱此高齊眠夢中聞松聲響如百尺泉不知何身世笙匏奏鈞天浮游清虛中有類脫殼蟬既信圖南樂更覺莊周賢生死俱兩忘况有俗慮牽何當䕃高樹一卧三千年白髮員外方君長余一嵗余髮斑白而方君則髭白一二因相顧笑嘆吾二人之早衰也且聞王政恤二毛則白髮固所當敬吾人其何悲為述以詩白髮無貴賤愁人先得之嗟我愁苦多四十髮有絲我愁實纍髮愁豈髮所為白髮勿笑我可喜不可悲紛紛霄壤間幾人得如斯嵗暮書事薄雲靄微隂江逺日易墜蒼然望平楚正與西山對冥冥孤鴻矯接接昏鴉退感兹嵗年暮矧爾時俗背賴有谷中蘭參差可為佩雨後過上藍寺柬方員外及泉上人𣑽宫鬱岧嶤碧殿𫀆緑水入門廊廡壞屋漏濕窗𥿄幽尋得丈室苔竹深且美孤華獨清艷衆緑隂薿薿隔簾新雨足石溜響宫徴青山如筆格重疊在書几老僧知客至合掌手作禮巳無千佛念為發一笑喜嗟余服轅駒局促垂兩耳逄師類脫鞅空闊向萬里聖覺雖異教迷悟乃一理歸途有餘清作詩示知己對江望山朝山翳其麓暮山翳其巔變態孰使之白雲與蒼烟我久不見山見山喜欲顛以我窺青山料應山亦然喜極復自笑我何愚且偏青山本無情于人何所憐因兹勿復道且聽薰風眠大山如龍蟠小山如虎伏以兹龍虎氣不雨山自緑虹長飲其左雲長繞其腹山靈既神異過者敢不肅我生敬青山如對父與叔旦起髮未冠垂簾聽松瀑晞髮在南浦驛道人晞髮坐緑樹啼幽鳥江闊風雨晴雲多青山少無聞衆幻滅不昧群迷曉猶有問津人孤帆望中小發南浦開船别西山迤邐向南浦帆輕去自速𥘉不用篙櫓蒼蒼烟中樹槖槖響斤斧一女沙上汲衆漁洲畔語我行嵗云晏况復逺儔侣回首北歸鴻翩翩下寒渚過黃牛洲望西山自我來西江未嘗看西山西山一何秀遙映蒼波間天寒衆木净日落孤雲閒當時珠簾雨髙捲不可攀至今烟靄中倣佛帝子還夜過市汊驛豐城北時酒醒月出有懷幕中諸友驛樓枕回洲湍汊聲活活霜蘆花猶泛烟桞葉漸脫月出鳬鴈鳴孤艕寒江闊酒緣風力退詩苦真景奪何處寄相思浮雲楚天末汊口與洪鎮撫夜話我船行何遲君船下來急烏啼月初上鷗靜露已濕褰衣步危沙細語成久立回瀾激空穴風響相噓吸君才誠國士冨貴可俯拾臨流莫看劍恐駭寒江蟄霧中望新淦城隔沙聞雞聲咫尺望新淦寒江白霧起驛樹連城暗瀰瀰浦溆濶晃晃日色淡亦有渡江人津頭解孤纜泊五老峯下以上仕江西作𥘉見廬山青再見廬山白山形各異狀轉盻即改色方隂迷積翠忽霽眩金碧蒼烟與雲霧來往遞蒙羃時時山中禽不自辨巢室我行三往返真態還未識山水猶若斯世事那可必自湖西發舟望瀑布泊舟廬山下北風吹不休山靈知我來故以風相留褰衣陟危沙曠然得平疇桞色緑尚淺芳草青以柔仰觀瀑布泉復作河漢流爐熏既冉冉鹿鳴亦􅊯􅊯乃因淹留中終得此日逰向非風濤力那能極冥搜作詩寓所感萬事無先謀聞廬山雷鳴雷霆有定位發聲胡不然兹山無冬春雷長鳴其巔昆蟲不坯蟄蛟龍亦蜿蜒致令山中人厭聽禮不䖍我行值孟春豐隆發深淵衣冠凛危坐對越上帝前天變自當敬心中非有愆望蘄州未見蘄州城已見蘄州山諸山𥘉不髙蒼石礪且頑想當至正時民物庶以殷大江楚西來萬里不閉關兹山獨儲英群雄出其間遂為禍亂階滋蔓莫可刪憶我聞亂𥘉我方總兩鬟侍立父祖旁聽說國步艱焉知三十年見此草與菅骨肉亦已零安得髮不斑披榛欲吊古豺虎愴我顔蒼茫望茆宇日落孤舟還過小孤大孤俯如盤小孤儼而立群山如從使左右相拱揖孤根屹撑拄萬竅爭噴吸瀏瀏隂風旋慘慘元氣濕江流亘其下震怒莫敢汲洑為盤渦深馳作奔馬急躋攀或失手一駚不可及我來值秋晚木落衆鳥集勿㸑夜船犀鮫人抱珠泣贈漢隂老父窮逹信有命丈夫乃長貧堂堂七尺軀而憂多苦辛早隨丁都護馳逐車馬塵歸來不得意灌園漢江濵但恐女子知不畏醉尉嗔終當返故里共煮秋風蓴過長沙吊賈太傅才高衆所妬年少衆所輕奈何文帝賢而乃謫賈生炎劉握乾運寬大易暴嬴涵濡三十年孰不為政成生言胡不祥慟哭淚滿纓外防夷狄奸內謹七國爭禮樂與風化無一不可行帝心既未遑廷論乃拂膺長沙卑濕地落日鵩鳥鳴臨湘歌短篇哀痛吊屈平雖承宣室問前席何足榮我來欲再拜祠宇久已傾荒苔剝斷碣滿目皆枳荆汨汨祠下水猶聞太息聲望嶽麓我為長沙客不醉長沙酒為愛嶽麓山繫舟城邊桞峯巒一何秀膏沐春雨後蛾緑净洗粧方知朱鉛醜所嗟山中寺頽圯想已久嶙峋北海碑千載獨不朽信為神靈惜長使山鬼守褰衣欲訪古日落辰在酉荒烟鳥雀喧密竹虎兕吼老眼念後期未知重來否望南嶽我從匡廬來但覺諸山低嵯峨望衡嶽雲霄與之齊下有赤蛇蟄上有朱雀棲仰瞻祝融拔俯揖紫蓋迷五嶺皆培塿三江為涔蹄巍然南服尊嵩霍相提携封秩崇君稱諸神咸朝隮丹書篆寶册萬古封金泥百王重祀典赤繅藉玉圭自非精靈通牲帛勞焚賫余方向逺道無由陟層梯蒼蒼烟霞中喔喔聞天雞𬗟思昌黎伯恭默開雲霓靈貺自昭格誠敬良可稽斯人久云沒感念徒含悽過魏夫人祠南嶽祕靈氣丹霞凌赤氛中有紺髮姝云是魏元君手把紫虛録印佩朱靈文素質如輕霞飄飄上烟雲三華弭絳節微月來繽紛繞之千靈妃從以萬鶴群大藥濟羸弱紫府奏殊勳何當受真典驂鸞入氤緼衡陽逢丁泰我素有詩疾逢人即談詩師友憐我勤遂以詩相期早與高徐輩徐幼文也折乃髙季迪逺慕黃𥘉時號折魏年時時發警䇿早為詩人知爾來慙潦倒拙語勞吾伊篇章非不多聊足充覆醯衡陽識丁泰握手誦我辭我疾已成癖君復求我醫譬彼病渴人却顧相如悲東風吹江花零落湘水湄情多未忍别因之贈將離發衡州五日白一髮十日皺一膚人生氷雪容終作鞾紋粗今朝清鏡中已與昨日殊不憂須眉蒼但恐皮肉枯肉枯亦常理所念非壯圖有親恩最深撫飬勞勤劬憐我幼失怙愛我如掌珠斯恩未及報不敢忘須臾書來得凶問哀頓空號呼衣衾與棺斂弗得親走趨家山在萬里那能返故都樹頭啞啞啼愧殺返哺烏有子初學言行步要毋扶已解索梨栗未知識之無重在託宗祀豈暇問賢愚弟妹皆漂零逺在天一隅仲氏久無信夢中時友于艱難斥鹵濱何以保微軀計工當已還毋乃歸東吳童僕各分飛僅有赤腳奴竛竮苦肺疾終夜聲嗚嗚憐渠亦解事剪伐供樵蘇異鄉骨肉逺賴此相支吾嗟我客梁楚隻身亦﨑嶇白晝畏豺虎夜防狸與狐所賴筋力強竄伏幸無虞今年覺衰倦自怯行逺途東風洞庭波落日青草湖魚龍來欺人烟濤慘糢糊兹晨過衡陽霽景差可娛桃花白練帶春水緑菰蒲感此顔色妍暫使憂心蘇萬事信有命拊膺長嘆吁湘女湘水緑瀰瀰湘山碧峩峩空明影上下但覺禽鳥多我方駐輕橈聽彼湘女歌湘女淡掃眉素頰垂兩螺幽蘭結短珮徐行拂青莎春風吹衣裙芳香動微波淑質自妍麗不待綺與羅真修慎所適窈窕山之阿盈盈青樓婦日暮將如何湘江道中思常宗暮江散微雨風㝎波自碧一鷺立不飛雙鴻遞相直餘烟菱女唱新月漁郎笛此處忽懷人相思杳何極湘竹有題朝行湘竹下暮宿湘竹中雲情與雨態萬變俄不同密密深翳日踈踈細含風新梢露裊裊老節烟濛濛紛如千靈妃從以萬青童幡幢列縹眇環珮搖丁東來從蔚藍天步入東華宫悵望不可即翩然若驚鴻夭矯喜而笑低回俯乃恭質堅本外直性潔緣中空籊爾中弦矢揉之可彤弓氷雪誓不易肯與時汚隆今朝揭春晴更覺翠色濃戢戢琅玕叢忽見桃花紅直疑路不逺便與桃源通我欲捐輕舟褰衣入崆峒春禽迎我啼音響諧絲桐終當聽山雨自號蒼筤翁􅅹澗灘一灘復一灘十步九盤錯崖崩亂石礙轉使水勢惡谽谺鱷張牙屼崛蛟鬪角百躬牽莫前一駚即退却余舟何猛鋭獨與萬險搏篙迎旋渦支纜入欹樹縛齊心忘親讐叶力濟勇弱方危信冝懼過此亦足樂寸嵲能摧車何必盡劒閣向使一不諧群命未敢托超然望西巘衆緑生逺壑丹砂明赤箭中有不死藥服食信可慿願借麻姑鶴曉發祁陽别劉啓賢群山抱洪流盡日行曲折坡回出平曠始覺人意恱晨櫛辭隂嵐夕飲得皓月微茫縣郭小樹屋遞顯滅深桞積逺烟孤華燦餘雪入籬聞書聲徑就野老謁跫然喜客至細語共茗啜諸生誠朴野未解習禮節几壁如塗鴉指鼻墨盡涅皆是農家子釋耒甘受業勿謂此輩愚畎畝有俊傑出門復登舟暮雨正凄切前途問尚逺髙榕亂啼鴂臨流發新咏聊以散蔚結㑹合自有時何勞念離别過道士洑椘之沅湘細宴山形如道士俯伏之狀因以名山其東南麓有吕安撫墓在焉兹山如青霓俯飲江水曲邦人失偉觀目以道士洑中有百嵗墳石室䕃藂木當時錮三泉鳬鴈祕金玉畋師辟虎豹武士禁采牧未為兹山榮竟為兹山辱至今湘漢流到此屢回伏春風吹急雨石斷積蘚緑亦有斧斤聲丁丁響幽谷過仙冡巖蒼崖何巖巖衆石鑿紺黝仙人已羽化蛻骨尤未朽當空玉棺破厯厯見跟肘劍作朱蛇盤函使白虎守及聞上古氏殯殮𥘉未有委棄無貴賤顙泚蠅蚋口陶瓦易衣薪宅兆貴深垕方春尚埋瘞掩此骼胔醜斯人獨不幸暴露嵗月久何當絶攀緣掇拾歸培塿雖臨不測險結搆亦已就叶兹言信非迂臨風重回首零陵感春舟行苦淫雨雨晴身亦輕暢如辭喧卑振衣登高明群芳沐春容瑩然眉目清萬緑隂薿薿孤禽語嚶嚶憶昨𥘉戒途飛雪沾我纓桃李寂未華一二春草生漂泊復幾時花落已縱橫花落非足惜念此嵗序更慷慨向秀笛從容桓伊筝曠逹自不凡悲憤何當平嗟嗟高世士亹亹勤修名瀟湘八景靄靄復霏霏橫霄曵夕暉巴人與湘女相逐買鹽歸回望墟烟處蒼茫隔翠微右山市晴嵐今朝罷漁早掛網堤邉樹雲斷一峯青斜陽在拗處癡兒晚睡醒却訝東方曙右漁村夕照孤塔望中青鐘聲隔洞庭蒼山不可及烟闊浪冥冥憶似寒山寺楓橋半夜聽右烟寺曉鐘風攪端花晚江寒波欲凝凍僵業漁者歸載一船氷一白迷沙渚柴扉認有燈右江天暮雪輕帆挂春風倒映湘江緑天低浦叙逺歸向誰家宿遙指落花西黃陵廟前屋右逺浦歸帆江橫秋烟白日落寒沙淺鴻鴈萬里來翩翩下平逺欲墮更低飛斜行兩三轉右平沙落鴈風急雨浪浪孤舟夜正長江湖隨處惡何况是瀟湘今夜殘燈裏無人不斷腸右瀟湘夜雨湘水秋更清湘月秋更白光輝一相蕩水月不辨色何處洞簫聲巴陵夜歸客右洞庭秋月右使湖南作登三夏故城寒樹無柔柯秋草有徑葉原空鶻孤騫山晚雲萬疊登高得平曠人馬皆意愜思挽角胎弓相從鴈門獵關前葉猶青關後草已白氣候本不殊山勢有阻隔風高鼓角動日落川塞黑邉鴻一聲來壯士亦變色過長平有感驛路石犖確驅車邁荒村川逺蒼烟凉黃沙浩無痕聞是古戰場長平名尚存有生四十萬共此入厚坤發軔暴虐秦六國漸併吞至今遺殺氣草木葉盡髠餘哀寄山嶽上有愁雲屯控馬為追吊白日慘欲昏西風呌邉鴈凄然傷旅魂至太原縣去城南五十里王維太原祁人也唐俗本儉嗇古風猶在兹山長水流邁泉脉注東菑氓事耕牧外鄙朴無他為何當起右轄共詠雉麥詩以上三首赴山西時作眉菴集卷之一
