front:
  text: 眉菴集卷之三
  hash: sha256:eaa3e18ac1175d34c4cda0a826c28a2d98735f4fb822ebda1e1ac565d2bccfa6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_003-1a}
body:
  text: 七言古體姑蘇楊基孟載著夢題雲山圖夢中有人以雲山圖索詩因題四韻覺後惟記其首二句為足成之前山嵯峨後山聳大如盤龍小飛鳯千巖萬壑春雨晴浮雲載山山欲動平生愛向雲山居漂泊尚作雲山夢明朝拂袖歸故山萬頃白雲和玉種省掖觀梅和宋草堂韻玉肌瘦怯春風惱唇紅不褪香雲老綺窗人靜月初圓笑覺飛璚顔色槁羅幄銅瓶小几邊銀燈踈影硯臺前一株初破休輕折半朵猶含最可憐宫粧近眼人爭愛却恐愁多零落快莫教纎手嗅東風誰畫生香與真態西省海棠山西陳則威以晉無梅花以管勾職初來江西即求識之省左掖東檻有海棠一小樹則威尤鍾愛之日數次至花下風雨昏暮不忍去也嘗索余賦詩余時迫於案牘不暇舟行湘中梨杏桃李每得厭觀獨無海棠因賦此補其缺云山西公子虬鬚客到處尋梅認香白春風省掖海棠開暫去還來拋不得嗟我有癖常自笑不意逢君同此癖花枝雅麗不妖艷我輩尚德不尚色曉窗雲暖風日妍數朵娉婷春半拆睡損紅綃膩有痕舞酣金殿嬌無力銀燈不如微月照珠簾更著踈烟隔飛燕輕盈冨貴姿玉環態度神仙格此日凝粧青瑣外當時擅寵沉香北繁開似妬却冥冥半吐欲言終默默豈惟人愛亦自愛不獨春惜當誰惜細雨重隂也看來莫對空枝謾相憶千葉桃花豫章氣候差早春未半花已岑寂省掖後苑有千葉桃一株人未之知也衆卉已謝芳草如積偶與員外方君過其下初開數朵色韻標度殆非人間所有豈所謂瑶水之遺也歟繞樹百匝賞之以詩壬子二月十七日江花先好還先落二月芳菲已蕭索掖垣一樹獨開遲嫩葉蘢蓯抱香蕚朝來小雨浥輕紅春色千重與萬重㸃注定知煩曉露剪裁寧不費春工春來到處尋桃李不道東闌花自美傷心世事總如花何用勞勞行萬里憶北山梨花辛亥清明豫與薛起宗聨騎遊北山飲酒大梨樹下時花盛開余有詠北山梨花詩壬子清明備員江西省幕風雨兀坐案牘山積緬懷北山之集邈如夢寐撫景感舊紀之以詩去年清明花正繁騎馬曉出神䇿門千桃萬李看未了小徑更入梨花村低枝初開帶宿雨髙樹爛日迷朝暾柔膚凝脂暖欲滴香髓入面春無㾗青霞玲瓏翠羽亂白雪照耀瓊瑶溫折花對酒藉草坐花氣暗撲黃金尊薛君起舞為我壽勸我一曲招花魂須臾明月忽到樹主人送客唯留髠羅巾欹斜烏帽落醉眼况復知清渾村中至今為故事笑我自是劉伶孫我慚不答竊自慶大抵此樂皆君恩今年清明坐西省雷雨兩日如翻盆群花削迹净如掃衆緑既暗不可捫豈無青錢換斗酒案牘雜沓窮晨昏伻來督責至訶詈面微發紅氣每吞未能搏搖跨鵰鶚詎免束縛同雞豚人生屈辱乃淬礪百鍊正欲逢盤根自知力不舉一羽強欲扛鼎追烏賁晚晴汲井試新火紫筍緑薤供盤飱歸來飯飽對妻子萬事反復何足論壬子清明看花有感熙寧五年壬子清明眉山蘇公看花于錢塘吉祥寺金盤綵藍獻花者五十三人有詩曰吉祥寺裏錦千堆前年賞花真盛哉道人勸我清明來腰鼓百面如春雷打徹涼州花始開是其事也洪武五年基與員外方君看花於西江省掖節值清明嵗亦壬子去蘇公三百年矣歎公之不可見而猶以誦公之詩也因賦長句以記嵗月庶為後三百年張本云吉祥寺裏千堆錦緑髮仙人對花飲腰鼓金盤五色藍醉歸猶帶花枝寢東風壬子幾清明三百年來寺已傾沙河塘上癡兒女猶誦錢塘太守名看花我亦逢壬子况是清明非偶耳莫論南浦與西湖楚水吳山正相似青蓮居士識前因金粟如來見後身總不能知塵外劫也須曾是㑹中人邀方員外看花金昌亭西萬株花胭脂玉雪爭紛拏春風携酒看花去騎馬徑到山人家花深樹密無徑入下馬徘徊映花立紫蕚風微翠䄂香紅絲露重烏巾濕别來幾負看花期客裡匆匆見一枝白下橋邊寒食後廣陵城外緑隂時今年花最逢春早准擬清樽對花倒人意方邀酒伴來花枝已向東風老花雖漸老仍堪折猶勝紛紛滿蹊雪且共芙蓉幕裏人坐看海棠枝上月樟樹鎮舟中作儂是吳淞釣魚叟全家生長吳江口遲鈍長飛衆鳥先迂踈每落諸人後城中父老少相知鄉里兒童亦見欺几上細抄髙士傳壁間大篆考槃詩春風百草承膏沐強擲漁蓑親案牘胥史猶嘲吏事踈妻孥欲笑形容俗羸馬長途恐不堪君恩何日許投簮半篷秋雨烟籠水數㸃寒星月滿潭泊舟桑落洲望廬山桑落洲前泊舟好對面推篷看五老石罅泉從樹杪來山坳雲向峯尖繞風墮初黃未黃葉烟暝將栖已栖鳥莫問漂零與壯遊飲不能多須醉倒聞鄰船吹笛江空月寒江露白何人船頭夜吹笛參差楚調轉吳音定是江南逺行客江南萬里不歸家笛裏分明說鬢華已分折殘堤上桞莫教吹落隴頭花春江對雪春雲作寒飛鳥絶花雨紛紛暮成雪江山最好雪中看况是東風二三月披蓑漁立桞邊航戴笠僧歸竹外莊草暖尚迷雙鷺白樹寒先露一鶯黃我愁春雪看難久重為江山更回首莫煮清貧學士茶且沽緑色人間酒春江雪霽烟嵐蒼蒼雨濛濛春雲淡白春霞紅扁舟江上行十日盡在郭熙山水中今朝推蓬更竒絶兩地江山皆玉潔又是王維著色山十幅屏風盡飛雪參差琪樹當春起零落天花墮春水鸞鶴三千月殿中芙蓉十二氷壷裏當時玉堂看畫圖自謂此景世所無而今老眼見真景始信二老畫不誣人間妙筆奪造化往往天真乃如畫意匠經營自逼真按圖索駿風斯下須臾雪霽天宇碧一色瓊瑶蕩春陌柳自輕黃草自青縱有此圖無此筆眉菴居士非好竒為歎此景無人知都將摩詰圖中意寫作春江雪後詩雪中登黃鶴樓洪武癸丑臘月十一日夜抵武昌是夜風雪交作向曉雪深二尺因登樓賦此黃鶴樓前水平岸春雪當空舞撩亂東風知我欲登樓助以瓊瑶作竒觀昔人黃鶴去不回我騎白鳯橫江來遙看厯厯漢陽樹一色盡是梨花開人間何處最佳絶百尺闌干滿江雪氣壓滕王閣下雲興髙庾亮樓中月瀛洲咫尺非難到鶴背琪花落烏帽載酒誰能問謫仙題詩未必無崔皓江山得此清無敵頃刻銀蟾蕩瑶碧更著仙人紫綺裘卧聽吕岩吹鐡笛雪中再登黃鶴樓平生不願萬戶侯亦不願識韓荆州但願武昌連日雪日日醉登黃鶴樓樓前絶景冠今古况有繽紛雪花舞玉樹參差認漢陽瀛洲浩蕩迷鸚鵡江頭兒女走欲顛謂我自是騎鶴仙白雲飛盡黃鶴去此景不見三千年我拍闌干為招手世上神仙果何有桃李非無頃刻花江湖亦是逡巡酒他日重來五百春樓前花草一畨新相逢不識純陽子何用重尋回道人湘中見春鴈蘼蕪葉長香蔟蔟雙鴈忘機相對浴東風何事不飛歸應念江南春草緑燕山密雪正茫茫况有桃花水滿鄉畢境不如歸去好楚雲湘水是他鄉登嶽陽樓望君山洞庭無烟晚風定春水平鋪如練净君山一㸃望中青湘女梳頭對明鏡鏡裏芙蓉夜不收水光山色兩悠悠直教流下春江去消得巴陵萬古愁長江萬里圖我家岷山仕江左生長吳中遂家焉折先生原籍蜀中嘉州人因祖更西住正見岷江發源處三巴春霽雪初消百折千回向東去江水東流萬里長人今漂泊尚他鄊烟波草色時牽恨風雨猿聲欲斷腸湘江秋意圖湘江澄澄漢江緑芷葉蘭花映斑竹一聲欵乃鴈雙飛數㸃青山淨如王蒼梧回望是荆州楚雨吳雲恨未休無夢可聽湘女瑟有人方倚仲宣樓湘漢秋晴圖讀書不願賢良舉朝醉霸陵暮湘渚兩鬢從添鏡裡霜十年聽遍江南雨呼鷹臺上愛秋清鸚鵡洲前看晚晴紅葉蟬聲湘寺逺碧潭鴻影漢川明湘波漢水愁無盡畫裏江山聊一哂舉世惟稱王仲宣當時亦有周公瑾湘隂廟梨花癸丑二月草日泊舟湘隂廟下廟東圃有棠梨一株花猶未開因念辛亥春與薛起宗賞花于鍾山之北賦詩酌酒為一時勝集壬子嵗宦居豫章追憶舊遊嘗與員外方君道其事復有詩寄薛今年見花于湘水之上不惟北山之㑹不可尋而豫章僚友亦相望數千里外人生漂泊蓋如是也舟中岑寂賦詩一首且歸以示方君預與啓宗締來嵗之約云平生厭看桃與李惟有梨花心獨喜海雪樓前雪一株嵗嵗清明醉花底北山岡下花最盛千樹玲瓏圍緑水前年騎馬賞花處我與河東兩人耳青苔滿地芳草合只有黃鸝映花蕊當時美人東閣上寶髻慵梳初睡起鏡裏爭先試一枝真態欲將春色比樓空燕去花自落細雨黃昏泪如洗踈籬蕭蕭茆屋破况復臨春開結綺我時賞花仍吊古花亦􅙾然為露齒歸來婆娑簮滿帽十日羅衣香不止去年相憶豫章城咫尺春江如萬里今年邂逅洞庭曲細蕚含愁照清泚人至魂消楚雨中花應斷腸湘烟裏三年勝遊不再得百嵗歡娛能有幾吉祥牡丹非舊夢玄都桃花亦如此更約明年載酒來莫笑花前人老矣留題湘江寺在全州瀟湘縣前山繞城緑陰滿地聞流鶯入門下馬松徑濕棕櫚花開春雨晴山僧知我携客至袈裟鐘磬下榻迎汲泉敲火煮新茗茶香鼎潔泉甘清龕燈照佛佛像古舍利五色真身明黃金布地孔翠帳幡蓋聨絡皆珠瓊飛來巨石卧青兕以爪扣擊成金聲十年足跡走萬里福地往往迷榛荆兹山信是無量壽百千萬劫完不傾乃知願力自廣大天神守護邪魔驚我來作禮繞三匝寶花如雪天樂鳴便從真如入妙覺豈有世網能相嬰同行僚友二三輩勸我寫石留芳名他年老眼得再覩風雨剝落莓苔生祁陽行黃鶴樓前漢陽雪嶽陽樓前洞庭月自謂人間無此清到處相逢向人說祁陽江頭春更佳倣佛似是神仙家黃鶯亂啼萬竿竹緑水縈抱千株花千紅萬碧深相映雞犬無聲茆屋靜野老回頭喚不譍忩忩况是通名姓水流花落岸東西只隔踈簾路已迷天下于今皆樂土何須更覔武陵溪皂角灘烟蘿􅧑毶樹䝉鬆夏緑更換春花紅千山萬山無所聽鷓鴣杜宇啼春風穹崖斕斒髙百尺快劍無痕鑱翠碧寶氣朝凝五色霞丹光夜燭三分日我從章江出彭蠡巴陵長沙洞庭尾看遍衡廬兩岸山行盡瀟湘一江水輕舠短楫辭零陵似與亂石爭功能牛刀慣􅍄中肯綮郢斧神捷回鋒稜男兒性命固可惜底事矜誇向群石鷗邊短草一枝笻牛背斜陽數聲笛湘中四詠黑翎紅嘴花間鳥映花一㸃珊瑚小當時如意擊東風萬語千言啼未了雕玉籠開出繡楹海棠庭院雨初晴美人按拍教鸚鵡學得霓裳四五聲右珊瑚棠梨花開滿山白白鷴飛來春一色黃鸝紫燕大匆忙不道花間有間客却嫌香露汚春衣立向湘江映夕暉鷗鷺相逢莫相妬一雙還拂椘烟歸右白鷴湘江兩岸無茆宇湘竹隂隂覆江渚春來未聽一鶯聲只有鷓鴣啼暮雨憐渠亦是他鄉客苦向人啼行不得縱教行得也消魂那箇行人不頭白右鷓鴣暖風晴日融春晝間看花隂雞吐綬綺縠都將綵羽粧紅絲不待金針繡疊疊胭胭縷縷金龍紋盤錯鳯紋深慿誰剪作鴛鴦帶雅稱佳人翡翠襟右錦雞過髙郵新開湖微雨有詠殘虹曉落西陂岸雨腳斜飛鷗鷺亂扁舟盡日畫中行荷葉荷花香不斷船頭老翁一尺鬚斗量菱舟兼賣魚兒能鼓柁女蕩楫何用聰明多讀書夢緑軒余與徐君幼文同謫鐘離結屋四楹幼文居東楹余居西楹文嘗賦詩曰夢裏緑隂幽草畫中春水人家何處江南風景鶯啼小雨飛花蓋深有意於故園也因題其室曰夢緑蜀山居在焉非西蜀之山也折蜀山乃吳中山名幼文所江頭萬章木細草幽泉䕃修竹五月六月山雨晴空翠紛紛滿衣緑杖藜或來隂下行雲影不斷凉風生青蓮翠結欲無路倣佛立有黃鸝鳴去年吳城正酣戰却倚危樓望葱蒨今年放逐到長淮萬緑時於夢中見夢中見緑覺始知索我亦賦夢緑詩逢人說夢子堪笑替人作夢余何癡世間萬事同野馬覺後非真夢非假五色過眼本虛空冨貴於人誠土苴南風劃然吹夢破樹頭不知微雨過從今寤寐俱兩忘靜與白雲相對坐舟入蔡河懷徐幼文憶初見君江浦外七尺長身齒含貝君年未冠復新婚錦帶吳鈎紫絲佩豪姿俠氣颯蕭爽春鴻輕便秋隼快結交梁椘燕趙間追慕亷藺羞郭解誓將弓槊事鞍馬恥作寒儒服巾帶余時瑣屑箋蟲魚折几寒燈寫秋芥相逢一笑恍自失不異低岑仰髙岱殺雞為黍三日談深中肯綮入骱方喜師君竟兄我巵酒動輒受百拜停觴爛熳出險語磔裂鬼膽窮百怪天然清真去雕飾王嬙西施洗鉛黛漱芳雋腴再三讀項上之臠左手蟹技癢礪秣互掎角十捷一二八九敗余實羡君敏且博君亦憐余強而邁英雄敢誇君與我強弱不止楚敵蔡孟潴豪士渤海髙也折季迪時復峙足如鼎鼐髙才於我十倍我尚歎追君力不逮縱橫千字戚生筆迭宕百韻余公菜邁詩二百句甚工折幼文與余唐卿作菜僧房秋逈鉢聲長雪屋香銷燭㾗在清游未竟夕漏終落月殘星悲一慨激烈正醉金陵酒漂泊共泛濠梁載城荒地僻生計拙時脫春衫倩人賣破樓夜雨鄰鐘急委巷秋風茅屋壞斯時愁絶正難禁君獨相看勸余耐别來奔走向西洛面色痿黧病新差章臺握手須臾立胸臆梗塞若有礙平生恥作兒女悲此别戚戚若有槩今朝過蔡將入陳漸見舟艫艤灘瀨平漪細石魚跳渚斜日低烟鴈橫塞相思無奈客中愁聊述長歌歌一再鄭州道中北風如刀吹靣裂弊裘無功塵絮折星稀日出勢尚嚴滿袖霜花厚如雪馬上沉吟苦憶家江南十月䞉春華金錢晚菊低叢葉緑蕚盤梅小樹花寄題水西草堂鴛鴦湖東武塘西桃花滿川蒲葉齊春風二月微雨霽鵝鴨拍水黃鶯啼推窗正見參差桞桞色波光淡於酒烏紗官帽半籠頭紫竹漁竿長在手平生愛讀內景書往往適意追禽魚開門懶迎俗士駕拄杖每叩髙僧廬客來舉酒邀明月細瀹松濤煮春雪但覺身無俯仰勞安知世有東西别今年扈從來大梁錦袍白馬青絲韁信陵宅畔暮鴉集朱亥門前秋草黃輪畨夜直中書省霜華滿巾鬚髮冷粉署香銷紫綺袍碧梧影落黃金井魂夢時時到草堂曲欄花藥漫分行他年得遂歸田計多種墻隂十畝桑留别楊公輔將還榮陽夜集公輔東齊酒酣索詩時銀燈結花漏下二鼓賦此留别紫簾凝烟碧香繞銀燈結花金粟小主人捧酒起勸賓離别長多㑹長少明朝騎驢鄭圃東白沙黃葉滿林風知君此際能相憶笑指燈花映酒紅送朱明善少府胙城主簿氷雪骨天闊霜清見飛鶻家住西湖第一橋半生詩酒笙歌窟斜肩兜子總宜名折舟船九里松隂十畝蓮松下看山船上宿小娃隨索賣花錢鶯嬌蝶妬春如綺一夜東風變桃李回首梁園望故鄉咫尺吳山四千里吳山漸逺音書絶兩鬢青青未成雪烏帽朝辭鄭圃烟鹿車夜挽蘭臺雪上官不憚道路長豈問冨庶并荒凉正須到縣招竄匿要使枳棘皆耕桑婦女飬𧖟男種麥食有雞豚衣有帛兒童不識成丁勞父老能歌縣官德慙余亦是榮陽簿虎牢關下成臯路有酒誰澆紀信魂無人敢畫鴻溝渡鄭衛由來本懿親相思只隔大河津愁將艮嶽風前桞持贈山陽笛裏人并州對雪春風雪花大如手匼匝䙰䙕撲窗牖入水消融鴨緑醅隨鶯㸃綴鵝黃栁人誰能來剡溪棹我獨痛飲淵明酒白髮沙頭罷釣翁睡覺簔衣頻抖擻眉菴集卷之三
