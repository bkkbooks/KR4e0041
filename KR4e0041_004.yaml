front:
  text: 眉菴集卷之四
  hash: sha256:4198ea956035ccda8691d42d1e3f666601561469dd2a178514236b6af68b454f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_004-1a}
body:
  text: 歌行姑蘇楊基孟載著齊老曲乃夫婦齊壽時年八十三生齊年復齊老當年齊種長生草草色蘢蓯日夜芳白頭夫婦長春好夫婦于今同幾嵗五十年前三十二記得花開共撫兒新來折得蟾宫桂親齊老子登科此樂人間殊不多東家新婚奈爾何鐡笛歌為鐡崖先生賦鐡崖道人吹鐡笛宫徴含嚼太古音一聲吹破混沌竅一聲吹破天地心一聲吹開虎豹闥彤庭跪獻丹扆針問君何以得此曲妙諧律吕可以召陽而呼隂都將春秋一百四十二年筆削手譜成透天之竅價重雙南金掉頭玉署不肯入直入辨峯絶頂俯瞰東溟深王綱正統著髙論唾彼傳癖兼書淫時人不識我不厭會有使者徴球琳具區下浸三萬六千頃之白銀浪洞庭上立七十二朵之青瑶岑莫邪老鐡作龍吼丹山鳯舞江蛟吟朂哉宗彥吾所欽赤泉之盟猶可尋更吹一聲振我清白祖大鳴盛世載賡阜財解愠南風琴本名透天關折先生注春秋一擊築吟贈張思亷擊築和短吟一擊意已深但聞築聲怨未知擊者心君子復何如而欲酬萬金萬金不足貴所貴在知音董君行贈董冠軍陷虜非失榮脫死尚多智纍纍几上肉一一生頭翅同行數十人謫戍逺將置翻言念君親向指白日誓臣不棄鄉井臣不背主義願瀝方寸血灑濺天與地江潭白虹起斜貫日色翳亂椹姦守胸用飽飢鱷噬歸來皮膚在顔慘色逾厲乃知壯士勇異彼兒女戲或降或為虜此寧不少愧我歌董君行庶發丈夫志白頭母吟白頭母烏頭婦婦姑啼寒抱雙股婦哭征夫母哭兒悲風吹折庭前樹家家有屋屯軍伍家家有兒遭殺虜越女能嘲楚女詞吳人半作淮人語東營放火夜斫門白日橫尸向官路母言我儂年少時夫妻種花花繞蹊夫亡子去寸心折花竇花窠成瓦埒十年不喫江州茶八年不歸姊妹家蘭芽菊本已凍死惟有春風薺菜花只憐新婦生苦晚不見當時冨及奢珠簾臺榭桃花塢笙歌院落王家府如今芳草野烏啼鬼火磷磷日未西儂如葉上霜死即在奄忽新婦固如花春來瘦成骨婦聽姑言淚如雨妾身已抱橋邊柱總使征夫戍不歸芳心誓不隨波去附杜彥正同題次韻白頭母征人婦銀叉零落鳯凰股天寒日暮練裙薄脈脈無言倚庭樹良人何在西從軍出入干戈死為伍腰間寶劍霜雪光逐隊齊行砍妖虜鼓衰力盡生死決野曠天青塔鈴語鬼妻悲號鬼為舞泪血如珠濺行路郎今一去歸何時櫻桃花開春滿蹊側身西望骨欲折千里煙塵暗邊埒君不見東陽御麵顧渚茶年年上供天王家月團小餅盤龍鳯玉塵十襲浮霜花秪今喪亂殊未已武夫競爾誇豪奢大明揚輝照村塢願見清平好官府延秋不聞烏衣啼版圖復入無東西翻慮此身先奄忽不得親收𣏌梁骨落花冥冥墜紅雨遲郎歸來華表柱若為化作紫鴛鴦一雙飛上青雲去李道士歌先生學醫并學仙朝采參术夜煮泉丹成雞犬飛上天靈氣化為五色煙珠宫璚樓花爭妍紫鳯白鶴青瑶編亦有窈窕蛾眉千緑鬟素頰雲埀肩手把玉磬彈氷絃倏然而來忽而旋一語不泄空留連但見碧霧籠蜿蜒歸來城郭久已遷海水枯涸成桑田疲癃之人瘡痍膻傴若病鶴脊膂跧寸七入口無不痊矍鑠起舞衣蹁躚報以白璧直萬錢珊瑚木難雲錦箋長揖自愛禮數虔倒騎赤虬不用鞭疾如飄風送飛鳶曽不少留我意懸丹臺崚嶒俯九淵清虛自是龜巢蓮我無羽翼相後先譬彼食蜜思中邊十年空齋坐寒氊兀與老衲參枯禪時有嗔愛來相牽未若得兔忘蹄筌嵗月滚滚東逝川欲返內景無夤緣道固可授不可傳恬淡無為神自全何當吹笙導綵旃相顧一笑崆洞巔九峯行九峯山頭白雲飛飛來化為遊子衣遊子思親去不返青天漫漫白日晚父骨未入土兒心安可休恨恨天河水夜夜東南流東南流向何處去向九峯山下住九峰九朵青芙蓉古今纍纍馬鬛封父生有身死有骨何當函置白雲中豈為吳淞山水好父骨未埋心未了而今結廬向墓傍休官甘就吳淞老南風吹送孝亷舟買地千金何足酬白雲倚門兒子去三江明月夢悠悠招鶴詞為薛復善賦朝放黃鶴去暮招黃鶴歸翩翩兩黃鶴朝暮相隨飛朝飛向三山暮歸向遼海雖云城郭是但覺人民改曽邀王子晉去謁浮丘公丹霞映碧水萬里瑶臺風瑶臺十二樓琪樹珠光繞時與五色鸞雙飛啄瑶草天風一飄蕩瞬息三千春回首清淺處拂拂揚輕塵青鸞既西飛丹鳯亦髙舉獨招黃鶴歸靜對黃鶴語黃鶴如有意起舞春風前一笑上黃鶴逍遙凌紫煙黃鶴生歌贈王録事叔明君不聞眉山道士徐佐卿化為黃鶴朝太清還君金㒒姑留得千載名又不聞穹窿小仙徐子貞翩翩自稱黃鶴生鍊形蓬萊山鳯臆紫燕膺千有六百年飛上白玉亰玉亰錦貝闕十二樓五城娟娟萬青娥吹笙沓相迎黃鶴生骨相竒金衣玄霜裙纎指而洪髀不飲華池漿不啄青田芝耻彼五色鳥覽德輝下之浮丘不能招八公不能騎飄然從西來不使上帝知帝遣紫虗玄君魏夫人夜乘白鸞來相追琅霄頃刻九萬里追之不及鸞聲悲黃鶴生請少留爾為黃鶴舞我為黃鶴謳便須吹玉笛登爾黃鶴樓樓髙幾百尺見三島十洲瓊珠金光草鐵網珊瑚鈎樓今已槌碎瓦礫三千秋黃鶴生孰與儔毋乘腰纒人扶搖上揚州揚州瓊花已枯死仙人不復來遨遊黃鶴生鉗爾口母㗸紫泥書寄與西王母王母見爾笑起作小垂手黃鶴生來爾聽崑崙十二峯朵朵芙蓉青上有翠羽箭金鏃孔翠翎為我取之來射此天狼星坐令談笑間四海煙塵清爾亦策爾勳我為爾勒銘更呼薛少保圖爾雲臺形黃鶴不肯顧長鳴掉頭去路逢鐵龍君亹亹道其故龍君勸不止竟觸龍君怒手挽黃鶴衣醉叱黃鶴住黃鶴不敢去飛繞三花樹夜深鐵龍醉不醒黃鶴髙飛不知處玉鸞引鐡崖翁昔有二鐡笛字之曰鐡龍今亡其一崑山顧仲瑛得蒼玉簫一具號玉鸞遺翁配之瑛既為謡索豫和之以引云丹穴鸞蒼霞翰素質琳琅玕衡度尺只寬中心空洞合混沌妙諧律吕有七竅如星攢紫鵷彩鳯乃其侣嬌歌妙舞花成團羿妃久藏桂宫裏弄玉求謀遺蕭史調得仙家别鵠吟吹落虎頭金粟耳太霞仙伯鐡崖翁昔豢洞庭雙鐡龍雌龍入海去不返雄兮鰥處瓊林宫虎頭憐之作婚媾洞房溫和配成偶絶勝玉杵聘藍橋從此翁嘗笑開口畫堂龜甲舒屏風翠煙凝暖春雲濃大瓶酒㵼鸚鵡緑滿頭花插鴛鴦紅鸞兮運居巢龍兮弄橫竹不須再奏合歡辭且聽和鳴太平曲太平曲斷還續一轉一拍相節促諧宫協徴宣八風四海萬年調玉燭玉仙謡和阮孝思作二女仙圖從人持旄前引一仙騎白牝鹿一騎青騾又婢持翬扇在後畫妙入神霅溪錢翁筆赤岸無波海塵起蟠桃枝上花成子玉仙邂逅赴瑶池雲角凌空月如水孑孑干旌引素霓神麚步蹙青騾嘶珮環流響入碧落霧鬢約掠風鬟低鸞尾金寒欹扇影銖衣濕露香痕冷銀漢斜回星彩沉漸漸扶桑耀初景齊州九點春微茫六龍騰駕催晨光踏歌不到碧雲夢胡蝶牽愁愁正長綵霞一滅瑶臺路想像徒憐蕣英慕青鳥千霜去不還猶許留情向毫素附金典籍德儒同題紫皇宫闕開中天鸞書晝下邀群仙神麚玉斫新蹄圓蹀􅞃上送雙嬋娟虹埀橋雲沓路鞭敲風馭騰霧寶幢金節相後先宛在銀河影邉渡侍兒顔色春花明照耀十二樓五城飄飄宫徴相諧鳴桉歌齊唱升天行升天未成曲愁壓巫山緑朝朝暮暮湘水深湘妃帝子徒勞心東飛烏西飛兔海變桑田知幾度燭龍肯緩羲和轡流光應向人間住流光不住將奈何坐令蛾黛秋霜多手摩銅狄嗟蹉跎人生誰似學仙好翠掃鬢華長不老下視寰垓入煙草岧嶤瓊臺夢要眇丹霞姿旁人可望不可追珮環一落空中響世上猶存千載思釣鰲海客歌松陵陶生振嘗遊鐡崖先生門視豫有師友誼介其所知周谷賓索豫歌其號曰釣鰲者為走筆云我昔西遊三湘與七澤洞庭彭蠡一泓窄鼓枻東遊東海濱丰神飄飄逢海客問之不肯道姓名但見虬髯電目面鐵色自言平生釣鰲不釣魚曽跨瀛洲涉蓬壷仙人五六輩拍手相招呼留連寓宿瓊臺上倐見暘谷升金烏烏光焦燒瀚海底神鰲在焉知有幾把竿埀犗餧不吞努力載山行贔屭金鈎一彎新月如上有徑寸明月珠珠含夜光炯如火潛精伏怪驚蹌趨眼小鯨鯢似魴鯉翻濤拔浪吹香餌捲衣欲裂供朝餔爭奈揚鬐掉尾悠然逝笑擲長竿亂釣絲罥出海底珊瑚枝珊瑚枝枝堪玩弄一聲欵乃開煙霏金沙長灘三百里紫泥汚衣慵濯洗蘆花雪落飲瓢空卧枕緑蓑呼不起海客海客胡為乎勸爾敲針作鈎但釣吳淞鱸烹銀斫雪矮篷裏相薦數斛瑶漿酤洗君平生耳聽我長短歌歌聲激烈湧海波陽侯九首天吳十眸為我起舞歌婆娑停歌慷慨三歎息風雲來時才頃刻不如待時栖舊磯袖手安心飬筋力筋力飬既就漁具還持携重施龍伯國人技一展絲綸連六歸春風行春風吹花快如剪桞條婆娑顔色淺四更急雨作輕寒零落餘香上苔蘚街泥汚人不出户強以一樽聊自遣西家酒􅌻復苦貴收拾春衣倩人典齋厨久斷魚肉腥細嚼芹葅勝禁臠時平戚戚恐寒飢况乃厄運愁不免醜妻念我憂無薪私㸑破簀炊戶楗客來嗟吁但枯坐慙愧不得具茶荈今朝棠梨開一花天氣自佳日色晛西南諸峯宛在望暖靄晴煙張翠巘去年􅍡馬虎丘前醉折櫻桃隨步輦只今咫尺烽火隔高柵長營依塹轉極目郊原草樹空那得鉏犁到溝畎東吳自經五世亂四百餘年絶兵燹物盛還衰滿則虧此理甚明知者鮮嗟豫親老諸弟隔晝夜蹙額眉不展巷哭鄰呼不敢聞何暇諄諄問牛喘樓前旌旗芳草闊紫燕未歸簾半捲呼兒插花向晴昊手把短鬚吟更撚準擬青鞋到處遊繞堤蒲桞春泥軟山中雲歌漠漠山中雲起自山上石天風一飄蕩雲與山俱碧白雲嵯峨不出山道人心與雲俱間明朝我亦乘雲去相遇蓬萊縹眇間春愁曲小樓十日聽雨卧春雲作團拂簾過金黃楊桞曉初勻雪白梨花春半破東家胡蝶飛無數西鄰燕子歸兩箇玉關萬里尺書稀春風不似春愁大新絃曲張新絃彈舊曲新絃聲未和一彈一轉軸莫道換絃聲亦換響比舊時增一半不敢臨風快快彈却恐新絃急還斷舊絃棄置君莫悲曽似初絃新上時結客少年場行情如飛絮任悠揚心與遊絲共短長花底若教連日醉座中猶可少年狂新調錦瑟爭傳譜巧製羅囊别貯香衣以鳯翎分縫織帶將蛇角遍鞓裝豪名獨擅秋千社俠氣平欺蹴踘場白璧一雙酬劍客明珠百斛買胡娼金丸挾彈章臺左寶騎聞箏太液傍梅子短墻羞擲果桃花深塢笑分漿每嘲春比人先老不信愁如海叵量猶有舊時桃李夢尚隨胡蝶到遼陽毬場曲軟紅十里平如掌馬蹄踏沙輕不響金袍玉帶五陵兒飛騎擊毬珠作賞身輕擘捷馬遊龍綵仗低昻一點紅倐忽飛星入雲表據鞍回袖接春風有時隨地香塵衮楊花亂擈桃花粉就窩奪得笑歸來月牙輕旋驪珠穩一生嬌貴厭朝天不信人間有倒懸但得花間風月好打毬場上自年年病駝行駝峯黃駝茸紫曽馱黃金獻天子燕山雪深沒駝耳錦韉糢糊駝不死去年隨軍下東越越江水渾沙草熱毛焦肉爛骨欲折回首却憶燕山雪燕山雪不得歸駝飢駝渴誰能知伶俜反遭牛馬欺於乎駝兮爾勿悲爾峰可食茸可衣利爾衣食孰爾醫廢宅行弓刀挂墻旗拂瓦行人過門須下馬日暮將軍縱酒歸白棒橫街人亂打朱門一閉春草積官印斜封泥涴壁守卒收蝦屋後池鄰翁晒麥階前石簾幕當年盡綺羅網絲顛倒腐螢多杏梁風雨丹青濕時有野鳩來做窠樓臺易成還易廢前年猶是桑麻地負蓑行黑風吹雲江雨急破篷蕭蕭衣被濕妻孥頂笠待天明我亦負蓑中夜立大奴操瓢不停手小奴張燈照鼉吼君不見杜陵茅屋嘆秋風此厄命窮無不有醉歌行贈朱彥明别西風吹老淮隂桞秋色遙連大江口楚漢爭衡未解兵一杯且盡髙陽酒竪儒可罵冠可溺底用文章呈百醜亂世功名才唾手不論鳴雞與屠狗自將雙劍報漢公更輟千金酬漂毋英雄百萬賭一擲肯對兒曹奪升斗東家權利競刀錐聞之恨不雙耳黈邊纊也折他口切耳我生貧無屋半畝囊錢數緡粟在缶凍餓長居野老先飛騰已落他人後君今著鞭辭培塿野樹遙遙迎馬首為問伶俜輿下人年來頗得蘇息否梁園飲酒歌我生之辰木入斗烏啼東井命壁守壁為文府斗為嵗許我文章播人口三齡能言學誦詩四齡指字識某某五齡琢句對虛實聨青儷黃配竒耦客來當座賦短章四韻不待八義手九齡六經已畢讀掩卷背誦無掣肘丰儀翩翩秋宇鶴顔色濯濯春月柳鄉閭每辱師長愛學校恥與兒童友毫分縷析辨同異務植嘉榖去稂莠揮毫直欲五色爛倚馬未肯一字苟龍蛇擬將赤手搏富貴謂可拾芥取文場馳騁竟一蹶鬐鬛局促俯其首歸來焚膏坐長夜盥櫛不暇面塵垢淬鋒礪鍔期再䇿狐豕隳突群兕吼豈惟文運遭屯否無乃曆數厄陽九自慚㝎亂匪鉛槧束縛經傳事南畝耕童樵稚課朱墨塗抹破硯掃弊帚東藩諸侯遂見徴白璧玄纁賁林藪屢辭不獲始強起野服長揖坐談久青閨漏箭傳午滴紫幕爐薰散春牖時翻玉檢題鸞鳯復賜銀箋篆科蚪鵑啼花落燕鶯飛頃刻浮雲變蒼狗遷逐西行泣楚囚倉卒弗及拜慈母初移鍾離復入汴山路匍匐十日走皮焦足胝汗浹踵手䇿羸蹇背有負囊資空乏衣破裂無以補綴謀諸婦婦言别久簮珥空借舊乞鄰無不有髙堂姑老繭女幼日羞魚蝦買梨藕恐無紈帛禦姑寒安得吳綿為君厚余聞愧赧雙臉赤灑泪出門心欲朽病軀有僕不得將藥食扶持賴親舊寒沙古壘泣英靈落日踈林嘯猿狖前途尚逺節屢換白露應候月在酉榮枯萬變類觀奕憂憤百結如錯鈕筋力衰頽卧猶倦鬚髮頒白照逾醜盡將得失付忘言且醉梁園一樽酒癡頑子歌癡非癡兮頑非頑清晨掃雲夜掩關恥道焦螟爭觸蠻齷齪自處癡頑間生涯秪在青巑屼拾枯汲深忘險艱披煙捫蘿亟躋攀朣朧月出東海灣謂是上古白玉環直欲走海赤手扳禁之不可誓不還道逢呆翁樂且間相顧一笑玉齒殷十年采藥不下山倒駕玄鹿招白鷴神經祕牒鳥篆彎時復竊讀見一斑往往亦辨跖與顔今年從翁來帝寰勸師慎勿忘舊山山中春泉響潺潺松花落蘚香斒斕醉聽黃鸝眠草菅不博人間玉筍班白葛篇代贈白葛細如絺千絲復萬絲南風池上看顔色正相宜昨日夫君别啼痕滿袖垂白葛軟含風輕盈望若空釧露金條脫珮映玉玲瓏浴罷羞單著催將半臂籠白葛白如霜裁衣當暑裳氷紈羞皎潔霧縠讓輝光念是夫君贈秋風忍棄藏憶昔行贈楊仲亨嗟我憶昔來臨濠親友相送妻孥號牽衣上船江雨急辟厯半夜翻洪濤濠州里長我所識憐我一月風波勞呼兒掃榻妾置酒買魚炊飯羞溪毛酒酣話舊各涕泣鄰里怪問聲嘈嘈明朝府帖促蓋屋旋􅓯瓦礫除蓬蒿大竹為楹小榱桷覆以菅草并索綯君時亦自長干來為我逺致書與袍密行細字讀未了苦語泄泄如蠶繅收書再拜問所厯燈影照夜吳音操異鄉寂寞遇知已歡喜豈止餽百牢藤牽蘿繞互依附濡沫相潤脂和膏薰風晝眠竹几靜落葉夜掩柴門髙黃鬚為汲東井水翠袖或送西家醪中書大官捧檄下霜鶻脫鏇鷹解絛君前挽鞘我後䇿陟險攀峻隨猿猱飢腸午渴掬澗飲甘滑不啻青葡萄到家倉卒席未暖復此赴汴同輕舠崖髙水澀石溜急時復著力撑長篙豫生有弟皆異域漂泊幸與君逢遭君才自是伯者佐比擬管樂卑蕭曺方期補劓拯焚溺詎肯析利窮秋毫比來縣邑久蕪廢亦有桑柘柤梨桃遺民可鳩業可復應屈君輩揮牛刀他時解綬歸故里相期結屋吳江臯卷之四
