front:
  text: 眉菴集卷之十一
  hash: sha256:1224fedc4ad7d7eff1a556951ccc007d782d294725a82c6cfdb813f7092955b3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_011-1a}
body:
  text: 七言絶句吳郡楊基孟載著天平山中豫家赤山相去不五里許細雨茸茸濕楝花南風樹樹熟枇杷徐行不記山深淺一路鶯啼送到家寒食有感二首亂裏情懷怕寒食強拈巵酒竟無歡晚來一陳東風雨吹得梨花不奈看漠漠輕隂接逺天離離芳草鎖春烟郭西多少新墳墓若箇能來掛紙錢過鄰家撥悶亂來情思倦看花間却西園小小車今日偶因題竹去試扶藜杖到東家憶均垍二弟在逺别來芳草遍天涯憶汝飄零何處家一向春愁禁不得晚風吹破紫荆花一雙鴻鴈隔天飛三月江南未解圍惆悵夜來風雨裡片時春夢見渠歸兄愁弟戚兩相親還復江濱定海濱却恐數州消息異懶將踪跡問行人稱稱初度我年六六鬢如絲見汝三齡却兩朞願得汝長并我老太平還說亂離時回文二首烏啼夢裏燈添恨月轉屏前影對愁枯葉亂飛霜砌冷細烟香繞夜囱幽秋凉晚殿水蕉紅扇掩閒情舊感空樓對逺霞殘照落愁邊寄信有歸鴻畫三首石上風來吹酒醒白雲幽繞緑苔生山中莫道無絲竹聽徹松聲與澗聲葉葉衣裳帶雨裁白漚江水淨無埃偶然扶杖沙邊立不為看山獨自來幽蘿灌水䕃清溪水鳥忘情自在啼正好從容看山色淡烟衰草夕陽低紅緑蕉二仕女圖兩樹紅蕉隔禁扉曉凉携伴試羅衣金鈴小犬迎人吠應怪秋來出院稀為折芙蓉向御溝碧羅衣薄又驚秋侍兒剛道新凉好不解芭蕉與扇愁夢逰西湖採蓮女郎蓮花腮藕絲衣輕難剪裁瞥然一見唱歌去荷葉滿湖風雨來燈夕微雨脉脉輕隂潤玉笙霏霏小雨濕銀箏雖教月色朦朧黑更覺燈光分外明紅梅一般香影月朦朧只有仙肌逈不同天不念貧空付色儘教消瘦却教紅水仙氷肌玉骨照江波瑟瑟塵生襪底羅自是仙魂招不得滿天風雨夜如何十二紅圖何處飛來十二紅萬年枝上立東風楚王宫殿皆零落說盡春愁暮雨中栁枝詞千枝萬縷軟婆娑倩得東風著雨挼昨夜鵝黃變新緑比郎衫色不爭多故山春日七首千花萬蕚委塵埃只有荼䕷獨自開應是鄰家更零落過墻胡蝶又飛來梨花兩枝春可憐下馬折花山徑邊山中人家改新火隔樹吹來榆栁烟青青蘆笋雜蒲芽細細浮萍是栁花昨日臨池看科斗曉來風雨已聞蛙桑葉隂隂戴勝飛采桑人執懿筐歸老夫𣣔買新絲染製取斑斕五色衣寂寂青山一鳥啼紫藤花落午風微不知刻漏長多少但覺桐隂半日移輕寒拂拂雨沉沉紅漸蕭踈緑未隂不是囱前兩啼鳥錯將時序比秋深春來芳草踏成蹊半是車輪半馬蹄多謝清明三日雨舊痕新緑一般齊陌上誰尋雨後花山中人摘雨前茶隂隂樹木青青草可是王家與謝家雨中對杏花杏花枝上雨冥濛洗得胭脂淡淡紅寄語東君莫相妬放教春色十分濃壺中碧桃先謝折梨花一枝補之一枝紅在一枝空底事氷肌不耐風更折梨花來作伴玉環飛燕本相同花時感事為怪春寒起較遲卧慿啼鳥報春期近來鶯燕渾無語過却梅花總不知雨中對花三首正好看花却醉吟醒時花事已傷心西園數朵開將盡風雨相看到夜深春風幾日雨淹淹鶯慘花愁總不堪惆悵隋堤千樹栁至今青眼望江南消得吟風却避風已開微淡半開濃要知有色還無色莫愛深紅映淺紅春半薺葉深能沒乳鴉石泉清可見魚蝦一年春事餘多少只有南風楝子花春暮西園雜興四首踈踈簾影漾微波庭户無人鳥自過一樹楊花三日雨池塘春水緑萍多緑蕪春水燕雙飛細雨輕寒稱祫衣半日不來池上立殘花又比午前稀蒲葉初長蕙葉齊杏花如雪涴春泥無人搖動秋千索黃鳥飛來架上啼野棠飛盡木香開蝶靜蜂稀徑有苔正是江村寒食後老夫先為緑隂來落花嘆半隨流水半莓苔只有沾泥更可哀燕子也能知愛惜為人㗸入繡簾來三月晦日花飛一片即春歸况是隂隂緑滿枝謾道東風有今夜不知春已去多時仕女四春圖東風剪剪入粧臺眉蹙春愁掃不開非是薄羅能耐冷捲簾貪看燕雙來右春隂隔簾鸚鵡解呼名花落閒庭草自生曲曲畫闌皆倚遍一春刀剪不聞聲右春悶風送楊花滿繡床飛來紫燕亦雙雙閒情正在停針處笑嚼殘絨唾碧窗右春繡蹴罷秋千日已沉東風花底力難禁笑携女伴歸來晚失却羅鞋不再尋右春倦衍斯道上人折梔子花見遺走筆奉謝五月鄉林簷蔔開雪花如掌照青苔不教天女輕分去却為維摩逺送來屋後種松屋後荒蕪地五弓自除瓦礫種青松朝來未見蕭蕭葉便覺吟詩錯費工松下小簟踈簾曲水濱葛衣蒲扇紫荷巾自慙不及雙松樹猶有清隂蔽路人寢齊見螢火雨館蕭條已罷吟流螢穿隙自相尋也應憐我無燈燭故入紗帷照夜深看蜘蛛補網風雨蛛絲斷不收密經細緯更綢繆自憐辛苦才盈尺多少飛蟲網外遊粉團兒花小小流蘇結素羅團團香粉綴柔柯玉奴不識傷心恨滿面春風笑靨多見紫薇有感野水荒垣兩樹紅猩袍爛熳照西風無人種近絲綸閣花落花開暮雨中蓮渚泛舟氷漿不用蔗漿調聞得荷香酒自消一派江聲滿船月却愁容易度今宵玉簫低與玉笙調度未成腔意已消雪白芙蓉香一色總教人不愛春宵避暑貽美人緑荷瀉酒勝瑤漿白葛含風壓串香不待瓊樓髙百尺玉人相對自清凉酥凝酪粉煉霞觴衣染浮絲碧藕香試下瑤階看明月玉膚消得幾多凉夏日聽徹簫韶獨掩扉氷花向夕斂紅衣舞衫不用鴛鴦縠别染春絲上錦機赤山漫興松梢吹粉落衣裳躑躅花開竹筍長可是山中朝洗藥一渠春水茯苓香過鄧尉山訪徐良夫留别二首隨意扶笻入逺林紫藤花落徑苔深山中莫道無音樂一片鶯聲在緑隂浮雲載山山𣣔動春水煮茶消午夢緑蘋風起恰開帆數聲啼鳥來相送𬋩夫人墨竹霧鬢雲鬟洛浦神氷肌玉骨衛夫人都將松雪齊中意偏寫瀟湘雨外真趙仲穆墨蘭當年曾進福州蘭小殿秋風翠珮寒零落楚香收不得且從魏國畫中看繁露幽香泣翠娥冷雲纎月淡秋河沅湘一帶皆春色誰道懷王廟裏多白描芍藥圖錢選作玉樓寒擁翠羅衾珠箔晴搖縷縷金蝴蝶亂飛花未落東風庭院又春深睡起圖月圓團扇送輕涼荷大如錢作藕香午夢醒來思白雪玉甌催進荔枝漿張仲敏鈎勒竹解珮歸來月影孤秋風鵉鶴自相呼先生晚種參差玉招得林間兩鳯雛藍采和像石崇步障四十里猗頓珊瑚八百株寧可黃金堆下死街頭不散一青蚨贈胡校理文伯南郭先生一尺鬚秋風𣣔别意踟蹰明朝歸看庭前杏添得清明幾百株贈薛如鑑善相二陸門前一見君笑談許我到青雲平生不學縱橫術那得黃金鑄印文寄無錫張彥禎老去張堪更愛農不教稅務及疲癃如今麥熟蠶成箔處處桑麻百二弓寄陳惟寅惟允坐有重氊食有魚眼能識字手能書山于秋水船頭看家在春波門外居松陵道中吳姬蕩槳出蘋花江上行人未到家日晚城邊秋似水萋萋烟樹亂鳴鴉青山白雲圖手種溪頭十畞隂鳥啼花落暮雲深夜來一尺蘭苕雨若箇扁舟肯見尋宿雲竹居月斜風細酒微醺白露瀼瀼濕練裙底事夜深清不寐半窗竹影半囱雲題畫暮靄霏霏掩翠峯繞籬落葉有行蹤杖藜獨自行吟去不是尋僧定看松四皓高帝如何太子盈先生垂老入京城當時四皓非黃綺多是留侯指教成煩李伯定移菊何處籬邊菊本多煩君將送緑婆娑老夫準擬重陽醉亂折黃花插皂羅九月八日對菊去年風雨罷登髙今日黃花預見招莫怪繞籬開未好正含秋色待明朝題趙松雪臨宋徽宗水墨草蟲趙自題云不假丹青筆何人寫逺愁露濃時菊晚風緊候蟲秋元末諸作者不知公意反有所誚走不揣次韻用以慰之云王孫老去尚風流畫裡新詩寫淡愁莫道吳宫與梁苑露蛩烟草一般秋二美人圖半餉無言却斂眉玉簮斜墮翠鬟欹相逢莫說傷心事才入深宫自得知鴉頭羅襪鳳頭鞋細踏花隂下玉階綰得青絲無奈滑更臨春水照金叉刺繡倦繡二圖兩日無心繡一絲偶將針線刺花枝無端繡到雙胡蝶憶著西囱夜雨時刺得芙蓉半朵金倚床無語自沉吟玉奴不解傷心意抵死相催繡幾針附唐處敬和洗花染線刺春羅鳳翼雙飛錦作窩暫起非關針力倦海棠時節困偏多附髙季迪和翠絲盤葉碧玲瓏小蕚花鋪茜縷紅夢裡鴛鴦留不得分明却在繡床中為孟辨題二仕女紅綃衫子雪膚肌女伴相邀去賭碁花底忽逢雙蛺蝶背藏羅扇看多時右觀蝶玉奴催報海棠開及早梳頭出鏡臺便揀一枝和露折六宫惟我最先來右折花二白練圖㦸尾參差白練分馬嵬坡下舊香魂君王西去無消息踈雨桃花半掩門右碧桃珍禽斜立海棠枝玉雪胭脂看𣣔迷只恐驚飛花亂落霓裳三拍按教低右海棠代贈所歡三首濃緑蛾眉淺淡粧玉肌紅映白霓裳春風不稱花枝願逢著多情即斷腸衆中相見獨相憐憐我多情更有緣不是無心看春色亂離情緒不如前寬盡羅衣兩鬢秋相逢猶自愛風流天涯無復陽臺夢辜負春風萬種愁枇杷青鳥枇杷香繞漢宫栽珠箔銀屏四面開武帝遣書邀阿母青衣使者最先來以上在吳中作遇史克敬詢故園克敬自長洲來因詢吳中風景大異往昔賦此以寓鄉里之思云三年身不到姑蘇見說城邊栁半枯縱有蕭蕭幾株在也應啼殺樹頭烏贈京妓宜時秀欲唱清歌却掩襟晚風亭子落花深坐中年少休輕聽此曲先皇有賜金出金陵城南長干塔前千樹花半隨流水半泥沙王孫醉裏渾忘却走馬粗豪來索茶去盡黃鸝緑樹隂間門重掩落花深當時一曲尊前酒多少王孫買笑金憶挹翠亭聽歌示徐幼文余唐卿清歌一曲動梁塵只憶當時淚滿巾何况春歸花落盡眼前漂泊兩三人江寧雨中解盡春氷水漸通岸花狼藉燕西東巴江不盡青青草都在踈烟淡兩中江村漫興三首行人何事不思家春盡聞鶯有懷髙季迪一聲黃鳥喚愁醒已是南風緑滿庭客裡得聞休恨晚故園知有幾人聽從袁贊府乞珉玉巾環新製東坡一幅巾也堪漉酒障埃塵更須乞取雙環玉相稱山人兩鬢銀夢故人髙季迪三首辛亥八月十八夜夢與季迪論詩已而各出詩藁互相啇確季迪在吳時每得一詩必走以見示得意處輒自詫不已夢中抵掌故態如常時因賦三絶季迪且索其舊作云詩社當年共頡頏我才慚不似君長可應句好無人識夢裏相尋與較量老來久不誦君詩得見都忘是夢時我最憐君君識我此中未許俗人知驚人新句嘆無前故態踈狂似少年便寫錦囊三百首為君披咏步凉天秋夜秋風今夜十分凉斜月欺人巧照床自是不眠思往事漏聲元只許多長江邊見紅葉一瓣霜紅一瓣秋上陽宫裏御街頭而今漂泊寒江上相趂蘆花細細流以上在京并寓江濵作客中懷弟妹弟妹當年五六人銀鞍羅綺照青春而今死别兼生别風雨瀟瀟一病身沙河聽雨壬子閏七月十四夜惡雨乖風聽未休暗愁悲續斷鴻秋却將湖海三年夢併作沙河一夜愁舟中書所見二首羅帕包頭不畫眉沙河船裏欎金衣可應憶著關心事斜倚秋風看鴈飛玉膚花貌是誰家趂逐秋風渡晚沙河水東流燕西去一般魂夢繞天涯舟中聞絡緯江濶天空北斗低月寒沙白露凄凄家鄉漸逺衣裳薄慿仗秋蛩莫夜啼客中憶弟去時霜葉繞溪紅落盡桃花信未通客裏匆匆寒食酒一尊那得弟兄同夢稱稱語未能真已誦詩相過爭愛骨權竒他鄉夢裏分明見猶似當年索果時掌上明珠落大淵夢中愁對玉姢姢我將四十空回顧念有何人與我玄過琵琶亭在彭澤楓葉蘆花兩鬢霜櫻桃楊栁久相忘當時莫怪青衫濕不是琵琶也斷腸詠大姑山下梅花紫蕚黃鬚抱玉膚也應人惜半枝枯雪中惟有山僧折瓦缶寒泉薦大姑出江看廬山一疊峰巒一道泉幾重雲樹幾重烟歸來記取屏風樣寫向茅齊聽雨眠雨晴廬山看雲橫帶斜烟抹翠蛾淡籠初日照青螺行人謾道廬山好自是春雲態度多看廬山時無片雲消盡春雲山更宜芙蓉全見碧參差天然標格誰能似號國夫人淡畫眉舟泊南湖有懷三首二月十二日舟泊彭蠡南湖嘴風雨甚寒憶吳中是日郡人皆試夾紗衣單羅扇往范家園看杏花入春來此為行樂之首紗衣羅扇一時裁兩兩三三作伴來正是吳中好風景范家園裡杏花開單羅小扇夾紗衣冠子梳頭插翠微知是范家園裏醉無人不戴杏花歸日日看花載酒行不論時節與隂晴相逢猶自嫌春色花裏迎人問太平途中為人題畫溪水􅉼秋帶緑蕪草堂雲冷鶴將雛相逢未遂還山約空復年來看畫圖江西送陳文獻薛存道二生還山西三首江上憐君踏雨來推篷一笑兩眉開莫教章句孤年少自古山西出將才滕王閣下說山西多少雲山望轉迷問我路程嗟更逺桂林烟雨鷓鴣啼君歸晉兾我湘潭塵土風波兩不堪盡道衡陽有回鴈行人更在鴈西南到江西省對花閒來樹底踏青莎喜見斜紅插皂羅莫愛壓枝千萬朵三花兩蕊更情多長恨花開春色闌不堪春半百花殘從今却願遲開落得向清明節裏看芳草無端出意長斷紅殘緑弄春陽莫愁寒食花開盡更有荼䕷與木香最好花枝最後開千重粧束萬重栽東風不敢輕吹破前度劉郎恐再來青絲茵褥是柔莎白苧衣裳勝綺羅千樹桃花紅一色春光誰道不須多小小旗亭曲曲闌禁烟時節未鶯殘便須連夜燒銀燭莫待他年霧裏看東湖東畔栁枝長滿苑飛花亂夕陽何處祓除兒女散過來流水欎金香生色屏風一面開輕羅團扇合歡裁深深院落青青栁縱是無花也看來後四首次前韻題方貟外像一尺長鬚七尺身當時顔色畫能真相看已覺如兄弟不待他年是别人雜畫六首玉碗糖霜萬顆氷王孫筵上酒微醒若教畫作回仙鶴一夜吹簫過洞庭右石榴盧橘當年出漢家誰將名字雜枇杷風枝露葉金盤果盡是僧房雪後花右枇杷一斛凉州價已多上林千樹酒成河塵沙漠漠穹廬雪若箇銀瓶覆紫駝右蒲萄茂陵老去愛求仙青鳥㗸書到御前不意種桃成一笑開花結子六千年右緋桃在臨江驛舟題密瓣深紅别有春武陵千樹𣣔迷津不因流水漂香出那得秦人識晉人右千葉緋桃沉香亭北繞闌栽曽藉花奴羯鼓催今夜不須銀燭照待他明月上枝耒右海棠淨洗胭脂學道裝玉冠青帔羽衣裳蕊珠宫裏秋宵永立盡瑤階一夜霜右蜀葵紫袍紅刺玉纎纎甘露收香入翠奩何處南風開滿架緑隂庭院水晶簾右薔薇在市汊驛舟題聞鵲鳷鵲船頭喚夢回鵲聲雖好却成哀升州一望三千里那得音書送喜來過黃州吊赤壁風雨來登赤壁磯武昌烟栁望中稀無人更有坡仙樂月小山髙醉未歸舟中見雪珠鮫人捧淚泣春風亂擲明珠向短篷欲采緑莎紉作佩滿江春水落花紅鯉魚山阻風天甚寒雨皆成霰江南天氣大無慿草色烟光暖𣣔蒸向晚鯉魚風乍急盡吹小雨作春氷夏口川江東接漢江流萬里相逢鸚鵡洲更約瀟湘與沅澧大家淘盡古今愁望武昌吹面風來杜若香離離烟栁拂鷗長人家鸚鵡洲邊住一向開門對漢陽春風吹雨濕衣裾緑水紅粧畫不如却是漢陽川上女過江來買武昌魚德安山中石橋斜日萬山隂雲滿寒溪雪滿林獨有梅花看不厭江南春色故園心嶽陽阻風三湘風雨五湖春萬里相思一病身能向此中魂不斷更無愁處可愁人過洞庭口號七十二峯天際開一泓秋水大于杯白鷗千㸃飛不盡鴻鴈一雙何處來湘江對雨風雨黃陵半掩門鷓鴣聲裡樹微昏無情最是江邊竹猶自淋漓有淚痕渺渺滄波淡淡鷗緑蒲青葦響如秋人生不聽瀟湘雨行遍江湖未是愁題楚江秋意圖萬里巴江入海流水天空闊鴈行秋楚歌未斷西風起一假青山一假愁經汨羅廟在湘隂縣北六十里三閭祠宇汨羅村重午年年一掃門莫道獨清當日事至今湘水不曽渾祁陽道中五首踈烟小雨濕流光愁得楊花不暇狂半餉春晴便飄蕩綴人簾幕上人床愁紅怨白滿江濱一樹盈盈恰破春正是情多開自晚雨中知有斷腸人曲垣低檻是誰家門户深深閉落花千百黃鸝萬竿竹夢魂應不到天涯一簇荼䕷湘水東輕輕脂粉趂微風低嚬淺笑皆傾國不在胭脂著意紅紅深翠密不成蹊修竹玲瓏巧更低黃鳥未知花又落野棠風裏一雙啼潭州雜懷九首春江㳽漫春草亂一色遙遙青不斷晚來烟起鷓鴣飛無數桃花在東岸鵁鶄鸕鷀飛滿沙緑水刺刺上蒲芽湘潭縣裏春分後不道人家有杏花渡頭烟栁入村稀沙嘴漁舟各自歸却笑匆匆㕠白鳥滿江風雨不停飛桃花深紅杏花白紅白花開弄春色東風一片落衣裾腸斷江南未歸客船頭漱齒濕衣裳水面花飛口亦香坐愛蜻蜓兼蛺蝶閗將春色上牙檣午睡醒來風滿面十年春夢思量遍前度劉郎觀裏花舊時王謝堂前燕吳女娉婷楚腰舞梁園風雪瀟湘雨多情長使鳥催歸底事不教花解語楚妃祠前花繞樓楚人唱歌牽客愁全開一樹紫含笑閒聽數聲黃栗留湘中老翁不褁巾見我自是平生親衡陽萬里鴈不到為問使君何處人舟回看廬山雲中西去雨中還又見秋雲黯淡間不是漂零應不得一年三度看廬山望五老峯次權宣使韻宣使權仲武有送余詩曰五老騎雲來送迎八月草四日雨中過湖望五老在烟雲中若欲與余笑語者因用仲武韻為起句五老騎雲來送迎笑余舟楫往來輕前身曽住東林寺因與廬山有舊盟五老騎雲來送迎迎君却是送君行從今卧聽鍾陵雨誰與廬山愛晚晴以上出任江西并使湖南作送李都司往江西簡省中諸友時寓茆山秋屏閣下雨新晴無恨匆匆别我情不意長干秋色裏又將詩句送君行我從西省罷官歸旋葺茆茨近翠微從此生涯是鉏畚故人休怪寄書遲左掖桃花向北栽兩畨風雨見花開明年對酒應齊說曽與眉菴共看來嘆道傍廢宅桑柘隂隂繞岸栽石闌銷折卧蒼苔欲求姓氏無人識時有逃軍剝棗來觀剝棗珠實離離雨更新行人敲剝走荆榛我來不忍臨風食為憶當年種樹人重過文竹軒二首蕭蕭茅宇曲岡西嗟我重來路已迷何事鄰翁猶愛惜壁間留得醉中題倐來還去已堪悲况復難期再到時踈栁最多離别意十分憔悴向人垂送陳明善之真定風塵􅑿得鬢毛斑不為臨岐一愴顔五日北風三尺雪馬頭遙見太行山過下蔡當時佳麗比陽城楚女腰肢雪閗輕莫怪王孫迷一笑古來尤物萬人傾過竇鳴犢大夫祠生死齊君有舜華西來尼父竟同車荒祠人去槐隂靜一院南風芍藥花梁園聞鴈有感萬里飛來一鴈聲梁園枕上夢初醒誰憐今夜江南月又是空齊獨自聽空齊獨自數長更聽得嘹嘹一鴈聲忘却江南與江北斷腸同是客中情斷腸何處最堪憐客裡逢秋憶去年安得妻孥與兄弟舉家歡笑鴈聲前登宋宫故基上皇宫殿碧參差嗟我來登見廢基盡道河邊金線栁腰肢猶似李師師太行望雲為新民賦十年漂泊向風塵一度看雲一愴神此日逢君重惆悵異鄉多少望雲人晉兾封疆萬里長白雲飛處是他鄉愁心恨不如春雪一夜東風到太行到山西題畫梅江南分手到山西每憶溪橋夢不迷氷雪有如林下約一枝重向畫中題太原官𪠘見榴花短短榴花石上栽南風吹得一枝開花枝縱是相憐我白髮何心為看來罷釣圖為翟少參文光題時翟將休致故及之畏途萬里費經逰到處紅塵沒馬頭何日釣竿從此老也分一片荻花秋觀晉祠泉在太原縣流出為汾河者太行翠色欎蟠蟠一派泉飛石罅寒千古東流誰禦得任歸滄海起波瀾曉度鴈門關山迢遞朔雲髙風緊霜華積毳袍此地宣威稱李牧有誰再退北羌豪除夜舊曆驚心只一行坐依燈火戀年光尋常客裡愁長夜惟有今宵願更長以上途中并仕河南山西作眉菴集卷之十一
