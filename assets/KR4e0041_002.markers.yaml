  - {type: variant, offset: 6455, length: 367, content: 雞鳴凾谷走壮士䇿老扶㓜驚四隣衣冠詭異頓危變始猶未認乆乃真故舊十室九戦死惟有碧草長如人東風渡江蕩舟楫與我相見吳城門梅花照耀雙鬂白柳色掩映麻𫀆新連朝握手話未了曉起别我潜悲辛江城禁酒不得醉黄鳥怨恨青山顰當朝大官每好士與子孰匪葭莩姻胡不留此拾青紫朝馬蹴踏天街塵君言家逺寒食近歸拜隴畝除荆榛魚蝦可羹黍可飯細雨更採西溪􅐜我聞此語重歎息敦尚孝義良可珎冨貴誰復念祖禰髙塚但卧雙麒麟春江風髙船去急鳬鴈散漾波𥻘𥻘何當委書着野服放浪同覔桃源民句容作折以上在金陵并哭翟好問今年九月君哭子老境憐君俄有此兩月悲號眼欲枯正擬唁君君亦死死生大夢未足驚但恨如君無繼嗣乃知造化真兒戯夭顔壽跖誰所使有子不如孫仲謀何用碌碌豚犬耳嗟余與君交最晚傾盖相歡忘汝爾夜雨酣歌酒滿壷秋風冩寄詩盈紙詩今在手那忍讀起酹一危悲莫止異鄉失友如失兄况復飄零俱老矣回首南園苧葉青憶君涕泪清如水卷之二, WYG: 燈疎影硯臺前}
