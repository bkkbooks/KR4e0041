  - {type: variant, offset: 792, length: 645, content: 洪鎮撫話霧中望新淦城泊五老峯下湖西望瀑布聞廬山雷鳴望蘄州過小孤贈漢隂老父吊賈太傅望岳麓望南岳過魏夫人祠衡陽逢丁㤗發衡州湘女湘江道中湘竹有題瀝澗灘别劉啓賢過道士洑過仙家岩零陵感春瀟湘八景登三夏故城過長平有感至太原卷之二七言古體逰穹窿山姑蘇臺雪坡索詩着色西湖景約范園看花草堂芙蓉尚梅軒王叔明畫棘竹三禽圗詠七姊妹花贈鑷工王生畫爲包師聖題沈仲真恵梅趙善長畫夜聞異香贈吕道士巧石双松圖清溪漁隱聞蟬畫馬贈故人全王孫歎道傍野花夜宿静嘯軒巢雲對雪禁體聴老京妓歌送劉子逺喜客来送章教諭雨中看花白門送范謙送李琴川冝秋軒桂冝秋軒梅贈别徐季子送吴居易周曽秋塘圖北山梨花句容送蔡惟中贈許白雲喜雨杜伯淵送新米月灣秋影贈蕭䖏士别哭翟好問卷之三七言古體夢題雲山圖省掖觀梅西省海棠千葉桃花憶北山梨花清明看花方貟外看花樟樹鎮舟中望廬山聞鄰船吹笛春江對雪春江雪霽雪中登黄鶴再登黄鶴楼湘中見春鴈登岳陽楼長江萬里圖湘江秋意圖湘漢秋晴圖湘隂廟梨花㽞題湘江寺祈陽行皂角灘湘中四詠過高郵新湖夢緑軒蔡河懷徐㓜文鄭州道中題水西草堂留别楊公輔送朱明善并州對雪卷之四歌行齊老曲鐡笛歌擊筑吟董君行白頭母吟附李道士歌九峯行招鶴詞黄鶴生歌玉鵉引玉仙謡附釣鰲海客歌春風行山中雲歌春愁曲新絃曲結客少年場毬場曲病駞行廢宅行負蓑行醉歌行梁園飲酒歌癡頑子歌白葛篇代贈憶昔行卷之五長短句體梅邉讀易觀眠松有感覇王丘過陳湖送孫照庵七賢過関圖宋宫觀潮圗漁樵問話圖七􅋙圖春􅱜捕雀圖夫織蒲麥田髙休採花詞雲樵畫鴈送張山長挂劍䑓狼山青霜葉紅君莫疑錦㠶涇送葛仲行七色荼䕷花双春堂元, WYG: 更始未可同}
