  - {type: variant, offset: 1438, length: 2158, content: 立春白雲書舍九日賞菊苧隱送朱孟仁彭蠡阻風南康望廬山登繩金塔過劍江聞鷄癸丑元日憶省掖桃花水雲居題李叅政紅竹卷之六五言律新嵗見月雪中柳雪中燕元夕前對雨感春近有謝恵江芷池閣晚興二首秋齋雜賦五首七夕送沙天民雪坡入淮早冬露梅花清夢夜坐懷天倪宫怨送王季野𥘉夏過道院謔柳隔隣桃花孤坐閏七夕秋日舟中見蝶孤雲聴雪軒直溪閑居荷葉桐樹謝徐良夫恵米季迪病目溪山小隱盟鷗亭雨愛竹軒偶題曉起送胡鼎文送孫都事贈沈真仲送王仲容寄葉德彰寄楊砦官送范彦章寄金縣令過束氏廢園壼中緋桃春暉堂瓶中緑蕚梅贈婉素𥘉夏試筆賀趙推官方氏園居十首卷之七五言律省垣對雨二首贈秦侍儀送劉翰林宿季迪京舘春盡聞鶯聲題牛侍御畫和懷弟之作懷赤山舊業夏夜有懷逢鄭校書江村雜興首折二十秋日郊居杜伯寜相過懷句容諸友送劉少府贈華陽道士客懷過龍江沙河舟中逢張孟㳟逢丘克荘發淮安寄婉素盱眙懷古舟中聞促織元夕前雨人日懷髙啓哭陳都事送沈縣丞寄張彦禎省中牡丹燈洪都立夏前有賦東湖晚晀湖口見月風雨泊舟晚過秋浦晚登峨眉亭沙河至采石逢俞武仲江船早起夜坐夜坐聞江聲江船聞柝宿雲巷三首晚過大悲閣至吴城山謁龍君廟出蠡望廬山夜泊聞笛江邉小旗亭雨中登湖亭鸚鵡洲折蘭見寄岳陽樓舟中聞杜䳌宿巴陵入永州零陵二首湘中雜言九首𥘉入山西境山西秋日省垣對雪五言排律水邉見新燕送趙景普京城觀燈送傅憲使送竺孟容衞氏挽章祀社稷述事晉邸北狩卷之八七言律送路季璉聞官軍南征寄楊鐡厓先生悼朱總制送謝雪坡送謝叅軍朝京郡齋飬痾送潘省叅挽吕輔之叅軍送錢思復登石湖山亭虎丘遊和韻追送徐孟岳寄王常宗寄醉樵饒介之送胡張二師送趙智送人之上海書張夢辰舟留書雲間元夕次韻和謝雪坡寄送鄭本𥘉寄謝隱君贈勤上人别寄林訓導謨何明府見過漫興聞雪坡將還懷王隱君附荅懷髙著作附荅江村寒食乘槎白雲深䖏聴秋軒雨中懷沈逹卿天妃宫題皇妃對奕圗問梅望太湖𥘉春二首春日雜詠四首見花清明後見花立夏木茶爐竹素圗栽竹鵝翎菊卜流梅花夢徴赴京到京奉天殿早朝新正試筆雪東風元夕觀燈塔燈應制上馬簡方貟外送周錬師感春春日出郊送杭太祝送安南使臣送僧住北禪悼楊文舉送鄭與權題玉真觀送俊用章春宵樓狂歌秦淮官舎晚春寓江寜村新柳春草春水樹底白髪减衣清明冩懷江畔㝷花上已對雨用前韻書事白門冩懷用韻春暮有感夜坐漸老畣李仲弘移家寄張揭二文學夜坐聴雨不寐雨中獨坐江墅晚歩自咲用前韻梅杏桃李卷之九七言律罷職寓句曲賣𫀆寄諸葛彦飛冝秋軒對月登茅峰不果宿清元道舘哭髙季迪豫章早春登洪都城浦口逢春過豐城夜泊臨江省垣對雨江郭對雨寄牛理問懷班大叅懷萬郎中寄劉儀部懷王節推懷方員外次前韻遣興冬夜宿江右祖母𥘉度思親别省垣諸友望夫石登娥眉亭謁小姑廟大姑遇老衲鄱陽湖喜晴懷申屠衡晚泊湓浦過黄州武昌夜泊吕仙祠過洞庭過龍君廟岳陽回仙夢覺舟中聞吴歌途次感秋渡漢江哭李太守三湘過黄陵廟江邉㝷花興安道中来陽江寄書祁陽道中衡陽有懷客中寒食桂林觀兵桂林即興二首聞江聲有感晚發瓜洲宿楊州南門邵白懷徐賁過髙郵即景淮安候船至龜山有題贈林通判懷許知府太原郊行清明懷故園寄王知司寄舊契張来儀懷宋大叅寄陳𬋩勾無題卷之十五言絶句新月殘雪春夢二首五色陌上桑優人乞米隔簾聽歌仕女羙女圗花開壺中二色桃贈内并代荅詠眉詠眼瓶中四花施君眠雲堂倪雲林畫竹題畫二首墨竹墨葵竹為僧賦九鷥圗弹琴髙士柳塘春燕扇上畫四首剌客四詠轅門十詠天平山十四題端陽十詠書懷聞柝不寐有懷聞鴈夢歸燈花憶母憶子憶弟上書乞歸養志喜對江望山陪方公看花夜坐示楊水西逢故奴二首雜畫十首逢王之常二首長沙雜詠十首六言絶句律一首内附即景小景二首𥘉歸感事赤山閑居二首登靈岩吊古濯清亭二首天心水面亭畫三首自嘆卷之十一七言絶句天平山中寒食有感過隣家撥悶憶均二弟称称𥘉度回文二首畫三首二仕女圗夢逰西湖燈夕㣲雨紅梅水仙十二紅圗柳枝詞故山春日七首雨中對杏花壺中碧桃花時感事雨中對花三首春半春暮西園雜興落花嘆三月晦日仕女四春圖斯道遺梔花屋後種松松下寢齋見螢火看蜘蛛𥙷網粉團兒花見𬗋薇有感蓮渚泛舟避暑貽羙人夏日赤山漫興過鄧尉山二首𬋩夫人墨竹趙仲穆墨蘭白描芍藥圗睡起圖張仲敏竹藍釆和像贈胡校理贈薛如鑑寄無錫張彦禎寄陳惟寅松陵道中青山白雲圗宿雲竹居題畫四皓煩伯定移菊八日對菊徽宗草蟲二羙人圖剌綉倦綉圖附題仕女二白練圗代贈所懽三首枇杷青鳥遇詢故園贈京妓出金陵城南挹翠亭聴歌江寧雨中江村漫興三首𥘉到京春日懷江南春盡聞鶯乞珉玉巾環夢髙季迪秋夜江邉見紅葉客中懷弟妹沙河聽雨舟中書所見舟中聞絡緯客中憶弟夢称称過琵琶亭詠姑山梅花出江看廬山廬山看雲又看廬山無雲舟泊南湖三首途中題畫送二生還山西到省對花題方貟外像雜畫六首聞鵲吊赤璧舟中見雪珠鯉魚山阻風夏口望武昌德安山中岳陽阻風過洞庭口號湘江對雨楚江秋意圖經汨羅廟祁陽道中五首潭州雜懷九首舟回看廬山望五老峯送李都司嘆道傍廢宅觀剥棗重過文竹軒送陳明善過下蔡過竇鳴犢祠梁園聞鴈登宋宫故基