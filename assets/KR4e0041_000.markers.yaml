  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書集部六眉庵集别集類五明提要臣等謹案眉庵集十二巻明楊基撰基字孟載其先嘉州人祖官呉中因家焉始為張士誠記室洪武初起為滎陽縣知縣厯官山西按察使尋以事奪官輸作卒於工所明史文苑傳附載髙啟傳中史稱基少以鐵笛歌為楊維楨所稱與髙啟張羽徐賁號明初四傑其詩頗沿元季穠纎之習都穆南濠詩話摘其佳句十二聨其所品題得失叅半李東陽懐麓堂詩話謂孟載春草詩最傳然緑迷歌扇紅襯舞裙已不能脫元詩氣習至簾為看山盡捲西更過纎巧春來簾幙怕朝東直艶詞耳故徐泰詩談謂其天機雲錦自然羙麗獨時出纎巧不及髙啟之冲雅王世貞藝苑巵言謂其情至之語風雅掃地朱彛尊静志居詩話亦摘其詩語類詞者至數十聯而獨推重其五言古體然近體之佳者亦自清俊流逸雖不能方駕青邱要非餘子所及也集初為鄭鋼板行成化中呉人張習重刻嘉州江朝宗為之序習為後志云乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀}
