  - {type: variant, offset: 0, length: 184, content: 眉菴集卷之一五言古體姑蘇楊基孟載著感懷十四首璞玉宜深藏白雪乃寡和和寡非所悲衒玉徒取禍柰何刖足者抱璞不知過進非烈士忠退耻愚夫懦傭舂匪利直販鬻欲自涴山中一尺雪且復掩扉卧清霜凋百草亦令脆者堅士不遇患難智慮何由全玄徳髀肉生重耳十九年一為三國雄一稱五伯賢苟不辨菽麥何足攬大權至今巴蜀人歎息後主禪鄧禹南陽来仗䇿歸光武孔明卧隆中不即事先主英雄各有見何必問出䖏孫曹與更始未可同日語向非, WYG: ''}
