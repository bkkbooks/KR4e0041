通畫舫銀鞍競相逐東風一分手去酌華亭酒華亭白鶴不歸來二陸文章亦何有江邊鳬鷖毛羽稀慎勿驚人撩亂飛君莫疑贈薛起宗有弓莫朝射有劍莫夜舞舞劍空驚半夜雞射弓須射南山虎當年意氣雙白虹三尺寳劍兩石弓平沙軟草馬蹄疾仰面射落南飛鴻歸來面皺頭雪白魚皮包劍弓挂壁逢君一笑盃酒空憐我衰顔手無力手無力眼有眵作歌贈君君莫疑英雄老去衆所薄何獨區區楊去非先生年五十更名曰去非賦得歸㠶涇送夏仲信之江北客舟不肯停相送錦㠶涇涇邊數株桞株株落秋聲當時種栁臨涇水桞葉參差間桃李君王日暮㸔花回一色錦㠶三十里朝從涇上出暮從涇上歸吳謌聴未了花落鷓鴣飛鳥散春無跡涇上叢叢春草碧自是君王愛捧心美人那得傾城國古來奢麗那能乆菲衣惡食傳不朽君過長淮向汴河請君更㸔隋堤桞送葛仲行逺遊子有逺行役我有逺行詩逺遊㡬萬里山川浩無期青山盤盤日欲暮車輪高隨飛鳥度笑殺東家白面郎一生不識城頭路七色荼蘼花朝出月在牖暮歸星撒沙今朝下馬日未晚見此七色荼䕷花千葩萬蕚春無價綺雪湘雲堆滿架題品當居芍藥前温柔豈在薔薇下我愛名花天下無中泠之水四腮鱸誰將十様天孫錦織取徐熈沒骨圖雙椿堂大椿葉青青小椿葉薿薿堂中兩眉壽共坐春風裏春風揺揺吹紫荆兩翁白頭親弟兄兄當有孫弟有子兩翁之壽從此始庚戌元日立春試筆二首桞暖已破眼梅寒尚含腮臘隨除夜盡春逐嵗朝來鳯凰臺下春歸早龍池桞色瀛洲草一夜東風雪盡消十年南國人空老富貴非吾願文章非我能且沽白下橋邊酒來㸔金陵市上燈其二南山雪已消北山雪盈尺信知南枝花早得春風力帝城回首春光近桞上梅邊見春信白玉椒盤内史傳紅羅彩帖詞臣進貧賤何足䘏功名非可誇且沽白下橋邊酒來㸔金陵市上花白雲書舎我家住山深白雲滿長林愛雲如珙璧友雲似同襟去年辭雲向城市雲亦相隨渡江水我留城市雲還山夢裏時時㸔雲起君家茆屋鑑湖西屋上青雲作隊飛爽氣每沾毛義檄晴光長映老萊衣祗今薇垣畨夜直咫尺蓬萊雲五色郤向昇州望越州呉山萬㸃呉雲白九日袁賛府宅賞菊自我離姑蘇已負兩重九不獨無錢對菊花白酒黄花總無有前年九月吳城破廿口倉黄驚竄走去年重九客滎陽淚眼西風盻衰桞那知此日來句曲秋水自佳慚白首到處逢人索佳菊預恐無花孤此酒東隣送我青兩株細蕋含苞香未剖耐何無花亦無酒不憤有酒成不偶丞家數本花正繁秀色幽香照窻牖入門一見清興發亂挿烏巾笑開口主人抵掌怪我狂我自有得忘老醜三年僅逢一餉樂此後寧知不愧負便須築室滿山田種菊循籬秋百畝年年釀酒薦秋菊笑引妻孥壽慈母世事茫茫未可期聊作長歌示佳友苧隠為句曲山人翟好問作種桑百箔蠶種苧千疋布先生種苧不種桑布作衣裳布為袴桃花雨晴水滿塘烏紗白苧春風香野蕉山葛不敢並越羅川錦爭輝光兒童漾紗婦紡織賣布得錢還買帛黄綿大襖一冬温白雪中单半襟窄今年苧好畝百觔堆場積圃長輪囷床頭白酒夜來熟殺雞煮鴨邀比隣東家種桑青遶屋官絹未輸空杼軸婦姑相對難無衣先生飯飽方捫腹送汲縣主簿朱孟仁我耕蘓臺雲君釣苕溪月萬里西來始識君相逢未乆俄相别梁園十月萬樹稀北風滿地塵沙飛客中送客未忍别感慨握手臨大堤問君此行向何所大河之北汲縣古桑柘遥連晉都邑牛羊近接曺風土縣民出郭迎縣官苦酒味薄柤梨酸道傍再拜勸官飲禮數朴畧誠堪觀知君下馬人爭愛白欄烏㡌紅鞓帶百年華夏總戎衣中原方治忽㸔中古威儀在父老喜極復涙垂廿年兵燹悲瘡痍兒孫汨沒骨已朽老眼復得逢雍熈人心如此亦難治要在從寛布君惠犬足生氂户不扄牛租减額人長醉嗟我前月除榮陽入門野蒿如屋長日斜吏散公宇靜時有雊雉來飛翔方除瓦礫治官道已見居民歸稍稍自愧才疎撫字勞嗟君年少蜚騰早清霜一夜滿河氷此别憐余白髪生主簿官卑君莫厭􅉇程九萬自兹升彭蠡阻風昨日南風顛輕舟掛席如飛仙又如快馬走空闊造父王良相先後今朝北風吼白浪飛天大如斗舟人勸客莫忩忩君不見世間快意那能久舟抵南康望廬山春山如春草春來無不好况是香爐峯百疊屏風圍五老嚶嚶厯厯谷鳥哀朱朱粉粉山花開芙蓉削出紫霧上瀑布倒㵼青天來船頭春山重回首世上虚名一盃酒李白雄豪妙絶詩同與徐凝傳不朽明日移舟過洞庭蘭花斑竹遶沙汀摩挲老子雙愁眼細㸔君山一㸃青登繩金塔望廬山過魯必謁岱入洛須望嵩嗟余夜半入彭蠡月黒不見香爐峯明登望湖亭雨氣何空濛山僧指㸃笑五老五老正在烟雲中今朝躡層梯髙標揭晴空匡廬逺出百里外紫翠映帶春霞紅雖云彷彿見顔色巳覺浩蕩開心胸在山㸔青山佳處未盡逢不如逈立萬仭表一日覽盡千玲瓏何當生羽翰兩腋乗天風不論雨雪與晴霽回翔下上飽玩八面青芙蓉過劍江聞岸上雞聲劔江光似劔霜月寒灔灔輕舟載月江上歸半夜雞聲起茒店寒雞自啼人自寝雞聲不到黄公枕癸丑元日霏霏元日雪脉脉人日雨春來無日不輕隂薄霧寒雲滿南浦常年有雨復新晴淑氣韶光淡遶城草色未迎金勒馬桞條先映玉樓鶯今年風雨兼氷雪忘却春幡慶春節野杏緘愁待酒催江梅索笑邀人折誰與觀雲卜大通且須祈榖問年豐相期十二樓前月賸㸔花燈萬㸃紅憶省掖千葉桃花穠李積皓雪繁桃炫朝霞江邊日日見春色盡是尋常兒女花東闌一樹能傾國千瓣玲瓏誰剪刻半吐疑紅却勝紅全開似白元非白旁觀淺淡正復濃雅麗稱月開宜風隂晴晚午各異態嗔喜笑嚬無不工嗟我匆匆簿書急時復微吟對花立白苧猶沾夕露香青鞋不怕蒼苔濕而今漂