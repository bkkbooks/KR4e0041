風其二小雨弄春晴湖光媚更清髻憐新沐後眉愛靚籹成鵠潔知無累鷗明覺倍輕離離川上草端為客愁生其三鄂渚雲歸後巴山雨過時䳌啼湘女廟花落楚王祠家遠身如夢愁多鬂易絲聊將身暫泊沙嘴看鸕鷀其四風起一湖香青青杜若長花迎衝浪楫燕逐使風檣欲采蘭為佩仍褰荔作裳何如山閣上屏裏看瀟湘其五江晚樹沉沉羣山入漢隂驛亭千栁暗僧院百花深鷺曝愁融雪鶯流欲墮金旅懷元易感非有壮遊心其六鷗聚江初靜鴉啼樹已昏碧湘悲帝子芳草怨王孫㠶影烟中浦漁燈雪後村匆匆萬里客極目正銷魂其七城近江臨郭沙虚月在川栁宜春雪後花怯晚風前野㸑三家市鄉音幾處船坐聽磯下水嘈雜響湘絃其八山霽雲猶濕江寒雪未消雙旗樓鼓急孤塔寺鐘遙水緑鳬鷖藻洲香翡翠苕巴人暮歸急横渡不停橈其九指㸃鷗飛處人間是岳州湘潭山亂出江漢水兼流深竹新祠宇飛花舊酒樓平生巴楚夢明日洞庭遊初入山西境晉鄙不識稻來麰常在庖民居多土窟官賦半羊毛七月裘寒着千山狼夜嘷遺風唐儉嗇古廟享臯陶山西秋日澹日荷香外微涼樹影邊俄聞落疎雨便覺是秋天塞近風寒早天高氣候偏忽思陳鼔吹萬馬向居延和宋大叅省垣對雪和風春前入瑤花雨後寒簾疎穿每易闌曲聚偏難客自衣裳薄人誰夢寐安掖垣今夜直離恨正多端闕題以下俱原闕五言排律水邊見新燕昔别秋風後今歸社雨前巢非金屋舊人是玉堂仙頥頷公侯似腰肢妓女憐花明春殿雪栁暗御樓烟羅幕棲長並銀屏過每聫尾寒鶯共濕衣暖蝶爭妍忽見青帘外俄逢綠水邊莫嗔茆舍小臺榭總蕭然早秋送趙景普東歸歌斷復依依情多忍遽違未緣春色晚自感故交稀舟傍荷花宿人先燕子歸乍涼才却扇多病欲添衣驛樹風蟬咽江祠雨鶴飛幾時搖艇子來扣竹間扉元夕京城觀燈與楊亷夫先生同賦琪樹遶春蛾銀燈爛絳羅風柔宵漏永天近月明多瑞靄浮雙闕繁星動兩河仗迎仙佩出香拂輦塵過菡蓞層層雪魚龍灔灔波清時更良夜遊讌莫蹉跎送傅子敬憲使朝散掖垣風恩乗憲使驄星辰天咫尺山水浙西東民力凋零後君心屬念中江晴鷗汎雪雲净鶚横空草復新年綠花仍故苑紅無因送君去鄉夢託㝠鴻送竺孟容戍營丘内殿朝辭日東藩報命時白門花婉婉青社草離離山雨朱袍濕江風錦帽欹禡牙朝進祝散敵夜吹箎士馬驚銅鼓兒童織綉旗突圍當左拒射敵中斜枝赤手千人服丹心一劍知功成正年少雙鬢未如絲趙宜人衛氏挽章故國王孫貴名家母德新令儀推冡婦榮寵錫宜人讀史青閨夜治絲錦帳春野烟條綠柘溪雨采香蘋熊膽資諸子虬髯識衆賓鏡臺俄掩月琴匣久蒙塵遺範傳宗閫悲歌動縉紳霞坡原上草相望一傷神八月九日祀社稷述事祝史祝王册儒臣奉誓詞衣冠陳盛典秬鬯降洪釐用報金穰瑞仍祈雨露私勾龍嚴配位神棄肅明祠幣玉趨宗伯笙鏞奏瞽師精靈潜格爾肸蠁儼來思赤壤新封國𤣥牲舊制儀豈惟宜土榖還得奠邦畿師出常依主君行每告期禮終受多祜民物正熈熈晉邸北狩剛戊吉初㳙藩宫武用宣獮田之藪隰旄節邁闉􅆵􅂒帀驪為鉓幩銜驒作纒彤弓臣累百貝胄士逾千雲路龍章衮璇霄鶴駕軿和鸞軾前奏韔服䪌傍懸笳鼓鳴翻海罝羅布匝烟獫猋過走兎鷹翥捷飛鳶洡泹多糜鹿豳岐盛豕豣延賓左髀逹登豆右腢穿殪兕才方著當熊譽又傳骨都魂亦散勅勒部齊遷固以巽爻象不殊詩雅篇邊氓瞻紀律勲業可銘鐫眉菴集巻七欽定四庫全書眉菴集巻八明楊基撰七言律送路季璉問聘河東時東駕出師太原二首三晉封疆拱帝圻兩河山色照戎衣青虹貫日隨星出赤鳥如雲夾電飛使者梅花春後折王孫芳草夢中歸入朝若問東南事積粟如山萬馬肥其二三讓祠前酒一巵杏花紅白栁絲絲古來使者稱吴札此日行人得趙咨老祖山河終不改諸侯勲業已如斯青宫賜宴如前日為賦栖栖六月詩聞官軍南征解圍有日喜而遂詠四首天師南下靜風塵正月樓船渡孟津中外諸侯元有約東南豪傑豈無人十年白骨埋荒楚一日蒼生去暴秦喜極自提孤劍舞不知雙涙落衣巾其二巴江東去動旌旗此變還應責望誰尺土未歸終自復一夫作難彼何時北來兵勢當無敵南向人心頼不離見說兩淮消息好已將牛酒犒王師其三兩河精騎向襄陽全蜀材臣出鳯翔天下風雲争㑹合江東子弟謾搶攘人皆厭亂思平世誰不將歸說故鄉我有先塋依古井十年不奠一壺漿其四官軍聞說下揚州夢裡扶搖賦逺遊天運未容人力勝民心須順物情求遭逢喪亂生何補見得昇平死即休沽取一壺花下酌弟兄兒女笑相酧寄楊鐵厓先生不見雲間楊鐵史寮中七客近如何老來詩句疎狂甚亂後文章感慨多長笛參差吹海鳯小璚楊栁舞天魔春明且盡嬉遊樂莫解梁鴻五噫歌先生所居名七者寮懷悼朱秦仲總制力盡戈鋋援不回猶揮赤手搏風雷波濤失意蛟龍伏肝膽如杠虎豹摧漫使張遼說關羽誰將全武易秦裴煩君更緩須臾死要對春風酒一杯送雪坡太守之武林湖上烟飛開畫船鳬鷖鴻鴈滿前川舊遊未覺英雄老遺愛猶思太守賢驛樹籠葱春雨裏江花零落晚風前遙知不着登山屐先向閭閻問倒懸送謝叅政朝京萬方臣妾歸降日四海諸侯職貢秋七册寶書銀葉篆九重珠絡翠雲裘舍人入奏臚傳早天子論功寵遇優正及燕山三尺雪馬蹄須遍御街遊郡齋養痾呈醉樵内史三首江雲倐忽暝還收五月猶寒着敝裘芳草斜陽看易晚綠荷疎雨聽如秋池塘空濶蜻蜓喜簾幙蕭條燕子愁不是無言成獨坐暫將心事静中求其二小軒新沐喜神清短幘单衣覺漸輕松下琴書晴亦潤竹西忩戸晚猶明愁來對酒心先醉病後看花意懶行却憶故山深處立綠蘿千樹呌流鶯其三亂裏情懷苦未開更兼貧病兩相催翻書自取醫方讀冩劵頻賒藥品裁有子問安催啖粥無人療渇漫思梅東山謝傅能相憶風雨園丁送韭來送潘省參榖北覲黄鉞專征異撫軍薊門鼙鼓接西秦江淮久頼齊桓伯中外方思李泌臣鶴駕簫聲丹禁曉龍池栁色舊宫春邦交不用縱横術况復東周有古人挽吕輔之參軍老來不作華亭尹死後仍書貞惠君猶有綈袍憐范叔更無珠履哭田文練兵每到防秋試積粟多緣歉歲分欲奠一尊招夜月紫藤蒼栢繞孤墳送錢思復曲江庾信文章四十年一官今喜便宜遷諸侯賔客青雲表亂世功名白髮前弟子年來金馬詔故人天上玉樓宣先生且向江南老草閣東風聽雨眠登石湖山亭和胡宣古宋仲温危亭百尺瞰奔湍落日清虛縹緲間石壁倚風青鳥下洞簫吹月玉龍還霸圖猶在英雄夢雲氣或連吳越山無限興亡眼前事五湖烟水不相關虎丘遊和張雲門韻烟草離離接故宫劍光無復吐長虹虬髯一怒江山定烏喙重來苑囿空佛宇勢凌雲海日梵鍾聲和塔鈴風峯前虎去髙丘在野草殘花泣露紅追送徐孟岳長洲苑前春草生騎馬送君君已行東風楊栁忽淡蕩新水鵞鴨自縱横青菘堆雨晚飯足白苧裁雪春衣成隣家有酒可賸買我欲相從聽早鶯寄王常宗不為春愁減帶圍自緣多病故人稀無多的的梅花在有幾斜斜燕子歸月上湖平還蕩槳酒醒風起更添衣㣲官未得追隨去定悒爐熏静掩扉寄號醉樵饒介之萬里西風到井梧泠泠秋水接平蕪清虛自是松間鶴瘦硬何須石上蒲千古英雄雙醉眼四山風雨一樵夫正須斤斧收材木要向凌烟見畫圖送胡布張憲二軍咨二首鳯凰出世不多見神駒汗血非全功子龍勇冠萬人敵劉表氣壓三軍雄㑹使策勲夸海内何必紀姓歸遼東遲子縱横覽八極當駕巨浪乗長風其二丈夫許國亦何蚤中興紱冕皆吾徒絳火流雲赤雀下神劍入海妖龍屠秦人玉琯不自惜宋客燕石何其愚㑹見清明舊雕鶚鶱飛萬里騁良圖送趙智之海濱兼柬乃伯元鼎十月肅霜霜未嚴片㠶歸去雨纎纎鴈飛空濶雙斜影山隔蒼茫一翠尖自笑楊雄登館閣誰憐膠鬲在魚鹽到家為我寒暄問汝伯遙應雪滿髯寓雲間送人之上海兼簡曲江居士嗟予多難未能歸念爾無家更别離春近江花開次第雪消沙鴈落參差英雄惟贈劍三尺貧賤相逄酒一巵為語海州錢博士白頭誰與細論詩同雲間謝嘉書張夢辰舟手持三尺青琅玕鼓枻來徃凌風湍放歌吳淞江月白濯足洞庭秋水寒黄金何用鑄范蠡紫蓴自足供張翰扁舟早晚落吾手便當相逐投魚竿將歸吳中留書雲間齋舍讀書喜逄明主知直節不受儒官欺男兒自當萬人敵少壮恥為童子師江總還家向草草仲尼去魯獨遲遲蜀雲亭下春消息雪白梅花開一枝元夕次韻鐵崖先生三首千輪萬騎影參差盡道風光勝舊時珠果亂抛金並蔕銀花交射玉連枝星緣燈映看偏密月為人留下轉遲白髪老仙逢盛事綵毫先詠太平詩其二星斗斕斒落絳河魚龍㶑灔出滄波尋常巷陌皆車馬到處笙歌盡綺羅人意尚嫌春夜短燈光更比月明多謾教夷女傞傞舞細按吳兒宛宛歌和謝雪坡錢塘見寄經旬不見謝宣城小楷烏絲寄逺情黄篾樓髙春夢破綠羅衣薄暮寒生鶴臨沙渚鷗俱浴花落江泥燕與争亦欲雨蓑搖短楫西湖新水蕩空明送鄭本初還越深冬未飄一片雪江梅已開千樹花出門上馬霜滿屋舞劍聞鷄月在沙秦豈無人徒贈策楚雖三户復成家壯懐亦有東遊夢明日津頭見斷槎赤山書事寄龜巢謝隐君君南蘭陵人今避兵居吴長洲之獨樹湖曾向溪南看藝麻竹杠兠子一肩斜秧苗尚短仍含穀荷葉才高已上花蠶屋柘烟朝焙蠒鵲爐沉火晝薰茶而今風雨成抛絶卧聽西園兩部蛙贈勤上人别兼簡雲間陶宗儀澄公髙義動山川亂後今逢弟子賢四海交遊諸老盡百年衣鉢一燈傳詩題玉几峰前竹社散東林寺裏蓮惟有赤城陶逸史老懐能說舊時禪寄林訓導謨江上雪消春水渾故人書札到柴門英雄所見自相合貧賤之交誰與論漢室山河終混一秦城樓閣易黄昏平生不識之無字也學相如與賣文長洲何明府見過使君麾節耒相訪正及南風百草長新語驚人渾爛漫竒才化俗更循良西山雲朶金銀氣東閣梅花氷雪香便欲乗槎逺相從鳬鷖春水綠茫茫漫興十日南風吹雨晴隣家鵞鴨傍人鳴蒼苔門巷槐花落青草池塘荷葉生已喜包茅來楚貢不勞酈舌下齊城野情欲買滄浪屋醉詠鳬鷖歌太平聞雪坡將還吳門桑葉重重戴勝飛行人多報故人歸髩從别後星星出花到春深樹樹稀詩喜官閒能不廢身緣謀拙事多違便須出郭相迎迓遮莫南風雨滿衣懷王隠君止仲小几支頥却掩書身閒喜復見秋初山林自此縱横落絺綌於人次第疎沙鳥浴江明白鷺水花搖雨淡紅蕖相知獨有王摩詰兩月無詩寄草廬附王半軒次韻寄答懷刺歸來卧枕書白雲滿榻閉門初草𤣥未信揚雄病禮法從知阮籍疎短障夕陽悲蟋蟀方塘秋水老芙蕖南村口燥呼難得一任狂風攪敝廬懷高著作季廸坐看青江飲白虹不知樓閣又秋風瀰漫禾黍蒼烟外零落芙蓉暮雨中富貴逼人驚變豹文章鳴世豈雕蟲清時欲草征西檄只有陳留阮瑀工附高青丘次韻寄答殘雨翛翛映彩虹憐君獨咏楚䑓風逺江㠶影秋蕪外故苑砧聲晚樹中壯歲漸如辭幕燕閒身猶坐蠧書蟲雅音自古無能好莫向人誇瑟最工江村寒食預折楊枝挿繞簷豆糜香軟麥􅄳甜春衣未染新絲織午篆猶分舊火􅄈小雨送花青見蕚輕雷摧笋碧抽尖不因人逺傷離别那得春愁上短髯乗槎為日者張徳元賦百尺枯槎孕氣靈濤花空影入滄溟星河弄月珠胎白銀漢流雲鵲羽青坐拂珊瑚龍婉婉卧看蓬島翠㝠㝠不須更問君平卜認得黄姑駕彩軿白雲深處為天平圭上人賦上人卓錫亂雲中縹緲蓮花第幾峯行盡崎嶇方見塔望迷樓閣但聞鐘四山曉氣層層雨一逕秋隂曲曲松幾度相尋問童子水流花落竟無蹤聽秋軒為方上人題聽秋軒前秋滿庭聽秋軒裏貯秋聲噫嘘萬竅西南發搖落四山風雨鳴定起寳花如雪墮夢回璧月帶潮生便須飛錫蒼梧野聞取鈞天九奏笙雨中懷沈逹卿茂卿立春一月二十日江鷗野鶩飛滿池杏花差白淨洗面楊栁半青爭畫眉沈郎多病徴未起王孫不歸吁可悲南周山頭養親好贈以金盤五色芝天妃宫贈道士沈雪溪帝遣神妃降紫芬海波搖蕩赤霞裙月明貝闕金銀氣日暖龍旂贔屭紋青册簡書天上錫紺帷靈語夜深聞方壇露冷三花繞坐演琅函大篆文題明皇貴妃對奕祿山傍觀圖深院紋楸敵睡魔玉環用意蹙雙蛾只因數子藏機密不覺三郎失着多布陣似窺龍尾道爭邊未至馬嵬坡有人冷眼觀成敗若個胡兒是爛柯問梅次趙元鼎韻驚散溪頭一樹雲故人相别又相親兩三枝上幾分月四五㸃中多少春不入楚騷緣底事畨成𦍑笛是何因芳心欲露還羞澁踏雪歸來香滿身望太湖天帝何年遣六丁鑿開混沌是雙青湖通南北澄氷鑑山斷東西列畫屏挾雨龍歸霄漢暝網魚船過水雲腥乗風欲往終吾老甪里先生古洞庭初春二首雪晴泥軟不生埃春水浮香上綠苔栁色嫩於鵞破殼笋痕斑似鹿辭胎踏青鞋韈平頭製試暖衣裳稱體裁安得草堂江浦上紫桃紅杏一齊開其二春色撩人到水涯草香蘭氣總詩材酒邀同伴嘗新熟花趁初晴賞半開蹀􅞃馬隨車響過鞦韆人送笑聲來直須清夜紅羅燭莫負東風玉鏡䑓春日雜詠四首雨雨風風未肯晴百年時序逼清明花無桃李非春色人有笙歌是太平黄鳥巧衝蝴蝶過紫騮驕趁玉驄行酒家不用逢人問高挿花枝作斾迎其二偶自循籬出逕苔刺桐花落野棠開一年春已無多在幾個人曽有暇來浸榖陂塘科斗亂浴蠶時節杜䳌哀買山莫種閒花栁多覔松栽與栢栽其三蘭心刺促上枯根草色淒迷入舊痕灘觜無泥沙自白潮頭有雨水先渾龍祠神去鴉鳴樹魚市人歸犬應門便織蓑衣與牛薦此身只合老江村其四陋巷荒蕪野趣濃小溪春水恰船通無邊草色猶春雨有幾梅花更晚風文體敢期盧駱並交情惟許范張同欲將浪迹隨漚鳥錯比溪南是瀼東見花聽風聽雨坐空齋不道春花爛漫開亂世身如危處立異鄉人似夢中來十年多故塵雙鬂萬事無心酒一杯明日清明改新火且將榆栁着殘灰清明後見花狼藉春到清明花漸稀花應憐我見春遲多情杜牧重來日前度劉郎再到時莫為東風愁對酒且因流水獨臨池短墻深處無人折留得殘紅四五枝立夏風雨都無半日春滿溪鵞鴨水迷津櫻桃子熟已薦廟芭蕉葉長才過人壯歲得閒緣性拙故交雖淡却情真如何蓋得江邊屋賸采新荷飯綠蒓木茶爐紺綠仙人煉玉膚花神為曝紫霞腴九天清淚沾明月一㸃芳心托鷓鴣肌骨已為香魄死夢魂猶在露團枯孀娥莫怨花零落分付餘醺與酪奴竹素圖百尺飛樓似石渠牙籖五色照窓虚平生不惜千金費喪亂猶存萬巻餘秦火已來皆斷簡楚經之外總閒書晴雲滿榻芝香散應與諸郎校一初裁竹劚開蒼蘚種琅玕移得瀟湘入座看宿土半含春雨潤短籬斜䕶晚風寒紫苞未見搖氷雪翠葉終須宿鳯鸞何處銀笙吹夜月碧袍零落滿闌干鵞翎菊曾隨漚鷺浴滄浪又對芙蓉試淺粧露冷有香栖晚圃月明無夢到寒塘綠波春草當時雨黄葉秋風此夜霜莫道淵明最憐惜右軍應為寫千行卜流吳人於初正以榖占人一年休咎炒成花者吉否反是春入吳門十萬家家家爆榖作生涯就鍋裂碎黄金粟随手翻成白玉花紅粉佳人占喜事白頭老子問年華晚來分付兒童戲數片江梅撲鬂斜梅花夢綠蕚仙人曉睡濃香魂縹緲逐東風翠禽啼破春如海蝴蝶飛來月滿空白玉樓䑓渾落莫黄昏時節正朦朧巡簷欲問神遊處只在孤山淺水東徴赴京亂後人如再得生敢於世上望聲名詩吟白屋惟安隱詔落丹厓陡失驚鳯闕有心求柱梲鯫材何量抵瓶罌不堪故舊愁分手楊栁楓橋第一程到京欝葱王氣古金陵㤗運重新感盛明臣庻梯航趨上國江山龍虎衞髙城六街塵掠秦淮過萬户鍾聲魏闕鳴白髮到京期少補敢將詞賦重聲名奉天殿早朝二首雙闕翬飛紫蓋高日華雲影映松濤萬年青擁連枝橘千葉紅開並蔕桃仗以玉龍銜寶玦珮將金兕錯銀刀乍晴風日忻妍美闔殿齊穿御賜袍其二貂璫綉帽列金撾玉節龍旂拱翠華甘露欺霜凝紫液卿雲如蓋結丹霞鶯聲近隔宫中栁駿騎遙穿仗外花聖主直教恩澤遍香羅先到小臣家新正試筆寒隨殘臘去匆匆又見年光入眼濃恨不髪如春草綠笑曽花似面顔紅門無賀客酬佳節座有癡兒夀老翁已許承恩趨鳯闕珮聲齊到日華東雪欹欹整整復皚皚可是春氷細剪裁到處江山皆玉立誰家庭院不花開幾回旋繞還飛去半餉悠揚却下來獨有梅邊易消滅也應和氣近蓬萊東風曉寒衣袂欲生稜沉火微薰半臂綾内苑未消千樹雪東風先解一池氷梅驚玉笛吹還落栁傍珠簾折未能回首帝城明月滿六街簫鼓萬家燈元夕觀燈綵鸞扶轂駕雲軿寶騎揚鑣逐隊行十里燈光欺月色九衢歌響雜簫聲綺羅香繞長春苑珠翠人遊不夜城喜極未能閒坐得也隨僚友看昇平塔燈應制百尺浮屠聳半空闌干十二影玲瓏日臨銅柱霞標爛風颺銀花火樹紅一劍騰光衝斗口五星揚彩入離宫高明願與君心並徧照逃亡草野中上馬晴來未覺是春朝已有東風着栁條雪自堅牢盈尺在氷纔輕薄一邊消不愁霧暗看花眼且倩人扶上馬腰却憶探春湖上路小紅船子木蘭橈新春左掖簡方員外鷄籌送曉日初長粉署微薫應漏香草色才回半痕綠栁條初染一分黄玉壺氷解春無迹羅幕風来澹有光自愧才疎非畫諾敢隨鳴鳯集朝陽送周鍊師𤣥初還吴𤣥都春暖碧桃開鳴佩朝天到鳯䑓夜檄雨龍江上發曉呼雲鶴洞中來黄精却老和泉煮丹橘娱親遶舍栽為問長生應有術早修真籙進蓬萊感春茂苑東風散鼓鼙草堂近在栁營西春衣禁酒聊存着詩句懷人每謾題花有底忙衝蝶過鳥能多慧學鶯啼閒身凖擬看山色又復朝叅逐馬蹄春日出郊偶臨春水賞春晴更覺身隨步履輕人靣映花渾一色竹音和雨恰齊聲衣從典盡須沉醉簮未容投且暫行除却鳯林佳麗地更於何處樂昇平送杭太祝代祀四瀆馮夷擊鼓走黄能夜報祠宫代祀來虎節不須桐柏去龍香且向吕梁開古來河海猶三望今日風塵上九垓若對壽春城下月可能巵酒酹荒萊黄能之能匡來反水中三足鱉名也應制送安南使臣杜相之還國都門車馬曉騑騑勅送陪臣萬里歸使者重聞新寵詔嗣王仍賜舊頒衣驛亭五月蕉花落江路南風荔子肥歸報大廷方徹樂也知存沒感皇威送僧住姑蘇北禪六年江海一論心又聽鐘聲出禁林歸路暖風芳草合講堂春雨落花深未誇葛老三編論獨愛韋郎五字吟水月仙人塵不染待君重振海潮音悼楊文舉博士白髮蒼髯老太常亂離終喜得還鄉八分書古追東漢七字詩工到盛唐謫久已無書滿屋病多惟有藥成囊我慚同姓曽聨職宿草西風淚數行送鄭與權之官七閩七閩地暖不飛雪山路早行仍衣綿黄金結客記昔日白髪上官非壮年荔子曉風人似玉桄榔春雨樹如烟還家定跨揚州鶴流水寒松遶墓田題玉真觀五色琳宫綴玉題萬年瑤冊秘金泥屏風盡是青山疊旛蓋都將綠樹迷雲氣長隂時嘯虎日華先曉夜聞鷄閒身願得同真侣卧看􅊯􅊯鹿引麛送俊用章上人還中竺五色雲函貝葉牋寳幢花雨下諸天纔叅闕下䕫龍會又赴山中鹿豕筵萬法西來知幾刼一枝東指已千年行當着屐藤蘿外共看峰頭玉井蓮春宵樓春宵樓上人如玉一刻光隂直萬錢簾底按歌風細細酒闌私語月姢姢錦窩香暖雲初散羅幕燈昏客未眠莫怪銅壺太催促長門猶嘆夜如年狂歌東風十日不成雨北郭兩山吹作塵縱横自可二千石貧賤何須七尺身醉後狂歌皆慟哭老來春色最傷神且將建業城邊栁持贈山陽笛裏人秦淮官舍懐春潮來灘觜綠沉沙獨坐㣲吟送物華强健憶曾身似犢風流那復鬢如鴉十年金谷園中友三月長安馬上花春色正濃人意好且教群吏暫休衙晚春三首旌旗獵獵繞髙城曲水飄香出綉楹雨頡風頏枝外蝶花遮栁映樹頭鶯乍籠紗幘羞容老試着羅衣覺體輕猶憶醉歸湖上路滿身飛絮馬縱横其二宫樹㕘差帶苑墻暖塵兼霧撲衣裳新蒲細栁皆春色紫燕黄鶯欲斷腸沽酒客來花未落祓除人去水猶香老懷無復登臨賞坐對鍾山到夕陽其三辛夷如雪照庭柯老去愁驚日已過芳草漸於歌館宻落花偏向舞筵多故人别後皆黄土南浦春來又綠波便欲移家勾曲住採芝種玉此山阿寓江寕村居病起寫懐十首落梅風急晚蕭蕭病起愁驚雪盡消巵酒不添前日量帶圍初减舊時腰髙樓錦瑟花連屋深巷珠簾栁映橋准擬青鞋踏春草看他翡翠戲蘭苕其二病體支離倦裏巾偶因行樂見陽春梅緣無恨尋常瘦栁故多愁日夜顰夢裏笙歌隨騕褭畫中羅綺繡麒麟相期欲就吳姬飲却恐江花笑客貧其三性懶逢春睡轉昏曉鶯多在夢中聞故人錦字憑誰寄學士銀魚每自焚布穀雨晴宜種藥葡蒲水暖欲生芹相思未信蓬山逺只隔江東一片雲其四望盡吳山是楚峰一緘芳信托歸鴻丁香暗結盈盈露荳蔻㣲含細細風春水染衣鸚鵡綠江花落酒杜䳌紅此身曾是登瀛客未信扶桑弱水東其五不知殘雪是春光起見輕雲覆野塘春草春江相妬綠新鶯新栁鬭争黄囊無太史新頒厯衣有容臺舊賜香但使清尊花底醉任教白髮鏡中長其六東風拂栁軟婆娑野鳥啼春聽未和世事不隨人意好雨聲偏為客愁多回文篆小香如蟻凹面杯深酒勝鵞一帶春江皆碧草却愁無地着漁蓑其七醉舞狂歌四十年老來參得一乗禪東風未濕墻腰雪細雨㣲添石眼泉無數白鷗閒似我一江春水碧於天莫言笠澤非彭澤定擬金川是輞川其八坐對青山覺眼明山應憐我眼偏青一官不博三竿日萬事無過兩鬢星花底蛛絲迷蛺蝶草根蝦族變蜻蜓文章無預封侯相莫向人誇識一丁其九十里吴堤踏暖塵老懐忽憶故鄉春泥金孔雀裁歌扇刻玉麒麟壓舞茵翠袖錦筝邀上客畫船銀燭照歸人而今白髪東風裏疑是前身與後身其十門外春泥一尺深窓間雲氣十分隂寒毡溜雨衾如鐵濕竈凝烟火似金酒解驅愁時强飲詩多感舊懶長吟貧家不願千金粟但得陽烏照晚林新栁濃如烟草淡如金濯濯姿容裊裊隂漸軟已無憔悴色未長先有别離心風來東面知春淺月到梢頭覺夜深惆悵隋宫千萬樹淡烟疎雨正沉沉春草嫩綠柔香逺更濃春來無處不茸茸六朝舊恨斜陽裏南浦新愁細雨中近水欲迷歌扇綠隔花偏櫬舞裙紅平川十里人歸晚無數牛羊一笛風春水溶溶漾漾欲平橋知是巴江雪盡消紅雨落花來衮衮綠烟芳草去迢迢沅湘已沒鷗邊渡湓浦新添鶩外潮向晚漁郎走相報大家齊上木蘭橈樹底偶自無眠樹底行不關春色惱人情蛙當静夜聽偏閙鳥並深池宿屢驚楊栁無風偏嬝娜梨花有月更分明春江一𣲖東流去剛道波聲為不平白髪江栁逢春已變金雪消江水到門深青山識我歸來意白髪消人仕宦心半醉半醒花冉冉閒愁閒悶闕莫言萬事中年後不是中年已不禁减衣春衣初减覺身輕老眼緣晴逺倍明濯足愛臨流水坐看山羞逐少年行江花一色多於雪野鳥雙啼闕莫道飄零易傷感故鄉應更不勝情清明寫懷江樹蘢䓤入苑青祓除時節又清明漢宫蠟燭分闕唐女羅衣傍水行一片花飛愁燕燕三分春去怨鶯鶯人生幾度東闌雪莫道黄州自有情江畔尋花偶成二首細草平沙暖更融謾隨蝴蝶步東風衰髯照水疑添白老眼看花覺厭紅且自細聽鶯宛宛莫教深惜燕怱怱江村到處皆春色聊與行人弔客中其二偶隨流水到花邊便覺心清似昔年春色自來皆夢裡人生何必盡樽前平原席上三千客金谷園中百萬錢俛仰繁華竟陳迹野花啼鳥謾留連上巳對雨三月長安草滿坡年年修禊襍笙歌麗人羅䄂珠腰衱中使銀鐺錦靿靴江上只今春雨暗水邊何處落花多不須惆悵開元事寂寂山隂長薜蘿再用前韻書事三首春來不到鳯凰坡辜負江頭白苧歌輕薄衣裳宜換裌軟紅泥土不沾靴鶯緣夢短嗔啼早雨為花疎厭聽多只恐新晴便零落南風吹老樹隂蘿其二溱水遙連洧水坡周人按舞鄭人歌轆轤回轉秋千索龜甲斜縫蹴踘靴轍迹不教青草合鶯聲偏向綠楊多而今折贈無紅葉枳棘䝉茸蓋女蘿其三莫將南浦擬東坡且對吴兒唱楚歌醉裏那知髯似㦸老來方信面如靴驚人事業非難做傳世文章不在多步逐東風看花栁幾時山月照烟蘿春日白門冩懷用高季廸韻十首得歸雖喜未忘悲夢裏愁驚在别離尚短栁如新折後已殘梅似半開時江雷殷夜蟲蛇早山雨崇朝蛺蝶遲製取烏紗籠白髪免教春色笑人衰其二萬里歸來戴鶡冠老懷無復舊時歡沙邊野水鷗隨汲竹外青山鶴從看花信幾畨風作陣江聲連日雨添寒無心車馬千鍾祿有幸茅茨一榻安其三柴門斜對曲江頭農具漁罾晚自收細雨短莎寒似臘淡烟新栁暝如秋鷗能來徃縁曾識鶯或丁寧解說愁回首故交零落盡更將詩酒與誰遊其四阮途無用苦悲窮已􅂸衰顔漸老翁沙鴈隨春衝北雨江花迎暖待東風文章誤我虚名在貧賤輕人舊業空惆悵成臯遷謫地夜闌猶入夢魂中其五綠髮無多白髪長謫居還復是他鄉風紉晚佩猗蘭弱雨滴春蔬早韭香碧栁五株千本菊黄牛十角一羣羊得閒隨地為農好不獨長安與洛陽其六未即移家返敝廬且移妻子傍村墟千金已費床頭劒一字無存架上書短髪恨因多難白故交慚為久貧疎浮名薄俗看俱幻獨有耽詩癖未除其七逺歸偏惜竄餘身多難畨為異姓親前度劉郎非故物當時燕子總西隣家貧母老難為客酒薄愁深不醉人走向津頭看春色綠波芳草却傷神其八綠蕪迷渚水漫沙斷岸無舟路轉賒細栁已黄千萬縷小桃初白兩三花烟中晚棹兼漚逺雨裏春旗趁屋斜野趣莫嫌渾寂寞近來沙觜有人家春暮有感春色鮮明不稱貧越羅川錦照烏巾斜陽芳草遲遲晚流水桃花去去春萬里歸心漚送客片時閒夢鳥催人五湖風雨烟波濶便着青蓑採白蘋其二啼鳥匆匆變物華雨池科蚪漸成蛙青鞋謾踏閒邊草白髪羞簮醉裏花此日驊騮思苜蓿當時鸚鵡喚琵琶遙憐簫鼓追遊地齊麥青青已沒鴉夜坐看雪曾登百尺樓江頭回首又新秋虛名未死猶相累舊業雖貧底足憂身暫得閒如換骨心長無愧勝封侯夜深風露凉如許坐對明河澹澹流漸老漸老無營萬慮沉鶯聲喚起向來心春風顛似唐張旭天氣和如魯展禽結客每酬雙白璧纏頭曾費萬黄金短笻消得江村路步步薔薇綠樹隂畣李仲𢎞寫懷次韻二首休對清江嘆逝波且抛簮珮着漁蓑愁邊巵酒歡娱少老後文章感慨多燕子綠蕪三月雨杏花春水一羣鵞聊將白髪歸來意總和東風懊恨歌其二春來渡口足風波獨立船頭舞短蓑髙栁忽驚啼鳥變故園應是落花多尋人不敢門題鳯愛客都將字換鵞獨有屋西山數疊也應憐我醉時歌移家不思歸隐却移家旋買輕舟繫淺沙飲興已􅂸今後絶吟情方悔向來差龍將急雨抛成雹虹入輕雲映作霞交友十年零落盡與誰同看上林花寄張學錄孟兼掲應奉孟同二文學何用聰明萬巻書自須卑陋一㕓居草於閒處生偏密花到春深看漸疎綠水滿渠澆藥後青山無數巻簾初相過莫道柴門窄細栁髙槐可䕃車寄潜齋夜坐聽雨獨憑書几坐空齋静裏孤蛩語自哀雨㸃故隨更㸃落秋聲偏逐鴈聲來一奩香篆銷仍在兩穗燈花欝未開不用追思十年事此心今日已成灰不寐斜河轉影月當櫺舊事牽愁酒漸醒半紙功名雙夢蝶十年辛苦一囊螢麒麟照眼嗟還失鴻鴈驚心忍暫聽如此老懐如此夕鬢毛那得不星星雨中獨坐有懐滎陽道中用寄潜齋夜坐韻山色秋光澹遶齋雨聲蟲響互悲哀清尊憐我攻愁去白髪欺人送老來江栁淨無餘葉在渚蓮遲有一花開馬蹄却憶成臯路野曉西風滿面埃早秋江墅晚步秋前秋後十日雨村北村南千頃麻晚渚芙蓉輕落片午前秔稻細含花仙翁蠟屐髙巾幘溪女銀釵小髻髽老我不知官府事水邊吟到日西斜自笑用前韻自笑多愁鬢有華懶求真訣飯胡麻庭蕪綠是今年草籬槿紅非昨日花西月墮江沉半璧北山當屋露雙髽此身那得如鷗鷺雨泊風飄片片斜梅杏桃李落莫香魂繞舊宫詎知色相本來空笛聲黄鶴高樓上詩句孤山小店中曉樹烟霜千萬㸃晚籬松竹兩三樷相思咫尺憑誰寄目㫁天南樹樹鴻右梅花其二當時庭館醉春風客裏相逢意轉濃只恐胭脂吹漸白最憐春水照能紅一枝爭買珠簾外千樹遙看小店中惆悵先生歸去後江南烟雨又濛濛右杏花其三深深翠竹映嬋娟湘女梳粧立曉烟流水落花成悵望舞裙歌袖是因緣也無人折休相妬纔有鶯啼更可憐却憶東闌碧千葉暖風香雨為誰妍右桃花其四憶與盧仝共看來花光月色兩徘徊江村逺處長相識風雨寒時已早開霽雪玲瓏愁易濕春氷輕薄笑難裁江城二月城西路誰惜柔香滿翠苔右李花眉菴集巻八欽定四庫全書眉菴集巻九明楊基撰七言律罷職初寓句曲山居在句容縣南一舎近三茆峰昔陶隠居所處也兔逃罝罟鳥投林脫彼官資暢此心便覺夜來清夢出始知人住碧山深詩窮任使金銷槖酒樂何妨雪滿簮更擬怡雲問𢎞景華陽仙洞事幽尋賣袍鵷鷺行中舊賜緋團花分縫織秋葵齋宫夜直雞前著内殿春朝馬上披仙露滴身猶㸃㸃御香薫袖尚離離山中無復瀛洲夢換取金錢當酒貲寄諸葛同知彦飛白髪慵梳步屧遲老於田野最相宜每當酒熟花開日正值身閒客到時雪屋夜燈因婦織月波秋舫為僧移而今此樂同誰説只有鄉人馬逺知宜秋軒對月并序四首余自罹患奔走南北佳景良辰往往愧負及來杜曲時豐景幽秋氣旣中月色倍常自十四至十七與杜氏兄弟舉酒邀月夜分乃休感佳節之難逢而良㑹之易失也夜賦一詩以示諸杜留以為故事云洪武辛亥寓句容仙家玉斧斵猶偏天上瓊樓㸔欲全未滿固當勝旣滿已圓終不似將圓今宵對影人先醉明日成珠蚌有縁惆悵吳宫與唐殿冷風魚鑰夜如年右十四夜其二龍宫浮出白蓮花海宇通明濕素霞琪樹有隂銀闕冷玉盤無缺綘河斜十分夜色初開鏡多少離人正憶家但舉觥籌行百罰莫聽更皷疊三撾右十五夜其三已覺來遲未捲簾漸經樓閣照東簷清光念爾隨秋減白髪憐余向曉添自對嫦娥歌宛宛誰教揚栁舞纎纎昇州憶似鄜州㸔香霧雲鬟濕翠奩右十六夜其四坐久星繁影漸虧也應天轉玉輪欹葵丘伯主初盟後天寳君王欲倦時繞樹鵲驚霜落早吹簫人恨夜眠遲不須戚戚悲圓缺長使清光灧酒巵右十七夜中秋約登茅峰不果寄羽士蔣玉壺仙人待月大茅峰樓閣髙寒近可通表裏山河俱皓白古今烏兔自西東一塵不住空明外萬象都懸倒影中欲便吹笙跨黄鶴人間或有雨兼風宿清元道館簡羽士巫山隠手閲靈文對羽流道心真境兩清幽雙松過影知將晚一雨生凉覺近秋丹井有靈泉似玉石碑無恙字如鈎欲求大藥調精魄却笑山人已白頭哭髙季迪舊知鸚鵡才髙竟殞身思君别我愈傷神每憐四海無知己頓覺中年少故人祀托友生香稻糈魂歸丘隴杜䳌春文章穹壤成何用哽咽東風淚滿巾豫章早春茸茸草色變枯荄􅉡􅉡寒梅落逕苔山頂雪惟朝北在水邊風已自東來不須銀管催鶯出便好珠簾為燕開見説嶺南春更早桃花流水勝天台登洪都城憶滕王閣故基豫章城郭楚江濱帝子笙歌逈不聞十載以前猶有閣三王之後豈無文春風南浦青青草暮雨西山淡淡雲若對畫圖悲蛺蝶落霞孤鶩正思君浦口逢春憶禁苑舊游春氷消盡草生齊細雨香融紫陌泥花裏小樓雙燕入栁邊深巷一鸎啼坐臨南浦彈流水步逐東風唱大堤還憶當年㸔花伴錦衣􅍡馬玉門西過豐城雲樹參差接逺汀隔沙誰識是豐城芙蓉不禁行人採薜荔多依古樹生寒店雞聲烟寺逺滄江鴻影暮川晴欲將三弄桓伊笛吹向船頭喚月明夜泊臨江城下江清月白悵然有懐萬里清江急有聲一篷愁影對寒檠當時鸚鵡杯中酒何處龍香火底笙斗轉東南知夜半月臨子午應潮生不多鏡裏青青髪又向今宵白幾莖省垣對雨有懐方員外二首老去惟耽是詠詩擬將詩癖待君醫何愁不到王摩詰自恨無過杜牧之城外緑陰聯騎日省中春雨聽鶯時歸來莫待秋風後荷葉荷花正滿池其二煮得新醅灧灧紅省垣誰與晚樽同人當暫别情偏惡詩到無聊語更工江浦荷花雙鷺雨驛亭楊栁一蟬風論文若到虞楊地應對清江憶范公江郭對雨鵓鳩催雨一雙啼江郭崇高竹樹低嫩葉暗將枯葉換新梢爭與舊梢齊席因留客長虗左簾為㸔山盡捲西自笑為郎今白首也曾通籍向金閨寄牛理問斗南每笑楊朱吝一毫恥將刀筆事蕭曹鯨鯢未覺滄溟濶鷹隼寧知華岳高白璧一雙酬劇孟黄金百鎰鑄山濤小牕新種娟娟竹深暎春風紫蔕桃懐班大叅景通一榻凝香省署西短屏深掩樹陰低笑談毎為相知發詩句惟應送别題不以學從當世曲直將名與古人齊别來幾日偏相憶風雨江村半夜鷄懐萬郎中伯玉憶曾簮筆侍金鑾華髪驚㸔照鶡冠倩可承家如有子俸能供祭勝無官杯縁量減常先醉帯為愁多覺屢寛應念故園秋色裏露珠香滿菊花團寄劉儀部子髙開遍芙蓉雨滿津西風又冷楚江蘋眼前簮紱流如水天上羲和釀得春黄葉亂蟬南浦樹紫髯一騎上京塵此時詩興誰能識還憶山隂賀季真懐王節推彦文烏㡌輕籠雪滿簮古苔怪木訟堂深官清猶有長憂色年老惟存不競心與吏議刑秋寂寂教兒讀律夜沈沈酒闌可解時相憶月落霜飛鵲繞林立秋日懐方員外幾日西清晝掩屏緑塵幽蘚遍閒㕔病中事少翻嫌健醉裏愁多只願醒悞響閤鈴飛夜鵲偶攤書巻落秋螢萍蹤已辦東南别風雨長更各自聴次前韻遣興已覺新凉入畫屏江聲樹影在西㕔人情近午猶思浴客夢驚秋却易醒月淡渚蓮香掩鷺雨深池草濕栖螢從今不恨無情緒茅屋西風細細聽冬夜宿江右省垣懐劉子髙司業曖曖微宵耿玉繩澄澄夜色麗觚稜月明鳷鵲千枝雪霜冷枇杷一樹氷魚鑰戒嚴森畫㦸鳯團銷醉擁青綾瀛洲盡是羣仙府鶴背應須得共登七月三十日祖母初度時年八十九白髪青瞳壽者身每逢佳節話咸淳百年未盡四千日來嵗還週九十春遷客無家空望拜孤臣有表竟誰陳今朝風雨茅茨底應對兒孫説逺人思親一割鴻溝消息稀隻身湖海尚流離乾坤何事有今日父子可憐逢此時悵望只添新涕淚艱難應變舊鬚眉愁心恨不隨春雪飛上吳山椿樹枝將歸金陵留别省垣諸友吳山歴歴向東遙望盡寒雲意未消多難定煩慈母憶畸魂時頼故人招曉霜猶凍枇杷樹春雨還生杜若苖歸去不愁江水濶野鷗羣裏木蘭橈望夫石在采石東山上古荔荒苔緑滿身至今翹首望歸人玉容已化峰頭石戰骨應為塞上塵風雨不銷千載恨鶯花又度一畨春誰將湘女斕斒竹種向東風佀有因登峨眉亭在牛渚山峨眉亭上㸔秋山低蹙輕顰淺淡間雨過微雲添一抹晚來新月闘雙彎不愁商女行相妬長恨離人去未還我亦峨眉山下客偶因西眺憶鄉關先生祖蜀中故末句及之謁小姑廟月帔星冠敞翠屏白腮紅頰兩眉青魚鱗小殿波紋滑龍尾長旗雨氣腥巫女沈牛歌宛轉彭郎囬馬拜娉婷蘭舟願祝東風便一夜夷猶過洞庭大姑山廟遇老衲年七十餘云是東林寺僧時廟厄囘禄方謀逮興有作白髪星星照赤髭春風邂逅水仙祠我非當世陶彭澤渠是前生逺法師結習已空終不染塵根俱盡竟何思猶將大乗神通力笑寄須彌向一枝鄱陽湖喜晴鄱陽湖裏㸔春晴山色波光蕩漾明短髪已羞芳草緑閒身應羨一鷗輕風來栁上偏無力雲到松梢更有情却羡蘇堤舊游路碧桃千樹響流鶯舟泊潯陽懐申屠衡江烟漠漠草毿毿且泊蘭舟近水南一鷺暝投槎外石雙鴻低拂樹邊嵐夢隨春雨歸華屋愁逐東風上短簮栁色漸深人漸逺幾時花裏共停驂晚泊湓浦逢冷節小雨籠隂䕶晚霞栁邊停棹聽啼鴉湖光已緑皆春草風信猶寒是杏花到處青鞵隨蛺蝶誰家紅袖泣琵琶匆匆客裏逢佳節那得行人鬢不華過黄州當年逐兔跨神州此地羣雄首建謀亂後江山猶故物春來花草亦新愁歸人拜塜營茅宇過客停舟問竹樓惆悵臨臯驛邊栁淡籠烟雨白沙鷗武昌夜泊懐古鄂渚柔莎夜雨餘漢陽雲樹暮烟初休誇健筆題鸚鵡終悔空緘託鯉魚遺臭功名成底用涴人塵土欲何如滔滔黄鶴樓前水日夜東流恨未除襧衡殷浩桓温庾亮吕仙祠祠在黄鶴樓東江山形勢非神仙不足居此風清月白之夜時聞鐵笛之聲兩㸃方瞳漆有光紫髯眉緑面如霜千年一笑來黄鶴三度長吟到岳陽日月自隨天地老江山不為古今忙又携鐵笛瑤池去亂挿桃花醉一塲過洞庭雨後春江似潑醅洞庭猶更緑於苔碧湘樓閣千花繞紫府旌旗十殿開春色不隨流水去暮雲長帶客愁來閒身也是滄浪客鷗鷺匆匆莫浪猜過洞庭龍君廟陰隂微殿肅神都地位清嚴鎮五湖水府奏工題玉檢淵泉錫爵送珠符雨分赤鯶衝波出風遣青鼉踏浪呼時有蠻商獻袍笏廟前抛肉飼神烏岳陽囘仙有題夢覺邯鄲月未西碧紗斜挿杏花枝丹霞淺淡微生頰白酒甘甜不上眉戲畫榴皮成鶴舞笑揮銅劍作龍騎夜來小宴瑤池上嬴得麻姑一著棋夢覺囊衣單薄藉無氊天氣將寒每自憐嵗月無情人老大風塵如此路三千片時兒女燈前笑多在關河夢裏船那得全家江浦上短蓑微雨卧秋烟舟中聞隣船吳歌有懐幼文來儀輕帆短檝泝烟波疊渚囘舟奈逺何一路詩從愁裏得二分春向客中過江通漢水晴偏緑山入湘雲晚更多何處思君腸欲斷楚妃祠下聴吳歌途次感秋嫋嫋西風吹逝波㝠㝠灝氣逼星河宣王石鼓青苔澁武帝金盤白露多八陣雲開屯虎豹三江潮落見黿鼉沅湘一帯皆秋草欲采芙蓉奈晚何渡漢江九天灝氣肅髙秋萬里銀河入海流西楚人才多用晉中原豪傑暫依劉久無翠羽供王貢時有􅊮弓賜列侯自惜飄飄雙短鬂也隨江漢一輕鷗經潭州哭李太守潭州即今長沙府太守名黼字子威死節元忠臣丁卯科中第一人誓將孤壁障妖塵百年事業歸儒者萬里江山泣老臣肝膽當時紹余闕英靈此日配張巡我來竟就船頭拜一盞寒泉薦緑蘋三湘曾向三湘望五溪水源汨汨盡流西狂思醉裏千鍾少老覺人間萬事低移艇出江當月上煮茶消睡恰鶯啼近來詩句慵思索逢著青山趣謾題過黄陵廟萬里蒼梧接桂林九疑雲氣隔湘陰東風又洒斕斒淚明月長懸悵望心雨裏鷓鴣春色晚廟前莎草落花深荒碑獨有元和刻苔色蝸涎已半侵江邊尋花值雨獨自尋花傍水濱霏霏小雨浥輕塵正憐啼鳥能留客却笑東風也妬人栁色半昏先近晚梨花漸濕更多春湘娥應解知人意兩㸃脩眉結翠顰興安道中青山一半入青雲碧磵千囬轉夕曛松碣㸔來多漢刻竹祠隨處是湘君路經猺洞諸峰直泉入灕江兩派分莫據孤鞍聽蜀魄野棠疎雨又紛紛二月晦日來陽江口寄書自笑無家類轉篷年光何事更怱怱數聲鶯響千山裏一樹花開萬竹中夜入瀟湘偏厭雨春來杜若自宜風兒童别久應驚問華髪飄蕭佀老翁祁陽道中見海棠桂陽江口望祁陽疊疊烟雲入𣺌茫髙樹緑陰千嶂濕野棠疎雨一籬香縱無春在猶囬首況有鶻啼合斷腸惆悵東湖堤上栁暖風輕絮正悠揚衡陽有懐二首寒郭沿洄楚水陰鶯花寂寂雨沈沈江山不盡登臨意節序偏驚老大心客裏茶烟長自冷衡陽栁色為誰深峰前亦有囘歸雁不肯隨人到桂林其二鳴鳩日日喚春陰坐挹爐熏萬慮沈對雨只添鄉國恨㸔花無復少年心烟皆榆栁青猶淺水是瀟湘緑更深不道沙邊有城郭短籬茆宇映疎林客中寒食有感客舎蕭條百尺天衡陽城下栁隂船梨花又濕初晴雨草色仍含己禁烟車馬㸔花悲昔夢綺羅傳燭待明年三吳八桂東西路萬里空山哭杜鵑其二減衣時節尚寒天暫倚東風泊畫船十里樓臺仍細雨五侯池館又新烟且簮楊栁酧佳節莫對桃花憶去年總是無情也腸斷鷓鴣聲裏又啼鵑桂林與蔣張二指揮觀兵大字青旗寫豹韜連環金鎻束征袍千艘夜泊烟江濶萬竈晨炊瘴嶺髙燕頷將軍髯似㦸鵠形俘虜面如刀自慙不得同髙適走馬西河㸔屬櫜桂林即興二首曾見重華巡狩來灕江廟宇野棠開山無檜柏皆巖穴地有芝苓盡藥材花布短衣齊膝製竹皮長㡌覆眉裁也應風土交州近丹荔紅蕉不用栽其二江為池塹石為城南去蒼梧兩日程碧殿尚存虞帝像青山不廢伏波名蘭根出土長斜掛榕樹成門却倒生時有苗人與猺女負薪輸布事科征聞江聲有感嵗事匆匆兩鬂星坐㸔簷影下虗屏寒梅向暖商量白舊草迎春斷續青夢以俗牽終夜惡酒因愁散片時醒秦山密雪巴山雨不似江聲不耐聽晚發𤓰洲江花江草望中稀相趁畸人萬里歸鷗逐晚潮爭北上雁隨春雨向南飛船頭野老新巾幘馬上王孫小帶圍嗟我逺來頭總白洛陽塵土滿征衣宿揚州南門春風曾在此停舟白髪重來又杪秋何事瓊花猶古物當時玉樹總新愁孤城小驛連荆杞野水荒墳見髑髏夜靜有人船上哭可應鄉井是揚州舟次邵白有懐徐幼文文章小技恥雕虫也逐羣才赴洛中多病不宜秋色裏相思只在暮江東鷄豚籬落茅茨雨鳬鴨陂塘菡蓞風欲買一樽澆寂寞傷心不與故人同過髙郵即景蒼烟斜日照孤城嗟我情多却倦登田豕白蹄髙似鹿野蚊花股大於蠅人家結屋多蘆葦官府輸租半藕菱莫向西風詢往事旅懐蕭索豈堪勝淮安新河候船城郭逶迤曲遶河塵沙滿眼北風多行人淚落山陽笛逐客魂銷郢水歌江總歸陳嗟老矣淮陰在楚奈貧何明朝又鼓征西棹帆影翩翩逐逝波至龜山有題在盱眙魚鱉撝訶激怒瀧腥風沫雨濕篷忩寳珠佛像山王䕶鐵鎻神工水母降石勢參天龜出洛潭光照夜蜃浮江我行未暇求陳迹且醉船頭濁酒缸夜宿開封郡齋贈林通判輝輝燈影照更闌巵酒憐君為解顔鏡裏風塵雙白鬂夢中烟雨萬青山逢迎意懶長思靜撫字才疎欲乞閒母徳君恩俱未報不勝悲感淚潺湲懐汝寧許知府能以寛閒繼古風府中無事不從容諸生秋試多髙選八縣春耕少惰農富貴何須皆汗馬文章正欲去雕虫同庚況有聯曹誼風雨相思意萬重太原春日郊行屐齒車輪更馬蹄緑莎隨處踏成蹊無人為惜閒花落有暇來聽好鳥啼步屧愛沿流水曲開懐欲與衆山齊詩成誰復吹簫和却向藤蘿石上題清明懐故園縷縷輕烟細細風秋千池館萬家同髙低草色相參緑深淺桃花各自紅人意盡隨流水去風光都在笑聲中多情白髪并州客坐對西南雪滿峰春日山西寄王允原知司并州春半無花可賞追憶舊遊情動于中因賦長句五首公退之暇詠而味之庶幾春色之在目也允原知司善詠詩者就録以贈是詩先生親筆知司曾孫至今藏于家十里烟光濕翠苕二分春色到花朝無人快擊華奴鼓有伴同吹弄玉簫遍地錦圍歌處席滿身珠壓舞時腰莫嗔老子疎狂甚曾醉揚州廿四橋其二藥苗初茁水生葒老麝収香鹿養茸二月春光纔霽雪一畨花信又顛風參差鸚鵡全身白淺淡棠梨半面紅正是江南寒食近滿簾飛絮雨濛濛其三畫船揺漿蕩晴波步障圍風踏軟莎簫皷隊衝黄鳥散綺羅人比白鷗多不知酒與愁成敵長恨花為病作魔囘首六橋青草徧水光山色近如何其四花時無處不黄鸝偏到垂楊著意啼人立晚風携便面馬臨春水惜障泥踏歌趂拍催腔急旋舞囘身應節齊遙想故山行樂地紫苔侵遍十年題其五一莖白髪已堪嗟況是東風兩鬂華醉裏誤將裙作草老來羞以㡌簮花疎狂不識眉雙結敏捷曾經手八义閒喜日長公館靜自分新火試新茶寄舊契張來儀秦山萬㸃接烟霞東出關門鬂已華無奈異鄉仍哭子可能孤館不思家貧逢北客長賖酒飯比南人只喜茶我住東林數間屋每同談坐到栖鴉懐宋大叅公黻西山暮雨對秋屏曾共銜盃話北征五月雪花猶亂落一春沙草未全生曉因諜使窺邊略夜問降王為冦情東閣晝長香篆小盡繙圖畫憶經行寄陳管勾則威全晉封疆寄太行西來絳水入平陽千山草樹惟無竹七月衣裘已有霜俗喜背牛兼帯犢人能擒虎類驅羊憐君詩思清無敵細覔寒梅認色香無題和唐李義山商隠嘗讀李義山無題詩愛其音調清婉雖極其穠麗然皆託於臣不忘君之意而深惜乎才之不遇也客牕風雨讀而悲之為和五章一瓣芙蕖是綵舟棹歌離思兩夷猶風鬟霧鬂遥相憶月户雲牕許暫留波冷緑塵羅襪曉恨添紅葉翠顰秋雙鸞鏡裏瑤臺雪任是無情也上頭其二纔向瑤臺覔舊踪曙鴉啼斷景陽鐘薄施朱粉籹偏媚倒挿花枝態更濃立近晚風迷蛺蝶坐臨秋水亂芙蓉多情莫恨蓬山逺只隔珠簾抵萬重其三細骨輕軀不耐風春來簾幙怕朝東人間玉宇三山隔天上銀河一水通眉暈淺顰横曉緑臉銷殘纈膩春紅氷絃莫奏清商曲滿地霜華泣翠蓬其四夜合花邊待月來宫中轣轆響春雷笙調恨譜參差度錦織愁紋宛轉囘樓上緑珠知報主座中紅拂解憐才傷心兩炬緋羅燭吹作銀荷葉下灰其五為雨為雲事兩難蕙心蘭質易摧殘箏移錦柱秋先斷漏滴銅壺夜不乾羅幙有香鶯夢煖綺牕無月雁聲寒芙蓉一樹金塘外只有芳卿獨自㸔附沈通理次韻無題五首通理居蘇之崑山宣徳正統間詩人蘭漿雙欹倚桂舟隔花臨水思夷猶香囊玉佩勞相贈綉幄銀屏惜共留愁繞鳳臺秦樹暝夢囘巫峽楚雲秋多才苦被春情惱鏡裏潘郎雪滿頭行雨行雲少定踪夢囘時節怕聞鐘竹枝寄恨心偏懶桃葉題情意轉濃香冷綉鞍閒騕褭燭殘金障掩芙蓉紅樓緑水無多逺如隔江山幾萬重纎纎斜日弄微風腸斷仙山碧海東鸞鏡有塵空自掩雁書無路若為通愁横栁葉眉顰翠泪濕桃花臉暈紅盡道芳年易憔悴莫教青鬂作秋篷油璧香車幾度來赤闌橋畔起驚雷夢隨暮雨陽臺去愁踏春波洛浦囘青鳥銜書通密意綵鸞留詠惜竒才芳心一寸如紅燭總遣燒殘未作灰𤨏牕珠户别離難蘭蕙柔姿惜易殘曲斷瑤箏銀甲冷書留錦字墨花乾羅衾積夢驚春晚寳鴨銷香覺夜寒檻外碧桃花自好一年芳景共誰㸔眉菴集巻九欽定四庫全書眉菴集巻十明楊基撰五言絶句新月光斜鏡露邊影沒眉鋪黛香烟隔院來知有佳人拜殘雪庭雪半消殘猶存舊臘寒春風知有意留待隔年㸔春夢二首春夢復春夢春夢何時曉啼鳥忽相呼花殘人又老其二春夢復春夢夢與覺時同縱使風吹破相㸔佀夢中五色五色綉羅衣花多枝葉稀春來不敢著怕引蝶雙飛陌上桑青青陌上桑葉葉帯春雨已有催絲人咄咄桑下語優人乞米恢諧一面笑慷慨千鍾粟相逢莫歎貧農夫方夜哭隔簾聴歌低處最多情聲遲拍轉停坐中腸亦斷況乃隔簾聴仕女美女二圖獨立長門裏徘徊無所親可憐前殿月不照後宫人其二無人問起遲不語自支頥此意春風解深閨未嫁時花開花開醉不休花謝莫深愁縱使花長在東風也白頭壺中二色桃花素頰映紅腮西園共折來憐渠竟先落知是最先開