  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書集部六眉庵集别集類五明提要臣等謹案眉庵集十二巻明楊基撰基字孟載其先嘉州人祖官呉中因家焉始為張士誠記室洪武初起為滎陽縣知縣厯官山西按察使尋以事奪官輸作卒於工所明史文苑傳附載髙啟傳中史稱基少以鐵笛歌為楊維楨所稱與髙啟張羽徐賁號明初四傑其詩頗沿元季穠纎之習都穆南濠詩話摘其佳句十二聨其所品題得失叅半李東陽懐麓堂詩話謂孟載春草詩最傳然緑迷歌扇紅襯舞裙已不能脫元詩氣習至簾為看山盡捲西更過纎巧春來簾幙怕朝東直艶詞耳故徐泰詩談謂其天機雲錦自然羙麗獨時出纎巧不及髙啟之冲雅王世貞藝苑巵言謂其情至之語風雅掃地朱彛尊静志居詩話亦摘其詩語類詞者至數十聯而獨推重其五言古體然近體之佳者亦自清俊流逸雖不能方駕青邱要非餘子所及也集初為鄭鋼板行成化中呉人張習重刻嘉州江朝宗為之序習為後志云乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀眉菴集原序予布衣時雅聞楊孟載先生盛名及入翰林為史官奉勅纂修大明一統誌攷先生先世予蜀嘉州人因大父仕江左而生呉中遂家焉又誦先生詩云我家岷山更西住正見岷山發源處於是乎益知先生雖生呉中實蜀人也先生生於元末仕於國初宏逺之器醇正之學初任滎陽令再謫鍾離閒居江寧句曲乆之被薦陞江西省幕賓復使湖南廣右累官山西按察使誌載先生讀書日記數千言尤工於詩與高啟徐賁張羽為詩友故時有高楊張徐之稱云先生所著眉菴集有五七言古體五七言律詩及歌行排律絶句詞曲總若干篇教授鄭鋼編集已板行矣字多訛謬先後失序而缺畧尤甚識者惜焉呉中張公企翺以名進士累官廣東僉憲素重先生之詩每遇公暇輒研究之補其缺畧次其先後履厯之序字之訛謬者悉攷正之釐為十二巻繡梓以廣其傳其用心亦厚矣哉間以示予俾為之序夫詩言志也三百篇之後變而為漢魏為六朝宋元以前惟唐為盛今先生之詩穠麗纎蔚藹然正大和平之音殆有唐人風味夫豈易得者哉僉憲公能俾先生之詩大顯於天下後世天下後世即其詩可以知其志知其志可以知其人然則先生不但有光於吳而且有光於蜀也予後生小子因僉憲公之命不敢以繆悠辭而僣序之其景仰之誠得不於是而少舒哉成化二十年夏六月既望賜進士奉直大夫廣東市舶提舉前翰林侍讀學士經筵官兼太子講讀古渝江朝宗書欽定四庫全書眉菴集巻一明楊基撰五言古體感懷十四首璞玉宜深藏白雪乃寡和和寡非所悲衒玉徒取禍奈何刖足者抱璞不知過進非烈士忠退耻愚夫懦傭舂匪利直販鬻欲自涴山中一尺雪且復掩扉卧其二清霜凋百草亦令脆者堅士不遇患難智慮何由全𤣥徳髀肉生重耳十九年一為三國雄一稱五伯賢茍不辨菽麥何足攬大權至今巴蜀人歎息後主禪其三鄧禹南陽來仗節歸光武孔明卧隆中不即事先主英雄各有見何必問出處孫曹與更始未可同日語向非昭烈賢三顧猶未許君子當識時守身如處女其四蝮蛇冬未蟄靡草寒更生陽光泄為電地雷忽有聲上天號令乖致此灾異并不然多殺傷兵氣之所成漢廷免三公毋乃非政刑願言調玉燭仰見三階平其五三人乃成虎衆口能爍金流言雖不多足移君子心人心本無疑理與勢所侵奈何形似間構結已駸駸入耳即契合不待間者深陳平雖云智羽有隙可尋髙祖誠豁達卒亦誅淮隂營營青蠅詩示古猶示今其六位卑諫勿直直諫君心疑交淺言勿深深言友誼虧諤諤衆所惡况復違逆之豈不利於行吐蘗而含飴朝登千仞崗振我身上衣丈夫貴自潔毋論他人非其七一女不得織三人歎無衣一夫不暇畊八口皆啼飢飢寒迫于身誰能不為非西伯善養老仁人為己歸霜寒草木落禽鳥相背飛民心亦何求在于得所依此理勿暫失君子慎其微其八鵲巢知避嵗終為鳩所居巧者勞不足拙者安有餘溪翁夜結網山人朝煮魚隆凖入關中不讀半巻書當時㣲張韓乃與勝廣俱大拙乃至巧巧者復何如其九驊騮日千里亦在御者功向無造父能乃與凡馬同韓彭覂駕材驅䇿遇沛公増本渥洼児意不與項通豈獨知馬難所貴御馬工駕御苟失宜鮮不敗乃翁蕭蕭帳下騅千駟何足雄其十鞲鷹歛六翮栖息如鷦鷯秋風颯然至聳目思凌霄英雄在承平白首為漁樵匪無搏擊能不與狐遭長星亘東南壮士拭寳刀落落丈夫志悠悠児女曹其十一善鬬須扼吭善戰須搏膺楚不都關中卒為漢所傾洛陽非用武况乃居彭城曹公失荆州致使吳蜀争五馬渡江南神孫終莫平元帥破㐮陽宋社忽已更制勝在得勢勿云險可輕其十二劍可敵一人書足記姓名學之十二年書劍两不成歸來吳楚間豪傑已起兵攬鏡照鬚眉一二白髪生老母在高堂未敢即逺行太息長在夜鷄鳴星斗横其十三浮雲從何來本是山川氣寸隂不終朝一雨浩無際江河㑹交流草木奮妍麗但知潤澤功不識真宰意天風吹𤣥隂白日照厚地理亂自有常千載可坐致其十四東隣夜從軍西隣曉上官一為死别愁一為知己歡歡者承新恩拂拭頭上冠愁者囑妻孥結束跨下鞍悲歡何不同一危復一安黄塵障東華平地生波瀾朝榮夕賜死轉盻異暑寒寄語承恩人莫歎從軍難漢傑士楚范增附淮隂天下士本是飢寒人朝為女子憐暮為惡少嗔身無兼人勇屈辱楚水濱一朝拜大將為漢伊吕臣王齊及王楚初假後即真男児猶龍蛇窮達乃屈伸如何百世下獨有黔婁貧其二蕭何刀筆吏碌碌起沛中初無一矢勞胡乃第一功發縱及指示帝論亦未公信亡追及之此為萬世雄漢卒頼信力亡楚定四封曹叅彼何人而欲與之同其三子房本韓臣志欲報韓仇亡秦與蹶楚初不為漢謀功成不貪賞而乃願封留冨貴非初心竟從赤松遊寥寥千載下斯人誰與儔其四范増亦人傑不去羽不亡漢非赤帝靈增固不可當紛紛與楚争可畏惟漢王危哉鴻門㑹㧞劍舞項荘示玦羽不决致令漢道昌成敗非失策天命固有常其五禮樂治化本百年然後興奈何叔孫通綿蕞為可行布衣起山東五載帝業成瘡痍有未起詎可謂治平當時定朝儀事正擊柱争遂令後賢王禮樂終不明漢道止于斯俗儒良可輕其六陳平素無行終為漢相國隂謀固可鄙竒計凢六出後來諸吕難卒頼陸賈力豈縁冨且貴臨事意反詘智者猶若斯請為愚者説秋懷二首曉城露氣白旭日猶蒼莽千林木葉墜逈覺川原廣村虚雞唱獨江静鷗飛兩瞻眺豈不佳遲暮良可愴菱歌發清詞助以蒹葭響斯意竟誰同忘悲却怡賞其二日沒霧靄曛微茫見羣山茅屋四五家時有芻牧還豈惟寵辱忘亦喜思慮閒嗟嗟當世事戚戚念時艱秋夜言懷四首鮮鮮籬邊菊慽慽庭下蕙蕙氣日已銷黄花自妍麗復恐清商激幽芳亦凋瘁褰衣步廣除露白月在地鵲飛林影空蟲語墻隂細昔賢悲絲染徃聖嘆川逝少壮不我留臨風發長喟雅志諒難酬蹉跎老將至其二西齋近寒徑枯葦接深篠秋風颯然至索索鳴不了抛書坐孤榻眼澁燈暈繞窻破斜隙明漏斷餘更悄平生所欣遇此夕紛内擾假寐入㝠思南枝有歸鳥其三夜坐復不樂起行亦無悰徘徊二者間百憂結心胸嵗事忽已遷復共䘮亂逢一身愧無補况乃禄萬鍾月林鵲翻翻風江雁嗈嗈栖止苟有託遲莫還相從其四高梧䕃崇岡衰草被廣陌風微夕露凉星淡秋河白芳辰兼物謝孤抱縁愁積佳人在何許悵望江浦隔昨㑹月初弦徘徊又生魄送謝雪坡防禦出郭團練朝催築城夫暮㸃團結兵兵民皆動揺一日十數驚所頼官長賢撫勞得衆情防禦出郊來父老拜且迎埀髫及戴白羅列車下聴官家百萬師自足與㓂爭汝自守汝鄉汝自保汝生閒暇苟不虞倉卒恐見傾我當徼汝勞薄爾賦税征父老共感激闐然動歡聲旌旗洎甲矛五色相鮮明豈惟備抄掠大敵固可嬰問君何能然子弟衛父兄平川雨初収馬嘶皷鼟鼟相送不同徃極目秋鷹横送将作僉院丁季周奉使兩廣還朝國家厄中運四海揚風塵蚩蚩弄児兵皆我耕桑民或為官府迫漁獵無冨貧奮然掉臂起一呼聚頑嚚始有可招徠乆之竟沉淪勢結不易解遂同越與秦皇明邈九重此恨弗得伸雖居蠻夷中豈不念帝宸丁侯京師來逺使廣海濱舟師送蛟鼉陸足披荆榛所至敷恩威一一為具陳上述天子聖下言將相賢叶欵欵漸輸誠仄仄咸來賔直氣既侃侃婉辭復諄諄邊氓及夷戎感激爭自新酋長獻印璽老弱投棘薪幡然悉改圖喜極涕沾巾安知萬里外復得仰化醇旌槎駕回風星斗羅高旻西風吹征衣相見吳城闉呼酒慰逺别烹鱸煮青蓴念兹歸意切又問銀河津嵯峨蓬萊宫雲霧鬱輪囷至尊開天顔前席顧問頻賜以錦繡叚翠織雙麒麟追趨鶴禁曉錫宴龍樓春賞功固盛典况復能咨詢丈夫志四方策勲貴及辰嗟我獨匏繫戚戚罹蹇屯壮心殊未巳矯首潜酸辛送陳資深歸廣大夫輕别離投老欲入廣奈何干戈際萬里渉沆漭兹城頗阜庶有女供奉養世亂得粗安胡勞問鄉黨君言苦無家一夕魂九徃鄉書昨日至捧讀屢泚顙四䘮寄淺土未得掩諸壙雖云敝廬在誰復脩祀享感兹歸意迫無力猶勉強齒髪固已衰尚足嬰擾攘敢忘鄉土情偷安戀兹壌吾聞重感激惜别復加賞天寒霜露繁摵摵枯葉響水宿慎蛟螭山行避魍魎田園雖荒蕪果實羅栗橡鄰居喜均還相邀具醅盎酒薄不得醉且復歌慨慷人生還鄉樂無物堪比仿喜極繼以悲歡戚同反掌畨思蘇臺月照女夜績紡此時父子情兩地同惝恍安得混車馬妻孥共羅幌兹事竟難期涙眼一悽愴我家嘉陵江踪跡乆飄蕩亦欲問前途逡巡覔西瀼贈破奚楊鉄笛奴也人笑跛奚蹩我愛跛奚跛蚿雖百跂速䕫亦一足可履平疑屐齾厯險若箕簸立如鷺聨拳行類鱉􅂒􅂒形欹裙長前肩脅鞲短左非斮渉寒脛豈刖獻玉踝附婁濟水厄哂却搆兵禍疢同哀駘佗怒及趙女婐觸屏屡思倚守户每得坐戒奚勿躁歩世路方坎坷登靈岩和韻周左丞伯温饒大叅介之單艫集羣英席窄坐每盍烟横半掩寺木落全見塔斜流出渠分曲徑轉溪合村籹妍醜並野話悲笑雜童操吳音聞僧作梵偈答霜苔滑難躋露棘朽易拉磴紆螘縁樹扉敞蝸啓闔娯賔列五豆禮佛過三匝晴崖暝憂雨秋洞寒疑臘窻攀盗果􅆐簷入避鸇鴿掬池萍沾䄂憩石蘚汚衲琴忘荒臺弄屧響囬廊踏值險慮思笻得竒即傾榼感深怒須磔愁極衰鬢颯華年倐川駛雅量浩海納嘯歌激欷歔雄辯肆交沓禅寂虚無量道祖清静葢吅囂蝸觸蠻變幻雀化蛤狂遊類飲酎薄宦避嚼蠟終當謝塵鞅掃屋分坐榻贈别龔行義楚龔風雲姿璞素玉不玷隻身躡雙屐十載食破研麻衣閲冬春睥睨狐貉賤胸中何所蓄經史子集傳酒酣文思湧強弩機發箭清真謝鉛飾越女巧笑倩紆盤珠九曲精粹金百鍊粲如星森羅勇若軍後殿吾黨多英雄氣索皮肉顫西風忽歸來塵土吹滿面從容問所厯揺首不復辨但云秋水清呉淞浄如練方同華表鶴遽作幕上燕去住何太輕弗得絆以線君材匪樗櫟名字已交薦淵泉暫蠖屈霧雨終豹變賢達坎坷多豪傑窮乏先嗟予書中蠧髀消兩目眩朝騎瘦馬出夕飽藜與莧志慚㸃爾狂質匪由也諺猥遭周秦厄不識舜禹禪因君動遐想翅塌足若罥螺巵白甆罌聊為江渚饑囬首芙蓉花紛紛落紅片贈張主簿有田乃有租有身乃有庸不憂徴需煩但願賦役公東家倉􅅒寔西鄰機杼空門戸非不齊貧富有不同縣官皆賢豪豈不念困窮但為嫌疑迫上下相蔽蒙坐㸔頒白民展轉溝壑中嗟嗟華亭簿彷彿古人風與陳時敏别近别㑹有期逺别易慘悽一人失意行衆賓顔色低相顧各無語握手立大堤白沙飛輕烟赤草漫路蹊竈户八九家皮肉瘦且黧再拜謁官長鵠立無所齎孤㕔如荒郵壁落新補泥日沒官吏散角角野雉啼歸來對寒燈児女相孩提雖云去鄉國喜不聞鼔鼙官卑職易稱牛刀用割鷄回首華亭鶴月白露凄凄送王國忠之邵武推官新霜落江楓蘋葉爛如染感秋方惻惻送别復冉冉一官萬里外舟楫破天險人皆亂離戚君獨笑而慊虹光拂孤劍酒色暈雙臉平生峥嶸志弗以微物掩經綸二三䇿謇諤謝諛謟天子固未遑屢讀首屢㸃七閩暖無雪臘月草木蔪花濃霧迷驛榕暗日在崦斯時到官舎鞫案手自檢雖無老母笑反獲在不忝顧予坐書癖譬若秋後簟低回鶴俛啄嚅囁魚上噞未能東浮越况方西渡陜文慙英俊逼鬢覺衰颯漸交遊暫雲合乖散倐電閃憮然成短歌持贈非琬琰雨中効韋體寄季迪止仲道衍仲温四首屢覿歡未終乍違離緒繞㝠㝠鄉國隂獨坐空齋曉鵑啼春樹宻花落流鶯少不有郢中吟何由冩懷抱其二乆静厭紛俗齋居自𤣥處遥知乆黙暇共此瀟瀟雨屢驚芳節換暫覺清音阻欲扣竹間扉棋聲隔春渚其三叢林翳重岡迢逓僧居獨慿軒一悵望春雨蘼蕪緑泉香花落磵窻暝松圍屋憶爾諷經餘袈裟坐深竹其四别君俄兼旬芳景已云暮南風吹新緑欲暗庭前樹騶鳴孤驛曉鴉散春城曙盻此慰離憂新知忽成故西齋聞晚鶯南風池館静深樹野鶯啼初鳴喜新聴再囀復含悽念爾來城市山林定鼔鼙初夏過寧真道院偶來高樹下獨坐青苔石澗雨落餘霏衣裳淡生碧道因微物悟理尚𤣥言析習静自無營何妨處囂寂賦得浄瓶送衍上人虚瓶湛靈泉行住一鉢友紅簮天女花碧挿大士桞中圓涵真虚外潔照萬有自盛甘露漿不貯聲聞酒衍師時出定提挈每在手詞鋒當建瓴禅寂宜守口賦得山逐放舟遲送王主簿舟行山亦移山盡舟亦住青山無故人行人自來去初辭逶迤谷復接參差樹柁轉暮色分㠶駛秋嵐度俄停風暫弱既逺烟重䕶别意即山情依君屢回顧賦舎利塔送僧人八萬四千塔巋然天地中靈光忽上下浩刼未終窮法象諸天䕶真身五藴空堅明元不壞生滅豈無同暫住猶飛錫三匝禮秋風空齋天王寺比丘號也托友求詩為説偈曰上人坐空齋嵳峩兠率宫兠率乃佛土亦在虚無中兠率既無有空齋何所從豈獨空齋無四大亦本空萬有萬法幻如泡影電風隨起即隨滅無聲色與踪以無起滅故即之了不逢真空本非空去住空色同試舉空齋偈為扣西來翁遊北寺竹林僧居古城隂迢逓通萬竹林光落虚牖坐愛衣裳緑齋餘孤磬逺茶罷㣲烟續道人悟重𤣥淡然無衆欲譬彼石根泉亭亭湛寒渌乆雨十日雨不止四簷如決堤今朝雨聲絶又聴斑鳩啼開門對西郊汨沒失路蹊徃來舟車人拍浮類鳬鷖我貧乏車馬徒步兩屐泥歸來冠裳濕焙燎勞山妻側聞關中旱終年望雲霓燥土及萬里曽不留涔蹄上天本無私造化自不齊侏儒與方朔斯言非滑稽雨中期袁宰不至晨興罷巾櫛撫巻對秋渚幽人期不至值此瀟瀟雨豈縁俗情牽致此清興阻呼童掃庭蕪落葉深幾許更採石田芝空齋待君煮寓感人心渺烟海浩浩不可量正兹春風和忽然變秋霜悽悽不見矜惕惕反中傷始終非感激愛惡自靡常豈悦芙蓉鮮厭此蕙葉蒼請看塵中鏡拂拭耿輝光贈馮瘍醫為金徳儒謝氣血在人身譬如江與河擁之不得行崩騰作風波古來飬生術運動及按摩較之䟽瀹功相去苦不多金君坐文墨錙銖細研磨氣鬱神不舒顴瘍忽為痾初疑疹發面頃刻如堆螺金刀試神巧一抉回天和神契二竪緩巧師五禽佗乃知藝學流無不由專科去毒類去惡芟夷絶根窠滋蔓不可圖未必非蹉跎余非知醫者此理信靡它作詩代璚玖語陋將如何東臯為馬仲蔚賦初夏藹衆緑霏霏繞園霧横書散輕䇿愜我林臯趣衣凉水氣襲屐潤苔痕汙雨菌結芝肪烟莎緑鶴步意銷念慮寧景適真樂遇衆妙入静觀前非覺神悟江花自孤婉芳草忽已暮為鼓朱絃琴南風在庭樹觀魚池隂樹影凉白小紛成隊吹絮圓漚續觸荷清露碎俄沉静却浮忽遇驚還退幸免釣絲憂江鱸且充鱠賦得萍贈陳乆中浮蹤散寒星一夕生無數魚跳翠乍開鷗過青還聚微風和影去急雨連根露惆悵别君時楊花滿衣絮季迪病目醫令止酒因作此勸之病目須飲酒飲酒調微痾氣血鬱不舒頼此酒力和所以雷公方製藥用酒多活血必酒洗散鬱須酒磨製藥既用酒飲酒良匪他酒可引經絡酒能驅病魔病目不飲酒此盖醫者譌李白好痛飲不聞目有痤子夏與丘明不為飲酒過飲酒既無害不飲如俗何清晨呼東家買置數斗醝爛醉瞑目坐滿目春風酡陶然物我忘夢見孔與軻此藥豈不佳而乃止酒那我今勸君飲君意無媕婀庸醫或見責請示眉菴歌夢親堂邯郸枕中夢要是夢所有余甞詠斯言嗟嘆為良乆漁夫及畋師所夢必筌笱颯然精誠接昭格固不偶聶君乃純孝寤寐夢父母思之不暫置猶種菂得藕嗤彼聲利徒孜孜在升斗壽萱堂朝㸔忘憂花暮㸔忘憂草毋憂日已忘母壽日已老児心與母心願得同壽考回首堂下萱秋風幾枯槁上巳遊虎丘值雨寓平逺齋層軒構崇立緑樹帶吳苑鳩鳴春竹静鶴下烟汀逺初登已神暢稍乆竟忘返松高急雨過草弱㣲風偃幽潭閟靈跡氣濕龍蜿蜿俯深戒臨危厯險知步蹇歸途極遐矚蒼茫失西巘贈毛生丈夫遇知已勝如得美官栖栖無聊中握手意便懽古來豪傑人所就非一端狂言與危行初若不可干從容兩陣間一語九廟安狐貉不外飾而足禦大寒嗟嗟隴西李願識荆州韓殘燈輝輝復熒熒露泠無良燄帷昏驚暈起隙破愁風颭幽人對餘光拂拭床頭劔附季迪和凝光結重暈逼曙零孤朶膏空逐漏水熖在同爐火戀影未能眠更就餘明坐晚節亭壽藏名也人生百年壽六十未為晚胡為鑿𤣥扄築亭在山阪周圍松櫟高可翫不可挽日暮春雨晴黄鳥啼睍睆東家鶴髪翁方置萬金産貽謀非不佳竟為達者莞王君超物理生死若徃返一笑步松隂青山在吾眼梁溪暮歸蕩舟入微茫晚烟羃羣山日落村墟遥惟見芻牧還鴉度風陣低牛鳴月痕彎五噫遺清歌聴之厚人顔山中言入山採薇蕨山路多荆杞褰裳避朝露欲往行復止豈不有饑餓一飯不為耻長歌古松下悲風為之起憂樂二首我有九十母白髪雙瞳青夜禮濩落斗朝誦彌陀經以兹精進力老而愈康寧百年何足云坐享三千齡其二嘗聞古人言五十不為夭嗟予已四旬齒髪固不少有子萬事足此事猶未了一笑付蒼天禍福詎可曉贈真性空上人真如心悟徹物我間廿年住名山已復到彼岸六觀㑹萬有一覺破諸幻袈裟坐緑蘚鳥悦林影散琴清風在竹偈古石當澗贈以青蓮花揺揺落秋瓣蘭室為醫士徐孟善賦種徳有餘慶種蘭有餘香爾來三十年徳與蘭俱昌春風葉猗猗秋露花的的人言徐翁蘭愛比蘓仙橘翁今已仙去蘭猶繞階庭瓊芝與玉樹相映蘭青青我雖不識翁而獲交二子芳名播清芬正與蘭相似人好蘭亦好愛之乆不衰弹君白雪操詠我幽蘭詩聴松軒鳥栖衆喧寂月出萬壑静秋聲松外來厯厯生我聴繁音雜宫徵空響調竽磬風細覺潜消山虚故相應幽人掩書坐瞑目兩耳定聲聴忽兩忘遒然發孤咏秀野軒結茒近東臯清矌接平衍新春㣲雨過芳草緑如剪携書坐深竹自讀自舒捲興來䇿杖藜初不頼輿輦西隣雞豚社落日牛羊圈至貴在無求何勞事冠冕僧寺感秋一榻卧僧室歸夢夕九至燈昏燼垂華香㫁灰成字斜光破窻月急響虚簷吹遥想宦游人應憐此中意守愚齋百智動不足一愚賢自守神交武子甯氣合刺史桞聰明與睿智方寸無不有歛之弗著形譬若物在篰慮千每得一問十且對九衆辨黙乃消羣囂静而受晨齋掩書坐草色連戸牖作詩代盤銘庶或置座右除夕冩懷曉凍雲正宻晚晴雪亦消岩松既露頂澗竹咸舒腰感兹年光徂又復見嵗朝漸與少壯辭老景去不遥人生百年間倐如狂風飄况我患難餘髪黄皮肉焦萬事若死灰那能復然燒差差青楊枝下䕃朱蘭橋明當長翠縷繫我春江橈吳宫遺跡八詠長洲春縠波流暖雲花光艶緑薲津頭洗紅女蝴蝶上羅裙羅裙秋水上明璫揺白槳飛下雙鴛鴦溘溘湖水響横塘晚川氣夕氤氲愁雲凝晚緑蘭舟蕩秋水東向横塘宿横塘花正開紅桃間竹栽誰家織白苧機聲度水來梧宫夜桐堦白露下濕螢光烱烱銅盤燒蠟黄秋衾夢魂冷粉泪鈆華滴雲鬢秋蟬整何處玉鑾聲芙蓉嘆孤影楓陵秋楓樹落清曉野烟結愁隂聲傳燒竹火人語滄波深鳬飛秋水黒蛩吟凉露白江月參差光芙蓉照芳魄越來溪逺岫如蛾眉紫菱盖緑漪小娃木蘭槳採菱溪上歸溪風揺白芷撩亂蘋花起疑是越兵來旌旗照秋水滄浪波入苑緑泱泱縠紋融暖光東風吹白浪照見赤龍堂龍堂負貝闕隂火春波熱鮫人賣髯綃夜夜唱明月綺川遊川水東北流川花照青樓龍船載鳯吹日來川上遊沙明屬玉止苕香翡翠留漁郎蒲葉底網得雙吳鈎茂苑思輦路秋蓬滿野香團緑濕嬪娥粉黛愁嫣花鈆露泣鶯聲舊時好玉砌秋歸早東家胡蝶飛烟姿滿芳草白門荅髙二聘君以上元末在吳作戊申秋余謫大梁季迪甞夢余與若平生明日道路傳余已死季迪有夢余詩己酉春正月余侍親東歸迪亦應召來京師相對驚喜因出所賦夢余之作余既感季迪之念而復疑猶夢也歌以答之結交貴知已不在早與遲嗟我識子晚深淺惟子知每於朋儕間擊節賞我辭前年吳城破子居我西馳交游非不多獨念與子離相去日已逺數與禍患罹道路傅我死可信子尚疑日暮過我廬為我涕交頥今年我還京適子應召來叶握手發長嘆示我夢我詩我昔患難中精爽無不之而子獨夢我與子若有期方子夢我初正我念子時春風鳥嚶嚶花發滿故枝為買一斗酒痛飲春江湄生死固常理勿為達士嗤自題宜秋軒予去官結小軒自適軒近秦淮松菊竹樹之外無他花卉且清曠幽寂與秋相宜因號宜秋賦以詩我軒南山下緑水圍繞之四時非不佳獨與秋最宜秋風入我軒便覺景物竒紅樹照西崦黄花滿東籬夜深明月來蕩漾軒東池池光與月色上下相逶迤我時坐軒中濁酒聊自持微飲不及醉陶然詠陶詩人言秋可傷我覺秋可怡至潔如屈平至清如伯夷愛彼潔與清竟忘揺落悲斯意獨領㑹但恐秋風知贈錢祐之祐之過余宜秋軒携武肅王家譜見示感慨古昔賦此為贈村居無來轍漸與人事屏軒窻頗宜秋爽氣接西嶺錢君曉過我跫然破幽静踉蹡田中來衣屨草露冷臨風岸烏巾上有雙蚱蜢示我族譜文厯厯星斗炳前王勲業在千載猶一頃諸孫尚醖藉整若弓在㯳嗟我昧淺深所得如捕影潭潭百尺甃汲以尋文綆况兹坐窮僻習懶不自省君來實起余如夢覺酒醒蠨蛸罥虚戸絡緯啼廢井何當照寒燈共此秋夜永淮隂祠朝登歌風臺暮入淮隂祠祠荒屋瓦落古木聲差差當時握漢兵劉項相交持舉足有輕重不負高帝知區區假王封如何遽見疑良平一躡足帝心即轉移全齊七十城實為䧟穽機後來雲夢遊此禍乃致之盧綰且稱王耻與絳灌隨居常獨怏怏握手逢陳豨事起倉卒間不意成誅夷吕后固不仁鄼侯亦忍為先王重報功無乃此道虧至今淮水南落日啼烏悲津頭問漂母一飯竟哀誰送叅政錢誠夫之淮安潮落大江渾烏啼曙色分公侯千萬騎送别隘人門威儀督府嚴禮秩節度尊兩淮甲胄士十年弓箭痕南陽與豐沛自古重承㤙寄内婉素天寒思故衣家貧思良妻所以孟徳耀舉案與眉齊憶汝事我初髙樓映深閨珠鈿照羅綺簮珮揺玉犀梳掠不待曉籹成聴鳴雞中吳惜䘮亂廿口各東西有母不得將獨汝與提攜我復竄逺方送我當路啼紛紛道上人無不為慘悽今年我還家赤手無所賫汝亦遇多難典賣罄珥笄朝炊粥一盂暮食鹽與虀堂有九十姑時復脩豚蹄膏沐弗暇澤髪落瘦且黧别來復秋深露下百草凄破碎要補綴甘㫖需醬醯安貧兼飬老此事汝素稽作詩逺相寄新月當窻低客館秋思閒齋閟秋隂弱蕙風屢偃蕭蕭微凉至坐怯疎簾捲哀蝉聴漸急歸雁嗟已晚忽動故園思山川匪遥逺夢綵堂為俞士評賦楚客身未歸悠悠念庭闈江濤雖云廣莫阻魂夜飛秋隂天無星猿呌楓樹稀家門倐已到不失舊路㣲宛然上高堂獻笑試舞衣焉知空明曙鐘動殘星輝難追夢中歡益發覺後欷安能附羽翼逺去仍相依贈許山人三首七十世所稀過此尤足喜山人腰脚徤一日行百里身安子能養飲食具甘㫖擾擾天壤間如翁能有幾其二讀書不須多達理斯為貴讀書未達理不讀亦何異山人識字少時復見一二乃知學道人心静自可至其三我笑山中人猶未達此理患害每過慮聞利輙先喜利害何足驚死生亦命耳但使心不欺造物聴所止送許山人歸長干别業三首我從長干來君向長干去春鴻與秋燕相逢不相聚當時三閣上緑鬢花如霧辱井不可尋纍纍種𤓰芋其二君家烏衣巷正對朱雀橋烏衣去已乆斜陽樹蕭蕭紅薑嫩生芽紫芋肥長苖斯時一樽酒時赴東隣招其三朝耕硯一區暮耕筆一尺疏食且不飽而况有囤積山人萬本韭冨與列侯敵治生不在多勤儉自有益舟中有感水性日就下大江日東馳不知舟行逺但覺青山移我方念儔侣手反坐拄頥天風吹衣裳明月來相隨乗流非不住逝者乃如斯滔滔適意中忽然令人悲壯嵗難再得修名安可期出臺獄復還洪都福至本無象禍來非有因方憂觸羅網遽喜辭妖塵念此蓬藋姿忽遘蹇與屯倉黄圜扉中日夕與死隣皇明眷私照寒谷回陽春既免在滌牲復縱充庖鱗重沐飭冠裳濟濟立要津道路與我慶况我骨肉親歸來向妻孥秉燭語及晨猶疑是夢寐歡樂恐未真嗟余抑何艱坎壈多苦辛弱無勝力錐而欲舉萬鈞羸牛服鹽車遥遥西入秦進逢九坂危退迫尺箠嗔敢惜筋力疲所慮車摧輪哀鳴徒嗷嗷仰訢空諄諄聴者無不憐誰復為觧嚬終當脱羈鞅滄波浩難馴曉發石頭口石頭何斕斒左顧踞赤虎自非神力鑿那得此江滸𤣥精畜隂霧秘迹曠萬古耽視洪都城百雉列飛堵我船候明發值此春夜雨方欣土膏潤可以藝稷黍年豐米糓賤何憂在覊旅掀蓬望烟桞春水緑可醑終許着漁蓑撈蝦冨春渚送陳管勾之鄱陽朝與吳人辭暮送晋人别滔滔楚江水朝暮流不竭我來賛兩省僚友皆俊傑怪君氣如虹欲立萬仞節青蓮出泥滓不涴天性潔相期保貞固百鍊終不折賦南昌亭送丁子讓之淮安士不遇知己鬱鬱徒自憐亭長小丈夫不如漂母賢一飯尚足惜萬金那忍捐季亦泗上人勲業四百年南昌雖云小豈無士八千當時得英雄劉項可比肩奈何自棄之吝彼粥與饘重瞳且沭猴此輩何足愆均行淮隂道亭草緑芊芊為我奉巵酒三酹東風前送滙東宋處士驊騮駕玉輅志不忘春草譬如藜藿人但識桑麻好十年遘憂患退縮苦不早回念春江魚洋洋在芹藻聰明身之累擁腫身所保歸去匡山中雲松可娯老送方以亨還吳興以亨來洪都省兄以常予因與之游者累月既而將還吳興其兄録所贈詩見示余喜而作三章以餞之草有不可偃木有不可彫人心非秋蓬安得隨風飄憐君玉雪姿明月當清霄葳蕤紫荆花輝映非一朝嗈嗈寒江鴈去去誰能招其二逺别腸欲斷近别泪滿纓交游無不然而况弟與兄荒塗霜露繁哀角響故城去傷骨肉思住感鄉里情還家及東作翳翳桑麻成其三賢女失之陋壯士失之貧相逢無所遺慷慨不得伸臨岐歌短章所道皆苦辛淮隂未去楚江摠復仕陳聊沽客中酒用酌還鄉人送方員外之廬陵十年在羈旅未甞憂别離如何與君辭愴如失羣麋君才非我儔語黙皆可師温温霜天裘細細當暑絺不勞綺繡文自然適時宜嗟我百無補不異面有眉既乏視聴功寧免耳目嗤君行值重午高花發榴葵荆人擊鼉鼔舟楫挾兩旗當時懷沙心後世為水嬉作歌贈君别秋風以為期省中樹掖垣東南有大樹隂可一二畝枝葉蓊茂望之蔚然豫章自兵興來巨材剪伐殆盡而兹木獨巋然城郭中其壽可喜也暇日步其下賦此嘉木不常有大材世所稀紛紛拱把中得此翠十圍盤柯結層隂枝葉大且肥下䕃數畝庭芳映百堵扉六月不知暑蒼烟晝霏霏豈為枕簟適實為烏鳥依豫章冨材木剪伐事已非此豈不材者獲與斤斧違褰裳步南風空翠沾我衣徘徊望黄鶴嵗乆將來歸午窻坐睡甚適覺而有賦省中昨夜風可畏今朝風可憐南風㪚煩暑稱此高齋眠夢中聞松聲響如百丈泉不知何身世笙匏奏鈞天浮游清虚中有類脱殻蟬既信圖南樂更覺荘周賢生死俱兩忘况有俗慮牽何當䕃高樹一卧三千年白髪員外方君長余一嵗余髪斑白而方君則髭白一二因相顧笑嘆吾二人之早衰也且聞王政恤二毛則白髪固所當敬吾人其何悲為述以詩白髪無貴賤愁人先得之嗟我愁苦多四十髪有絲我愁寔累髪愁豈髪所為白髪勿笑我可喜不可悲紛紛霄壤間㡬人得如斯嵗暮書事薄雲靄微隂江逺日易墜蒼然望平楚正與西山對㝠㝠孤鴻矯接接昏鴉退感兹嵗年暮矧爾時俗背頼有谷中蘭參差可為佩雨後過上藍寺柬方員外及泉上人梵宫欝岧嶤碧殿抱緑水入門廊廡壞屋漏濕窻紙幽静得丈室苔竹深且美孤華獨清艶衆緑隂薿薿隔窻新雨足石溜響宫徴青山如筆格重疊在書几老僧知客至合掌來作禮已無千佛念為發一笑喜嗟余服轅駒局促垂兩耳逢師類脱鞅空濶向萬里聖覺雖異教迷悟乃一理歸途有餘清作詩示知己對江望山二首朝山翳其麓暮山翳其巔變態孰使之白雲與蒼烟我乆不見山見山喜欲顛以我窺青山料應山亦然喜極復自笑我何愚且偏青山本無情于人何所憐因兹勿復道且聴薫風眠其二大山如龍蟠小山如虎伏以兹龍虎氣不雨山自緑虹長飲其左雲長遶其腹山靈既神異過者敢不肅我生敬青山如對父與叔旦起髪未冠垂簾聴松瀑晞髪在南浦驛道人晞髪坐録樹啼幽鳥江濶風雨晴雲多青山少無聞衆幻滅不昧羣迷曉猶有問津人孤㠶望中小發南浦開船别西山迤􅆔向南浦㠶輕去自速初不用篙櫓蒼蒼烟中樹橐橐響斤斧一女沙上汲衆漁洲畔語我行嵗云晏况復逺儔侣回首北歸鴻翩翩下寒渚過黄牛洲望西山自我來西江未甞㸔西山西山一何秀遥映蒼波間天寒衆木浄日落孤雲閒當時珠簾雨髙捲不可攀至今烟靄中彷彿帝子還夜過市汊驛豐城北時酒醒月出有懷幕中諸友驛樓枕迴洲湍汊聲活活霜蘆花猶泛烟桞葉漸脱月出鳬鴈鳴孤艕寒江濶酒縁風力退詩苦真景奪何處寄相思浮雲楚天末汊口與洪鎮撫夜話我船行何遲君船下來急烏啼月初上鷗静露已濕褰衣步危沙細語成乆立回瀾激空穴風響相嘘吸君才誠國士冨貴可俯拾臨流莫㸔劔恐駭寒江蟄霧中望新淦縣隔窻聞雞聲咫尺望新淦寒江白霧起驛樹連城暗瀰瀰浦溆濶晃晃日色淡亦有渡江人津頭觧孤䌫泊五老峰下初見廬山青再見廬山白山形各異狀轉盻即改色方隂迷積翠忽霽眩金碧蒼烟與雲霧來徃逓䝉羃時時山中禽不自辨巢室我行三徃返真態還未識山水猶若斯世事那可必自湖西發舟望瀑布泊舟廬山下北風吹不休山靈知我來故以風相㽞牽衣渉危沙曠然得平疇桞色緑尚淺芳草青以柔仰觀瀑布泉復作河漢流爐熏既冉冉鹿鳴亦呦呦乃因淹留中終得此日遊向非風濤力那能極㝠捜作詩寓所感萬事無先謀聞廬山雷鳴雷霆有定位發聲胡不然兹山無冬春雷長鳴其巔昆虫不閉蟄蛟龍亦蜿蜒致令山中人厭聼禮不䖍我行值孟春豐隆發深淵衣冠凜危坐對越上帝前天變自當敬心中非有愆望蘄州未見蘄州城已見蘄州山諸山初不髙蒼石礪且頑想當至正時民物庶以殷大江楚西來萬里不閉關兹山獨儲英羣雄出其間遂為禍亂堦滋蔓莫可刪憶我聞亂初我方總兩鬟侍立父祖旁聴説國步艱焉知三十年見此草與菅骨肉亦已零安得髪不斑披榛欲弔古豺虎愴我顔蒼茫望茆宇日落孤舟還過小孤大孤俯如盤小孤儼而立羣山如從吏左右相拱揖孤根屹撑拄萬竅爭噴噏瀏瀏隂風旋慘慘元氣濕江流亘其下震怒莫敢汲洑為盤渦深馳作奔馬急躋攀或失手一駚不可及我來值秋晚木落衆鳥集勿爨夜船犀鮫人抱珠泣贈漢隂老父窮達信有命丈夫乃長貧堂堂七尺軀而憂多苦辛早隨丁都䕶馳逐車馬塵歸來不得意灌園漢江濱但恐女子知不畏醉尉嗔終當返故里共煮秋風蓴過長沙弔賈太傅才高衆所妬年少衆所輕奈何文帝賢而乃謫賈生炎劉握乾運寛大易暴嬴涵濡三十年孰不為政成生言胡不詳慟哭淚滿纓外防夷狄奸内謹七國爭禮樂與風化無一不可行帝心既未遑廷論乃拂膺長沙卑濕地落日鵩鳥鳴臨湘歌短篇哀痛弔屈平雖承宣室問前席何足榮我來欲再拜祠宇乆已傾荒苔剥斷碣滿目皆枳荆汨汨祠下水猶聞太息聲望岳麓我為長沙客不醉長沙酒為愛􅇲麓山繫舟城邊桞峰巒一何秀膏沭春雨後蛾緑淨洗籹方知朱鉛醜所嗟山中寺頽圮想已乆嶙峋北海碑千載獨不朽信為神靈惜長使山鬼守褰衣欲訪古日落辰在酉荒烟鳥雀喧竹宻虎兕吼老眼念後期未知重來否望南岳我從匡廬來但覺諸山低嵯峨望衡岳雲霄與之齊下有赤蛇蟄上有朱雀棲仰瞻祝融㧞俯揖紫葢迷五嶺皆培塿三江為涔蹄巍然南服尊嵩霍相提攜封秩崇君稱諸神咸朝隮丹書篆寳册萬古封金泥百王重祀典赤繅藉玉圭自非精靈通牲帛勞焚賫余方向逺道無由陟層梯蒼蒼烟霞中喔喔聞天雞緬想昌黎伯恭黙開雲霓靈貺自昭格誠敬良可稽斯人乆云沒感念徒含悽過魏夫人祠南岳秘靈氣丹霞凌赤氛中有紺髪姝云是魏元君手把紫虚録印佩朱靈文素質如輕霞飄飄上烟雲三華弭絳節微月來繽紛遶之千靈妃從以萬鶴羣大藥濟羸弱紫府奏殊勲何當受真典驂鸞入氤氲衡陽逢丁㤗我素有詩疾逢人即談詩師友憐我勤遂以詩相期早與高徐輩乃髙季廸徐幼文也逺慕黄初時魏年號時時發警䇿早為詩人知爾來慙潦倒拙語勞吾伊篇章非不多聊足充覆醯衡陽識丁泰握手誦我辭我疾已成癖君復求我醫譬彼病渴人却顧相如悲東風吹江花零落湘水湄情多未忍别因之贈將離發衡州一日白一髪十日皺一膚人生氷雪容終作鞾紋麄今朝清鏡中已與昨日殊不憂須眉蒼但恐皮肉枯肉枯亦常理所念非壯圖有親恩最深撫養勞勤劬憐我幼失怙愛我如掌珠斯恩未及報不敢忘須臾書來得㓙問哀頓空號呼衣衾與棺歛弗得親走趨家山在萬里那能返故都樹頭啞啞啼愧殺返哺烏有子初學言行步要母扶已解索梨栗未知識之無重在託宗祀豈暇問賢愚弟妹皆漂零逺在天一隅仲氏久無信夢中時友于艱難斥鹵濱何以保微軀計工當已還毋乃東歸吳童僕各分飛僅有赤脚奴竛竮苦肺疾終夜聲嗚嗚憐渠亦解事剪伐供樵蘓異鄉骨肉逺頼此相支吾嗟我客梁楚隻身亦﨑嶇白晝畏豺虎夜防狸與狐所頼筋力強竄伏幸無虞今年覺衰倦自怯行逺途東風洞庭波落日青草湖魚龍來欺人烟濤慘糢糊兹晨過衡陽霽景差可娯桃花白練帯春水緑菰蒲感此顔色妍暫使憂心甦萬事信有命拊膺長嘆吁湘女湘水緑瀰瀰湘山碧峩峩空明影上下但覺禽鳥多我方駐輕橈聴彼湘女歌湘女淡掃眉素頰垂兩螺幽蘭結短佩徐行拂青莎春風吹衣裙芳香動微波淑質自妍麗不待綺與羅真修慎所適窈窕山之阿盈盈青樓婦日暮將如何湘江道中思常宗暮江散微雨風定波自碧一鷺立不飛雙鴻逓相直餘烟菱女唱新月漁郎笛此處忽懷人相思杳何極湘竹有題朝行湘竹下暮宿湘竹中雲情與雨態萬變俄不同宻宻深翳日疎疎細含風新梢露裊裊老節烟濛濛紛如千靈妃從以萬青童旛幢列縹緲環珮揺丁東來從蔚藍天歩入東華宫悵望不可即翩然若驚鴻夭矯喜而笑低徊俯乃恭質堅本外直性潔縁中空籊爾中弦矢揉之可彤弓氷雪誓不易肯與時汚隆今朝揭春晴更覺翠色濃戢戢琅玕叢忽見桃花紅直疑路不逺便與桃源通我欲捐輕舟褰衣入崆峒春禽迎我啼音響偕絲桐終當聴山雨自號蒼筤翁瀝澗灘一灘復一灘十步九盤錯厓崩亂石礙轉使水勢惡谽谺鱷張牙屼崛蛟鬬角百躬牽莫前一駚即退却余舟何猛鋭獨與萬險搏篙迎旋渦支纜入欹樹縛齊心忘親讐叶力濟勇弱方危信宜懼過此亦足樂寸嵲能摧車何必盡劔閣向使一不諧羣命未敢托超然望西巘衆緑生逺壑丹砂明赤箭中有不死藥服食信可慿願借麻姑鶴曉發祁陽别劉啓賢羣山抱洪流盡日行曲折坡回出平曠始覺人意悦晨櫛辭隂嵐夕飲得皓月微茫縣郭小樹屋逓顯滅深桞積逺烟孤華燦餘雪入籬聞書聲徑就野老謁跫然喜客至細語共茗啜諸生誠朴野未解習禮節几壁如塗鴉指鼻墨盡湼皆是農家子釋耒甘受業勿謂此輩愚畎畆有俊傑出門復登舟暮雨正凄切前途問尚逺高榕亂啼鴂臨流發新咏聊以散鬱結㑹合自有時何勞念離别過道士洑楚之沅湘細宴山形如道士俯伏之狀因以名山其東南麓有吕安撫墓在焉兹山如青蜺俯飲江水曲邦人失偉觀目以道士洑中有百嵗墳石室䕃木當時錮三泉鳬鴈秘金玉畋師辟虎豹武士禁采牧未為兹山榮竟為兹山辱至今湘漢流到此屢回伏春風吹急雨石斷積蘚緑亦有斧斤聲丁丁響幽谷過仙冡巖蒼崖何巖巖衆石鑿紺黝仙人已羽化蛻骨尤未朽當空玉棺破厯厯見跟肘劍作朱蛇盤函使白虎守及聞上古氏殯殮初未有委棄無貴賤顙泚蠅蚋口陶瓦易衣薪宅兆貴深垕方春尚埋瘞掩此骼胔醜斯人獨不幸暴露嵗月乆何當絶攀縁掇拾歸培塿雖臨不測險結搆亦已就叶兹言信非迂臨風重回首零陵感春舟行苦滛雨雨晴身亦輕暢如辭喧卑振衣登高明羣芳沐春容瑩然眉目清萬緑隂薿薿孤禽語嚶嚶憶昨初戒途飛雪沾我纓桃李寂未華一二春草生漂泊復㡬時花落已縱横花落非足惜念此嵗序更慷慨向秀笛從容桓伊箏曠逹自不凢悲憤何當平嗟嗟高世士亹亹勤修名瀟湘八景靄靄復霏霏横霄曳夕暉巴人與湘女相逐買鹽歸回望墟烟處蒼茫隔翠微右山市晴嵐其二今朝罷漁早掛網堤邊樹雲斷一峯青斜陽在坳處痴兒晚睡醒却訝東方曙右漁村夕照其三孤塔望中青鐘聲隔洞庭蒼山不可及烟濶浪㝠㝠憶似寒山寺楓橋半夜聴右烟寺晚鐘其四風攬湍花晚江寒波欲凝凍僵業漁者歸載一船氷一白迷沙渚柴扉認有燈右江天暮雪其五輕㠶挂春風倒映湘江緑天低浦溆逺歸向誰家宿遥指落花西黄陵廟前屋右逺浦歸㠶其六江横秋草白日落寒沙淺鴻鴈萬里來翩翩下平逺欲墮更低飛斜行兩三轉右平沙落鴈其七風急雨浪浪孤舟夜正長江湖隨處惡何况是瀟湘今夜殘燈裏無人不斷腸右瀟湘夜雨其八湘水秋更清湘月秋更白光輝一相蕩水月不辨色何處洞簫聲巴陵夜歸客右洞庭秋月登三夏故城二首寒樹無柔柯秋草有勁葉原空鶻孤騫山晚雲萬疊登高得平曠人馬皆意愜思挽角胎弓相從雁門獵其二關前葉猶青關後草已白氣候本不殊山勢有阻隔風高鼔角動日落川塞黒邊鴻一聲來壯士亦變色過長平有感驛路石犖确驅車邁荒村川逺蒼烟凉黄沙浩無痕問是古戰塲長平名尚存有生四十萬共此入厚坤發軔暴虐秦六國漸併吞至今遺殺氣草木葉盡髠餘哀寄山嶽上有愁雲屯控馬為追弔白日慘欲昏西風呌邊鴈凄然傷旅魂至太原縣去城南五十里王維太原祁人也唐俗本儉嗇古風猶在兹山長水流邁泉脉注東菑氓事耕牧外鄙樸無他為何當起右轄共詠雉麥詩眉菴集巻一欽定四庫全書眉菴集巻二明楊基撰七言古體遊穹窿山昨日出遊今日還登臨未盡湖東山紫藤花落高樹下翠羽鳥啼深竹間泉停峻石淨可掬磴倚絶壁危難攀攀蘿試上最高頂天風兩腋超塵寰廻視羣峰摠在下擬接浮丘同解顔一本無末四句有人生跬步即天險不獨瞿塘與劍關二句為結姑蘇臺姑蘓臺下清江晚斜日江心照闌檻臺上西施醉捧心江邊東越愁甞膽鴟夷裹屍去不還麋鹿散迹游其間功成却羡陶朱子一葉扁舟弄雲水雪坡約余同入杭既而弗果臨别索詩賦此十年不醉西湖酒夢寐春風萬株桞滿意從容覔舊遊短衣疋馬隨君後孤山梅花斷橋月此興既發中忽否停驂索我題詩送握手躊躇為之久江堤霜白萬馬滑城角鑿落掛北斗前鋒已逺後已動弓箭束腰槊在手借問軍中誰最賢紫髯太守勲名舊范公兵甲陳平計方寸耿耿無不有當時結束事楚國日間十策晦其九萬里曽瞻上國光一麾復出三城守至今錢塘與湖秀父老傳誦弗離口去年逡巡㸃朝斑予得沗為幙下友今兹祀釐尚祀事黼黻籩豆薦芹韭禮樂三千固未遑趙王鼔瑟秦王缶君侯入城如父母兒女掃街霜滿帚莫向江邊聴蹋歌一夜相思成白首著色西湖景和張光弼韻時杭正被苖完虐甚昔日西湖最佳麗稚緑新紅無著地日光爛漫注黄金恰似而今畫圖裡繞湖髻鬟翠萬堆行雲行雨相徃來魚吹碧浪送歌舫手當玉槃行酒杯但知身在歡娛内肯計年光逐流水若尋昨夢問風流不及丹青一張紙約范園看杏花西園杏花如雪明年年看花春滿城烏紗小㡌挿花舞碧羅窄䄂穿山行花今仍發當年道淨洗臙脂眉淡掃僻處休嗟車馬稀内家園裡猶芳草東風回首㡬人存粉悴香憔不忍論錦瑟金錢誰赴約鳯笙龍管謾招魂月斜徐步花枝下欲折生紅淚盈把莫怪無人看此花當年已嘆遊人寡風雨隂晴每願違便湏携酒趂春暉明朝青子花零落鶯老梅酸蛺蝶飛草堂芙蓉孟冬始開遲莫可傷作詩慰之東隣芙蓉花已歇西隣拒霜亦開徹草堂一樹初着花錦蕋瀟瀟間疎葉也知地僻竟開晚不見重陽好時節池寒夜静看不休月白霜清照愈潔愧無樽酒澆遲暮且為花從盛時説憶昔開元太液池緑水朱闌颭紅雪鸞輿毎煩天子顧玉缾甞詔才人折零落江湖事總非露草烟蕪共悽切衰颯如君也不多相㸔勿用長嗚咽尚梅軒江堤雪消春水漲吳人看花車百兩梨花輕盈杏花俗只有梅花清可尚剛風一吹色殊絶霽月暫照光欲蕩一枝斜横修竹外數朶逈臨流水上孤高百卉不敢先豈獨區區丈人行山人尚梅如尚賓兩屐莓苔曉相訪清樽慰花對花飲香雪紛紛落盆盎莫待東家玉笛吹花間容我青藜杖王叔明長史畫白雲英英山簇簇緑蘿隂埀樹如屋鳴琴彈罷坐碧蘚手揺羽扇坦其腹南風徐來生晚凉衣裳颯然荷染香世間萬事若流水呼吸湖光醉一觴棘竹三禽圖棘刺揺揺風蔌蔌一禽驚啼兩禽宿空山日晚腹猶飢何處藩籬有遺粟杏花春雨小樓西撫巻彷徨不忍題愿作尋常雙燕子年年飛入未央棲食燒笋留題陳惟寅竹間春雷一聲萬簮玉參差亂迸莓苔緑斬來掃葉當逕燒何異燃箕煮秋菽登盤查牙玉版肥焦尾碎剥蒼龍皮山人大嚼無以報寫作林間燒笋詩詠七姊妹花紅羅鬬結同心小七蕋參差㺯春曉盡是東風兒女魂蛾眉一様青螺掃三姊娉婷四妹嬌緑窻虚度可憐宵八姨秦國休相妬腸斷江東大小喬贈鑷工王生湘娥剪筠編櫛齒鸞刀寒凝鸊鵜髓鉊華拂刅秋霜飛兩㸃春山愁不起青銅自照顔色好粉垢脂痕驚一掃三十六宫妬少年背指梨花笑春老細骨輕軀珠翠蛾玉膚紅映鴛鴦羅明朝面皺白髪多王郎王郎奈若何畫為包師聖題疎簾半捲絲絲雨菱葉荷花暗江渚水近松深徹夜凉不用開襟揺白羽隔岸人家住緑隂偶來聼我坐彈琴聊將白雪猗蘭意銷盡紅塵汗馬心沈仲真自徳清折苔梅一枝見惠江南地暖雪不落臘月梅花滿岩壑今年正月氷雪多梅蕊青青尚含蕚夢斷寒窻風雨中遥想西湖總蕭索野人逺自山中來寄我横斜春一握碧苔遶枝花半露翡翠明珠相間錯玉骨寒封紫繡衣氷梢翠剪青螺殻初疑老樹鱗甲動更覺霜禽羽毛薄生香入手未敢嗅一日春風到樓閣與君别來鬚髪蒼心跡未逺怍匪昨忽向江南見似人顔色皎皎殊不惡笑呼春酒白玉壺且復清吟對花酌苕溪雪消生杜若畵舫青帘恣行樂明日相思賦逺遊東家許借孤山鶴趙元畫懸厓圖懸崖無根谷無底樓閣參差半空起不信神工斧鑿成人間至險無如此我對畫圖猶拊膺何况﨑嶇險處登槿樹籬邊堤似掌藕花池上月如燈夜聞異香玉河低斜衆星皎白露横飛濕幽艸異香何處忽飄揚郁郁霏霏遍穹昊驀焉隨風驚旖旎稍乆欲尋還縹緲褰衣四顧但澄碧正似萬株丹桂繞恍疑真仙鳯輦過芬馥爐熏散雲表復疑寒兎搗𤣥霜王臼丁東杵龍腦道人六鑿乆空寂臭味色聲俱一掃黙然鼻觀相感通此豈天花故紛惱絪緼自散還自滅聞佀不聞神不擾世間萬有等虚幻臭腐神竒心所造須臾斗轉金氣肅刺刺微寒欺破襖自展羅衾向壁眠一任秋風㺯池篠贈道士吕紫岩岩松青青岩石紫紫岩仙人躡朱履一簮星斗月光寒手把芙蓉扣元始岩下琪花樹樹春岩前流水泛青蘋前身自是純陽子何用重尋回道人巧石雙松圖松蟠怪誕龍形矯石嵌玲瓏雪膚巧何事淋漓水墨圖高堂六月秋風早秋風吹雪山脚動瀑布飛來濕瑶草翠幹危撑日月低霜根倒挿雷霆繞山中黄葉已葢地獨有烟蘿青裊裊夕露猶含碧海秋春霞已破丹山曉平生愛松并愛石何異江鳬得蒲藻醉裡徂徠若可登人間草木慙枯槁豫章將軍顔色好十年走馬淮隂道索我題詩寫壯懷詩成已覺松杉老清溪漁隠清溪秋水清如練厯厯魚蝦皆可見緑蓑酒醒鴈初飛風急蘆花吹滿面溪南一帶是青山逢着埀楊便可灣謾道白鷗閒似我漁舟更比白鷗閒聞蟬眉菴四十未聞道偶于世事無所好尋常惟看東家竹屈指十年今不到微軀之外無長物寒暑一裘兼一㡌妻孥屢嘆升斗絶不獨無烟亦無竈身輕自笑可駕鶴眼明豈止堪窺豹人情世故㸔爛熟皎不如汚恭勝傲有瑕可指未為辱無善足稱方入妙此意於今覺更深靜倚南風聴蟬噪畫馬古人畫馬如畫竹貴在蕭蕭去凢俗骨欲權竒尾欲輕不用豐騌與多肉當時精妙稱曹覇人與驊騮意俱化信筆為之自有神忘却龍媒是圖畫此馬滿身花作團大宛三日到長安若教引見南薰殿應賜殷紅瑪瑙盤贈故人全王孫兄為柱國弟開府門吏紛紛皆繡斧敕賜龍河百畝宫畫㦸彤弓映朱户金鳯盤胸白錦􅃭面如紅玉紫虬鬚六宫曉逐諸王入八府春隨宰相趣東風忽念江南好寳騎㸔花踏春草茂苑鶯聲醉裏聴建章桞色愁中老回首瀛洲草木新蒼顔白髪照烏巾都將秋水蛇紋劔贈與長安游俠人歎道傍野花烟蕪凄凄秋色老夕陽穿樹照梨棗野花一簇道傍開細蕊繁英出深草我來采薪露已晞落莖滿地黄葉飛偶從荆杞得麗質肌膚玉潔生光輝花得人逢花亦喜靈妃粲然露玉齒小朶誰簮寳髻雲幽香不到銀瓶水臨風折花重歎息細數花名思未得人生歡樂在相知莫恨從前未相識夜宿靜嘯軒寒風瀟瀟枯葉響緑窻梅影隨燈上龍腦香熏雲母錢鳯團暖送仙人掌東家夜半雞唱獨西林月黒烏啼兩明朝相憶鳯凰臺臺邊春草青青長巢雲為周孟基賦白雲無心本無住聊結雲巢與雲寓十年種得雲滿山雲復留人人不去以雲作巢人未知雲為窻户雲梁楣巢中除雲一無有几席枕簟皆雲為人言我巢雲一朶我非巢雲雲巢我是耶非耶何足云雲我我雲無不可雲臺諸將千鍾禄萬里青雲電經目人生冨貴等浮雲何似巢雲數椽屋金陵對雪用蘓長公聚星堂禁體韻黄雲凍凝不成葉十載江南無此雪朱簾十二曉開齊正值千山鳥飛絶墻腰簷角危欲墮竹頂松梢重將折偏來舞殿鬬輕盈忽上金釵易消滅誰家沉火吹笙坐着處銀瓶呵手掣脂凝香靨罷晨籹臉暈微渦散春纈帶雨欲拈仍作片因風誤觸俄成屑漁蓑向晚畫難工歌樓未曉光盈瞥怪事休驚越犬吠豐年毎信呉儂説欲和東坡白戰詩氷滿霜毫硯如鐡聼老京妓冝時秀歌慢曲春雲隂隂圍綉幄梨花風𦂳羅衣薄白頭官妓近前歌一曲纔終涙先落收淚從容説姓名十三歌學郭芳卿先皇最愛芳卿唱五鳯樓前樂太平鼎湖龍去紅籹委此曲宜歌到人耳潜向東風作慢腔梨園不信芳卿死從此京華獨擅塲時人爭識杜韋娘芙蓉秋水黄金殿芍藥春屏白玉堂風塵回首江南老衰髩如絲顔色矯深嘆無人聴此詞縱能來聼知音少説罷重歌爾莫辭我非徒聼更能知樽前多少新翻調一度相思一皺眉送劉子逺歸廬陵宫槐隂隂鶯嚦嚦細雨楊花飛不得朝回把酒問東風不獨送春兼送客留春且為行人飲世間萬事邯郸枕但得還家莫厭貧十載異鄉空衣錦喜客來壯年不愁長作客亦不暇愁鬚雪白但愁金盡酒樽空辜負長安好春色閉門三日生緑苔失意忽聞佳客來急拈春衣典春酒正值滿樹梨花開花如氷雪人如玉妙舞清歌歡不足黄昏客醉酒未醒細雨鶯啼梅子緑送張教諭鑑湖五月凉風起荷葉荷花香旎旎先生到縣花正開濯足船頭弄秋水聖朝復興文武科諸生習射更絃歌他年大比登髦俊應報新昌縣裡多雨中看花青青楊桞深深竹雨裡絳桃開一簇羞將瘦蹇逐金鞍着屐㸔花仍不俗花枝淨洗胭脂面老眼驚如夢中見已􅂸春色過三分何止東風吹一片只恐天晴是暮春半隨流水半成塵淡烟芳草長干路作意能來有㡬人春日白門送范謙還四明白門花開春酒香參差桞條如酒黄栁邊沽酒勸君飲别意逈與江流長江花近接瀛洲草宫樹鶯啼燕歸早白馬銀鞍游俠兒雞鳴爭入金陵道金陵自昔稱佳麗虎踞龍蟠天子氣緑㡌將軍衛霍功黒頭卿相金張貴紫陌遥遥十丈塵鳯笙牙板奏青春相逢金水河邊客半是公車待詔人君今掉頭歸故國欲傍雲松㸔山色親老冝承菽水歡時清不用芻蕘䇿到家春深花未稀竹筍嫩白江魚肥登堂奉親兾親喜蜂蝶故遶斑斕衣多才如君世稀有珠韜玉韞那能乆明日徴書到四明期君更酌金陵酒送李琴川謫臨海南風雨來塵作泥稻花豆莢生初齊一人失意解官去席上衆賓顔色低輶車欲發未忍别感慨握手立大堤緑荷為盃樹為葢碧酒蕩漾青琉璃兹行觸熱向甌越咫尺浙水分東西或登龍門探禹穴或上鴈宕聞天雞天台桃花千萬樹中有睍睆黄鶯啼雖云竄謫異憂喜眺望自可窮天梯韓潮桞播夜郎白吉士徃徃遭傾擠蕉中之鹿塞翁馬此事何足含悲凄但嗟靈物困汚瀆無一出手相提携不然寵辱實命致毋乃天不哀羣黎渡江秋風未十日織女須嫁牽牛妻自甘沉匿守太拙寧復乞巧陳爪梨嗟余遘患屢遷逐親見郿塢爭燃臍金多位重胡足恃頃刻變化如雲霓君年五十髮漆黒壯氣欝欝衝端倪驊騮厯塊偶蹔蹶終展􅁬迅追風蹄經過虎阜坐石壁為我拂拭苔中題冝秋軒桂軒東古桂一株花已爛漫人無知者偶夜聞香自東來旦起訪之得于荒庭廢苑中余既嘆其不為人所賞識而復嘉其不以無人而不香也繞樹嗟悼慰之以詩冝秋軒東一株桂香葉婆娑擁寒翠秋堂夜靜風滿簾時覺幽芳來拂鼻清晨曵履訪幽獨一徑青苔雙戸閉離離嫩蕋􅇢虫絲蓛䔩輕花落深砌􅀈金泫露濃更宻苞粟凝珠疎復細半粒能含萬斛香一枝解奪千姝麗當年此地競攀折月戸雲窻敞秋霽金樽灔泛緑色酒翠袖凉簮寳粧髻西風㡬度人跡絶獨有幽花能㸃綴村荒地僻霜露繁摧折紅蘭凋紫蕙瞥然一見衆憂失不意孤懷得佳麗遶之百匝未忍去筆以長歌悲莫繼更深月出擬再來明日紛紛嗟滿篲冝秋軒梅萬松嶺上梅千樹踏雪年年㸔花去湖邊十里翠裙腰盡是㸔花醉眠處花今憔悴不如前人亦飄零二十年夢魂不到西湖上春色自繞南枝邊今年㸔花來杜曲一樹寒香照茒屋别是人間氷雪魂肌膚綽約清如玉雪更玲瓏玉更温春風入頰淡無痕數聲殘角黄昏後獨自相㸔半掩門贈别徐季子徐君昔為吳學官玉壘劍具魚皮鞍千金毎贈壮士别一語耻作儒生酸庭前手種萬修竹窻戸颯沓烟霏寒南風醉眠雪覆簟西月對奕星羅盤維時海内冨文學爭飾黼藻窮研鑚諸生面試鸚鵡賦座客頭帶鵕鸃冠我方年壯髪漆黒朋視班馬慚蘓韓飛鳴欲厠九苞鳯絢爛未讓五色鸞君來勸我意無鋭少抑汝氣粲可觀驊騮受駕就矩步健鶻歛束摶風翰吳門一别二十載鬼物變怪驚百端相逢白下恍夢寐方巾闊帶麻衣寛道傍再拜問所厯細語欵接平生歡君言誓欲拜我母為恐此别重來難母今九十兩足痺風雨半榻茒茨安今朝山中得束筍嫩者香軟供晨飱百年自足三釡飬晚景忽此船行灘君才所施無不可經史滿腹皆琅玕酒酣文史孰比擬強弩激矢江奔湍明朝到京學小隠惟有遶屋山㠝岏櫻桃爛熟梅子大荷葉出水青團團行當散髪坐白石何用秉筆趨金鑾送吳居易黄梅雨晴葉重緑南風棟花開䔩䔩故人謁我此山隈帶束烏犀㡌輕縠入門相顧如夢寐名姓雖忘面仍熟乆之稍稍憶舊游尚恐非真問童僕遂昌先生鄭元祜也吳中老儒客滿座君時雄辨衆賔服先生博學且敬君况我才疎敢相逐蘓臺一别已十載世事飄如電經目羡君遊俠印屢懸嗟我巢傾卵俱覆去年謫官向河洛手脚酸皸雙鬢秃歸來親友半死生不意逢君此江曲摩挲老眼為君喜更覺君顔美如玉龍江花落乳燕飛芙蓉葉大筍過竹殺雞沽酒招我飲爛醉頹然坦其腹深情宻意語未終舟楫匆匆去何速臨流索我題詩送詩句難工羞再讀廬山東來五老峰大孤小孤青亂矗著我茅茨一二間悠然醉把東籬菊題宋周曽秋塘圖右宋周曽秋塘圖一卷前元皇姊大長公主所藏也前有皇姊圖書印記後有集賢學士諸詞臣奉皇姊教㫖所題自大學士趙世延王約而下凢十六人時鄧文原袁伯長俱為直學士李洄以翰林待制居京師為監修國史實至治三年也元運方隆皇姊雅尚文學一時名公鉅儒以文章翰墨寵遇當世其盛盖可想見元既革命此巻遂出江左吾友薛起宗得於其私沈祥氏一日携以見示且徴題詩余雖不獲援筆其間而一十六人者猶及親炙一二袁鄧二老又皆先子之友不可作矣把玩再四敬題於後陂塘九月菰蒲老菱葉無多荷葉少無數飛來白鷺明一羣遊去青鳬小寒雲弄影忽成霞雁帶斜行下淺沙晚色不隨流水去秋光都在拒霜花當時内殿春風細紫衣傳教詞臣醉鮑謝文章沈宋才詩成曲盡秋塘意塘水秋來景漸疎低烟斜日照平蕪鴛鴦去盡芙蓉死空向人間看畵圖北山梨花余卜居金川是金陵城西北門也去北山無十里毎清明時梨花盛開輙動洗籹之想隣友薛起宗邀余㸔者再俱以猥俗所繫不能如約昨又期出郭風雨泥濘弗良於行起宗為折一枝相贈喜而賦此辛亥暮春五日北山梨花千樹栽年年清明花正開薛君好事兩邀我騎馬㸔花携酒來看花出郭我所愛况是梨花最多態我牽塵俗不得赴花本無情花亦怪君今折花馬上歸索我細詠梨花詩氷肌玉骨未受飾敢以粉墨圖西施東坡先生心似鐡惆悵東闌一枝雪重門晚掩沉沉雨疎簾夜捲溶溶月月宜淺淡雨宜濃淡非浪白濃非紅閨房秀麗林下趣冨貴標格神仙風一枝寂莫開逾徧朶朶玲瓏㸔應眩皓腕輕籠素練衣蛾眉淡掃春風面自須玉堂承露華何事種向山人家不愁占斷天下白正恐壓盡人間花江梅正好憐清楚桃杏紛紛何足數只有銀燈照海棠海棠亦是嬌兒女句容送蔡惟中昨日立秋今日凉蔡子束書歸故鄉我來未乆子遽别子豈與我如參商自慚貧無槖金贈解劍換酒澆愁腸醉酣月出重露滴梧飄金井芙蕖香衆賓諠譁􅛐笑口我獨不言情傍徨豈徒戚戚兒女態感舊懷古増悲傷憶昔追遊茂苑上白馬紫轡青絲韁子方年少冨文學面如紅玉肥有光黄金曉酬西館客緑錦夜贈東樓娼三公走檄辟作椽兩府交薦除為郎風塵一别未十載短鬢蕭颯俱老蒼黒巾籠頭着野服微雨鵠立官道傍自云匍匐事販鬻葢屐巾箑紙筆將匪爭刀錐競微利聊復餬口走四方我聞此語重歎息助以唧唧鳴寒螿丈夫失意固如此屠狗買畚庸何妨曲江之西沙桞黄夜逐落潮登野航相逢故友或相問句曲岡頭一草堂贈許白雲白雲老翁樂且貧眼如紫電烱有神麻衣紙扇趿兩屐頭帶一幅東坡巾清晨扣戸走過我謂我舊是諸侯賓入門長揖肆雄辯動引四代卑先秦初疑傲睨意骯􅗣稍乆漸覺情真淳從兹興至毎一到不問風雨并昏晨矯如野鹿不受縶去不可挽送乃嗔我來杜曲少朋舊一境二姓唯朱陳租徴税迫夜繼日未暇與我談逡巡荒村不意得此老洗我三斗胸中塵我時信口答所問怪我出語多驚人翁年耳順學不倦片言有益書諸紳我慚習懶竟成癖日影照腹脚未伸起來巾櫛不自理一飯且飽南湖蓴諸生幼弱學久廢數字費我言諄諄翁來相對輙太息謂可舘閣胡沉淪人生冨貴等泡幻達何可喜窮何顰紛紛道路餓死骨半是臺省公侯身龎公未為無所遺夫婦白首㐮陽民翁聞我語乃大􅛐呼我共醉華陽春正須狎暱到鷗鷺何必影像圖麒麟秦淮雨過秋水碧中有一尺黄金鱗明朝買魚期再酌我自掇拾山中薪喜雨為黄明府作今年太嵗集在酉謂可三錢糴米斗入夏兩月無雲霓焦捲黄枯滿田畝句容縣尹黄叔度晝夜蹙額疾其首脱巾跣足禱諸廟龍井神祠一一扣精誠信可貫金石頃刻雷公訶電毋一雨五日三尺深高壠低田無不有芃芃茂葉雲䆉稏蓛蓛輕花雪紛揉邦民歡喜夜無寐起賀買盡村中酒清晨扶䇿謝縣官微君吾儂將散走尹言此豈我輩力自是天公憐爾叟嗟余貧無牛十角終嵗筆耒事糊口硯田得雨墨濡足庶免饑寒累朋友今朝野老邀我飲草草杯盤薦梨藕醉後狂歌喜雨時詩成謾續諸公後杜伯淵送新米山人送我闕米粒粒如霜新可喜雨舂風簸落紅芒照眼明珠絶糠粃饑腸欲食未敢炊未及秋甞羞祖禰憶我初來嵗方旱焦穗萎苖將槁矣不意兹晨見精鑿此寳更將何物比終嵗勤勞農可念不耕而食余堪耻歸買淞江雪色鱸持向高堂奉甘㫖月灣秋影句容有水號明月灣毎中秋月圓而水中見影方半相傳葛仙翁幻術為此分題送友千江明月秋無際獨有灣頭明月異灣頭十五月方弦半璧婵娟半猶未月明在天光在水水月天月本無二豈縁醉眼自圓缺㸔碧成朱醜成麗不然水府食妖蟇毋乃神仙為狡獪姮娥亦學半面籹太滿恐為人所忌圓非真圓缺非缺造化掀騰等兒戲我來送客秋正中香影婆娑落霜桂邀我同吟月影詩自愧詩脾少清氣眉菴集卷二欽定四庫全書眉菴集巻三明楊基撰七言古體夢題雲山圖夢中有人以雲山圖索詩因題四韻覺後惟記其首二句為足成之前山嵯峨後山聳大如盤龍小飛鳯千巖萬壑春雨晴浮雲載山山欲動平生愛向雲山居漂泊尚作雲山夢明朝拂袖歸故山萬頃白雲和玉種省掖觀梅和宋草堂韻玉肌瘦怯春風惱唇紅不褪香雲老綺窻人靜月初圓笑覺飛璚顔色槁羅幄銅瓶小几邊銀燈疎影硯臺前一株初破休輕折半朶猶含最可憐宫籹近眼人爭愛却恐愁多零落快莫教纎手嗅東風誰畫生香與真態西省海棠山西陳則威以晉無梅花以管勾職初來江西即求識之省左掖東檻有海棠一小樹則威尤鍾愛之日數次至花下風雨昏暮不忍去也甞索余賦詩余時迫於案牘不暇舟行湘中梨杏桃李毎得厭觀獨無海棠因賦此補其缺云山西公子虬髯客到處尋梅認香白春風省掖海棠開暫去還來抛不得嗟我有癖常自笑不意逢君同此癖花枝雅麗不妖艶我輩尚徳不尚色曉窻雲暖風日妍數朶娉婷春半折睡損紅綃膩有痕舞酣金殿嬌無力銀燈不如微月照珠簾更着疎烟隔飛燕輕盈冨貴姿玉環態度神仙格此日凝籹青瑣外當時擅寵沉香北繁開似妬却𡨕㝠半吐欲言終黙黙豈惟人愛亦自愛不獨春惜當誰惜細雨重隂也㸔來莫對空枝慢相憶千葉桃花豫章氣候差早春未半花已岑寂省掖後苑有千葉桃一株人未之知也衆卉已謝芳草如積偶與員外方君過其下初開數朶色韻標度殆非人間所有豈所謂瑶水之遺也歟繞樹百匝賞之以詩壬子二月十七日江花先好還先落二月芳菲已蕭索掖垣一樹獨開遲嫩葉蘢蓯抱香蕚朝來小雨浥輕紅春色千重與萬重㸃注定知煩曉露剪裁寧不費春工春來到處尋桃李不道東闌花自美傷心世事總如花何用勞勞行萬里憶北山梨花辛亥清明予與薛起宗聨騎遊北山飲酒大梨樹下時花盛開余有詠北山梨花詩壬子清明偹員江西省幕風雨兀坐案牘如山積緬懷北山之集邈如夢寐撫景感舊紀之以詩去年清明花正繁騎馬曉出神䇿門千桃萬李㸔未了小逕更入梨花村低枝初開帶宿雨髙樹爛日迷朝暾柔膚凝脂暖欲滴香髓入面春無痕青霞玲瓏翠羽亂白雪照耀瓊瑶温折花對酒藉草坐花氣暗撲黄金尊薛君起舞為我壽勸我一曲招花魂須臾明月忽到樹主人送客唯㽞髠羅巾欹斜烏㡌落醉眼况復知清渾村中至今為故事笑我自是劉伶孫我慚不答竊自慶大抵此樂皆君恩今年清明坐西省雷雨兩日如翻盆羣花削迹淨如掃衆緑既暗不可捫豈無清錢換斗酒案牘雜沓窮晨昏伻來督責至訶詈面微發紅氣毎吞未能摶揺跨鵰鶚詎免束縛同鷄豚人生屈辱乃淬礪百鍊正欲逢盤根自知力不舉一羽強欲扛鼎追烏賁晚晴汲井試新火紫筍緑薤供盤飱歸來飯飽對妻子萬事反復何足論壬子清明㸔花有感熈寧五年壬子清明眉山蘓公㸔花於錢塘吉祥寺金盤綵藍獻花者五十三人有詩曰吉祥寺裏錦千堆前年賞花真盛哉道人勸我清明來腰皷百面如春雷打徹凉州花始開是其事也洪武五年基與員外方君㸔花於西江省掖節值清明嵗亦壬子去蘓公三百年矣歎公之不可見而猶以誦公之詩也因賦長句以記嵗月庶為後三百年張本云吉祥寺裏千堆錦緑髪仙人對花飲腰皷金盤五色藍醉歸猶帶花枝寝東風壬子㡬清明三百年來寺已傾沙河塘上痴兒女猶誦錢塘太守名㸔花我亦逢壬子况是清明非偶耳莫論南浦與西湖楚水吳山正相似青蓮居士識前因金粟如來見後身總不能知塵外刼也須曾是㑹中人邀方員外㸔花金昌亭西萬株花胭脂玉雪爭紛拏春風携酒㸔花去騎馬徑到山人家花深樹宻無逕入下馬徘徊映花立紫蕚風微翠䄂香紅絲露重烏巾濕别來㡬負㸔花期客裡匆匆見一枝白下橋邊寒食後廣陵城外緑隂時今年花最逢春早准擬清樽對花倒人意方邀酒伴來花枝已向東風老花雖漸老仍堪折猶勝紛紛滿蹊雪且共芙蓉幙裏人坐㸔海棠枝上月樟樹鎮舟中作儂是吳淞釣魚叟全家生長吳江口遲鈍長飛衆鳥先迂疎毎落諸人後城中父老少相知鄉里兒童亦見欺几上細抄高士傳壁間大篆考槃詩春風百草承膏沐強擲漁簔親案牘胥史猶嘲吏事疎妻孥欲笑形容俗羸馬長途恐不堪君恩何日許投簮半篷秋雨烟籠水數㸃寒星月滿潭泊舟桑落洲望廬山桑落洲前泊舟好對面推篷㸔五老石罅泉從樹杪來山坳雲向峰尖繞風墮初黄未黄葉烟暝將栖已栖鳥莫問漂零與壯遊飲不能多須醉倒聞鄰􅊑吹笛江空月寒江露白何人船頭夜吹笛參差楚調轉吳音定是江南逺行客江南萬里不歸家笛裡分明説鬢華已分折殘堤上桞莫教吹落隴頭花春江對雪春雲作寒飛鳥絶花雨紛紛暮成雪江山最好雪中㸔况是東風二三月披蓑漁立桞邊航戴笠僧歸竹外莊草暖尚迷雙鷺白樹寒先露一鸎黄我愁春雪㸔難乆重為江山更囘首莫煮清貧學士茶且沽緑色人間酒春江雪霽烟嵐蒼蒼雨濛濛春雲淡白春霞紅扁舟江上行十日盡在郭熈山水中今朝推篷更竒絶兩地江山皆玉潔又是王維着色山十幅屏風盡飛雪參差琪樹當春起零落天花隨春水鸞鶴三千月殿中芙蓉十二氷壺裏當時玉堂㸔畫圖自謂此景世所無而今老眼見真景始信二老畫不誣人間妙筆奪造化徃徃天真乃如畫意象經營自逼真按圖索駿風斯下須臾雪霽天宇碧一色瓊瑶蕩春陌桞自輕黄草自青縱有此圖無此筆眉菴居士非好竒為歎此景無人知都將摩詰圖中意冩作春江雪後詩雪中登黄鶴樓洪武癸丑臘月十一日夜抵武昌是夜風雪交作向曉雪深二尺因登樓賦此黄鶴樓前水平岸春雪當空舞撩亂東風知我欲登樓助以瓊瑶作竒觀昔人黄鶴去不囘我騎白鳯横江來遥看厯厯漢陽樹一色盡是梨花開人間何處最佳絶百尺闌干滿江雪氣壓滕王閣下雲興高庾亮樓中月瀛洲咫尺非難到鶴背琪花落烏㡌載酒誰能問謫仙題詩未必無崔顥江山得此清無敵頃刻銀蟾蕩瑶碧更着仙人紫綺裘卧聴吕岩吹鐡笛雪中冄登黄鶴樓平生不願萬戸侯亦不願識韓荆州但願武昌連日雪日日醉登黄鶴樓樓前絶景冠今古况有繽紛雪花舞玉樹參差認漢陽瀛洲浩蕩迷鸚鵡江頭兒女走欲顛謂我自是騎鶴仙白雲飛盡黄鶴去此景不見三千年我拍闌干為招手世上神仙果何有桃李非無頃刻花江湖亦是逡巡酒他日重來五百春樓前花草一畨新相逢不識純陽子何用重尋回道人湘中見春雁蘼蕪葉長春蔟蔟雙雁忘機相對浴東風何事不飛歸應念江南春草緑燕山宻雪正茫茫况有桃花水滿鄉畢竟不如歸去好楚雲湘水是他鄉登岳陽樓望君山洞庭無烟晚風定春水平鋪如練淨君山一㸃望中青湘女梳頭對明鏡鏡裏芙蓉夜不收水光山色兩悠悠直教流下春江去消得巴陵萬古愁長江萬里圖我家岷山先生原籍蜀中嘉州人因祖仕江左生長吳中遂家焉更西住正見岷江發源處三巴春霽雪初消百折千回向東去江水東流萬里長人今漂泊尚他鄉烟波草色時牽恨風雨猿聲欲斷腸湘江秋意圖湘江澄澄漢江緑芷葉蘭花映斑竹一聲欵乃雁雙飛數㸃青山淨如玉蒼梧回望是荆州楚雨吳雲恨未休無夣可聴湘女瑟有人方倚仲宣樓湘漢秋晴圖讀書不願賢良舉朝醉覇陵暮湘渚兩鬢從添鏡裡霜十年聴遍江南雨呼鷹臺上愛秋清鸚鵡洲前㸔晚晴紅葉蝉聲湘寺逺碧潭鴻影漠川明湘波漢水愁無盡畫裡江山聊一哂舉世惟稱王仲宣當時亦有周公瑾湘隂廟梨花癸丑二月廿日泊舟湘隂廟下廟東圃有棠梨一株花猶未開因念辛亥春與薛起宗賞花於鍾山之北賦詩酌酒為一時勝集壬子嵗宦居豫章追憶舊游甞與員外方君道其事復有詩寄薛今年見花於湘水之上不惟北山之㑹不可尋而豫章僚友亦相望數千里外人生漂泊盖如是也舟中岑寂賦詩一首且歸以示方君預與起宗締來嵗之約云平生厭㸔桃與李惟有梨花心獨喜海雪樓前雪一株嵗嵗清明醉花底北山岡下花最盛千樹玲瓏圍緑水前年騎馬賞花處我與河東兩人耳青苔滿地芳草合只有黄鸝映花蕋當時美人東閣上寳髻慵梳初睡起鏡裏爭先試一枝真態欲將春色比樓空燕去花自落細雨黄昏泪如洗疎籬蕭蕭茆屋破况復臨春開結綺我時賞花仍弔古花亦燦然為露齒歸來婆娑簮滿㡌十日羅衣香不止去年相憶豫章城咫尺春江如萬里今年邂逅洞庭曲細蕚含愁照清泚人至魂消楚雨中花應斷腸湘烟裏三年勝遊不再得百嵗歡娛能有㡬吉祥牡丹非舊夢𤣥都桃花亦如此更約明年載酒來莫笑花前人老矣留題湘江寺瀟湘縣前山繞城緑陰滿地聞流鶯入門下馬松逕濕㯶櫚花開春雨晴山僧知我携客至袈裟鐘磬下榻迎汲泉敲火煮新茗茶香鼎潔泉甘清龕燈照佛佛像古舎利五色真身明黄金布地孔翠帳旛葢聨絡皆珠瓊飛來巨石卧青兕以爪扣擊成金聲十年足跡走萬里福地徃徃迷榛荆兹山信是無量壽百千萬刼完不傾乃知願力自廣大天神守䕶邪魔驚我來作禮繞三匝寳花如雪天樂鳴便從真如入妙覺豈有世網能相嬰同行僚友二三輩勸我冩石㽞芳名他年老眼得再覩風雨剥落莓苔生祁陽行黄鶴樓前漢陽雪岳陽樓前洞庭月自謂人間無此清到處相逢向人説祁陽江頭春更佳彷彿似是神仙家黄鸎亂啼萬竿竹緑水縈抱千株花千紅萬碧深相映雞犬無聲茅屋靜野老回頭喚不譍忩忩况是通名姓水流花落岸東西只隔疎簾路已迷天下於今皆樂土何須更覔武陵溪皂角灘烟蘿􅧑􅆴樹䝉鬆夏緑更換春花紅千山萬山無所聴鷓鴣杜宇啼春風穹崖斕斒高百尺快劍無痕鑱翠碧寳氣朝凝五色霞丹光夜燭三分日我從章江出彭蠡巴陵長沙洞庭尾㸔遍衡廬兩岸山行盡瀟湘一江水輕舠短楫辭零陵似與亂石爭功能牛刀慣熟中肯綮郢斧神㨗回鋒稜男兒性命固可惜底事矜誇向羣石鷗邊短草一枝笻牛背斜陽數聲笛湘中四詠黒翎紅嘴花間鳥映花一㸃珊瑚小當時如意擊東風萬語千言啼未了雕玉籠開出綉楹海棠庭院雨初晴美人按拍教鸚鵡學得霓裳四五聲右鸚鵡其二棠梨花開滿山白白鷴飛來春一色黄鸝紫燕大匆忙不道花間有閒客却嫌香露汚春衣立向湘江映夕暉鷗鷺相逢莫相妬一雙還拂楚烟歸右白鷴其三湘江兩岸無茆宇湘竹隂隂覆江渚春來未聴一聲鶯只有鷓鴣啼暮雨憐渠亦是他鄉客苦向人啼行不得縱教行得也消魂那得行人不頭白右鷓鴣其四暖風晴日融春晝閒㸔花隂雞吐綬綺縠都將綵羽粧紅絲不待金針綉疊疊胭脂縷縷金龍紋盤錯鳯紋深慿誰剪作鴛鴦帶雅稱佳人翡翠衿右錦雞過髙郵新開湖微雨有詠殘虹曉落西陂岸雨脚斜飛鷗鷺亂扁舟盡日畫中行荷葉荷花香不斷船頭老翁一尺鬚斗量菱舟兼賣魚兒能鼔柁女蕩楫何用聰明多讀書夢緑軒余與徐君㓜文同謫鍾離結屋四楹㓜文居東楹余居西楹文甞賦詩曰夢裏緑隂幽草畫中春水人家何處江南風景鶯啼小雨飛花葢深有意於故園也蜀山蜀山乃呉中山名㓜文所居在焉非西蜀之山也江頭萬章木細草幽泉䕃修竹五月六月山雨晴空翠紛紛滿衣緑杖藜或來隂下行雲影不斷凉風生青連翠結欲無路彷彿上有黄鸝鳴去年呉城正酣戰却倚危樓望葱蒨今年放逐到長淮萬緑時於夢中見夢中見緑覺始知索我亦賦夢緑詩逢人説夢子堪笑替人作夢余何癡世間萬事同野馬覺後非真夢非假五色過眼本虚空冨貴於人誠土苴南風劃然吹夢破樹頭不知微雨過從今寤寐俱兩忘靜與白雲相對坐舟入蔡河懷徐㓜文憶初見君江浦外七尺長身齒含貝君年未冠復新婚錦帶吳鈎紫絲佩豪姿俠氣颯蕭爽春鴻輕便秋隼快結交梁楚燕趙間追慕亷藺羞郭解誓將弓槊事鞍馬耻作寒儒服巾帶余時瑣屑箋虫魚折几寒燈冩秋芥相逢一笑恍自失不異低岑仰高岱殺雞為黍三日談深中肎綮入餉骱方喜師君竟兄我巵酒動輙受百拜停觴爛漫出險語磔裂鬼膽窮百怪天然清真去雕飾王嬙西施洗鉊黛潄芳雋腴再三讀項上之臠左手􅈉技痒礪秣互掎角十㨗一二八九敗余實羡君敏且愽君亦憐余強而邁英雄敢誇君與我強弱不止楚敵蔡孟瀦豪士渤海高李迪也時復峙足如鼎鼐高才於我十倍丕尚歎追君力不逮縱横千字戚生筆迭宕百韻余公萊幼文與余唐卿作萊邁詩二百句甚工僧房秋逈鉢聲長雪屋香銷燭痕在清游未竟夕漏終落月殘星悲一慨激烈正醉金陵酒漂泊共泛濠梁載城荒地僻生計拙時脱春衫倩人賣破樓夜雨隣鐘急委巷秋風茅屋壞斯時愁絶正難禁君獨相㸔勸余耐别來奔走向西洛面色痿黧病新差章臺握手須臾立胸臆梗塞若有碍平生耻作兒女悲此别戚戚若有槩今朝過蔡將入陳漸見舟艫艤灘瀬平漪細石魚跳渚斜日低烟雁横塞相思無奈客中愁聊述長歌歌一再鄭州道中北風如刀吹靣裂敝裘無功塵絮折星稀日出勢尚嚴滿袖霜花厚如雪馬上沉吟苦憶家江南十月賸春華金錢晚菊低叢葉緑蕚盤梅小樹花寄題水西草堂為楊公輔作鴛鴦湖東武塘西桃花滿川蒲葉齊春風二月微雨霽鵞鴨拍水黄鶯啼推窻只有參差桞桞色波光淡於酒烏紗官㡌半籠頭紫竹漁竿長在手平生愛讀内景書徃往適意追禽魚開門懶迎俗士駕拄杖毎扣高僧廬客來舉酒邀明月細瀹松濤煮春雪但覺身無俯仰勞安知世有東西别今年扈從來大梁錦袍白馬青絲繮信陵宅畔暮鴉集朱亥門前秋草黄輪畨夜直中書省霜華滿巾鬚髪冷粉署香銷紫綺袍碧梧影落黄金井魂夢時時到草堂曲欄花藥漫分行他年得遂歸田計多種墻隂十畝桑留别楊公輔將還榮陽夜集公輔東齋酒酣索詩時銀燈結花漏下二鼔賦此留别紫簾凝烟碧香繞銀燈結花金粟小主人捧酒起勸賓離别長多㑹長少明朝騎驢鄭圃東白沙黄葉滿林風知君此際能相憶笑指燈花映酒紅送朱明善少府胙城主簿氷雪骨天濶霜清見飛鶻家住西湖第一橋半生詩酒笙歌窟斜肩兠子總宜舟名船九里松隂十里蓮松下㸔山船上宿小娃隨索賣花錢鶯嬌蝶妬春如綺一夜東風變桃李回首梁園望故鄉咫尺吳山四千里吳山漸逺音書絶兩鬢青青未成雪烏㡌朝辭鄭圃烟鹿車夜挽蘭臺月上官不惮路道長豈問冨庶并荒凉正須到縣招竄匿要使枳棘皆耕桑婦女飬􅁞男種麥食有雞豚衣有帛兒童不識成丁勞父老能歌縣官徳慚余亦是榮陽簿虎牢關下成臯路有酒誰澆紀信魂無人敢畫鴻溝渡鄭衛由來本懿親相思只隔大河津愁將艮嶽風前桞持贈山陽笛裏人并州對雪春風雪花大如手匼匝䙰䙕撲窻牖入水消融鴨緑醅隨鶯㸃綴鵞黄栁人誰能來剡溪棹我獨痛飲淵明酒白髪沙頭罷釣翁睡覺蓑衣頻抖擻眉菴集巻三欽定四庫全書眉菴集巻四明楊基撰歌行齊老曲廼夫婦齊壽時年八十三生齊年復齊老當年齊種長生草草色蘢蓯日夜芳白頭夫婦長春好夫婦於今同㡬嵗五十年前三十二記得花開共撫兒新來折得蟾宫桂親齊老子登科此樂人間殊不多東家新婚奈爾何鐡笛歌為鐡崖先生賦鐡崖道人吹鐡笛宫徴含嚼大古音一聲吹破混沌竅一聲吹破天地心一聲吹開虎豹闥彤庭跪獻丹扆箴問君何以得此曲妙諧律吕可以召陽而呼隂都將春秋二百四十二年筆削手譜成透天之竅價重雙南金掉頭玉署不肯入直入弁峯絶頂俯瞰東溟深王綱正統著高論唾彼傳癖兼書淫時人不識我不厭㑹有使者徴球琳具區下浸三萬六千頃之白銀浪洞庭上立七十二朶之青瑶岑莫邪老鐡作龍吼丹山鳯舞江蛟吟朂哉宗彦吾所欽赤泉之盟猶可尋更吹一聲振我清白祖大鳴盛世載賡阜財解愠南風琴先生註春秋一本名透天關擊筑吟贈張思亷擊筑和短吟一擊意已深但聞筑聲怨未知擊者心君子復何如而欲酬萬金萬金不足貴所貴在知音董君行贈董冠軍䧟敵非失榮脱死尚稱智纍纍几上肉一一生頭翅同行數十人謫戍逺將置翻言念君親向指白日誓臣不棄鄉井臣不背主義願瀝方寸血洒濺天與地江潭白虹起斜貫日色翳亂揕奸守胸用飽饑鱷噬歸來皮膚在顔慘色逾厲乃知壯士勇異彼兒女戲或降或為虜此寧不少愧我歌董君行庶發丈夫志白頭母吟白頭毋烏頭婦婦姑啼寒抱雙股婦哭征夫母哭兒悲風吹折庭前樹家家有屋屯軍伍家家有兒遭殺虜越女能嘲楚女詞吳人半作淮人語東營放火夜斫門白日横尸向官路母言我儂年少時夫妻種花花繞蹊夫亡子去寸心折花竇花窠成瓦埒十年不喫江州茶八年不歸姊妹水蘭芽菊本已凍死惟有春風薺菜花只憐新婦生苦晚不見當時冨及奢珠簾臺榭桃花塢笙歌院落王家府如今芳草野烏啼鬼火燐燐日未西儂如葉上霜死即在奄忽新婦固如花春來瘦成骨婦聴姑言淚如雨妾身已抱橋邊柱總使征夫戍不歸芳心誓不隨波去附杜彦正同題次韻白頭母征人婦銀釵零落鳯凰股天寒日暮練裙薄脉脉無言倚庭樹良人何在西從軍出入干戈死為伍腰間寳劔霜雪光逐隊齊行斫妖虜鼓衰力盡生死决野曠天青塔鈴語鬼妻悲號鬼為舞淚血如珠濺行路郎今一去歸何時櫻桃花開春滿蹊側身西望骨欲折千里烟塵暗邊埒君不見東陽御􅋗顧渚茶年年上供天王家月團小餅盤龍鳯玉塵十襲浮霜花秪今䘮亂殊未已武夫競爾誇豪奢大明揚輝照村塢願見清平好官府延秋不聞烏衣啼版圖復入無東西翻慮此身先奄忽不見親収杞梁骨落花㝠㝠墜紅雨遲郎歸來華表柱若為化作紫鴛鴦一雙飛上青雲去李道士歌先生學醫并學仙朝采參木夜煮鉛丹成雞犬飛上天靈氣化為五色烟珠宫璚樓花爭妍紫鳯白鶴青瑶編亦有窈窕蛾眉千緑鬟青頰雲埀肩手把玉磬弹水絃儵然而來忽而旋一語不洩空留連但見碧霧籠蜿蜒歸來城郭乆已遷海水枯涸成桑田疲癃之人瘡痍膻傴若病鶴􅆃膂跧寸七入口無不痊矍鑠起舞衣蹁