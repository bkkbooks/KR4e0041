  - {type: line-break, offset: 0, content: '', id: KR4e0041_SBCK_013-1a01}
  - {type: variant, offset: 0, length: 472, content: 跋成化本眉菴集十二卷爲吳郡張習所刻吳門四家之一癸丑歳余得之蘇州鳴琴室楊叟馥堂之手同年董授經大理喜其有黄蕘翁手跋幷明嘉靖王玉芝題字愛不釋手因以歸之不數年又展轉以歸於陶君蘭泉聞之輒爲悵惘近歳薄遊南中又見企翶此集刻本兼有靜居北郭二家因急收入篋旣慰珠還兼欣璧合於茲集信有宿縁矣按孟載本吾蜀嘉州人據古渝江朝宗序教授鄭鋼曾爲刊行今鄭氏本已不可得見傳世者當以張刻爲最舊次則有萬曆陳邦瞻校訂本余嘗取兩本粗事校閱知陳本脱誤弘多如陳本卷二終月灣秋影詩此本尚有贈蕭處士别哭翟好問二首則陳本於卷末奪去一葉又二行矣又各卷詩後往往有旁注如卷一望新淦城下云以上仕江西作瀟湘八景下云右使湖南作卷二聞蟾下云以上在吳中作卷七贈道士徐介之下云以上在金陵幷勾曲作送沈自誠任武康縣丞下云以上赴河南途中作和宋大參對雪下云以上在山西作卷八梅花夢下云以上元末在吳中作梅杏桃李詩下云右仕在京幷閑居秣陵江畔作如此者凡數十則皆於孟載岀處事跡攸關陳本悉爲芟落殊不可解其他字句違異者尚難縷述則陳本所標爲校訂要未足信學者讀孟載之詩試取企翶此本而勘之知不徒以版刻之古傳世之稀爲足珍矣丙子三月暮藏園傅增湘附記, WYG: ''}
