front:
  text: 眉菴集卷之八
  hash: sha256:671f68fe5798cb07975204c87f7988c6a50f2767a55503f75096f34329f766e4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_008-1a}
body:
  text: 七言律姑蘇楊基孟載著送路季璉問聘河東時東駕出師太原三晋封疆拱帝圻兩河山色照戎衣青虹貫日随星出赤鳥如雲夾電飛使者梅花春後折王孫芳草夢中歸入朝若問東南事積粟如山萬馬肥三讓祠前酒一巵杏花紅白桞絲絲古来使者稱吴札此日行人得趙咨老祖山河終不攺諸侯勲業巳如斯青宫錫宴如前日為賦栖栖六月詩聞官軍南征觧圍有日喜而遂詠四首天師南下静風塵正月樓船渡孟津中外諸侯元有約東南豪傑豈無人十年白骨埋荒楚一日蒼生去暴秦喜極自提孤劒舞不知雙涙落衣巾巴江東去動旌旗此變還應責望誰尺土未歸終自復一夫作難彼何時北来兵勢當無敵南向人心頼不離見說兩淮消息好巳将牛酒犒王師兩河精騎向㐮陽全蜀材臣出鳯翔天下風雲争㑹合江東子弟謾搶攘人皆厭亂思平世誰不将歸說故郷我有先塋依古井十年不奠一壺漿官軍聞說下楊州夣裡扶摇賦逺逰天運未容人力勝民心湏順物情求遭逢喪亂生何𥙷見得昇平死即休沽取一壺花下酌弟兄兒女咲相酧寄楊鐡厓先生不見雲間楊鐡史寮中七客近如何老来詩句踈狂甚亂後文章感慨多長笛參差吹海鳯小璚楊柳舞天魔春明且盡嬉逰樂莫觧梁鴻五噫歌先生所居名七者寮懐悼朱秦仲總制力盡戈鋋援不囬猶揮赤手搏風雷波濤失意蛟龍伏肝膽如杠虎豹摧謾使張遼說關羽誰將全武易秦裴煩君更緩湏臾死要對春風酒一杯送雪坡太守之武林湖上烟飛𨳩畫船鳬鷖鴻鴈滿前川舊逰未覺英雄老遺愛猶思太守賢驛樹籠䓗春雨裏江花零落晚風前遥知不着登山屐先向閭閻問倒懸送謝叅政朝京萬方臣妾歸降日四海諸侯職貢秋七冊寳書銀葉篆九重珠絡翠雲裘舎人入奏臚傳早天子論功寵遇優正及燕山三尺雪馬蹄湏遍御街逰郡齋養痾呈醉樵内史三首江雲倐忽暝還収五月猶寒着弊裘芳草斜陽看易晚緑荷踈雨聴如秋池塘空闊蜻蜓喜簾幙蕭條燕子愁不是無言成獨坐暫将心事静中求小軒新沐喜神清短幘单衣覺漸輕松下琴書晴亦潤竹西窓戸晚猶明愁来對酒心先醉病後看花意懶行却憶故山深䖏立緑蘿千樹呌流鶯亂裏情懐苦未𨳩更兼貧病兩相催翻書自取醫方讀冩劵頻賖藥品裁有子問安催啖粥無人療渇謾思梅東山謝傅能相憶風雨園丁送韭来送潘省叅糓北覲黄鉞專征異撫軍薊門鼙鼓接西秦江淮乆頼齊桓伯中外方思李泌臣鶴駕簫聲丹禁曉龍池柳色舊宫春邦交不用縦横術况復東周有故人挽吕輔之叅軍老来不作華亭尹死後仍書貞惠君猶有綈𫀆憐范叔更無珠履哭田文練兵每到防秋試積粟多縁歉歲分𣣔奠一尊招夜月紫藤蒼栢繞孤墳送錢思復曲江庾信文章四十年一官今喜便冝遷諸侯賔客青雲表亂世功名白髮前弟子年来金馬詔故人天上玉樓宣先生且向江南老草閣東風聽雨眠登石湖山亭和胡宣古宋仲温危亭百尺瞰奔湍落日清虚縹緲間石壁倚風青鳥下洞簫吹月玉龍還覇啚猶在英雄夣雲氣或連吴越山無限興亡眼前事五湖烟水不相關虎丘逰和張雲門韻烟草離離接故宫劒光無復吐長虹虬髯一怒江山定鳥喙重来苑囿空佛宇勢凌雲海日𣑽鐘聲和塔鈴風風前虎去髙丘在野樹殘花泣露紅追送徐孟岳長洲苑前春草生騎馬送君君巳行東風楊柳忽淡蕩新水鵝鴨自縦横青菘堆雨晚飯足白苧裁雪春衣成隣家有酒可賸買我𣣔相從聽早鶯寄王常宗不為春愁减帶圍自縁多病故人稀無多的的梅花在有㡬斜斜燕子歸月上湖平還蕩槳酒醒風起更添衣微官未得追随去㝎挹爐熏静掩扉寄號醉樵饒介之萬里西風到井梧泠泠秋水接平蕪清虚自是松間鶴瘦硬何湏石上蒲千古英雄雙醉眼四山風雨一樵夫正湏斤斧収材木要向凌烟見畫圖送胡布張憲二軍咨鳯凰出世不多見神駒汗血非全功子龍勇冠萬人敵劉表氣壓三軍雄㑹使筞勲夸海内何必紀姓歸遼東遲子縱横覽八極當駕巨浪乗長風丈夫許國一何蚤中興紱冕皆吾徒絳火流雲赤雀下神劒入海妖龍屠秦人玉琯不自惜宋客燕石何其愚㑹見清明舊鵰鶚鶱飛萬里騁良圖送趙智之海濵兼柬乃伯元鼎十月肅霜霜未嚴片㠶歸去雨纎纎鴈飛空濶雙斜影山隔蒼茫一翠尖自咲楊雄登舘閣誰憐膠鬲在魚塩到家為我寒暄問汝伯遥應雪滿髯寓雲間送人之上海兼簡曲江居士嗟予多難未能歸念爾無家更别離春近江花𨳩次第雪消沙鴈落參差英雄惟贈劍三尺貧賤相逄酒一巵為語海州錢博士白頭誰與細論詩同雲間謝嘉書張夣辰舟手持三尺青琅玕鼓枻来往凌風湍放歌吴淞江月白濯足洞庭秋水寒黃金何用鑄范蠡紫蓴自足供張翰扁舟早晚落吾手便當相逐投魚竿将歸吴中留書雲間齋舎讀書喜逢明主知直節不受儒官欺男児自當萬人敵少壮耻為童子師江㧾還家何草草仲尼去魯獨遲遲蜀雲亭下春消息雪白梅花開一枝元夕次韻鐡崖先生千輪萬騎影叅差盡道風光勝舊時珠果亂抛金並蔕銀花交射玉連枝星縁燈映看偏宻月為人留下轉遲白髪老仙逢盛事綵毫先詠太平詩星斗斕𥚹落絳河魚龍㶑灔出滄波尋常巷陌皆車馬到䖏笙歌盡綺羅人意尚嫌春夜短燈光更比月明多謾教胡女傞傞舞細按吴児宛宛歌和謝雪坡錢塘見寄經旬不見謝宣城小楷烏絲寄逺情黄篾楼髙春夣破緑羅衣薄暮寒生鶴臨沙渚鷗俱浴花落江泥燕與争亦欲雨蓑摇短楫西湖新水蕩空明送鄭本𥘉還越深冬未飄一片雪江梅巳𨳩千樹花出門上馬霜滿屋舞劒聞雞月在沙秦豈無人徒贈䇿楚雖三户復成家壮懐亦有東㳺夣明日津頭見㫁槎赤山書事寄龜巢謝隱君君南蘭陵人今避兵居吴長洲之獨樹湖曾向溪南看藝麻竹杠兠子一肩斜秧苗尚短仍含糓荷葉才髙巳上花蚕屋柘烟朝焙蠒鵲爐沉火晝薰茶而今風雨成抛絶卧聴西園兩部蛙贈勤上人别兼簡雲間陶宗儀澄公髙義動山川亂後今逢弟子賢四海交㳺諸老盡百年衣鉢一燈傳詩題玉几峯前竹社散東林寺裏蓮惟有赤城陶逸史老懐能說舊時禪寄林訓導謨江上雪消春水渾故人書札到柴門英雄所見自相合貧賤之交誰與論漢室山河終混一秦城楼閣易黃昏平生不識之無字也學相如欲賣文長洲何明府見過使君麾節来相訪正及南風百草長新語驚人渾爛熳竒才化俗更循良西山雲朶金銀氣東閣梅花氷雪香便𣣔乗槎逺相從鳬鷖春水緑茫茫漫興十日南風吹雨晴隣家鵝鴨傍人鳴蒼苔門巷槐花落青草池塘荷葉生巳喜包茅来楚貢不勞酈舌下齊城野情𣣔買滄浪屋醉詠鳬鷖歌太平聞雪坡将還吴門桒葉重重戴勝飛行人多報故人歸髩從别後星星出花到春深樹樹稀詩喜官閑能不廢身縁謀拙事多違便湏出郭相迎迓遮莫南風雨滿衣懐王隱君止仲小几支頥却掩書身閑喜復見秋𥘉山林自此縦横落絺綌扵人次第踈沙鳥浴江明白鷺水花摇雨淡紅蕖相知獨有王摩詰兩月無詩寄草廬附王半軒次韻寄荅懐剌歸来卧枕書白雲滿榻閉門𥘉草玄未信楊雄病禮法從知阮籍踈短障夕陽悲蟋蟀方塘秋水老芙蕖南村口燥呼難得一任狂風攪弊廬懐髙著作季迪坐看清江飲白虹不知楼閣又秋風㳽漫禾黍蒼烟外零落芙蓉暮雨中冨貴逼人驚變豹文章鳴世豈雕虫清時欲草征西檄只有陳留阮瑀工附髙青丘次韻寄荅殘雨翛翛映彩虹憐君獨咏楚臺風逺江㠶影秋蕪外故苑砧聲晚樹中壮歲漸如辭幙燕閑身猶坐蠧書䖝雅音自古無能好莫向人誇瑟最工江村寒食預折楊枝挿繞簷荳糜香軟麥餳甜春衣未染新絲織午篆猶分舊火添小雨送花青見蕚輕雷催笋碧抽尖不因人逺傷離别那得春愁上短髯時弟均戍塞外乗槎為日者張徳元賦百尺枯槎孕氣靈濤花空影入滄溟星河弄月珠胎白銀漢流雲鵲羽青坐拂珊瑚龍婉婉卧看蓬島翠㝠㝠不湏更問君平卜認得黃姑駕綵軿白雲深䖏為天平圭上人賦上人卓錫亂雲中縹緲蓮花第㡬峯行盡﨑嶇方見塔望迷樓閣但聞鍾四山曉氣層層雨一逕秋隂曲曲松㡬度相尋問童子水流花落竟無踪聴秋軒為方上人題聴秋軒前秋滿庭聴秋軒裡貯秋聲噫嘘萬竅西南發摇落四山風雨鳴定起寳花如雪堕夣囬璧月帶潮生便湏飛錫蒼梧野聞取鈞天九奏笙雨中懐沈逹卿茂卿立春一月二十日江鷗野鶩飛滿池杏花差白净洗面楊柳半青争畫眉沈郎多病徴未起王孫不歸吁可悲南周山頭飬親好贈以金盤五色芝天妃宫題贈道士沈雪溪帝遣神妃降紫芬海波摇蕩赤霞裙月明貝闕金銀氣日暖龍旂贔屭紋青冊簡書天上錫紺帷靈語夜深聞方壇露冷三花繞坐演琅凾大篆文題明皇貴妃對奕禄山傍觀圖深院紋楸敵睡魔玉環用意蹙雙蛾只因数子蔵機宻不覺三郎失着多布陣似窺龍尾道争邉未至馬嵬坡有人冷眼觀成敗若箇胡児是爛柯問梅次趙元鼎韻驚散溪頭一樹雲故人相别又相親兩三枝上㡬分月四五㸃中多少春不入楚騷縁底事畨成羌笛是何因芳心𣣔露還羞澁踏雪歸来香滿身望太湖天帝何年遣六丁鑿𨳩混沌是雙青湖通南北澄氷鑑山㫁東西列畫屏挾雨龍歸霄漢暝網魚船過水雲腥乗風𣣔往終吾老甪里先生古洞庭𥘉春二首雪晴泥軟不生埃春水浮香上緑苔柳色嫩扵鵝破殼笋痕斑似鹿辭胎踏青鞋韈平頭製試暖衣裳稱體裁安得草堂江浦上紫桃紅杏一齊𨳩春色撩人到水涯草香蘭氣總詩材酒􅌽同伴嘗新熟花趂𥘉晴賞半𨳩蹀􅞃馬随車嚮過鞦韆人送咲聲耒直湏清夜紅羅燭莫負東風玉鏡臺春日雜詠四首雨雨風風未肯晴百年時序逼清明花無桃李非春色人有笙歌是太平黃鳥巧衝蝴蝶過紫騮驕趂玉􅍡行酒家不用逢人問髙挿花枝作斾迎偶自循籬出逕苔剌桐花落野棠𨳩一年春巳無多在㡬箇人曾有暇来浸糓陂塘科斗亂浴蚕時節杜䳌哀買山莫種閒花柳多覔松栽與栢栽蘭心剌促上枯根草色凄迷入舊痕灘觜無泥沙自白潮頭有雨水先渾龍祠神去鴉鳴樹魚市人歸犬應門便織蓑衣與牛薦此身只合老江村陋巷荒蕪野趣濃小溪春水恰船通無邉草色猶春雨有幾梅花更晚風文體敢期盧駱並交情惟許范張同𣣔将浪迹随漚鳥錯比溪南是瀼東見花聴風聴雨坐空齋不道春花爛熳𨳩亂世身如危䖏立異郷人似夣中来十年多故塵雙鬂萬事無心酒一杯明日清明攺新火且将榆柳着殘灰清明後見花狼藉春到清明花漸稀花應憐我見春遲多情杜牧重来日前度劉郎再到時莫為東風愁對酒且因流水獨臨池短墻深䖏無人折留得殘紅四五枝立夏風雨都無半日春滿溪䳘鴨水迷津櫻桃子熟巳薦廟芭蕉葉長才過人壮歲得間縁性拙故交雖淡却情真如何盖得江邉屋賸采新荷飯緑蒓木茶爐紺緑僊人煉玉膚花神為曝紫霞腴九天清淚沾明月一點芳心托鷓鴣肌骨巳為香魄死夣魂猶在露團枯孀娥莫怨花零落分付餘醺與酪奴竹素圖百尺飛樓似石渠牙籖五色照窓虚平生不惜千金費丧亂猶存萬卷餘秦火巳来皆断簡楚經之外總閑書晴雲滿榻芝香散應與諸郎校一𥘉栽竹斸𨳩蒼蘚種琅玕移得瀟湘入座看宿土半含春雨潤短籬斜䕶晚風寒紫苞未見摇氷雪翠葉終湏宿鳯鵉何䖏銀笙吹夜月碧𫀆零落滿闌干鵝翎菊曾随漚鷺浴滄浪又對芙蓉試淺粧露冷有香栖晚圃月明無夣到寒塘緑波春草當時雨黃葉秋風此夜霜莫道淵明最憐惜右軍應為冩千行卜流者吉否反是折吴人扵𥘉正以糓占人一年休咎炒成花春入吴門十萬家家家爆糓作生涯就鍋裂碎黃金粟随手翻成白玉花紅粉佳人占喜事白頭老子問年華晚来分付児童戯数片江梅撲鬂斜梅花夣緑蕚仙人曉睡濃香魂縹緲逐東風翠禽啼破春如海胡蝶飛来月滿空白玉樓臺渾落莫黄昏時節正朦朧巡簷𣣔問神逰䖏只在孤山淺水東以上元末在吴中作徴赴京亂後人如再得生敢扵世上望聲名詩吟白屋惟安隱詔落丹厓陡失驚鳯闕有心求柱梲鯫材何量抵瓶罌不堪故舊愁分手楊柳楓槗第一程到京欎䓗王氣古金陵㤗運重新感盛明臣庶梯航趨上國江山龍乕衛髙城六街塵掠秦淮過萬户鐘聞魏闕鳴白髮到京期少𥙷敢將詞賦重聲名奉天殿早朝雙闕翬飛紫盖髙日華雲影映松濤萬年青擁連枝橘千葉紅開並蔕桃仗以玉龍㗸寳玦珮将金兕錯銀刀乍晴風日忻妍美闔殿齊穿御賜𫀆錦襠綉㡌列金撾玉節龍旂拱翠華甘露欺霜凝紫液卿雲如盖結丹霞鶯聲近隔宫中柳駿騎遥穿仗外花聖主直教恩澤遍香羅先到小臣家新正試筆寒随殘臈去匆匆又見年光入眼濃恨不髪如春草緑咲曾花似面顔紅門無賀客酬佳節座有癡児夀老翁巳許承恩趨鳯闕珮聲齊到日華東雪欹欹整整復皚皚可是春氷細剪裁到䖏江山皆玉立誰家庭院不花𨳩㡬囬旋繞還飛去半餉悠揚却下来獨有梅邉易消㓕也應和氣近蓬莱東風曉寒衣𬒮𣣔生􅏢沉火㣲薫半臂綾内苑未消千樹雪東風先觧一池氷梅驚玉笛吹還落柳傍珠簾折未能回首帝城明月滿六街簫鼓萬家燈元夕觀燈綵鸞扶轂駕雲駢寳騎揚鏕逐隊行十里燈光欺月色九衢歌響雑簫聲綺羅香繞長春苑珠翠人逰不夜城喜極未能間坐得也随僚友看昇平塔燈應制百尺浮屠聳半空闌干十二影玲瓏日臨銅柱霞標爛風颺銀花火樹紅一劒騰光衝斗口五星揚彩入離宫髙明碩與君心並徧照逃亡草野中上馬晴来未覺是春朝巳有東風着柳條雪自堅牢盈尺在氷纔輕薄一邉消不愁霧暗看花眼且倩人扶上馬腰却憶探春湖上路小紅船子木蘭橈新春左掖簡方員外雞籌送曉日𥘉長粉署㣲薫應漏香草色才囬半痕緑柳條𥘉染一分黃玉壺氷觧春無迹羅幙風来澹有光自愧才踈非畫諾敢随鳴鳯集朝陽送周錬師玄𥘉還吴玄都春暖碧桃𨳩鳴佩朝天到鳳臺夜檄雨龍江上發曉呼雲鶴洞中来黄精却老和泉煑丹橘娱親遶舎栽為問長生應有術早修真籙進蓬莱感春茂苑東風散鼓鼙草堂近在柳營西春衣禁酒聊存着詩句懐人每謾題花有底忙衝蝶過鳥能多慧學鶯啼閒身準擬看山色又復朝叅逐馬蹄春日出郊偶臨春水賞春晴便覺身随步履輕人靣映花渾一色竹音和雨恰齊聲衣從典盡湏沉醉簮未容投且暫行除却鳯城佳麗地更扵何䖏樂昇平送杭太祝代祀四瀆馮夷擊鼓走黃能夜報祠宫代祀来虎節不湏桐柏去龍香且向吕梁𨳩古来河海猶三望今日風塵尚九垓若對夀春城下月可能巵酒酹荒萊水中三足鼈名也折黄能之能匡来反應制送安南使臣杜相之還國都門車馬曉騑騑敕送陪臣萬里歸使者重聞新寵詔嗣王仍賜舊頒衣驛亭五月蕉花落江路南風荔子肥歸報大廷方徹樂也知存没感皇威送僧住姑蘇北禪六年江海一論心又聴鐘聲出禁林歸路暖風芳草合講堂春雨落花深未誇葛老三編論獨愛韋郎五字吟水月仙人塵不染待君重振海潮音悼楊文舉慱士白髮蒼髯老太常亂離終喜得還郷八分書古追東漢七字詩工到盛唐謫乆已無書滿屋病多惟有藥成囊我慚同姓曽聮職宿草西風淚数行送鄭與權之官七閩七閩地暖不飛雪山路早行仍衣綿黄金結客記昔日白髪上官非壮年荔子曉風人似玉桄榔春雨樹如烟還家定􅘳楊州鶴流水寒松遶墓田題玉真觀五色琳宫綴玉題萬年瑶冊秘金泥屏風盡是青山疊旛盖都将緑樹迷雲氣長隂時嘯虎日華先曉夜聞雞閒身碩得同真佀卧看􅊯􅊯鹿引麛送俊用章上人還中竺五色雲凾貝葉牋寳幢花雨下諸天纔叅闕下䕫龍會又赴山中鹿豕筵萬法西来知㡬刼一支東指已千年行當着屐藤蘿外共㸔峯頭玉井蓮春宵樓春宵樓上人如玉一刻光隂直萬錢簾底按歌風細細酒䦨私語月姢姢錦窩香暖雲𥘉散羅幙燈昏客未眠莫怪銅壺大催促長門猶嘆夜如年狂歌東風十日不成雨北郭兩山吹作塵縱横自可二千石貧賤何湏七尺身醉後狂歌皆慟哭老来春色最傷神即将建業城邉柳持贈山陽笛裏人秦淮官舎春懐潮来灘觜緑沉沙獨坐㣲吟送物華強健憶曾身佀犢風流那復鬂如鴉十年金谷園中友三月長安馬上花春色正濃人意好且教群吏暫休衙晚春三首旌旗獵獵繞髙城曲水飄香出綉楹雨頡風頏枝外蝶花遮柳映樹頭鶯乍籠紗幘羞容老試着羅衣覺體輕猶憶醉歸湖上路滿身飛絮馬縱横宫樹參差帶苑墙暖塵兼霧撲衣裳新蒲細柳皆春色紫燕黄鶯𣣔㫁腸沽酒客来花未落祓除人去水猶香老懐無復登臨賞坐對鍾山到夕陽辛夷如雪照庭柯老去愁驚日易過芳草漸扵歌舘宻落花偏向舞筵多故人别後皆黄土南浦春来又緑波便𣣔移家勾曲住採芝種玉此山阿寓江寧村居病起寫懐落梅風急晚蕭蕭病起愁驚雪盡消巵酒不添前日量帶圍𥘉减舊時腰髙楼錦瑟花連屋深巷珠簾桞映橋凖擬青鞋踏春草看他翡翠戯蘭苕病體支離倦褁巾偶因行樂見陽春梅縁何恨尋常瘦桞故多愁日夜顰夢裏笙歌随騕褭畫中羅綺綉麒麟相期𣣔就吴姬飲却恐江花咲客貧性懶逢春睡轉昏曉鶯多在夣中聞故人錦字慿誰寄學士銀魚每自焚布糓雨晴宜種薬蒲萄水暖𣣔生芹相思未信蓬山逺只隔江東一片雲望盡吴山是楚峰一緘芳信託㱕鴻丁香暗結盈盈露荳􅞦㣲含細細風春水染衣鸚鵡緑江花落酒杜䳌紅此身曾是登瀛客未信扶桒弱水東不知殘雪是春光起見輕雲覆野塘春草春江相妬緑新鶯新桞闘争黄囊無太史新頒暦衣有容臺舊賜香但使清尊花底醉任教白髮鏡中長東風拂桞軟婆娑野鳥啼春聴未和世事不随人意好雨聲偏為客愁多囬文篆小香如蟻凹面杯深酒勝鵝一帶春江皆碧草却愁無地着漁蓑醉舞狂歌四十年老来參得小乗禪東風未濕墻腰雪細雨微添石眼泉無数白鷗閑佀我一江春水碧扵天莫言笠澤非彭澤定擬金川是輞川坐對青山覺眼明山應憐我眼偏青一官不博三竿日萬事無過兩鬂星花底蛛絲迷蛺蝶草根蝦族變蜻蜓文章無預封侯相莫向人誇識一丁十里吴堤踏暖塵老懐忽憶故郷春泥金孔雀裁歌扇刻玉麒麟壓舞茵翠䄂錦筝邀上客畫船銀燭照歸人而今白髪東風裏疑是前身與後身門外春泥一尺深窓間雲氣十分隂寒毡溜雨衾如鐡濕竈凝烟火似金酒觧驅愁時強飲詩多感舊懶長吟貧家不願千金粟但得陽烏照晚林新柳濃如烟草淡如金濯濯姿容裊裊隂漸軟已無憔悴色未長先有别離心風来東面知春淺月到梢頭覺夜深惆悵隋宫千萬樹淡煙踈雨正沉沉春草嫩碧柔香逺更濃春来無䖏不茸茸六朝舊恨斜陽裏南浦新愁細雨中近水𣣔迷歌扇綠隔花偏櫬舞裙紅平川十里人歸晚無数牛羊一笛風春水溶溶漾漾𣣔平槗知是巴江雪盡消紅雨落花来衮衮緑烟芳草去迢迢沅湘已沒鷗邉渡湓浦新添鶩外潮向晚漁郎走相報大家齊上木蘭橈樹底偶自無眠樹底行不關春色惱人情蛙當静夜聴偏急鳥並深池宿屡驚楊柳無風偏裊娜梨花有月更分明春江一派東流去剛道波聲為不平白髪江柳逢春已變金雪消江水到門深青山識我歸来意白髪消人仕宦心半醉半醒花冉冉閑愁閑悶雨沉沉莫言萬事中年後不是中年已不禁减衣春衣𥘉减覺身輕老眼縁晴逺倍明濯足愛臨流水坐看山羞逐少年行江花一色多於雪野鳥双啼巧似鶯莫道飄零易傷感故郷應更不勝情清明寫懐江樹蘢䓤入苑青祓除時節又清明漢宫蠟燭分烟岀唐女羅衣傍水行一片花飛愁燕燕二分春去怨鶯鶯人生㡬度東䦨雪莫道黄州自有情江畔尋花偶成細草平沙暖更融謾随胡蝶步東風衰髯照水疑添白老眼㸔花覺厭紅且自細聴鶯宛宛莫教深惜燕怱怱江村到䖏皆春色聊與行人吊客中偶随流水到花邉便覺心清似昔年春色自来皆夣裏人生何必盡樽前平原席上三千客金谷園中百萬錢俛仰繁華竟陳迹野花啼鳥謾留連上巳對雨三月長安草滿坡年年修禊襍笙歌䴡人羅䄂珠腰衱中使銀鐺錦靿靴江上只今春雨暗水邉何䖏落花多不湏惆悵開元事寂寂山隂長薜蘿再用前韻書事春来不到鳯凰坡辜負江頭白苧歌輕薄衣裳冝換裌軟紅泥土不沾靴鶯縁夢短嗔啼早雨為花踈厭聴多只恐新晴便零落南風吹老樹隂蘿溱水遥連洧水坡周人按舞鄭人歌轆轤囬轉秋千索龜甲斜縫蹴踘靴轍迹不教青草合鶯聲偏向緑楊多而今折贈無紅葉枳棘䝉茸盖女蘿莫将南浦擬東坡且對吴児唱楚歌醉裏那知髯似㦸老来方信面如靴驚人事業非難做傳世文章不在多步逐東風看花柳幾時山月照烟蘿春日白門寫懐用髙季迪韻得歸雖喜未忘悲夣裏愁驚在别離尚短柳如新折後已殘梅似半開時江雷殷夜䖝蛇早山雨崇朝蛺蝶遲製取烏紗籠白髪免教春色咲人衰萬里歸来戴鶡冠老懷無復舊時歡沙邉野水鷗随汲竹外青山鶴從看花信幾畨風作陣江聲連日雨添寒無心車馬千鍾禄有幸茅茨一榻安柴門斜對曲江頭農具漁􅊻晚自収細雨短莎寒佀臘淡烟新柳暝如秋鷗能来徃縁曾識鶯或丁寧觧說愁囬首故交零落盡更将詩酒與誰逰阮途無用苦悲窮已拚衰顔漸老翁沙鴈随春衝北雨江花迎暖待東風文章誤我虚名在貧賤輕人舊業空惆悵成臯遷謫地夜䦨猶入夣魂中緑髮無多白髪長謫居還復是他郷風紉晚佩猗蘭弱雨滴春𬞞早韭香碧柳五株千本菊黄牛十角一群羊得閒随地為農好不獨長安與洛陽未即移家返弊廬且携妻子傍村墟千金已費床頭劒一字無存架上書短髪恨因多難白故交慚為乆貧踈浮名薄俗看俱幻獨有耽詩癖未除逺歸偏惜竄餘身多難畨為異姓親前度劉郎非故物當時燕子揔西隣家貧母老難為客酒薄愁深不醉人走向津頭看春色緑波芳草却傷神緑蕪迷渚水漫沙斷岸無舟路轉賖細柳已黄千萬縷小桃𥘉白兩三花烟中晚棹兼漚逺雨裏春旗趂屋斜野趣莫嫌渾寂寞近来沙觜有人家春暮有感春色鮮明不稱貧越羅川錦照烏巾斜陽芳草遲遲晚流水桃花去去春萬里歸心漚送客片時閑夣鳥催人五湖風雨烟波闊便着青蓑採白蘋啼鳥匆匆變物華雨池科蚪漸成蛙青鞋謾踏閒邉草白髪羞簮醉裏花此日驊騮思苜蓿當時鸚鵡喚琵琶遥憐簫鼓追逰地薺麥青青已沒鴉夜坐看雪曾登百尺楼江頭囬首又新秋虚名未死猶相累舊業雖貧底足憂身暫得閒如換骨心長無愧勝封侯夜深風露􅋽如許坐對明河澹澹流漸老漸老無營萬慮沈鶯聲喚起向来心春風顛似唐張旭天氣和如魯展􅨛結客每酬雙白璧纒頭曾費萬黄金短笻消得江村路步步蔷薇緑樹隂畣李仲弘冩懐次韻二首休對清江嘆逝波且抛簮珮着漁蓑愁邉巵酒歡娱少老後文章感慨多燕子緑蕪三月雨杏花春水一群鵝聊将白髪歸来意緫和東風懊恨歌春来渡口足風波獨立船頭舞短蓑髙栁忽驚啼鳥變故園應是落花多尋人不敢門題鳳愛客都將字換鵝獨有屋西山數疊也應憐我醉時歌移家不思歸隱却移家旋買輕舟繫淺沙飲興已拚今後絶吟情方悔向来差龍将急雨抛成雹虹入輕雲映作霞交友十年零落盡與誰同㸔上林花寄張學錄孟兼掲應奉孟同二文學何用聦明萬卷書自湏卑陋一㕓居草扵閒䖏生偏宻花到春深㸔漸踈緑水滿渠澆藥後青山無數卷簾𥘉相過莫道柴門窄細栁髙槐可䕃車寄潜齋夜坐聴雨獨凭書几坐空齋静裏孤蛩語自哀雨點故随更點落秋聲偏逐鴈聲来一奩香篆銷仍在兩穗燈花欎未開不用追思十年事此心今日已成灰不寐斜河轉影月當櫺舊事牽愁酒漸醒半𥿄功名雙夣蝶十年辛苦一囊螢麒麟照眼嗟還失鴻鴈驚心忍暫聽如此老懐如此夕鬂毛那得不星星雨中獨坐有懐榮易道中用寄潜齋夜坐韻山色秋光澹遶齋雨聲䖝響互悲哀清尊憐我攻愁去白髪欺人送老来江栁净無餘葉在渚蓮遲有一花𨳩馬蹄却憶成皐路野燒西風滿面埃早秋江墅晚步秋前秋後十日雨村北村南千頃麻晚渚芙蓉輕落片午前秔稻細含花仙翁蠟屐髙巾幘溪女銀釵小髻髽老我不知官府事水邉吟到日西斜自咲用前韻自咲多愁鬂有華懶求真訣飯胡麻庭蕪緑是今年草籬槿紅非昨日花西月堕江沉半璧北山當屋露双髽此身那得如鷗鷺雨泊風飄片片斜梅杏桃李落莫香魂繞舊宫詎知色相本来空笛聲黄鶴髙楼上詩句孤山小店中曉樹烟霜千萬點晚籬松竹兩三樷相思只尺慿誰寄目㫁天南字字鴻右梅花當時庭舘醉春風客裏相逢意轉濃只恐胭脂吹漸白最憐春水照能紅一枝争買珠簾外千樹遥㸔小店中惆悵先生歸去後江南烟雨又濛濛右杏花深深翠竹映嬋娟湘女梳粧立曉烟流水落花成悵望舞裙歌䄂是因縁也無人折休相妬纔有鶯啼更可憐却憶東闌碧千葉暖風香雨為誰妍右桃花憶與盧仝共㸔来花光月色兩徘徊江村逺䖏長相識風雨寒時已早𨳩霽雪玲瓏愁易濕春氷輕薄咲難裁江城二月城西路誰惜柔香滿翠苔右李花右仕在京并閑居秣陵江畔作眉菴集卷之八
