front:
  text: 眉菴集卷之八
  hash: sha256:671f68fe5798cb07975204c87f7988c6a50f2767a55503f75096f34329f766e4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_008-1a}
body:
  text: 七言律姑蘇楊基孟載著送路季璉問聘河東時東駕出師太原三晋封疆拱帝圻兩河山色照戎衣青虹貫日隨星出赤鳥如雲夾電飛使者梅花春後折王孫芳草夢中歸入朝若問東南事積粟如山萬馬肥三讓祠前酒一巵杏花紅白桞絲絲古來使者稱吳札此日行人得趙咨老祖山河終不攺諸侯勳業巳如斯青宫錫宴如前日為賦栖栖六月詩聞官軍南征解圍有日喜而遂詠四首天師南下靜風塵正月樓船渡孟津中外諸侯元有約東南豪傑豈無人十年白骨埋荒楚一日蒼生去暴秦喜極自提孤劒舞不知雙淚落衣巾巴江東去動旌旗此變還應責望誰尺土未歸終自復一夫作難彼何時北來兵勢當無敵南向人心賴不離見說兩淮消息好巳將牛酒犒王師兩河精騎向襄陽全蜀材臣出鳯翔天下風雲爭㑹合江東子弟謾搶攘人皆厭亂思平世誰不將歸說故鄉我有先塋依古井十年不奠一壺漿官軍聞說下楊州夢裡扶搖賦逺逰天運未容人力勝民心須順物情求遭逢喪亂生何𥙷見得升平死即休沽取一壺花下酌弟兄兒女笑相酬寄楊鐡崖先生不見雲間楊鐡史寮中七客近如何老來詩句踈狂甚亂後文章感慨多長笛參差吹海鳯小璚楊柳舞天魔春明且盡嬉逰樂莫解梁鴻五噫歌先生所居名七者寮懷悼朱秦仲總制力盡戈鋋援不回猶揮赤手搏風雷波濤失意蛟龍伏肝膽如杠虎豹摧謾使張遼說關羽誰將全武易秦裴煩君更緩須臾死要對春風酒一杯送雪坡太守之武林湖上烟飛開畫船鳬鷖鴻鴈滿前川舊逰未覺英雄老遺愛猶思太守賢驛樹籠䓗春雨裏江花零落晚風前遙知不著登山屐先向閭閻問倒懸送謝參政朝京萬方臣妾歸降日四海諸侯職貢秋七冊寶書銀葉篆九重珠絡翠雲裘舍人入奏臚傳早天子論功寵遇優正及燕山三尺雪馬蹄須遍御街逰郡齊養痾呈醉樵內史三首江雲倐忽暝還收五月猶寒著弊裘芳草斜陽看易晚緑荷踈雨聽如秋池塘空闊蜻蜓喜簾幕蕭條燕子愁不是無言成獨坐暫將心事靜中求小軒新沐喜神清短幘單衣覺漸輕松下琴書晴亦潤竹西窗戶晚猶明愁來對酒心先醉病後看花意懶行却憶故山深處立緑蘿千樹呌流鶯亂裏情懷苦未開更兼貧病兩相催翻書自取醫方讀寫劵頻賖藥品裁有子問安催啖粥無人療渴謾思梅東山謝傅能相憶風雨園丁送韭來送潘省參穀北覲黃鉞專征異撫軍薊門鼙鼓接西秦江淮久賴齊桓伯中外方思李泌臣鶴駕簫聲丹禁曉龍池柳色舊宫春邦交不用縱橫術况復東周有故人挽吕輔之參軍老來不作華亭尹死後仍書貞惠君猶有綈𫀆憐范叔更無珠履哭田文練兵每到防秋試積粟多緣歉歲分𣣔奠一尊招夜月紫藤蒼柏繞孤墳送錢思復曲江庾信文章四十年一官今喜便冝遷諸侯賔客青雲表亂世功名白髮前弟子年來金馬詔故人天上玉樓宣先生且向江南老草閣東風聽雨眠登石湖山亭和胡宣古宋仲溫危亭百尺瞰奔湍落日清虛縹眇間石壁倚風青鳥下洞簫吹月玉龍還霸啚猶在英雄夢雲氣或連吳越山無限興亡眼前事五湖烟水不相關虎丘逰和張雲門韻烟草離離接故宫劒光無復吐長虹虬髯一怒江山定鳥喙重來苑囿空佛宇勢凌雲海日𣑽鐘聲和塔鈴風風前虎去髙丘在野樹殘花泣露紅追送徐孟嶽長洲苑前春草生騎馬送君君巳行東風楊柳忽淡蕩新水鵝鴨自縱橫青菘堆雨晚飯足白苧裁雪春衣成鄰家有酒可賸買我𣣔相從聽早鶯寄王常宗不為春愁减帶圍自緣多病故人稀無多的的梅花在有幾斜斜燕子歸月上湖平還蕩槳酒醒風起更添衣微官未得追隨去㝎挹爐熏靜掩扉寄號醉樵饒介之萬里西風到井梧泠泠秋水接平蕪清虛自是松間鶴瘦硬何須石上蒲千古英雄雙醉眼四山風雨一樵夫正須斤斧收材木要向凌烟見畫圖送胡布張憲二軍咨鳯凰出世不多見神駒汗血非全功子龍勇冠萬人敵劉表氣壓三軍雄㑹使策勳夸海內何必紀姓歸遼東遲子縱橫覽八極當駕巨浪乘長風丈夫許國一何蚤中興紱冕皆吾徒絳火流雲赤雀下神劒入海妖龍屠秦人玉琯不自惜宋客燕石何其愚㑹見清明舊鵰鶚鶱飛萬里騁良圖送趙智之海濵兼柬乃伯元鼎十月肅霜霜未嚴片帆歸去雨纎纎鴈飛空濶雙斜影山隔蒼茫一翠尖自笑楊雄登館閣誰憐膠鬲在魚鹽到家為我寒暄問汝伯遙應雪滿髯寓雲間送人之上海兼簡曲江居士嗟豫多難未能歸念爾無家更别離春近江花開次第雪消沙鴈落參差英雄惟贈劍三尺貧賤相逄酒一巵為語海州錢博士白頭誰與細論詩同雲間謝嘉書張夢辰舟手持三尺青琅玕鼓枻來往凌風湍放歌吳淞江月白濯足洞庭秋水寒黃金何用鑄范蠡紫蓴自足供張翰扁舟早晚落吾手便當相逐投魚竿將歸吳中留書雲間齊舍讀書喜逢明主知直節不受儒官欺男兒自當萬人敵少壯耻為童子師江㧾還家何草草仲尼去魯獨遲遲蜀雲亭下春消息雪白梅花開一枝元夕次韻鐡崖先生千輪萬騎影參差盡道風光勝舊時珠果亂拋金並蒂銀花交射玉連枝星緣燈映看偏密月為人留下轉遲白髮老仙逢盛事綵毫先詠太平詩星斗斕𥚹落絳河魚龍㶑灔出滄波尋常巷陌皆車馬到處笙歌盡綺羅人意尚嫌春夜短燈光更比月明多謾教胡女傞傞舞細按吳兒宛宛歌和謝雪坡錢塘見寄經旬不見謝宣城小楷烏絲寄逺情黃篾樓髙春夢破緑羅衣薄暮寒生鶴臨沙渚鷗俱浴花落江泥燕與爭亦欲雨蓑搖短楫西湖新水蕩空明送鄭本𥘉還越深冬未飄一片雪江梅巳開千樹花出門上馬霜滿屋舞劒聞雞月在沙秦豈無人徒贈䇿楚雖三户復成家壯懷亦有東遊夢明日津頭見斷槎赤山書事寄龜巢謝隱君君南蘭陵人今避兵居吳長洲之獨樹湖曾向溪南看藝麻竹杠兜子一肩斜秧苗尚短仍含穀荷葉才髙巳上花蠶屋柘烟朝焙繭鵲爐沉火晝薰茶而今風雨成拋絶卧聽西園兩部蛙贈勤上人别兼簡雲間陶宗儀澄公髙義動山川亂後今逢弟子賢四海交遊諸老盡百年衣鉢一燈傳詩題玉几峯前竹社散東林寺裏蓮惟有赤城陶逸史老懷能說舊時禪寄林訓導謨江上雪消春水渾故人書札到柴門英雄所見自相合貧賤之交誰與論漢室山河終混一秦城樓閣易黃昏平生不識之無字也學相如欲賣文長洲何明府見過使君麾節來相訪正及南風百草長新語驚人渾爛熳竒才化俗更循良西山雲朵金銀氣東閣梅花氷雪香便𣣔乘槎逺相從鳬鷖春水緑茫茫漫興十日南風吹雨晴鄰家鵝鴨傍人鳴蒼苔門巷槐花落青草池塘荷葉生巳喜包茅來楚貢不勞酈舌下齊城野情𣣔買滄浪屋醉詠鳬鷖歌太平聞雪坡將還吳門桑葉重重戴勝飛行人多報故人歸鬢從别後星星出花到春深樹樹稀詩喜官間能不廢身緣謀拙事多違便須出郭相迎迓遮莫南風雨滿衣懷王隱君止仲小几支頥却掩書身間喜復見秋𥘉山林自此縱橫落絺綌于人次第踈沙鳥浴江明白鷺水花搖雨淡紅蕖相知獨有王摩詰兩月無詩寄草廬附王半軒次韻寄答懷剌歸來卧枕書白雲滿榻閉門𥘉草玄未信楊雄病禮法從知阮籍踈短障夕陽悲蟋蟀方塘秋水老芙蕖南村口燥呼難得一任狂風攪弊廬懷髙著作季迪坐看清江飲白虹不知樓閣又秋風㳽漫禾黍蒼烟外零落芙蓉暮雨中冨貴逼人驚變豹文章鳴世豈雕蟲清時欲草征西檄只有陳留阮瑀工附髙青丘次韻寄答殘雨翛翛映彩虹憐君獨咏楚臺風逺江帆影秋蕪外故苑砧聲晚樹中壯歲漸如辭幕燕間身猶坐蠧書蟲雅音自古無能好莫向人誇瑟最工江村寒食預折楊枝插繞簷豆糜香軟麥餳甜春衣未染新絲織午篆猶分舊火添小雨送花青見蕚輕雷催笋碧抽尖不因人逺傷離别那得春愁上短髯時弟均戍塞外乘槎為日者張德元賦百尺枯槎孕氣靈濤花空影入滄溟星河弄月珠胎白銀漢流雲鵲羽青坐拂珊瑚龍婉婉卧看蓬島翠冥冥不須更問君平卜認得黃姑駕綵軿白雲深處為天平圭上人賦上人卓錫亂雲中縹眇蓮花第幾峯行盡﨑嶇方見塔望迷樓閣但聞鍾四山曉氣層層雨一徑秋隂曲曲松幾度相尋問童子水流花落竟無踪聽秋軒為方上人題聽秋軒前秋滿庭聽秋軒裡貯秋聲噫噓萬竅西南發搖落四山風雨鳴定起寶花如雪墮夢回璧月帶潮生便須飛錫蒼梧野聞取鈞天九奏笙雨中懷沈逹卿茂卿立春一月二十日江鷗野鶩飛滿池杏花差白净洗面楊柳半青爭畫眉沈郎多病徴未起王孫不歸吁可悲南周山頭飬親好贈以金盤五色芝天妃宫題贈道士沈雪溪帝遣神妃降紫芬海波搖蕩赤霞裙月明貝闕金銀氣日暖龍旗贔屭紋青冊簡書天上錫紺帷靈語夜深聞方壇露冷三花繞坐演琅函大篆文題明皇貴妃對奕祿山傍觀圖深院紋楸敵睡魔玉環用意蹙雙蛾只因數子藏機密不覺三郎失著多布陳似窺龍尾道爭邉未至馬嵬坡有人冷眼觀成敗若箇胡兒是爛柯問梅次趙元鼎韻驚散溪頭一樹雲故人相别又相親兩三枝上幾分月四五㸃中多少春不入楚騷緣底事畨成羌笛是何因芳心𣣔露還羞澀踏雪歸來香滿身望太湖天帝何年遣六丁鑿開混沌是雙青湖通南北澄氷鑑山斷東西列畫屏挾雨龍歸霄漢暝網魚船過水雲腥乘風𣣔往終吾老甪里先生古洞庭𥘉春二首雪晴泥軟不生埃春水浮香上緑苔柳色嫩于鵝破殼笋痕斑似鹿辭胎踏青鞋襪平頭製試暖衣裳稱體裁安得草堂江浦上紫桃紅杏一齊開春色撩人到水涯草香蘭氣總詩材酒􅌽同伴嘗新熟花趂𥘉晴賞半開蹀􅞃馬隨車嚮過鞦韆人送笑聲耒直須清夜紅羅燭莫負東風玉鏡臺春日雜詠四首雨雨風風未肯晴百年時序逼清明花無桃李非春色人有笙歌是太平黃鳥巧衝蝴蝶過紫騮驕趂玉􅍡行酒家不用逢人問髙插花枝作斾迎偶自循籬出徑苔剌桐花落野棠開一年春巳無多在幾箇人曾有暇來浸穀陂塘科斗亂浴蠶時節杜䳌哀買山莫種閒花柳多覔松栽與柏栽蘭心剌促上枯根草色凄迷入舊痕灘觜無泥沙自白潮頭有雨水先渾龍祠神去鴉鳴樹魚市人歸犬應門便織蓑衣與牛薦此身只合老江村陋巷荒蕪野趣濃小溪春水恰船通無邉草色猶春雨有幾梅花更晚風文體敢期盧駱並交情惟許范張同𣣔將浪迹隨漚鳥錯比溪南是瀼東見花聽風聽雨坐空齊不道春花爛熳開亂世身如危處立異鄉人似夢中來十年多故塵雙鬢萬事無心酒一杯明日清明攺新火且將榆柳著殘灰清明後見花狼藉春到清明花漸稀花應憐我見春遲多情杜牧重來日前度劉郎再到時莫為東風愁對酒且因流水獨臨池短墻深處無人折留得殘紅四五枝立夏風雨都無半日春滿溪鵝鴨水迷津櫻桃子熟巳薦廟芭蕉葉長才過人壯歲得間緣性拙故交雖淡却情真如何蓋得江邉屋賸采新荷飯緑蓴木茶爐紺緑仙人煉玉膚花神為曝紫霞腴九天清淚沾明月一點芳心托鷓鴣肌骨巳為香魄死夢魂猶在露團枯孀娥莫怨花零落分付餘醺與酪奴竹素圖百尺飛樓似石渠牙籖五色照窗虛平生不惜千金費喪亂猶存萬卷餘秦火巳來皆斷簡楚經之外總間書晴雲滿榻芝香散應與諸郎校一𥘉栽竹斸開蒼蘚種琅玕移得瀟湘入座看宿土半含春雨潤短籬斜護晚風寒紫苞未見搖氷雪翠葉終須宿鳯鵉何處銀笙吹夜月碧𫀆零落滿闌干鵝翎菊曾隨漚鷺浴滄浪又對芙蓉試淺粧露冷有香栖晚圃月明無夢到寒塘緑波春草當時雨黃葉秋風此夜霜莫道淵明最憐惜右軍應為寫千行卜流者吉否反是折吳人于𥘉正以穀占人一年休咎炒成花春入吳門十萬家家家爆穀作生涯就鍋裂碎黃金粟隨手翻成白玉花紅粉佳人占喜事白頭老子問年華晚來分付兒童戲數片江梅撲鬢斜梅花夢緑蕚仙人曉睡濃香魂縹眇逐東風翠禽啼破春如海胡蝶飛來月滿空白玉樓臺渾落莫黃昏時節正朦朧巡簷𣣔問神逰處只在孤山淺水東以上元末在吳中作徴赴京亂後人如再得生敢于世上望聲名詩吟白屋惟安隱詔落丹崖陡失驚鳯闕有心求柱梲鯫材何量抵瓶罌不堪故舊愁分手楊柳楓槗第一程到京欎䓗王氣古金陵泰運重新感盛明臣庶梯航趨上國江山龍乕衛髙城六街塵掠秦淮過萬户鐘聞魏闕鳴白髮到京期少𥙷敢將詞賦重聲名奉天殿早朝雙闕翬飛紫蓋髙日華雲影映松濤萬年青擁連枝橘千葉紅開並蒂桃仗以玉龍㗸寶玦珮將金兕錯銀刀乍晴風日欣妍美闔殿齊穿御賜𫀆錦襠繡帽列金撾玉節龍旗拱翠華甘露欺霜凝紫液卿雲如蓋結丹霞鶯聲近隔宫中柳駿騎遙穿仗外花聖主直教恩澤遍香羅先到小臣家新正試筆寒隨殘臘去匆匆又見年光入眼濃恨不髮如春草緑笑曾花似面顔紅門無賀客酬佳節座有癡兒夀老翁巳許承恩趨鳯闕珮聲齊到日華東雪欹欹整整復皚皚可是春氷細剪裁到處江山皆玉立誰家庭院不花開幾回旋繞還飛去半餉悠揚却下來獨有梅邉易消滅也應和氣近蓬萊東風曉寒衣𬒮𣣔生􅏢沉火微薰半臂綾內苑未消千樹雪東風先解一池氷梅驚玉笛吹還落柳傍珠簾折未能回首帝城明月滿六街簫鼓萬家燈元夕觀燈綵鸞扶轂駕雲駢寶騎揚鏕逐隊行十里燈光欺月色九衢歌響雜簫聲綺羅香繞長春苑珠翠人逰不夜城喜極未能間坐得也隨僚友看升平塔燈應制百尺浮屠聳半空闌干十二影玲瓏日臨銅柱霞標爛風揚銀花火樹紅一劒騰光衝斗口五星揚彩入離宫髙明碩與君心並遍照逃亡草野中上馬晴來未覺是春朝巳有東風著柳條雪自堅牢盈尺在氷才輕薄一邉消不愁霧暗看花眼且倩人扶上馬腰却憶探春湖上路小紅船子木蘭橈新春左掖簡方員外雞籌送曉日𥘉長粉署微薰應漏香草色才回半痕緑柳條𥘉染一分黃玉壺氷解春無迹羅幕風來淡有光自愧才踈非畫諾敢隨鳴鳯集朝陽送周錬師玄𥘉還吳玄都春暖碧桃開鳴佩朝天到鳳臺夜檄雨龍江上發曉呼雲鶴洞中來黃精却老和泉煮丹橘娛親繞舍栽為問長生應有術早修真籙進蓬萊感春茂苑東風散鼓鼙草堂近在柳營西春衣禁酒聊存著詩句懷人每謾題花有底忙衝蝶過鳥能多慧學鶯啼閒身準擬看山色又復朝參逐馬蹄春日出郊偶臨春水賞春晴便覺身隨步履輕人靣映花渾一色竹音和雨恰齊聲衣從典盡須沉醉簮未容投且暫行除却鳯城佳麗地更于何處樂升平送杭太祝代祀四瀆馮夷擊鼓走黃能夜報祠宫代祀來虎節不須桐柏去龍香且向吕梁開古來河海猶三望今日風塵尚九垓若對夀春城下月可能巵酒酹荒萊水中三足鱉名也折黃能之能匡來反應制送安南使臣杜相之還國都門車馬曉騑騑敕送陪臣萬里歸使者重聞新寵詔嗣王仍賜舊頒衣驛亭五月蕉花落江路南風荔子肥歸報大廷方徹樂也知存沒感皇威送僧住姑蘇北禪六年江海一論心又聽鐘聲出禁林歸路暖風芳草合講堂春雨落花深未誇葛老三編論獨愛韋郎五字吟水月仙人塵不染待君重振海潮音悼楊文舉慱士白髮蒼髯老太常亂離終喜得還鄉八分書古追東漢七字詩工到盛唐謫久已無書滿屋病多惟有藥成囊我慚同姓曽聮職宿草西風淚數行送鄭與權之官七閩七閩地暖不飛雪山路早行仍衣綿黃金結客記昔日白髮上官非壯年荔子曉風人似玉桄榔春雨樹如烟還家定􅘳楊州鶴流水寒松繞墓田題玉真觀五色琳宫綴玉題萬年瑶冊祕金泥屏風盡是青山疊幡蓋都將緑樹迷雲氣長隂時嘯虎日華先曉夜聞雞閒身碩得同真似卧看􅊯􅊯鹿引麛送俊用章上人還中竺五色雲函貝葉箋寶幢花雨下諸天才參闕下䕫龍會又赴山中鹿豕筵萬法西來知幾劫一支東指已千年行當著屐藤蘿外共看峯頭玉井蓮春宵樓春宵樓上人如玉一刻光隂直萬錢簾底按歌風細細酒䦨私語月姢姢錦窩香暖雲𥘉散羅幕燈昏客未眠莫怪銅壺大催促長門猶嘆夜如年狂歌東風十日不成雨北郭兩山吹作塵縱橫自可二千石貧賤何須七尺身醉後狂歌皆慟哭老來春色最傷神即將建業城邉柳持贈山陽笛裏人秦淮官舍春懷潮來灘觜緑沉沙獨坐微吟送物華強健憶曾身似犢風流那復鬢如鴉十年金谷園中友三月長安馬上花春色正濃人意好且教群吏暫休衙晚春三首旌旗獵獵繞髙城曲水飄香出繡楹雨頡風頏枝外蝶花遮柳映樹頭鶯乍籠紗幘羞容老試著羅衣覺體輕猶憶醉歸湖上路滿身飛絮馬縱橫宫樹參差帶苑墻暖塵兼霧撲衣裳新蒲細柳皆春色紫燕黃鶯𣣔斷腸沽酒客來花未落祓除人去水猶香老懷無復登臨賞坐對鍾山到夕陽辛夷如雪照庭柯老去愁驚日易過芳草漸于歌館密落花偏向舞筵多故人别後皆黃土南浦春來又緑波便𣣔移家勾曲住採芝種玉此山阿寓江寧村居病起寫懷落梅風急晚蕭蕭病起愁驚雪盡消巵酒不添前日量帶圍𥘉减舊時腰髙樓錦瑟花連屋深巷珠簾桞映橋凖擬青鞋踏春草看他翡翠戲蘭苕病體支離倦褁巾偶因行樂見陽春梅緣何恨尋常瘦桞故多愁日夜顰夢裏笙歌隨騕裊畫中羅綺繡麒麟相期𣣔就吳姬飲却恐江花笑客貧性懶逢春睡轉昏曉鶯多在夢中聞故人錦字慿誰寄學士銀魚每自焚布穀雨晴宜種藥蒲萄水暖𣣔生芹相思未信蓬山逺只隔江東一片雲望盡吳山是楚峰一緘芳信託㱕鴻丁香暗結盈盈露豆􅞦微含細細風春水染衣鸚鵡緑江花落酒杜䳌紅此身曾是登瀛客未信扶桑弱水東不知殘雪是春光起見輕雲覆野塘春草春江相妬緑新鶯新桞鬪爭黃囊無太史新頒曆衣有容臺舊賜香但使清尊花底醉任教白髮鏡中長東風拂桞軟婆娑野鳥啼春聽未和世事不隨人意好雨聲偏為客愁多回文篆小香如蟻凹面杯深酒勝鵝一帶春江皆碧草却愁無地著漁蓑醉舞狂歌四十年老來參得小乘禪東風未濕墻腰雪細雨微添石眼泉無數白鷗間似我一江春水碧于天莫言笠澤非彭澤定擬金川是輞川坐對青山覺眼明山應憐我眼偏青一官不博三竿日萬事無過兩鬢星花底蛛絲迷蛺蝶草根蝦族變蜻蜓文章無預封侯相莫向人誇識一丁十里吳堤踏暖塵老懷忽憶故鄉春泥金孔雀裁歌扇刻玉麒麟壓舞茵翠䄂錦筝邀上客畫船銀燭照歸人而今白髮東風裏疑是前身與後身門外春泥一尺深窗間雲氣十分隂寒氈溜雨衾如鐡濕竈凝烟火似金酒解驅愁時強飲詩多感舊懶長吟貧家不願千金粟但得陽烏照晚林新柳濃如烟草淡如金濯濯姿容裊裊隂漸軟已無憔悴色未長先有别離心風來東面知春淺月到梢頭覺夜深惆悵隋宫千萬樹淡煙踈雨正沉沉春草嫩碧柔香逺更濃春來無處不茸茸六朝舊恨斜陽裏南浦新愁細雨中近水𣣔迷歌扇緑隔花偏櫬舞裙紅平川十里人歸晚無數牛羊一笛風春水溶溶漾漾𣣔平槗知是巴江雪盡消紅雨落花來衮衮緑烟芳草去迢迢沅湘已沒鷗邉渡湓浦新添鶩外潮向晚漁郎走相報大家齊上木蘭橈樹底偶自無眠樹底行不關春色惱人情蛙當靜夜聽偏急鳥並深池宿屢驚楊柳無風偏裊娜梨花有月更分明春江一派東流去剛道波聲為不平白髮江柳逢春已變金雪消江水到門深青山識我歸來意白髮消人仕宦心半醉半醒花冉冉間愁間悶雨沉沉莫言萬事中年後不是中年已不禁减衣春衣𥘉减覺身輕老眼緣晴逺倍明濯足愛臨流水坐看山羞逐少年行江花一色多於雪野鳥雙啼巧似鶯莫道飄零易傷感故鄉應更不勝情清明寫懷江樹蘢䓤入苑青祓除時節又清明漢宫蠟燭分烟出唐女羅衣傍水行一片花飛愁燕燕二分春去怨鶯鶯人生幾度東䦨雪莫道黃州自有情江畔尋花偶成細草平沙暖更融謾隨胡蝶步東風衰髯照水疑添白老眼看花覺厭紅且自細聽鶯宛宛莫教深惜燕匆匆江村到處皆春色聊與行人吊客中偶隨流水到花邉便覺心清似昔年春色自來皆夢裏人生何必盡樽前平原席上三千客金谷園中百萬錢俯仰繁華竟陳迹野花啼鳥謾留連上巳對雨三月長安草滿坡年年修禊雜笙歌麗人羅䄂珠腰衱中使銀鐺錦靿靴江上只今春雨暗水邉何處落花多不須惆悵開元事寂寂山隂長薜蘿再用前韻書事春來不到鳯凰坡辜負江頭白苧歌輕薄衣裳冝換夾軟紅泥土不沾靴鶯緣夢短嗔啼早雨為花踈厭聽多只恐新晴便零落南風吹老樹隂蘿溱水遙連洧水坡周人按舞鄭人歌轆轤回轉秋千索龜甲斜縫蹴踘靴轍迹不教青草合鶯聲偏向緑楊多而今折贈無紅葉枳棘䝉茸蓋女蘿莫將南浦擬東坡且對吳兒唱楚歌醉裏那知髯似㦸老來方信面如靴驚人事業非難做傳世文章不在多步逐東風看花柳幾時山月照烟蘿春日白門寫懷用髙季迪韻得歸雖喜未忘悲夢裏愁驚在别離尚短柳如新折後已殘梅似半開時江雷殷夜蟲蛇早山雨崇朝蛺蝶遲製取烏紗籠白髮免教春色笑人衰萬里歸來戴鶡冠老懷無復舊時歡沙邉野水鷗隨汲竹外青山鶴從看花信幾畨風作陳江聲連日雨添寒無心車馬千鍾祿有幸茅茨一榻安柴門斜對曲江頭農具漁􅊻晚自收細雨短莎寒似臘淡烟新柳暝如秋鷗能來往緣曾識鶯或丁寧解說愁回首故交零落盡更將詩酒與誰逰阮途無用苦悲窮已拚衰顔漸老翁沙鴈隨春衝北雨江花迎暖待東風文章誤我虛名在貧賤輕人舊業空惆悵成臯遷謫地夜䦨猶入夢魂中緑髮無多白髮長謫居還復是他鄉風紉晚佩猗蘭弱雨滴春𬞞早韭香碧柳五株千本菊黃牛十角一群羊得閒隨地為農好不獨長安與洛陽未即移家返弊廬且携妻子傍村墟千金已費床頭劒一字無存架上書短髮恨因多難白故交慚為久貧踈浮名薄俗看俱幻獨有耽詩癖未除逺歸偏惜竄餘身多難畨為異姓親前度劉郎非故物當時燕子揔西鄰家貧母老難為客酒薄愁深不醉人走向津頭看春色緑波芳草却傷神緑蕪迷渚水漫沙斷岸無舟路轉賖細柳已黃千萬縷小桃𥘉白兩三花烟中晚棹兼漚逺雨裏春旗趂屋斜野趣莫嫌渾寂寞近來沙觜有人家春暮有感春色鮮明不稱貧越羅川錦照烏巾斜陽芳草遲遲晚流水桃花去去春萬里歸心漚送客片時間夢鳥催人五湖風雨烟波闊便著青蓑採白蘋啼鳥匆匆變物華雨池科蚪漸成蛙青鞋謾踏閒邉草白髮羞簮醉裏花此日驊騮思苜蓿當時鸚鵡喚琵琶遙憐簫鼓追逰地薺麥青青已沒鴉夜坐看雪曾登百尺樓江頭回首又新秋虛名未死猶相纍舊業雖貧底足憂身暫得閒如換骨心長無愧勝封侯夜深風露􅋽如許坐對明河淡淡流漸老漸老無營萬慮沈鶯聲喚起向來心春風顛似唐張旭天氣和如魯展􅨛結客每酬雙白璧纒頭曾費萬黃金短笻消得江村路步步薔薇緑樹隂畣李仲弘寫懷次韻二首休對清江嘆逝波且拋簮珮著漁蓑愁邉巵酒歡娛少老後文章感慨多燕子緑蕪三月雨杏花春水一群鵝聊將白髮歸來意總和東風懊恨歌春來渡口足風波獨立船頭舞短蓑髙栁忽驚啼鳥變故園應是落花多尋人不敢門題鳳愛客都將字換鵝獨有屋西山數疊也應憐我醉時歌移家不思歸隱却移家旋買輕舟繫淺沙飲興已拚今後絶吟情方悔向來差龍將急雨拋成雹虹入輕雲映作霞交友十年零落盡與誰同看上林花寄張學録孟兼揭應奉孟同二文學何用聰明萬卷書自須卑陋一㕓居草于閒處生偏密花到春深看漸踈緑水滿渠澆藥後青山無數卷簾𥘉相過莫道柴門窄細栁髙槐可䕃車寄潜齊夜坐聽雨獨憑書几坐空齊靜裏孤蛩語自哀雨點故隨更點落秋聲偏逐鴈聲來一奩香篆銷仍在兩穗燈花欎未開不用追思十年事此心今日已成灰不寐斜河轉影月當櫺舊事牽愁酒漸醒半𥿄功名雙夢蝶十年辛苦一囊螢麒麟照眼嗟還失鴻鴈驚心忍暫聽如此老懷如此夕鬢毛那得不星星雨中獨坐有懷榮易道中用寄潜齊夜坐韻山色秋光淡繞齊雨聲蟲響互悲哀清尊憐我攻愁去白髮欺人送老來江栁净無餘葉在渚蓮遲有一花開馬蹄却憶成皋路野燒西風滿面埃早秋江墅晚步秋前秋後十日雨村北村南千頃麻晚渚芙蓉輕落片午前粳稻細含花仙翁蠟屐髙巾幘溪女銀叉小髻髽老我不知官府事水邉吟到日西斜自笑用前韻自笑多愁鬢有華懶求真訣飯胡麻庭蕪緑是今年草籬槿紅非昨日花西月墮江沉半璧北山當屋露雙髽此身那得如鷗鷺雨泊風飄片片斜梅杏桃李落莫香魂繞舊宫詎知色相本來空笛聲黃鶴髙樓上詩句孤山小店中曉樹烟霜千萬點晚籬松竹兩三叢相思只尺慿誰寄目斷天南字字鴻右梅花當時庭館醉春風客裏相逢意轉濃只恐胭脂吹漸白最憐春水照能紅一枝爭買珠簾外千樹遙看小店中惆悵先生歸去後江南烟雨又濛濛右杏花深深翠竹映嬋娟湘女梳粧立曉烟流水落花成悵望舞裙歌䄂是因緣也無人折休相妬才有鶯啼更可憐却憶東闌碧千葉暖風香雨為誰妍右桃花憶與盧同共看來花光月色兩徘徊江村逺處長相識風雨寒時已早開霽雪玲瓏愁易濕春氷輕薄笑難裁江城二月城西路誰惜柔香滿翠苔右李花右仕在京并間居秣陵江畔作眉菴集卷之八
