front:
  text: 眉菴集卷之七
  hash: sha256:b0aa5d60da3f94cb967753b5e189884179e6c724568a5e56abb3cbbb29f127df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_007-1a}
body:
  text: 五言律姑蘇楊基孟載著省垣對雨二首朱邸開東閣青閨對晚林雨苔行處濕風葉坐來深俯仰唯緘口交遊孰吐心偶逢佳節醉萬事捴銷沉舊雨深叢菊新霜小樹楓醉憐花冷淡愁愛葉踈紅沙逺無鳴柝江寒有斷鴻羇懷誰共語默默坐書空贈秦侍儀右二首江西作文釆玉姢姢班行內外聮蕃王從學拜邉使候通箋侍立􅊮庭上追趨法駕前今朝退朝早衣上有爐煙送翰林修撰劉用章赴滇陽桂苑思戎客薇垣亞相才人皆期管樂我獨愛鄒枚霧雨爐熏掩星河殿影開玉堂清切地遲爾早歸耒宿髙季迪京館歲晚此相逢鄉情似酒濃語長銷夜燭夢短及晨鐘急雪風鳴葦微雲月照松雞前趨闕去寒樹曉籠蔥春盡始聞鶯聲衆緑藹園池鶯聲逺更宜愛于三月暮聽似百花時上苑啼應早南風見自遲緑窗殘夢斷相憶海棠枝為牛諒侍御題畫步履近星辰霜凝翠柏新自憐烏府月應照白頭人繡斧監祠夜封章待漏晨清朝崇孝治一飯不忘親和牛侍御懷弟之作春草緑芊芊看雲憶惠連午隂花蕚上秋色鴈行邉此日臨池坐當時聽雨眠應將舒卷意戲綵北堂前懷吳中赤山舊業東林携䇿處南垞釋耕時一徑都緣石諸泉盡到池靜憐松響續涼愛竹隂移盛世容歸隱毋令解組遲漸與世紛逺自然塵慮消沿隨碧溪水徑渡緑隂槗岐路迷還識孤村近却遙間身任來往不為野人招夏夜有懷重露澄秋色輕風生夜涼碧看湖草亂紅愛渚蓮香有弟徒相憶何人不異鄉悲笳在城上雙淚落衣裳逢鄭校書一從淮水别千里各西東又是秋風後相逢客路中鬚眉憐我老憂患憶君同遙想西齋宿孤燈照影紅江村雜興春墅一鳩啼橋危懶過溪徑苔都上壁野菜不分畦倚杖妨花密看山礙竹低欲知幽隱處風雨白門西陋巷泥三尺無人訪隱淪窗鳴風減睡炊斷雨添貧野路花迎客江槗柳送人暫須依薄俗憩此竄餘身春色冶城東花濃笑老翁燕遲雙壘破蜂早一房通薄暝山腰雨踈紋水靣風便携蓑笠去垂釣緑蒲中判醉望愁醒愁因醉轉增巳歸仍似客投老漸如僧詩興風樓笛棋聲雪舫燈莫言渾不解此事野夫能東瀼復西圻村村可釣磯草于煙處密花較雨前稀小管催鶯出踈簾待燕歸傷心新栁色猶妬舊羅衣偶因辭祿去聊傍葦邊居瓢棄頻賖後衣存屢典餘晚簾花掠燕春水絮吹魚復恐沙崩石楊栽插繞廬江槗春别後沙舸獨歸時鵝鴨東西宅菰蒲逺近陂藕深荷蓋密竹瘦筍鞭遲野趣誰能識唯應白鷺知斜檻俯江湍輕簾矗小竿柳寒鶯羽濕花暖蝶鬚乾酒或臨流酌詩多寫石看不因迂僻地那得此身安江影搖春樹潮䀶摺晚沙緑蕪三尺雨朱槿一籬花去國仍思國還家復夢家自無干祿意何必逺京華將雨山光黑𥘉晴樹色青賣薪沙店逺占穀瓦龜靈石枕支頥冷江瓢潄齒腥醉餘春睡熟長得鳥呼醒乍暖夾衣輕間依緑渚行鳥喧如有訴花慘似傷情風度思前輩才華畏後生自緣耽野趣𥘉不為逃名詩廢并無藁琴亡况有函菌生舂藥臼苔蝕種花鑱徑濕慵頻掃畦荒懶自芟畏人詢往事𣣔語意先慚江月盈盈白墟煙細細隂茅茨孤碓急機杼一燈深短笛多悲調長歌少醉吟自憐知已盡空負壁間琴野渡緣沙闊村酤入市遙雨籬花婉婉風箔葦蕭蕭祠古猶供祭墳荒不禁樵夜來沙觜沒漂斷屋西槗僧居映柳莊漁市入橫塘晚渡雙橈月朝吟一硯霜療貧知有術醫俗笑無方種得青青草離憂賴爾忘淸流曲幾回喫飯此山隈歌斷憐鶯續詩遲畏酒催晚晴初見月春盡尚逢梅歸路緣江熟支笻不用陪江渚疑無岸䕷蕪逺接波花踈逰騎少酤賤醉人多燕巳將雛出蜂能負子過祗愁春巳晚欲借魯陽戈咫尺南朝寺松杉覆短垣野猿偷佛供山鳥學人言石氣晴猶濕泉聲靜却喧塵心久空寂隨意給孤園儀困非無舌顔貧尚有田病多賖藥劵貧乏買山錢白璧交徴日黃金寵賜年都將舊遊夢一笑野漚邊情深却倦逰矮屋任低頭花落東風怨鶯啼夜雨愁酒煩鄰媪買詩許社僧求𣣔駕東家鶴吹笙到十洲句曲秋日郊居雜興十首茅屋人歸後荒村更異鄉樹寒烏繞月江冷鴈啼霜影賴燈相續愁緣酒在忘明朝覽青鏡白髮幾多長出門山氣夕循徑入溪隂野水經寒淺秋風到晚深草潛驚鶻兔莎露啄魚禽自采黃花嗅誰知獨步心漸老愛秋光升沉意兩忘鴈聲偏到枕蟲響故依床薜荔千林雨芙蓉一樹霜故園叢菊在衰颯為誰香庭樹聚棲鴉溪流沒淺沙瘦憐人似菊濃愛葉如花秋色都連水寒雲忽變霞自慚長在客無地不思家囱掩輝輝燭爐消細細香無風寒尚淺有雨夜偏長飢鼠搖空槖枯螢委破囊十年江海夢此夕詎能忘地與華陽近三峯獨往來草香千品藥松老一身苔書怪猿偷讀門經鹿撞開墻東有修竹移向北庭栽編竹輔踈籬生芻束酒旗雞豚田祖廟鷹犬獵神祠玉糝菰為粉璚酥豆作糜兒童採蘆葉爭學短簫吹欲往竟無適意行仍獨還猿聲黃葉寺牛背夕陽山書棄將成業身投未老間相逢莫嘲誚才與不才間偶隨黃蝶去岸幘樹邊槗卯酒紅𥘉散朝霞白漸消沙平留鴈迹水落見魚苖却愛箕山老從容棄一瓢落葉擁柴扉村深客過稀曉車分穀去晚笛飯牛歸漁負雨蓑立鳥㗸霜果飛此中真小隱豫亦久忘機杜伯寧雨中相過晚晴告别念汝能相過危橋渡野塘入門巾屨濕滿席芰荷香我愛秋前雨人誇午後涼都將耕鑿意一笑送斜陽懷句容縣中諸友武師文山市繞寒廰雲分半榻燈苔荒征訟少果熟稅錢增薄俸長留客新詩或寄僧朱絃嗟久斷𣣔續竟誰能趙仲弘古貌復長鬚山林一老儒豐城埋古劍滄海得明珠文氣曹劉並才華沈宋俱故園諸友盡相見獨踟蹰柏師文白髮已千莖相逢喜氣生看山留十日待月坐三更秋浦槎頭釣春泥谷口耕莫言蹤迹閟朝市久知名翟好問愛尓山城隱柴門對縣衙酒資千畞苧生計一園瓜雨步荷巾濕風吟席帽斜時時扶短杖看竹到東家居行恕一榻卧秋隂松明照夜深瓦枰山館奕石薦竹窗琴老愛籠鵝字貧消買藥金岡頭三日别葉落亂蟬吟樊楚尹緑幕雨𥘉涼間齋夕漏長硯生秋蘚碧花落紫薇香教子抄書法逢人録酒方自緣耽野趣臺閣意都忘吳善飬心境兩俱寂松風時掩關佩紉蘭葉紫冠製竹皮斑飲少長先醉吟多每自刪近來登眺懶滿壁畫秋山吳損菴玉笈佩神經雙瞳煉更青秋雲分席坐春雨卧樓聽掃石持鸞尾㪺泉洗鶴翎清虛長不食輕𣣔駕飛軿巫山隱巫山青十二一一楚江濵自入山中隱都忘夢裡身玉冠蒼水珮鶴氅紫荷巾愧我方為客秋風滿靣塵送句容劉少府回楊州家具一車輕囊書與短檠吏多難别意人有去官情帆影江沉寺簫聲月到城竹西尋舊業煙雨緑蕪生贈華陽道士徐介之太極仙翁劍相傳此瘞藏蘚䀶皆鐵色松影尚雷光斗閣三花供真壇半夜香便須􅌽顧况特地宿君房客懷以上在金陵并句曲作休官得飬親况及楚江春喜極花迎笑情多柳效顰玉醪銀葉鱠紅稻紫絲蓴遙想西園草青青待逺人七月十四日過龍江親巳年逾九兒才月過周家貧歸似客路逺去如流失意螢辭火驚心燕感秋平生離别淚相對未能休沙河舟中旅懷歸正急春色到非遙草際風𥘉泛蘭心雪未消鷺明欺白髮鷗快避輕橈得遂歸田計殊恩感聖朝儀真逢張孟恭相見獨依依都緣會面稀故鄉諸友散獨客幾人歸江捴頭全白劉琨事巳非野鷗知别意故繞夜航飛瓜洲逢丘克莊江水靚如空江華冷未紅憐余猶客裏羡汝巳鄉中白苧青衫雨烏紗短帽風不須搖艇子垂釣五湖東閏七月二日發淮安舟行日巳晡帆影動檣烏河伯拋錢祭風神酹酒呼紅憐瓜似蜜白愛芡如珠且就篙師醉何煩問逺途至鍾離發書寄婉素漂泊嗟吾逺支吾賴汝賢老親思饌肉癡女憶衣綿刀尺砧聲裏燈花笑影邉聊將千里夢持送到金川盱眙懷古舊説盱眙縣居民不掩關雞聲啼鳥上人影落花間簾幕層層雨樓臺面面山惟餘孤塔在秋蘚緑斑斑舟中聞促織促織來何處哀吟近短蓬不堪為客裏况復是舟中殘夢寒衾月孤燈夜枕風此時腸欲斷恨不耳雙聾元夕前雨楚澤春𥘉入巴江水又來草憐容易緑花恨較遲開月暗燈慵試衣單苧懶栽晴光在梅柳應待鼓聲催人日懷髙啓客路逢人日流光惜易過楚山青漸少吳樹緑還多短􅋄茸茸雪輕鳬隊隊波無因寄髙適詩罷獨吟哦哭陳仲野都事沒任所氷雪阻修途畸魂託老奴百年鄉夢斷萬里客墳孤囊槖遺書在期功逺姓無一盂寒食飯誰與掃榛蕪輿紼暗風沙丹旌映晚霞吏人營殯殮童僕著衰麻襲廕無遺嗣招魂有外家重來恐迷處記取路三義送沈自誠任武康縣丞朱紱還家日青衫佐縣時野蠶春自繭山犬暮生氂細讀隋唐律間臨漢魏碑都將晉陽事寫作送行詩寄張彥禎以上赴河南途中作城小更臨邉今聞太守賢牛歸新覆屋農種久荒田機杼春坊月旌旗晝壘煙直須興禮樂閭巷盡歌絃省中元夕剪綵簇牡丹燈一樹戲題綵樹玉為柯銀燈錦作窩絳紗籠月小金剪得春多暖艷千枝雪天香五色羅掖垣齋事肅相對夜如何洪都江流與郡通山勢向西雄緑樹南風裏黃梅細雨中城門帝子閣鐵柱羽人宫𣣔就蘇公飲東湖小圃東立夏前一日有賦漸老緑隂天無家怯杜鵑東風有今夜芳草又明年蠶熟新絲後茶香煮酒前都將南浦恨聊寄北窗眠東湖晚眺漚沒岸如無涼多柳易枯巫歸神廟靜兵語驛亭孤日落霞明渚虹收雨暗湖此時篷底坐天盡是東吳湖口見月以上在江西作秋月自嬋姢澄波照更妍梳憐宫鬢側眉想鏡臺前𥘉見愁將墮猶觀喜漸圓旅懷何處感風露九江船風雨泊舟江渚𥘉寒夜全家在一篷漂零兼主㒒憂患及兒童柝響孤城雨鐘聲逺寺風明朝青鏡裏鬚髮定成翁晚過秋浦淡日雨晴天江村正可憐碧雲𥘉見鴈紅樹尚聞蟬一望皆秋色千山各暮煙自慚簪組纍羞近釣魚船晚登峨眉亭亭子慿虗好登臨似鏡臺江分一股折山作兩眉開濃愛秋煙隔顰疑暮雨來短歌聊共寫深愧謫仙才沙河至采石近午風猶熱微隂日巳凄病軀勞更弱憂色瘦偏黧路轉蒹葭入舟從絡緯棲此中腸易斷不待玉關西河曲帆頻轉波髙夢屢驚學人狐拜月照骨鬼吹燈斷甓沉沙嘴殘碑露石􅏢不知何縣邑芳草沒荒塍病後難為客天涯獨此身幾朝才聽鵲千里未逢人夢好徒增喜詩工不療貧悔將孤釣艇拋棄五湖濵舟中逾一月驛路及三千老淚青衫上新愁白髮前蛩聲秋岸雨鴻影暮河煙不有西征客誰同此夜眠逢鄉人俞武仲釃酒酹江神占風𣣔問津偶于春草外逢著故鄉人語密終難别知新却易親因君問先壟清淚滿衣巾江船早起霽色耀輕霞風檣起曙鴉防寒慿酒力避淺問漁家日出雞鳴樹波清蟹上沙此時篷底坐極目看蘆花夜坐坐久一船霜神清念慮忘水當深夜白星隔大川黃鐘斷松間寺燈歸柳下莊鳬鷖方露宿漁父莫鳴榔夜坐聞江聲天寒月滿川冬夜木蘭船人影清于鶴江聲急似弦書殘燈落燼香在帳留煙多少關心事相隨到目前江船聞柝月皎江逾白沙明岸𣣔無柝聲寒郭靜人語夜航孤酒渴思分橘衣單怯絮蘆遙憐抱關者霜露裂肌膚宿雲港三首新月低江樹回風疊浪花珠明𥘉見斗綺淡𣣔銷霞轉柁防危石收帆避淺沙鄰船有漁火兒女自成家孤楫辨漁舟雙旌識戍樓江山人老去嵗月水東流鶩外霞催晚虹邉雨送秋不因風浪急那得此淹留江闊淨無埃澄澄一鑑開兩帆煙外小單櫓月中哀更靜漚𥘉定秋深鴈未來誰家東戶好蒲柳逐行栽晚入湖口過大悲閣石斷岸爭出蘿垂樹倒懸僧吟秋閣雨人渡野航煙鴈鶩清江畔蒹葭白露前終慚纍軒冕空學在家禪至吳城山得南風過湖沙嘴南風起船頭雨正飛人方離别去鴈又竟辭歸暖日紅生暈晴波緑漲肥龍君廟前柳顔色妬羅衣謁鄱陽湖龍君廟劍履朱𫀆列幢幡碧殿開舟人沉璧祭神女獻珠來𣣔雨蟬鳴樹將風鵲繞臺瑶函有珉册猶是楚王裁出左蠡望廬山時春雨新霽山色明潤獨不見五老峯為賦瀑布銀河落香爐紫霧分諸峯皆翠碧五老獨煙雲澗濕雨猶滴坡香草自薰遙知幽絶處麋鹿自成群夜泊琵琶亭聞笛夜泊古亭邉春愁滿畫船青衫司馬淚紅袖琵琶絃故國人何在澄江月又圓誰將折楊桞三弄落花前江邉小旗亭亭子枕春沙青旗趂雨斜瀟湘新畫壁桃李舊栽花換酒來雙鯉當爐立兩鴉當年下江客相約送新茶雨中登望湖亭有懷幕中諸友水接虛無白亭浮浩蕩開登臨能幾日風雨又重來藕濕花𥘉斂蒲深葉半摧乍同諸友别吟望獨徘徊鸚鵡洲緑繞武昌城遙連漢口營䕷蕪昨夜雨鸚鵡舊時名詩句憐崔皓才華惜禰衡誰能洲下泊不有釣蓑情江夏朱元瑾折蘭花見寄幽蘭不易得孤潔比秋霜自可供金屋何須寄草堂一花湘水碧數葉楚山長便結參差佩羅衣十日香嶽陽樓春色醉巴陵闌干落洞庭水吞三楚白山接九疑青空闊魚龍舞娉婷帝子靈何人夜吹笛風急雨冥冥舟中聞杜鵑落月祁陽路聲聲呌子規萬山春盡夜孤枕夢回時客自傷漂泊人誰念别離無多眼中淚聽汝不勝悲宿巴陵楚有巴陵好君山對縣門暮煙湘樹逺春雨蜀江渾日落船依岸人歸犬吠村慿虛望雲夢胸次詎能吞入永州石氣隂才霧嵐霏暖𣣔霞憩床腥畏虎飲澗毒防蛇紅葉秋崖樹青蘿晚洞花江山盤屈外遙認兩三家零陵二首地僻三苖近江回二水兼青林皆種蠟赤穀半收鹽好武人輕鬪多祠俗尚占晚來山霧濕衣薄又須添古瓦籠山葛荒碑仆石楠江晴𥘉漲雨城午未銷嵐甕冨鯖羞鹿杯渾酒餉蚺邦人盡麻枲終歲不知蠶湘中雜言九首春水連春草遙遙一望同煙江來漢口雲樹出湘中竹有啼䀶碧花仍笑靨紅誰能鼓瑶瑟哀怨向東風小雨弄春晴湖光媚更清髻憐新沐後眉愛靚粧成鵠潔知無纍鷗明覺倍輕離離川上草端為客愁生鄂渚雲歸後巴山雨過時鵑啼湘女廟花落楚王祠家逺身如夢愁多鬢易絲聊將身暫泊沙觜看鸕鷀風起一湖香青青杜若長花迎衝浪楫燕逐使風檣𣣔釆蘭為佩仍褰荔作裳何如山閣上屏裏看瀟湘江晚樹沉沉群山入漢隂驛亭千柳暗僧院百花深鷺曝愁融雪鶯流𣣔墮金旅懷元易感非有壯逰心鷗聚江𥘉靜鴉啼樹巳昏碧湘悲帝子芳草怨王孫帆影煙中浦漁燈雪後村匆匆萬里客極目正銷魂城近江臨郭沙虛月在川柳宜春雪後花怯晚風前野㸑三家市鄉音幾處船坐聽磯下水嘈雜響湘絃山霽雲猶濕江寒雪未消雙旗樓鼓急孤塔寺鍾遙水緑鳬鷖藻洲香翡翠苕巴人暮歸急橫渡不停橈指點鷗飛處人間是嶽州湘潭山亂出江漢水兼流深竹新祠宇飛花舊酒樓平生巴楚夢明日洞庭逰𥘉入山西境以上使湖南作晉鄙不識稻來牟常在庖民居多土窟官賦半羊毛七月裘寒著千山狼夜嘷遺風唐儉嗇古廟享臯陶山西秋日淡日荷香外微涼樹影邉俄聞落踈雨便覺是秋天塞近風寒早天髙氣候偏忽思陳鼓吹萬馬向居延和宋大參省垣對雪和氣春前入瑶花雨後寒簾踈穿每易闌曲聚偏難客自衣裳薄人誰夢寐安掖垣今夜直離恨正多端以上在山西作五言排律水邉見新燕昔别秋風後今歸社雨前巢非金屋舊人是玉堂仙頥頷公侯似腰肢妓女憐花明春殿雪柳暗御樓煙羅幕栖長並銀屏過每聮尾寒鶯共濕衣暖蝶爭妍忽見青簾外俄逢緑水邉莫嗔茆舍小臺榭總蕭然早秋送趙景普東歸歌斷復依依情多忍遽違未緣春色晚自感故交稀舟傍荷花宿人先燕子歸乍涼才却扇多病𣣔添衣驛樹風蟬咽江祠雨鶴飛幾時搖艇子來扣竹間扉元夕京城觀燈與楊廉夫先生同賦琪樹繞春蛾銀燈爛絳羅風柔宵漏永天近月明多瑞靄浮雙闕繁星動兩河仗迎仙佩出香拂輦塵過􅔽蓞層層雪魚龍灔灔波清時更良夜逰宴莫蹉跎送傅子敬憲使朝散掖垣風恩乘憲使􅍡星辰天只尺山水浙西東民力凋零後君心屬念中江晴鷗泛雪雲淨鶚橫空草復新年緑花仍故苑紅無因送君去鄉夢託冥鴻送竺孟容戍營丘內殿朝辭日東藩報命時白門花婉婉青社草離離山雨朱𫀆濕江風錦帽欹禡牙朝進祝散虜夜吹箎士馬驚銅鼓兒童識繡旗突圍當左拒射敵中斜枝赤手千人服丹心一劒知功成正年少雙鬢未如絲趙宜人衛氏挽章故國王孫貴名家母德新令儀推冡婦榮寵錫宜人讀史青閨夜治絲錦帳春野煙條緑柘溪雨釆香蘋熊膽資諸子虬髯識衆賔鏡臺俄掩月琴匣久蒙塵遺範傳宗閫悲歌動縉紳霞坡原上草相望一傷神八月九日祀社稷述事祝史祝王册儒臣奉誓詞衣冠陳盛典秬鬯降洪釐用報金穰瑞仍祈雨露私勾龍嚴配位神棄肅明祠幣玉趨宗伯笙鏞奏瞽師精靈潛格爾盻響儼來思赤壤新封國玄牲舊制儀豈惟宜土穀還得奠邦畿師出常依主君行每告期禮終受多祜民物正熙熙晉邸北狩剛戊吉𥘉涓藩宫武用宣獮田之藪隰旄莭邁闉廛匝驪為鉓幩䘖驒作纒彤弓臣纍百貝胄士逾千雲路龍章衮璇霄鶴駕軿和鸞軾前奏韔服䪌傍懸笳鼓鳴翻海罝羅布匝煙獫猋過走兔鷹翥捷飛鳶洡沮多麋鹿豳岐盛豕豜延賔左髀逹登豆右腢穿殪兕才方著當熊譽又傳骨都魂亦散敕勒部齊遷固以巽爻象不殊詩雅篇邉氓瞻紀律勳業可銘鐫眉菴集卷之七
