front:
  text: 眉菴集卷之七
  hash: sha256:b0aa5d60da3f94cb967753b5e189884179e6c724568a5e56abb3cbbb29f127df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0041_SBCK_007-1a}
body:
  text: 五言律姑蘇楊基孟載著省垣對雨二首朱邸開東閣青閨對晚林雨苔行䖏濕風葉坐来深俯仰唯緘口交㳺孰吐心偶逢佳節醉萬事捴銷沉舊雨深叢菊新霜小樹楓醉憐花冷淡愁愛葉踈紅沙逺無鳴柝江寒有㫁鴻覉懐誰共語黙黙坐書空贈秦侍儀右二首江西作文釆玉姢姢班行内外聮蕃王從學拜邉使候通箋侍立􅊮庭上追趨法駕前今朝退朝早衣上有爐烟送翰林脩撰劉用章赴滇陽桂苑思戎客薇垣亞相才人皆期管樂我獨愛鄒枚霧雨爐熏掩星河殿影開玉堂清切地遲爾早歸耒宿髙季迪京舘歲晚此相逢郷情佀酒濃語長銷夜燭夣短及晨鐘急雪風鳴葦㣲雲月照松雞前趨闕去寒樹曉籠䓗春盡始聞鶯聲衆緑藹園池鶯聲逺更宜愛扵三月暮聴似百花時上苑啼應早南風見自遲緑窓殘夣㫁相憶海棠枝爲牛諒侍御題畫步履近星辰霜凝翠栢新自憐烏府月應照白頭人綉斧監祠夜封章待漏晨清朝崇孝治一飯不忘親和牛侍御懐弟之作春草緑芊芊看雲憶恵連午隂花蕚上秋色鴈行邉此日臨池坐當時聴雨眠應将舒卷意戯綵北堂前懐吴中赤山舊業東林携䇿䖏南垞釋畊時一逕都縁石諸泉盡到池静憐松響續凉愛竹隂移盛世容㱕隱毋令觧組遲漸與世紛逺自然塵慮消沿随碧溪水徑渡緑隂槗岐路迷還識孤村近却遥閑身任来徃不為野人招夏夜有懐重露澄秋色輕風生夜凉碧看湖草亂紅愛渚蓮香有弟徒相憶何人不異郷悲笳在城上雙淚落衣裳逢鄭校書一従淮水别千里各西東又是秋風後相逢客路中鬚眉怜我老憂患憶君同遥想西齋宿孤燈照影紅江村雜興春墅一鳩啼橋危懶過谿徑苔都上壁野菜不分畦倚杖妨花宻看山碍竹低欲知幽隱䖏風雨白門西陋巷泥三尺無人訪隱淪窓鳴風减睡炊斷雨添貧野路花迎客江槗柳送人暫湏依薄俗憇此竄餘身春色冶城東花濃咲老翁燕遲雙壘破蜂早一房通薄暝山腰雨踈紋水靣風便携蓑笠去垂釣緑蒲中判醉望愁醒愁因醉轉増巳歸仍佀客投老漸如僧詩興風樓笛棋聲雪舫燈莫言渾不觧此事野夫能東瀼復西圻村村可釣磯草扵烟䖏宻花較雨前稀小管催鶯出踈簾待燕㱕傷心新栁色猶妬舊羅衣偶因辭禄去聊傍葦邊㞐瓢棄頻賖後衣存屡典餘晚簾花掠燕春水絮吹魚復恐沙崩石楊栽挿遶廬江槗春别後沙舸獨歸時䳘鴨東西宅菰蒲逺近陂藕深荷盖宻竹瘦筍鞭遲野趣誰能識唯應白鷺知斜檻俯江湍輕帘矗小竿柳寒鶯羽濕花暖蝶鬚乾酒或臨流酌詩多冩石看不因迂僻地那得此身安江影揺春樹潮㾗摺晚沙緑蕪三尺雨朱槿一籬花去國仍思國還家復夣家自無干禄意何必逺京華將雨山光黒𥘉晴樹色青賣薪沙店逺占糓瓦亀靈石枕支頥冷江瓢潄齒腥醉餘春睡熟長得鳥呼醒乍暖夾衣輕閑依緑渚行鳥喧如有訴花慘佀傷情風度思前軰才華畏後生自縁耽野趣𥘉不為逃名詩廢并無藁琴亡况有凾菌生舂薬臼苔蝕種花鑱徑濕慵頻掃畦荒懶自芟畏人詢徃事𣣔語意先慚江月盈盈白墟烟細細隂茅茨孤碓急機杼一燈深短笛多悲調長歌少醉吟自憐知已盡空負壁間琴野渡縁沙闊村酤入市遥雨籬花婉婉風箔葦蕭蕭祠古猶供祭墳荒不禁樵夜来沙觜沒漂断屋西槗僧㞐映柳庄漁市入横塘晚渡雙橈月朝吟一硯霜療貧知有術醫俗咲無方種得青青草離憂頼爾忘淸流曲㡬囬喫飯此山隈歌斷憐鶯續詩遲畏酒催晚晴初見月春盡尚逢梅歸路縁江熟支笻不用陪江渚疑無岸䕷蕪逺接波花踈逰騎少酤賤醉人多燕巳將雛出蜂能負子過祗愁春巳晚欲借魯陽戈咫尺南朝寺松杉覆短垣野猿偷佛供山鳥學人言石氣晴猶濕泉聲静却喧塵心乆空寂随意給孤園儀困非無舌顔貧尚有田病多賖薬劵貧乏買山錢白璧交徴日黃金寵賜年都將舊㳺夢一咲野漚邊情深却倦逰矮屋任低頭花落東風怨鶯啼夜雨愁酒煩隣媪買詩許社僧求𣣔駕東家鶴吹笙到十洲句曲秋日郊居雜興十首茅屋人歸後荒村更異郷樹寒烏遶月江冷鴈啼霜影頼燈相續愁縁酒在忘明朝覧青鏡白髪㡬多長出門山氣夕循徑入谿隂野水經寒淺秋風到晚深草潜驚鶻兎莎露啄魚禽自采黃花嗅誰知獨步心漸老愛秋光升沉意兩忘鴈聲偏到枕䖝響故依床薜荔千林雨芙蓉一樹霜故園樷菊在衰颯為誰香庭樹聚棲鴉溪流沒淺沙瘦憐人佀菊濃愛葉如花秋色都連水寒雲忽變霞自慚長在客無地不思家囱掩輝輝燭爐消細細香無風寒尚淺有雨夜偏長飢䑕摇空槖枯螢委破囊十年江海夣此夕詎能忘地與華陽近三峯獨往來草香千品藥松老一身苔書怪猿偷讀門經鹿撞𨳩墙東有脩竹移向北庭栽編竹𥙷踈籬生芻束酒旗雞豚田祖廟鷹犬獵神祠玉糝菰為粉璚酥荳作糜児童採蘆葉争學短簫吹欲往竟無適意行仍獨還猿聲黄葉寺牛背夕陽山書棄將成業身投未老閑相逢莫嘲誚才與不才間偶随黄蝶去岸幘樹邊槗卯酒紅𥘉散朝霞白漸消沙平留鴈跡水落見魚苖却愛箕山老從容棄一瓢落葉擁柴扉村深客過稀曉車分糓去晚笛飯牛㱕漁負雨蓑立鳥㗸霜果飛此中真小隱予亦乆忘機杜伯寜雨中相過晚晴告别念汝能相過危橋渡野塘入門巾屨濕滿席芰荷香我愛秋前雨人誇午後凉都將畊鑿意一咲送斜陽懐句容縣中諸友武師文山市遶寒廰雲分半榻燈苔荒征訟少果熟稅錢增薄俸長留客新詩或寄僧朱絃嗟乆断𣣔續竟誰能趙仲弘古貌復長鬚山林一老儒豐城埋古劍滄海得明珠文氣曹劉並才華沈宋俱故園諸友盡相見獨踟蹰栢師文白髪已千莖相逢喜氣生看山留十日待月坐三更秋浦槎頭釣春泥谷口畊莫言踪跡閟朝市乆知名翟好問愛尓山城隱柴門對縣衙酒貲千畞苧生計一園瓜雨步荷巾濕風吟蓆㡌斜時時扶短杖㸔竹到東家居行恕一榻卧秋隂松明照夜深瓦枰山舘奕石薦竹窓琴老愛籠䳘字貧消買藥金岡頭三日别葉落亂蟬吟樊楚尹緑幙雨𥘉凉閑齋夕漏長硯生秋蘚碧花落紫薇香教子抄書法逢人錄酒方自縁耽野趣臺閣意都忘吴善飬心境兩俱寂松風時掩関佩紉蘭葉紫冠製竹皮斑飲少長先醉吟多每自刪近来登眺懶滿壁畫秋山吴損菴玉笈佩神經雙瞳煉更青秋雲分席坐春雨卧樓聽掃石持鸞尾㪺泉洗鶴翎清虚長不食輕𣣔駕飛軿巫山隱巫山青十二一一楚江濵自入山中隱都忘夣裡身玉冠蒼水珮鶴氅紫荷巾媿我方為客秋風滿靣塵送句容劉少府囬楊州家具一車輕囊書與短檠吏多難别意人有去官情㠶影江沉寺簫聲月到城竹西尋舊業烟雨緑蕪生贈華陽道士徐介之太極仙翁劍相傳此瘞蔵蘚㾗皆鉄色松影尚雷光斗閣三花供真壇半夜香便湏􅌽頋况特地宿君房客懷以上在金陵并句曲作休官得飬親况及楚江春喜極花迎咲情多柳效顰玉醪銀葉鱠紅稻紫絲蓴遥想西園草青青待逺人七月十四日過龍江親巳年逾九児纔月過週家貧㱕佀客路逺去如流失意螢辭火驚心燕感秋平生離别淚相對未能休沙河舟中旅懐歸正急春色到非遥草際風𥘉汎蘭心雪未消鷺明欺白髪鷗快避輕橈得遂歸田計殊恩感聖朝儀真逢張孟恭相見獨依依都緣㑹面稀故郷諸友散獨客㡬人歸江捴頭全白劉琨事巳非野鷗知别意故繞夜航飛瓜洲逢丘克荘江水靚如空江華冷未紅憐余猶客裏羡汝巳郷中白苧青衫雨烏紗短㡌風不湏摇艇子垂釣五湖東閏七月二日發淮安舟行日巳晡㠶影動檣烏河伯抛錢祭風神酹酒呼紅憐瓜似蜜白愛芡如珠且就篙師醉何煩問逺途至鍾離發書寄婉素漂泊嗟吾逺支吾頼汝賢老親思饌肉癡女憶衣綿刀尺砧聲裏燈花咲影邉聊将千里夢持送到金川盱眙懐古舊說盱眙縣居民不掩関雞聲啼鳥上人影落花間簾幙層層雨樓䑓面面山惟餘孤塔在秋蘚緑斑斑舟中聞促織促織来何䖏哀吟近短蓬不堪為客裏况復是舟中殘夣寒衾月孤燈夜枕風此時腸欲斷恨不耳雙聾元夕前雨楚澤春𥘉入巴江水又来草憐容易緑花恨較遲𨳩月暗燈慵試衣单苧懶栽晴光在梅柳應待鼓聲催人日懐髙啓客路逢人日流光惜易過楚山青漸少吴樹緑還多短􅋄茸茸雪輕鳬隊隊波無因寄髙適詩罷獨吟哦哭陳仲野都事没任所氷雪阻脩途畸魂託老奴百年郷夢㫁萬里客墳孤囊槖遺書在期功逺姓無一盂寒食飯誰與掃榛蕪輿紼暗風沙丹旌映晚霞吏人營殯殮童僕着衰麻襲廕無遺嗣招魂有外家重来恐迷䖏記取路三义送沈自誠任武康縣丞朱紱還家日青衫佐縣時野蚕春自蠒山犬暮生氂細讀隋唐律閒臨漢魏碑都將晋陽事冩作送行詩寄張彦禎以上赴河南途中作城小更臨邉今聞太守賢牛歸新覆屋農種乆荒田機杼春坊月旌旗晝壘烟直湏興禮樂閭巷盡歌絃省中元夕剪綵簇牡丹燈一樹戯題綵樹玉為柯銀燈錦作窩絳紗籠月小金剪得春多暖艶千枝雪天香五色羅掖垣齋事肅相對夜如何洪都江流與郡通山勢向西雄緑樹南風裏黄梅細雨中城門帝子閣鉄柱羽人宫𣣔就蘇公飲東湖小圃東立夏前一日有賦漸老緑隂天無家怯杜鵑東風有今夜芳草又明年蠶熟新絲後茶香煑酒前都將南浦恨聊寄北窓眠東湖晚眺漚沒岸如無凉多柳易枯巫歸神廟静兵語驛亭孤日落霞明渚虹収雨暗湖此時篷底坐天盡是東吴湖口見月以上在江西作秋月自婵姢澄波照更妍梳憐宫鬂側眉想鏡䑓前𥘉見愁将堕猶觀喜漸圓旅懐何䖏感風露九江船風雨泊舟江渚𥘉寒夜全家在一篷漂零兼主㒒憂患及児童柝響孤城雨鐘聲逺寺風明朝青鏡裏鬚髪定成翁晚過秋浦淡日雨晴天江村正可憐碧雲𥘉見鴈紅樹尚聞蝉一望皆秋色千山各暮烟自慚簪組累羞近釣魚船晚登峨眉亭亭子慿虗好登臨似鏡䑓江分一股折山作兩眉開濃愛秋烟隔顰疑暮雨来短歌聊共冩深愧謫仙才沙河至采石近午風猶熱微隂日巳凄病軀勞更弱憂色瘦偏黧路轉蒹葭入舟從絡緯棲此中腸易斷不待玉關西河曲㠶頻轉波髙夢屡驚學人狐拜月照骨鬼吹燈断甓沉沙嘴殘碑露石􅏢不知何縣邑芳草沒荒塍病後難為客天涯獨此身㡬朝纔聽鵲千里未逢人夢好徒増喜詩工不療貧悔將孤釣艇抛棄五湖濵舟中逾一月驛路及三千老淚青衫上新愁白髪前蛩聲秋岸雨鴻影暮河烟不有西征客誰同此夜眠逢郷人俞武仲釃酒酹江神占風𣣔問津偶扵春草外逢着故郷人語宻終難别知新却易親因君問先壟清淚滿衣巾江船早起霽色耀輕霞風樯起曙鴉防寒慿酒力避淺問漁家日出雞鳴樹波清蠏上沙此時篷底坐極目看蘆花夜坐坐乆一船霜神清念慮忘水當深夜白星隔大川黄鐘㫁松間寺燈歸柳下庄鳬鷖方露宿漁父莫鳴榔夜坐聞江聲天寒月滿川冬夜木蘭船人影清扵鶴江聲急似弦書殘燈落燼香在帳留烟多少関心事相随到目前江船聞柝月皎江逾白沙明岸𣣔無柝聲寒郭静人語夜航孤酒渇思分橘衣单怯絮蘆遥憐抱関者霜露裂肌膚宿雲港三首新月低江樹囬風疊浪花珠明𥘉見斗綺淡𣣔銷霞轉柁防危石収㠶避淺沙鄰船有漁火児女自成家孤檝辨漁舟雙旌識戍樓江山人老去嵗月水東流鶩外霞催晚虹邉雨送秋不因風浪急那得此淹留江闊净無埃澄澄一鑑𨳩兩㠶烟外小单櫓月中哀更静漚𥘉定秋深鴈未来誰家東戸好蒲柳逐行栽晚入湖口過大悲閣石㫁岸争出蘿垂樹倒懸僧吟秋閣雨人渡野航烟鴈鶩清江畔蒹葭白露前終慚累軒冕空學在家禅至吴城山得南風過湖沙嘴南風起船頭雨正飛人方離别去鴈又竟辭歸暖日紅生暈晴波緑漲肥龍君廟前柳顔色妬羅衣謁鄱陽湖龍君廟劍履朱𫀆列幢幡碧殿開舟人沉璧祭神女獻珠来𣣔雨蟬鳴樹将風鵲遶䑓瑶凾有珉冊猶是楚王裁出左蠡望廬山時春雨新霽山色明潤獨不見五老峯為賦瀑布銀河落香爐紫霧分諸峯皆翠碧五老獨烟雲澗濕雨猶滴坡香草自薰遥知幽絶䖏麋鹿自成群夜泊琵琶亭聞笛夜泊古亭邉春愁滿畫船青衫司馬淚紅袖琵琶絃故國人何在澄江月又圓誰将折楊桞三弄落花前江邉小旗亭亭子枕春沙青旗趂雨斜瀟湘新畫壁桃李舊栽花換酒来雙鯉當鑪立兩鴉當年下江客相約送新茶雨中登望湖亭有懐幕中諸友水接虚無白亭浮浩蕩開登臨能㡬日風雨又重来藕濕花𥘉歛蒲深葉半摧乍同諸友别吟望獨徘徊鸚鵡洲緑遶武昌城遥連漢口營䕷蕪昨夜雨鸚鵡舊時名詩句憐崔顥才華惜禰衡誰能洲下泊不有釣蓑情江夏朱元瑾折蘭花見寄幽蘭不易得孤㓗比秋霜自可供金屋何湏寄草堂一花湘水碧数葉楚山長便結參差佩羅衣十日香岳陽樓春色醉巴陵闌干落洞庭水吞三楚白山接九疑青空闊魚龍舞娉婷帝子靈何人夜吹笛風急雨冥冥舟中聞杜䳌落月祁陽路聲聲呌子規萬山春盡夜孤枕夣囬時客自傷漂泊人誰念别離無多眼中淚聴汝不勝悲宿巴陵楚有巴陵好君山對縣門暮烟湘樹逺春雨蜀江渾日落船依岸人歸犬吠村慿虚望雲夢胷次詎能吞入永州石氣隂才霧嵐霏暖𣣔霞憇床腥畏虎飲磵毒防蛇紅葉秋崖樹青蘿晚洞花江山盤屈外遥認兩三家零陵二首地僻三苖近江囬二水兼青林皆種蠟赤糓半収塩好武人輕闘多祠俗尚占晚来山霧濕衣薄又湏添古瓦籠山葛荒碑仆石楠江晴𥘉漲雨城午未銷嵐甕冨鯖羞鹿盃渾酒餉蚺邦人盡麻枲終歲不知蚕湘中雜言九首春水連春草遥遥一望同烟江来漢口雲樹出湘中竹有啼㾗碧花仍咲靨紅誰能鼓瑶瑟哀怨向東風小雨弄春晴湖光媚更清髻憐新沐後眉愛靚粧成鵠㓗知無累鷗明覺倍輕離離川上草端為客愁生鄂渚雲歸後巴山雨過時䳌啼湘女廟花落楚王祠家逺身如夣愁多鬂易絲聊將身暫泊沙觜看鸕鷀風起一湖香青青杜若長花迎衝浪楫燕逐使風檣𣣔釆蘭為佩仍褰荔作裳何如山閣上屏裏看瀟湘江晚樹沉沉群山入漢隂驛亭千柳暗僧院百花深鷺曝愁融雪鶯流𣣔堕金旅懐元易感非有壮逰心鷗聚江𥘉静鴉啼樹巳昏碧湘悲帝子芳草怨王孫㠶影烟中浦漁燈雪後村匆匆萬里客極目正銷魂城近江臨郭沙虚月在川柳宜春雪後花怯晚風前野㸑三家市郷音㡬䖏船坐聽磯下水嘈雜響湘絃山霽雲猶濕江寒雪未消雙旗樓鼓急孤塔寺鍾遥水緑鳬鷖藻洲香翡翠苕巴人暮歸急横渡不停橈指點鷗飛䖏人間是岳州湘潭山亂出江漢水兼流深竹新祠宇飛花舊酒樓平生巴楚夣明日洞庭逰𥘉入山西境以上使湖南作晉鄙不識稻来麰常在庖民居多土窟官賦半羊毛七月裘寒着千山狼夜嘷遺風唐儉嗇古廟享臯陶山西秋日澹日荷香外微凉樹影邉俄聞落踈雨便覺是秋天塞近風寒早天髙氣候偏忽思陳鼓吹萬馬向㞐延和宋大叅省垣對雪和氣春前入瑶花雨後寒簾踈穿每易闌曲聚偏難客自衣裳薄人誰夢寐安掖垣今夜直離恨正多端以上在山西作五言排律水邉見新燕昔别秋風後今歸社雨前巢非金屋舊人是玉堂仙頥頷公侯似腰肢妓女憐花明春殿雪柳暗御樓烟羅幕栖長並銀屏過每聮尾寒鶯共濕衣暖蝶争妍忽見青帘外俄逢緑水邉莫嗔茆舎小䑓榭總蕭然早秋送趙景普東歸歌㫁復依依情多忍遽違未緣春色晚自感故交稀舟傍荷花宿人先燕子歸乍凉才却扇多病𣣔添衣驛樹風蟬咽江祠雨鶴飛㡬時摇艇子来扣竹間扉元夕京城觀燈與楊廉夫先生同賦琪樹遶春蛾銀燈爛絳羅風柔宵漏永天近月明多瑞靄浮雙闕繁星動兩河仗迎仙佩出香拂輦塵過􅔽蓞層層雪魚龍灔灔波清時更良夜逰讌莫蹉跎送傅子敬憲使朝散掖垣風恩乗憲使􅍡星辰天只尺山水浙西東民力凋零後君心属念中江晴鷗汎雪雲净鶚横空草復新年緑花仍故苑紅無因送君去郷夣託冥鴻送竺孟容戍營丘内殿朝辭日東藩報命時白門花婉婉青社草離離山雨朱𫀆濕江風錦㡌欹禡牙朝進祝散虜夜吹箎士馬驚銅鼓児童識綉旗突圍當左拒射敵中斜枝赤手千人服丹心一劒知功成正年少雙鬂未如絲趙宜人衛氏挽章故國王孫貴名家母徳新令儀推冡婦榮寵錫宜人讀史青閨夜治絲錦帳春埜烟條緑柘溪雨釆香蘋熊膽資諸子虬髯識衆賔鏡臺俄掩月琴匣乆蒙塵遺範傳宗閫悲歌動縉紳霞坡原上草相望一傷神八月九日祀社稷述事祝史祝王冊儒臣奉誓詞衣冠陳盛典秬鬯降洪釐用報金穰瑞仍祈雨露私勾龍嚴配位神棄肅明祠幣玉趨宗伯笙鏞奏瞽師精靈潜格尔盻響儼来思赤壤新封國玄牲舊制儀豈惟宜土糓還得奠邦畿師出常依主君行每告期禮終受多祜民物正熈熈晉邸北狩剛戊吉𥘉㳙藩宫武用宣獮田之藪隰旄莭邁闉廛帀驪為鉓幩䘖驒作纒彤弓臣累百貝胄士逾千雲路龍章衮璇霄鶴駕軿和鸞軾前奏韔服䪌傍懸笳鼔鳴翻海罝羅布匝烟獫猋過走兎鷹翥捷飛鳶洡沮多麋鹿豳岐盛豕豣延賔左髀逹登豆右腢穿殪兕才方著當熊譽又傳骨都魂亦散敕勒部齊迁固以巽爻象不殊詩雅篇邉氓瞻紀律勲業可銘鐫眉菴集卷之七
